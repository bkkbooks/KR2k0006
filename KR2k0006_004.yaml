body:
  text: 輿地廣記卷四宋歐陽忞撰皇朝郡國四京東京西京南京北京京東東路青宻齊沂登萊濰淄淮陽京東西路兖徐拱興仁鄆濟單濮廣濟京西南路㐮鄧隨金房均郢唐光化京西北路潁昌鄭滑孟蔡陳潁汝信陽河北東路開徳河間滄冀博棣莫雄霸徳濵恩清永靜信安保定河北西路真定相中山邢懐衛洺深磁祁趙保安肅永寜廣信順安河北路化外州安東上都䕶幽涿易檀葪媯平營陜西永興軍路京兆河中陜延安同華耀邠鄜解慶虢商寜坊丹環銀綏徳保安陜西秦鳯路鳯翔秦涇熈隴成鳯岷渭原階河蘭鞏㑹西安西寜湟廓洮鎮戎徳順懐徳積石陜西路化外州安西大都䕶北庭大都䕶靈夏凉沙𤓰鹽勝西伊甘肅疊宕豐宥河東路太原潞晉府麟絳代隰慈忻汾澤憲嵐石遼豐威勝平定岢嵐寜化火山保徳晉河東路化外州單于大都䕶安北大都䕶鎮北大都䕶雲應新蔚朔寰儒毅淮南東路揚亳宿楚海㤗泗滁真通髙郵淮南西路夀廬蘄和舒濠光黄無為西浙路杭越平江潤湖婺明常温台處衢睦秀江南東路江寜宣歙江池饒信太平南康廣徳江南西路洪䖍吉袁撫筠興國南安臨江建昌荆湖南路潭衡道永郴邵全武岡桂陽荆湖北路江陵鄂安復鼎澧峡岳歸辰沅靖漢陽荆門荆湖北路化外州錦奨溪成都府路成都眉蜀彭緜漢嘉卭黎雅茂簡威祺亨永康仙井成都府化外州松當悉静恭柘翼真乾姚嶲梓州路梓遂果資普昌叙瀘合榮渠懐安廣安長寧富順利州路興元利洋閬劍巴文興蓬龍三泉利州路化外州扶䕫州路䕫黔達施忠萬開涪恭珍承溱梁山南平遵義大寜䕫州路化外州費西髙福建路福建泉南劍汀漳邵武興化廣南東路廣韶循潮連封端新康南恩梅南雄英恵廣南西路桂容邕融象賀昭梧藤龔潯貴栁宜賔横化髙雷欽欎林亷瓊昌化萬安朱崖廣南路化外州安南大都䕶峯瀼巖田愛驩陸福祿長湯演林景山環籠古輿地廣記卷四
