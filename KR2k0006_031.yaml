body:
  text: 輿地廣記卷三十一宋歐陽忞撰梓州路𦂳梓州春秋戰國為蜀地秦屬蜀郡二漢晉宋齊屬廣漢郡梁宋置新州西魏置昌城郡隋開皇初郡廢後改新州為梓州大業初州廢置新城郡唐武徳元年曰梓州天寳元年曰梓潼郡乾元後升為劍南東川節度皇朝乾徳四年改静戎軍太平興國三年改安静軍端拱二年復故今縣九望郪縣二漢屬廣漢郡晉省之置五城縣梁置新州西魏改五城曰昌城置昌城郡隋改新州曰梓州大業初置新城郡改昌城曰郪唐置梓州其城左帶涪水右挾中江居水陸之衝要漢郪縣故城在西南有牛頭山宜君山涪水中江郪江望中江縣晉五城縣地後周置𤣥武郡東有二山如龜蛇因以名焉隋開皇初郡廢改曰𤣥武仁夀初置凱州大業初州廢屬蜀郡唐武徳三年来屬皇朝大中祥符五年改為中江有天柱山中江望涪城縣漢涪縣地東晉置始平郡西魏改郡為涪城後周又改曰安城隋開皇初郡廢置安城縣十六年改為涪城屬金山郡唐大厯十三年来屬有涪江𦂳射洪縣漢郪縣地西魏置射江縣婁縷灘東六里有射江因以為名後周改曰射洪隋屬梓州唐因之有白崖山涪水梓潼水射江𦂳鹽亭縣漢廣漢縣地梁置鹽亭縣西魏置鹽亭郡隋開皇初郡廢屬梓州唐因之有負戴山中通泉縣漢廣漢縣地後置涌泉縣及西宕渠郡西魏改郡曰涌泉隋開皇初郡廢改縣曰通泉屬梓州唐因之廣漢縣二漢屬廣漢郡晉為郡治宋徙郡治雒元魏改縣曰廣魏後改曰光漢隋開皇初省入通泉有涌泉山涪水中飛烏縣漢郪縣地隋開皇中置飛烏鎮因升為縣因山為名唐因之有哥郎山郪江中銅山縣漢郪縣地其南可象山西北私鎔山皆有銅唐貞觀二十三年置鑄錢官調露元年罷而析郪飛烏置銅山縣有飛烏山㑹軍堂山郪江中下東闗縣蜀置招葺院皇朝乾徳四年以其地置東闗縣有鼓樓山楊桃溪安泰尉司本永泰縣唐武徳四年析鹽亭及劍州之黄安閬州之西水置皇朝熈寧五年省為鎮入鹽亭十年復置永泰尉司後改曰安泰都督府遂州春秋戰國為蜀地秦屬蜀郡二漢及晉屬廣漢郡東晉桓温平蜀於徳陽界東南置遂寧郡宋因之齊梁曰東遂寜後周置遂州改郡曰石山隋開皇初郡廢大業初州廢置遂寧郡唐武徳元年曰遂州天寳初曰遂寧郡皇朝因之今縣五望小溪縣漢廣漢縣地東晉置遂寧郡唐為東遂寧置小溪縣西魏改縣曰方義後周置遂州改郡曰石山隋復為遂寜郡唐復為遂州皇朝太平興國元年復改縣曰小溪有銅山盤山涪江望蓬溪縣本唐興縣唐永淳元年析方義置長夀二年曰武豐神龍元年復故名景龍元年析置唐安縣先天二年省天寳元年改唐興曰蓬溪有賓王山蓬溪𦂳長江縣本巴興縣東晉置西魏改曰長江隋唐因之有明月山鳯凰川涪江𦂳青石縣本晉興縣東晉平蜀置屬巴西郡西魏改曰始興後又曰青石隋唐因之有青山出青石可以為磬有涪江中遂寧縣唐景龍元年以故廣漢縣地置有梵雲山大安溪中果州春秋戰國為巴子地秦屬巴郡二漢因之晉屬巴西郡宋置南宕渠郡齊梁後周因之隋開皇初郡廢属隆州大業初屬巴西郡唐武徳四年置果州天寳元年曰南充郡皇朝因之今縣三望南充縣本二漢安漢縣屬巴郡晉屬巴西郡宋屬南宕渠郡隋開皇十八年改縣曰南充唐置果州流溪鎮唐開耀元年析南充置流溪縣皇朝熈寧六年省入南充有果山嘉陵江望西充縣唐武徳四年析南充置有西充山西溪水上相如縣漢安漢縣地梁置梓潼郡西魏廢郡置相如縣縣南二十里有司馬相如故宅因以名焉隋屬巴西郡唐武徳四年来屬有琴臺鎮龍角山嘉陵江上賀州春秋戰國為蜀地秦屬蜀郡二漢屬犍為郡晉宋齊因之後周自今陽安徙資州治此及置資中郡隋開皇初郡廢大業初州廢置資陽郡唐武徳元年改為資州天寳元年曰資陽郡皇朝因之今縣四𦂳盤石縣本二漢資中縣屬犍為郡晉宋齊因之後周徙資州治此及置資中郡而改資中縣為盤石隋置資陽郡唐為資州月山丹山銀山三鎮皆故縣隋義寧二年同置屬資陽郡唐屬資州皇朝乾徳五年並省入盤石有盤石山中江𦂳資陽縣後周析資中置隋屬資陽郡唐屬資州有獨秀山資水中下龍水縣漢資中縣地隋義寜二年置屬資陽郡唐屬資州有龍水下内江縣漢資中縣地後周於中江水濱置漢安城遂改為中江縣隋改曰内江屬資陽郡唐屬資州有中江資水上普州春秋戰國為巴蜀之境秦屬巴蜀二郡二漢屬巴犍為二郡晉李維亂後為羌夷所據至梁乃招撫之置普慈郡後周置普州隋開皇初郡廢大業初州廢屬資陽郡唐武徳三年置普州天寳元年曰安岳郡皇朝因之今縣三中下安岳縣漢墊江縣地屬巴郡後周置安岳縣及置普州隋大業初州廢唐復置普康鎮本永康縣後周置屬普慈郡隋屬普州開皇十八年改曰隆康大業初屬資陽郡唐屬普州先天元年改曰普康皇朝乾徳三年省入安岳有安岳山岳陽溪下安居縣漢牛鞞縣地屬犍為郡後周置柔剛縣及安居郡隋開皇初郡廢屬普州十八年改為安居縣大業初屬資陽郡唐屬普州崇龕鎮本隆龕縣唐武徳三年置先天元年改曰崇龕皇朝乾徳五年省入安居有柔剛山崇龕山安居水下樂至縣漢資中縣地屬犍為郡唐武徳三年置普慈鎮本梁置普慈郡及多業縣後周因之隋開皇初郡廢十三年改縣為普慈屬普州大業初屬資陽郡唐屬普州皇朝乾徳五年省入樂至有婆娑山樂至池上昌州春秋戰國為巴蜀之境秦屬巴蜀二郡二漢及晉屬巴犍為二郡隋屬資陽瀘川涪陵三郡唐屬資普瀘合四州乾元二年析置昌州大厯六年州縣廢其地各還故屬十年復置後曰昌元郡皇朝因之今縣三上大足縣本合州巴川縣地唐置屬昌州光啓元年州徙治焉及以普州普康縣地置静南縣屬昌州後省入有牛鬬山太足川上昌元縣本資州内江縣地唐置為昌州治光啓元年州徙治大足有葛仙山賴波溪上永川縣本瀘州瀘川縣地唐置屬昌州亦得渝州壁山縣地有綾錦山侯溪上叙州春秋戰國為僰侯國秦屬蜀郡漢置犍為郡東漢晉宋齊皆因之梁兼置戎州及六同郡後周因之隋開皇初郡廢大業初州廢置犍為郡唐武徳元年復曰戎州天寳元年曰南溪郡皇朝政和四年改名今縣二上宜賓縣本僰侯國秦曰僰道漢置犍為郡初治鄨縣後徙治此東漢又徙武陽而以僰道為屬縣梁置戎州隋置犍為郡唐復置戎州初治南溪貞觀中徙治僰道長慶中復治南溪皇朝又治僰道政和四年改縣曰宜賓故僰道縣在馬湖江㑹漢武帝使縣令開西南夷勞費無成使者唐䝉斬之乃鑿石開道以通南中今石門是也宜賓鎮本􅛿鄢縣隋末置屬戎州唐天寳元年改為義賔皇朝太平興國元年改曰宜賓熈寧四年省故開邊縣漢僰道縣地隋開皇六年置屬戎州唐貞觀四年屬南通州八年來屬皇朝乾徳五年省入僰道故歸順縣唐聖厯二年分􅛿鄢縣置以處生獠乾徳五年省入僰道有黄泉山大江馬湖江馬湖之上源曰若水出旄牛徼外東南流鮮水注之又東南逕大莋與繩水合又南逕卭都又南逕㑹無孫水注之又南逕遂乆蜻蛉水注之又南逕三絳淹水注之又與母血水合又東逕姑復涂水注之又東逕馬湖為馬湖水又東北至朱提與瀘水合而瀘水上流有蘭蒼水出博南東北流㑹類水禁水北注瀘津自朱提以下通為瀘水又東北至僰道入于大江中南溪縣漢僰道縣地梁置南廣縣及六同郡隋開皇初郡廢仁夀初改縣曰南溪屬戎州唐因之有平葢山大江馬湖江漢志云南廣有汾闗山符黒水所出北至僰道入江即今南廣漢也梁以此縣為南廣盖取其名耳上瀘州春秋戰國為巴地秦屬巴郡二漢屬犍為郡蜀章武元年立江陽郡晉宋齊梁因之梁兼立瀘州後周因之隋開皇初郡廢大業初州廢為瀘川郡唐武徳元年曰瀘州天寳元年曰瀘川郡皇朝因之今縣三中瀘川縣本江陽縣二漢屬犍為郡蜀屬江陽郡晉為江陽郡治焉梁立瀘州隋開皇初郡廢大業初立瀘州郡改縣曰瀘川唐因之為瀘州治有大江内江内江上源曰洛水縣據江洛㑹枕帶雙流中江安縣本漢安縣東漢置屬犍為郡蜀為江陽郡治晉宋齊梁後周皆因之隋屬瀘州開皇十八年改曰江安唐因之故綿水縣漢江陽縣地梁置屬江陽郡隋屬瀘州唐因之皇朝乾徳五年省入江安有方山大江綿溪中合江縣本漢符縣地屬犍為郡武帝使唐蒙将萬人從巴符闗入夜郎即此東漢曰符節晉復曰符属江陽郡後置安樂縣後周改為合江隋屬瀘州唐因之有安樂山安樂溪漢志南廣有大涉水北至符入江即此水也縣在安樂水㑹中合州春秋戰國為巴地秦屬巴郡二漢晉因之宋置東宕渠郡齊梁因之西魏改為墊江郡兼置合州後周因之隋開皇初郡廢改州曰涪州大業初州廢為涪陵郡唐武徳元年曰合州天寳元年曰巴川郡皇朝因之今縣五中石照縣本墊江縣二漢晉屬巴郡東晉寧康二年桓石䖍破苻堅将姚萇於墊江即此宋齊梁為東宕渠郡西魏改郡為墊江縣曰石鏡及置合州隋為涪州涪陵郡唐為合州皇朝乾徳三年改縣曰石照有銅梁山嘉陵江中漢初縣梁置新興郡西魏改郡曰清居而置漢初縣隋開皇初郡廢屬合州唐因之有江陵山嘉陵江中巴川縣唐開元二十三年析石鏡銅梁置屬合州有小安溪巴川中下赤水縣隋開皇八年析石鏡置屬合州唐因之有朝霞山赤水中下銅梁縣唐長安三年置屬合州有銅梁山悦池下榮州春秋戰國為蜀地秦屬蜀郡二漢晉宋立南安郡後廢隋屬資陽郡唐武徳元年立榮州天寳元年曰和義郡皇朝因之今縣四中下榮徳縣本旭川唐貞觀元年析大牢置屬榮州永徽二年州自大牢徙于此皇朝治平四年改為榮徳公井鎮後周置唐武徳元年改為縣而立榮州治此貞觀元年州徙大牢皇朝熈寧四年省入榮徳有榮徳山大牢溪中威逺縣隋開皇初以威逺戍置資州唐武徳元年来屬貞觀元年析置婆日至如二縣二年以瀘州之隆越入焉故和義縣隋末置屬瀘州貞觀八年来屬皇朝乾徳五年省入焉有鐵山中江中下資官縣隋末置屬嘉州唐武徳六年来屬有白崖山澭斯水中下應寧縣本大牢隋開皇十三年置屬資州唐武徳元年来屬六年州自公井徙治於此永徽二年徙治旭川景龍二年省雲州及羅水雲川胡連三縣入焉天寳元年更名有應靈山應靈水下渠州春秋戰國為巴地秦二漢屬巴郡晉初屬巴西郡恵帝分置宕渠郡宋齊屬巴渠郡梁立渠州西魏立流江郡後周因之隋開皇初郡廢大業初州廢為宕渠郡唐武徳元年曰渠州天寳元年曰流江郡皇朝因之今縣三𦂳流江縣本宕溪二漢屬巴郡蜀屬巴西郡晉恵帝立宕渠郡後廢梁立渠州西魏立流江郡及置流江縣隋曰宕渠郡唐曰渠州故大足縣唐乆視元年分宕渠置屬蓬州至徳二年来屬寳厯元年省入潾山後復置皇朝景祐二年省入焉有宕渠山流江古賨城流江即渝水也夾水上下皆賨民所居漢髙祖入闗後定三秦其人勇健好歌舞帝愛習之所謂巴渝舞是也下潾水縣梁置潾水縣及立潾州西魏立潾山郡隋開皇初郡廢屬渠州唐武徳元年屬潾州三年来屬寳厯元年省入潾山後復置有潾水下潾山縣唐武徳元年析潾水置及立潾州八年州廢来屬有潾山湼水同下州懐安軍春秋戰國為蜀地秦屬蜀郡二漢屬廣漢郡晉屬析都郡西魏立金淵郡後周郡廢隋屬蜀郡唐屬簡州皇朝乾徳五年立懐安軍今縣二望金水縣漢新都縣地東晉朱齡石於東山置金淵戍西魏置金淵縣及立郡焉隋屬蜀郡唐武徳元年避髙祖名改曰金水皇朝立懐安軍有金臺山中江望金堂縣唐咸亨三年析雒新都置屬益州垂拱二年屬漢州皇朝乾徳五年来屬有金堂山中江同下州廣安軍春秋戰國為巴地秦二漢屬巴郡晉屬巴西郡後屬宕渠郡宋齊屬巴渠郡西魏流江宕渠墊江三郡隋屬宕渠巴西涪陵三江唐屬渠果合三州皇朝開寳二年置廣安軍今縣三中渠江縣本始安縣宋置屬巴郡西魏屬流江郡隋開皇十八年改曰賨城屬宕渠郡匕夷謂貨布曰賨故謂之賨人唐武徳元年曰始安屬渠州天寳元年改曰渠江皇朝開寳二年来屬有富靈山渠江𦂳岳池縣萬嵗通天二年析南充相如置屬果州皇朝開寳二年来屬有安岳山岳池水中新明縣唐武徳三年析石鏡置屬合州皇朝開寳二年来屬有龍池山嘉陵江長寧軍盖漢犍為郡之漢陽縣地唐置羈縻長寧等二州𨽻瀘州都督府皇朝置淯井監屬瀘州熈寧八年夷人獻納十州地以屬焉政和四年改置長寧軍富順監自齊梁以前地理與瀘州同後周置富世縣以富世鹹井為名及立洛源郡隋開皇初郡廢屬瀘州唐貞觀二十三年改縣曰富義皇朝乾徳四年以其地置富義監太平興國元年改曰富順治平元年置富順縣熈寧元年省輿地廣記卷三十一
