body:
  text: 輿地廣記卷五宋歐陽忞撰四京東京開封府今治開封祥符二縣春秋時為衛陳鄭三國之境戰國時屬魏秦屬三川郡漢屬陳留河南頴川淮陽郡東漢改淮陽為陳國晉屬陳留滎陽𨽻川元魏屬陳留許昌東魏分置開封郡兼立梁州北齊罷開封郡後周改梁州為汴州陪開皇初罷陳留郡大業初罷汴州分入滎陽等郡唐武德四年復立汴州開元中為河南採訪使治所興元元年自宋州徙宣武軍於此以劉𤣥佐為節度使梁以州建國升為東京開封府後唐復為汴州宣武軍晉復升為東京開封府漢周及皇朝因之今縣十四赤開封縣二漢屬河南郡晉屬榮陽郡東魏置開封郡北齊郡郡廢隨屬榮陽郡唐武德四年屬汴州正觀元年省延和元年新浚儀尉氏復置移在郭下與浚儀分治有汴河蓋古茛蕩渠也首受黃河水隋煬帝開浚以通江淮漕運兼引汴水亦曰通濟渠皇朝元豐中導洛通入謂之清汴有惠民河浚溝其地則衛詩所謂浚郊浚都者也有蓬池亦曰逢澤故衛國之匡地竹書紀年云梁惠王發逢忌之藪以賜民即此唐天寶元載更名福源地禁漁採有沙海戰國策顔率言大梁之君臣欲得九鼎謀於沙海之上在此蓼堤梁孝王築東至睢陽長三百里有吹臺今曰繁臺本晉師曠作之梁孝王增築焉赤祥符縣本大梁魏惠王所築惠王六年自安邑徙都于此故亦曰梁惠王竹書紀年云惠王為大溝于此郛以行圃田之水縣北有浚水像而儀之故謂之浚儀秦始皇二十三年攻魏引河水灌地而拔之二漢屬陳留郡晉及後魏因之東魏兼立梁州後周改為汴州隋開皇初郡罷大業初州罷屬榮陽郡隋末浚儀故縣為李密所陷縣人王要漢師豪族置縣于今所而自為令唐髙祖因立汴州以要漢為刺史武德四年移縣于州北正觀元年復移州西皇朝大中祥符二年更名有夷門山夷門者大梁城之東門也魏人侯嬴抱關于此有蔡河蓋古琵琶溝也有廣濟河金水河有寒泉阪衛詩所謂爰有寒泉在浚之下畿尉氏縣古獄官曰尉氏此本鄭獄官尉氏之邑二漢屬陳留郡晉及元魏因之東魏屬開封郡北齊省隋開皇六年復置屬穎川郡唐武德四年置洧州正觀元年州廢汴州有惠民河長明溝三亭岡魏范睢與秦使王稽期于三亭之南即此有制澤陂左傳注榮陽宛陵縣東有制澤亦一宛陵地也畿陳留縣留本鄭邑後為陳所並故曰陳留有莘城國語謂之莘墟漢武帝元狩元年置陳留郡晉為陳留國治小黃而省陳留縣隋開皇十六年復置屬梁郡唐屬洧州小黃縣漢髙帝於此兵敗母時兵死後招魂葬號昭靈后其處曰小黃園漢亦曰小黃縣故城在縣東北二漢屬陳留郡晉及元魏因之北齊省有皇恆山狼丘汴河睢溝其水首受莨蕩水東入泗畿雍丘縣故杞國姒姓周武王封禹後東樓公先春秋時徙魯東北二漢屬陳留郡曹操圍張超于此城晉亦屬陳留東晉祖逖鎮此以禦石勒元魏置陽夏郡隨開皇初郡廢十六年置杞州大業初州廢屬梁郡唐武德四年復置杞州正觀元年州廢屬汴州圉廢鎮本漢圉縣屬睢陽國故城在東南翟義興兵王莽遣孫建擊之于圉地義師大敗積尸萬數立為京觀東漢及晉屬陳留郡元魏屬陽夏郡北齊省隋開皇六年復置曰圉城屬梁郡唐正觀元年省漢外黃縣故城在東二漢屬陳留郡晉屬陳留國元魏省北齊復置隋屬濟陰郡唐正觀元年省有葵邱齊桓公㑹諸侯于此畿封丘縣古封父之國左傳所謂周以封父之繁弱賜魯是也二漢屬陳留郡晉及元魏因之北齊省隋開皇十六年復置屬東郡唐屬汴州亦漢平丘縣地有黑山白溝河封丘臺期城黃池吳王夫差㑹諸侯于此畿中牟縣趙襄子時佛肸以中牟叛置鼎于庭不與已者烹之趙獻侯自耿徙此二漢屬河南郡晉及元魏屬滎陽郡東魏置廣武郡隋開皇初郡廢改中牟曰內牟屬鄭州十八年改內牟曰圃田唐武德三年復曰中牟亦屬鄭州梁開平元年來屬後唐同光初還之晉天福中復來屬北十二里有中牟臺是為官渡城曹公袁紹相持之所有圃田澤為豫州之藪有汴河鄭河畿陽武縣兩漢屬河南郡晉元魏屬滎陽郡東魏屬廣武郡隋唐屬鄭州梁開平元年來屬有博浪沙張良擊秦始皇之所有黑陽山黃河汴河白溝畿酸棗縣戰國時嘗為韓所都刺客聶政為􅗛陽嚴仲子殺韓相俠纍于此秦拔魏置縣漢因之以其地多酸棗因以為名屬陳留郡東漢晉因之元魏屬東都北齊省隋開皇六年復置屬滎陽郡唐屬滑州梁開平元年來屬唐同光初還之晉天福中復來屬有土山黃河金堤漢文帝時河決金堤即此有酸棗臺有延津袁紹渡津南立壁以拒曹公紹將淳于瓊宿烏巢在縣東為曹公所襲破之于此畿長垣縣本衛之匡邑孔子畏于匡者故城在今縣南春秋㑹于匡即此地二漢為長垣縣屬陳留郡晉屬陳留國元魏屬東都隋開皇十六年改曰匡城屬滑州唐因之梁復曰長垣來屬後唐又曰匡城皇朝復為長垣有􅗛水刁河漢長羅縣故城在東北古蒲邑在此子路為之宰畿東明縣本漢東昏縣屬陳留郡王恭改曰東明東漢復曰東昏後省為東明鎮皇朝建隆四年升為縣濟陽鎮本濟陽縣二漢屬陳留郡南頓君為令生光武于縣舍晉屬陳留郡元魏屬陽夏郡隋屬濟陰郡唐正觀元年省入宛句皇朝建隆四年來屬畿扶溝縣縣有扶亭又有洧水溝故以為名漢屬淮陽國東漢屬陳留郡晉省元魏復置東魏屬許昌郡隋屬頴川郡唐屬許州梁開平元年來屬漢新汲縣故城在西本鄭之曲洧左傳諸侯伐鄭自祁童至于曲洧是也畿鄢陵縣本鄭地春秋鄭伯克段于鄢即此戰國謂之安陵二漢屬頴川郡晉元魏因之東魏屬許昌郡北齊省隋開皇七年復置屬許州十六年置許州大業初州縣廢屬頴川郡唐屬許州梁開平元年來屬後唐同光初還之晉天福中復來屬有祁耶山洧水白亭畿咸平縣漢為陳留扶溝二縣地後為通許鎮皇朝咸平五年外為咸平縣有牛首城春秋諸侯伐鄭師于牛首有裘亭西京河南府周武王克商定鼎于郟鄏成王卜澗水東瀍水西而作洛邑謂之王城今皇城是也又卜瀍水東而作下都以遷商頑民謂之成周今洛陽故城是也平王避犬戎之難乃自豐東遷而居王城至敬王與子朝爭立子朝據王城于是晉魏舒合都侯之大夫城成周以居敬王至考王封弟桓公于河南以續周公之官職其後遂為西周即王城也桓公之孫惠公又封少子于鞏號為東周王赧時東西周分治王赧徙居西周秦滅二周置三川郡謂伊洛河也秦亡項羽立瑕丘申陽為河南王漢髙帝取之置河南郡亦屬𢎞農頴川帝始欲都此感奉春君之言而止光武中興都雒邑置河南尹兼置司隸魏晉因之兼置司州後為劉聰所陷東晉末頴川劉裕再克河洛建置郡府終不能有後魏孝文乃代徙闕置河南尹並司州東魏置洛州北齊後周及隋皆因之大業初年作新都改曰豫州三年復為河南郡唐平王世充置洛州顯慶二年升為東都開元元年改為河南府天寶元年曰東京梁唐晉漢周常以為都梁開平元年改為西京後唐為洛京晉為西京漢周及皇朝皆因之今縣十五赤河南縣古郟鄏地周武王遷鼎成王卜宅是為王城平王東遷居之後為西周君所封二漢為河南縣魏晉以來因之隋自洛陽故城移都城於此郡遂徙焉唐因之有闕塞山俗曰龍門有伊洛澗瀍四川漢榖城縣在西北北齊常山王演築以拒周師又築孝水戍在縣西北赤洛陽縣本周下都商頑民所遷是為成周城中有狄泉敬王避子朝之難居之秦晉三川郡兼封文信侯吕不韋楚封瑕丘申陽為河南郡東漢魏晉元魏皆魏晉元魏皆為帝都東魏置洛陽郡隋開皇初郡廢大業初移都城于河南縣而洛陽縣亦徙在都城中其故城遂空皇朝熙寧八年省入河南元祐二年復置魚豢曰漢火德火忌水故光武去水而加佳魏土德土水之母也故除佳而加水有北邙山魏明欲平之令登臺見孟津辛毗諫乃止東魏髙歡破宇文泰軍唐史思明敗李光弼軍皆在此有金墉城在故城西北角魏明帝所築有漢平陰縣故城在縣北五十里魏文帝改為河陰後魏爾朱榮舉兵入洛朝士三千人遇禍于此赤永安縣本鞏緱氏登封三縣地近世為永安鎮屬鞏皇朝景德四年升為縣有少室山鳯臺山轘轅山青龍河畿偃師縣帝嚳所都亦古亳邑也商有三亳成湯居西亳此即也至盤庚又自河北徙治于此亳商家從此而改國號曰殷周武王伐紂而還欲示休戎之意名為偃師二漢屬河南郡晉以來省隋開皇十六年復置屬河南郡自晉之有尸鄉田橫自刎處緱氏鎮古滑國原闕為緱氏縣屬河郡自晉至唐因之皇朝熙寧八年省原闕偃師有緱山王子晉控鶴上升之所有黃河曲洛畿鞏縣春秋時鞏國戰國時東周居此二漢屬河南郡晉元魏因之東魏屬成臯郡北齊省隋開皇十六年復置屬河南郡唐因之有洛口倉為李密所據原闕漢平縣故城在西北俗謂之小平其北有小平津畿登封縣漢武帝登中嶽少室漢書在山下聞有言萬嵗云于是以三百戶奉祠命曰崇髙邑屬頴川郡東漢省入陽城東魏分潁陽置堙陽縣隋開皇六年改曰武林十八年曰輪氏大業初曰嵩陽屬河南郡唐萬嵗登封元年更名登封屬河南有嵩髙山禹貢所謂外方山有陽城山禹避舜之子于此二漢為陽城縣屬頴川郡元魏置陽城郡隋唐皆屬河南萬嵗登封元年更名告成天祐二年改為陽邑後省有箕山昔堯將遜位許由恥之逃隱于此立許由冡有測景臺昔周公以土圭測日景求地中以陽城為地中焉漢綸氏縣故城在西南畿頴陽縣二漢為輪氏縣地晉省之後魏改曰臨武後周省之唐載初元年析河南伊闕嵩陽復置臨武縣屬河南府開元年五月更名頴陽皇朝熙寧八年省入登封元祐二年復置有箕山潁水畿新安縣昔項羽坑秦降卒二十萬于此二漢屬𢎞農郡晉屬河南郡東魏置新安郡後周置東垣縣隋仁壽四年省新安入東垣大業初更名新安屬河南郡唐因之有漢函谷關武帝元鼎三年楊僕以有功恥為關外人乃上書乞移關于新安以家財給其費後周武帝保定中改關城為通洛防以備齊冦有缺門山金谷水畿澠池縣有古東西俱利二城秦昭王與趙惠文王相㑹澠池藺相如劫秦王令為趙兵鼓缶處蓋云秦趙原闕利也漢晉屬𢎞農郡元魏置澠池郡後周及隨屬河南郡唐因之有天壇山廣陽山澠池水畿永寧縣本漢宜陽澠池屬𢎞農部後因置熊耳縣隋耳縣隋因之屬河南郡義寧二年更名永寧西北有二嶺山連入峽石界其南陵夏后臯之墓其北陵文王之所避風雨春秋晉襄公敗秦師于殽又有回溪馮異處俗名曰坑長四里濶二丈深二丈五尺自漢以前道皆由此建安中曹公西征巴漢惡南路之險更開北道自後行旅率多從之有熊耳山劉盆子積田之所有嶕嶢山後周置黃櫨同軌永昌三城以備齊畿長水縣本漢盧氏縣地屬𢎞農郡後魏置南陜縣屬全門郡西魏改為長淵隋義寧元年改為長水唐顯慶二年來屬土剗在西北二十五里蓋古關之塞垣後周以為鎮防有松陽山洛水畿壽安縣本漢宜陽河南縣地後魏置甘棠縣隋仁壽四年更名壽安屬河南郡唐因之髙齊置孔城防以備周在縣東南有銅屏山鹿蹄山畿福昌縣本宜陽縣秦武王欲通三引以窺周室乃使甘茂約魏以攻韓遂拔宜陽二漢晉屬𢎞農郡元魏置宜陽郡東魏置陽州後周改曰熊州隋開皇初郡廢大業初州廢以宜陽屬河南郡唐武德二年改曰福昌因隋宫為名故韓城在縣東劉盆子降光武處縣城東南北三面峭絶天險後周屯重兵于此以備髙齊東魏又置荆門郡後周省入有女几山畿伊陽縣本漢陸渾縣地唐先天元年析置伊陽屬河南府陸渾戎名初在秦晉之西北後秦晉遷之於伊川因以名縣漢屬𢎞農郡晉屬河南郡東魏置伊川郡又有北荆州後周改曰和州隋開皇初郡廢改和州曰伊川大業初州廢以陸渾屬河南郡後省入伊陽後周置兵于伊陽備齊有三塗山春秋晉伐陸渾請有事于三塗即此伊闕鎮本戎蠻三國漢惠帝置新城縣屬河南郡東漢晉因之東魏置新城郡隋開皇初都廢屬河南郡十八年改縣曰伊闕北有依闕故關昔大禹疏鑿以通水兩山相對望之若闕伊水歷其間北流謂之伊闕云皇朝熙寧五年省入伊陽畿河清縣南臨黃河左傳云晉陰郡此唐咸亨四年析河南洛陽新安王屋濟源河陽六縣置大基縣屬河南府先天元年改名河清有柏崖故城在縣西東魏將侯景所築有青要山滽滽水南京應天府髙辛氏子閼伯所居商丘也周武王封微子啓是為宋國戰國時齊楚魏滅之三分其地秦置碭郡漢為梁國東漢晉因之元魏為梁郡後周置梁州隋開皇初廢十六年置宋州大業初州廢又為梁郡唐復為宋州天寶元年曰睢陽郡梁號為宣武軍節度後唐改歸德軍皇朝景德四年升應天府大中祥符七年升南京今縣四赤宋城縣古商丘也閼伯微子漢梁孝王皆都之漢曰睢陽縣後漢晉元魏因之隋開皇十八年改曰宋城唐屬宋州張巡許逺死節于此有梁孝王兔園平臺雁鶩池春秋時隕石五見在蓼堤即梁孝王開道也畿榖熟縣商之南亳成湯所都也後漢置榖熟縣屬梁國晉因之後魏廢焉隋開皇十六年復置屬梁郡唐屬宋州畿下邑縣漢屬梁國晉因之北齊廢巴吾縣入焉隋屬梁郡唐屬宋州畿虞城縣夏封舜後于此少康避有過之難奔有虞即此有綸城即少康邑漢置虞縣屬梁國晉因之元魏曰蕭縣北齊廢隋文帝開皇十六年置虞地縣屬梁郡唐屬宋州有禹貢孟諸藪北京大名府春秋時屬晉衛戰國時屬衛二漢屬魏郡東郡清和魏文帝分置陽平郡晉因之宋文帝東陽平郡元魏因之後周大象二年置魏州隋大業初置武陽郡唐武德四年平竇建德改置魏州龍朔二年更名冀州咸亨三年復曰魏州天寶元年曰魏郡自代宗後為田承嗣史憲誠何進滔羅洪信所據曰大名府置天雄軍二代皆因之後唐建鄴都晉漢因之至周罷大名府後唐曰興唐晉漢周復曰大名皇朝慶歷二年升為北京今縣十一赤元城縣魏武侯公子元食邑于此因以名縣二漢屬魏郡魏置陽平郡晉元魏因之東魏屬魏郡後周置魏州隋置武陽郡唐為魏州五代漢以來為大名府有沙麓春秋時沙麓崩即此有馬陵魏龎涓為齊孫臏所破于此大名鎮漢館陶縣地東魏分館陶西界置貴鄉縣後周隋唐因之後唐更名廣晉漢乾祐初改為大名皇朝熙寧六年省入元城按左傳獻公賜畢萬魏卜偃曰萬盈數也魏大名也其地于今為河中之永樂非元城之魏也漢以大名名此失矣畿莘縣本漢陽平縣屬東郡魏晉元魏屬陽平郡北齊改曰樂平隋開皇六年復曰陽平八年改曰清邑十六年置莘州大業初州廢改清邑為莘縣屬武陽郡唐屬魏州春秋衛宣公使盜殺公子伋于莘即此漢東武陽縣故城在南畿內黃縣漢魏元魏屬魏郡東魏併入臨漳開皇十六年復置屬汲郡唐屬相州天祐三年來屬漢繁陽縣故城在縣西北畿戍安縣本斥丘縣地漢晉元魏屬魏郡東魏併入臨漳故城在縣西北北齊置成安縣隋屬魏郡唐屬相州天祐二年更名斥丘來屬後唐復為成安洹水縣晉長樂縣地後周分臨漳縣東北界置洹水縣隋屬魏郡唐屬相州天祐三年來屬皇朝熙寧六年省入成安蘇秦令六國之將相㑹盟于此水上即此畿魏縣戰國為魏武侯别都漢晉元魏屬魏郡北齊廢之隋開皇六年復置屬武陽郡唐屬魏州畿館陶縣漢屬魏郡魏晉元魏屬陽平郡後置毛州隋煬帝大業初州廢以館陶屬武陽郡唐屬魏州漢書溝洫志河北決于館陶分為屯氏河而後世誤以為毛氏河乃置毛州失之甚矣畿臨清縣後漢廣宗縣水經注言趙立建興郡于廣宗故城內置臨清縣後魏因之北齊廢焉隋開皇六年復置屬清河郡唐屬貝州後來屬永濟鎮唐大歷七年田承嗣析臨清置永濟縣屬貝州天祐三年來屬皇朝熙寧六年省畿宗城縣後漢廣宗縣屬巨鹿郡晉屬安平國隋仁壽元年改曰宗城屬清河郡唐屬貝州天祐三年來屬經城鎮本後漢經縣屬安平國晉因之北齊廣焉隋開皇六年復置經城縣屬清河郡唐屬貝州皇朝熙寧六年省入宗城畿夏津縣本二漢鄃縣屬清河郡晉因之其後廢焉隋開皇十六年復置唐屬貝州天寶九年更名夏津後來屬畿清平縣本漢清陽縣屬清河郡後漢省焉隋開皇六年置貝丘縣十六年改曰清平唐屬博州後來屬畿冠氏縣春秋晉邑左傳齊為衛故伐晉冠氏是也隋開皇六年分館陶東界置屬武陽郡唐屬魏州清水鎮本漢清淵縣屬魏郡晉陽平郡隋屬清河郡唐避髙祖諱改為清泉縣後為清水正觀元年省入冠氏輿地廣記卷五
