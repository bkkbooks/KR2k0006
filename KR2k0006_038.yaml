body:
  text: 輿地廣記卷三十八宋歐陽忞撰廣南路化外州安南大都督護府古路越之地秦屬象郡漢屬南越元鼎六年立交趾郡東漢建安八年兼立交州治龍編十五年徙治蒼梧之廣信十六年又徙南海之畨禺尋復治龍編分立武平郡晉因之宋又分立宋平郡齊以後因之隋平陳三郡並廢大業初州廢復立交趾郡唐武德五年曰交州調露元年曰安南郡護府至德二載改曰鎮南大厯三年復安南領縣七上宋平縣宋置及立郡隋平陳郡廢屬交州大業初州廢立交趾郡唐武德四年立宋州六年曰南宋州貞觀元年州廢來屬寶厯元年府自交趾徙治此故南定縣唐武德四年析宋平置𨽻定州五年來屬後省中下太平縣本隆平唐武德四年置以縣立隆州六年曰南隆州貞觀元年州廢來屬先天元年更名中下交趾縣本漢羸􅖮縣地髙帝立南越侯織為南海王居此武帝以為交趾郡治焉隋置交趾縣後省唐武德五年立慈州并置慈廉烏延武立三縣貞觀元年州廢省三縣更置杜佑云今南方夷人其足大指開廣皆並足而立其指交故名上朱鳶縣漢屬交趾郡晉以後因之隋屬交州唐武德四年立鳶州并置臨髙安定二縣貞觀元年州廢省二縣以朱鳶來屬故茍漏縣漢晉屬交趾郡産丹沙葛洪乞為茍漏令以求丹沙即此交州記云有濳水牛上岸共鬭角軟還復生後縣省中下龍編縣漢屬交趾郡初置縣城有交趾盤編於南北二津之間因取名焉東漢自羸􅖮移郡治此兼立交州晉以後因之隋屬交趾郡唐武德四年立龍州并置武寧中樂二縣貞觀元年州廢省二縣以龍編屬仙州州廢來屬中下平道縣自未為郡縣時其地有雒田隨海潮上下民墾食其田因名為雒民君長曰雒王臣佐曰雒侯設諸雒將後蜀王子討雒王滅之自稱安陽王居此後南越王他舉衆攻安陽王王有神弩一發殺三百人南越知安陽不可克乃遣太子始詐降而事之王女曰眉珠私與始通始令眉珠取神弩視之則竊以鋸截弩逃歸報南越進兵攻安陽王王遂敗亡入海其地并於南越有王宫城故基在焉東漢為封溪縣地屬交趾郡晉屬武平郡齊置昌國縣梁陳因之隋更名屬交州唐武德四年立道州并置昌國縣六年曰南道州是年更名仙州貞觀七年州廢省昌國以平道來屬中下武平縣本東漢封溪縣地吳置武寧縣及立武平郡晉以後因之後改縣曰武定隋屬交州開皇十八年改縣曰隆平唐武德四年改曰武平𨽻道州五年來屬下都督峯州古文朗國亦陸梁地秦屬象郡漢屬南越後及東漢屬交趾郡吳分立新興郡晉武帝改曰新昌郡宋齊梁陳因之陳兼立興州隋平陳郡廢為峯州天寶元年曰承化郡武德四年復立峯州天寶元年曰承化郡領縣五下嘉興縣本漢麗泠縣地東漢分屬封溪吳分置嘉寧縣屬新興郡晉武帝改郡曰新昌後以嘉寧為郡治焉宋以後因之陳兼立興州隋平陳郡廢開皇十八年改州曰峯州大業初州廢屬交趾郡唐復立峯州初東漢建武中朱鳶雒將子名詩索麊泠雒將女徴側為妻側為人有膽勇將詩起兵攻破郡縣徴側為王麊泠得交趾九真二郡光武遣伏波將軍馬援討之側詩走金溪它中二年乃克於是置封溪縣吳晉因之屬武平郡後省隋末復置唐武德四年來屬貞觀元年省入嘉寧下承化縣下新昌縣舊屬新昌郡隋屬交趾郡唐武德四年來屬下嵩山縣唐元和復置下朱緑縣唐元和復置望瀼州隋大將軍劉方始開此路置鎮守尋廢不通唐貞觀中清平公李𢎞節尋劉方故道開置瀼州以逹交趾今州在鬱林之西南交趾之東北天寶元年曰臨潭郡領縣四下瀼江縣下波零縣下鵠山縣下𢎞逺縣貞元後沒於蠻夷州縣名存而已下巖州唐調露二年析橫貴二州立以巖岡之北因為名天寶元年曰樂寧郡領縣四下常樂縣本安樂蕭銑分興德置貞觀元年省乾封元年復置屬鬱林州永隆元年來屬至德二載更名下恩封縣本伏龍洞當牢白二州之境調露二年與髙城石巖同置下髙城縣以髙城水為名下石巖縣下田州唐開元中開蠻洞立天寶元年曰橫山郡領縣五下都救縣下惠佳縣下武龍縣下橫山縣下如賴縣皆與州同置下愛州秦象郡地漢屬南越元鼎六年立九真郡東漢以後因之梁兼立愛州隋平陳郡廢大業初州廢復立九真郡唐武德五年復為州天寶元年曰九真郡領縣六下九真縣梁立愛州陳因之隋立九真郡治此唐復立愛州縣省下安順縣本常樂晉屬九真郡隋更名唐武德五年立順州并析置東河建昌邉河三縣貞觀元年州廢省三縣入安順來屬下崇平縣舊曰髙安隋開皇十八年改曰隆安屬九真郡唐武德五年立安州并置教山建道都握三縣又置山州并置同山真潤古安西安建初五縣貞觀元年廢安州省教山建道都握入隆安來屬又廢山州省岡山真潤古安西安入建初來屬八年省建初先天元年更隆安曰崇安至德二載又更今名下日南縣本漢居風縣地屬九真郡吳改曰移風後析置日南縣隋屬九真唐武德五年立積州并置積善津梧方載三縣又以移風縣立前真州并置九臯建正真寧三縣又以胥浦縣立胥州并置攀龍如侯博犢鎮星四縣九年更積州曰南陵州貞觀元年曰後真州是年廢前真州省九臯建正真寧以移風𨽻南陵州又廢胥州省攀龍如侯博犢鎮星以胥浦𨽻南陵州十年州亦廢以軍安日南胥浦來屬天寶中省移風胥浦漢晉九真郡治胥浦後治移風義熙九年交州刺吏杜慧度造九真水口與林邑王范胡逹戰禽斬胡逹二子虜獲百餘人胡逹退五月慧度自九真水厯都粟浦復襲九真長圍跨山重柵斷浦驅象前鋒接刃城下連日交戰津梧晉屬九真郡後省唐復置後又省有居風山山上有風門常有風山有金牛往往夜見照耀千里時鬬則海水沸溢下長林縣本無編二漢屬九真郡晉省之唐復置後更名漢西干縣故城在縣東下歡州古越裳氏之國重九譯者也秦屬象郡漢屬九真郡吳分立九德郡晉宋齊因之梁兼立德州隋改曰歡州大業初州廢立日南郡唐武德五年立南德州八年改曰德州貞觀元年更名天寶元年曰日南郡領縣三中下九德縣古越裳氏之國也周時獻白雉於成王秦屬象郡二漢屬九真郡其地為寶網之所居及寶網卒其子黨繼立黨服從吳化於是孫皓改為九德郡及九德縣晉以後因之梁立德州隋曰歡州唐武德五年置安逺曇羅光安三縣是年以光安置源州又置水源安銀河龍長江四縣貞觀八年復改為歡州廢曇羅水源河龍長江以安逺安銀來屬浦陽縣晉屬九德郡隋屬日南郡唐屬歡州下越裳縣隋屬日南郡唐屬歡州武德五年又以日南郡之文谷金寧二縣立智州是年又置明州貞觀十三年廢明州省其萬安明引明定入越裳曰南智後又廢智州省文谷金寧入越裳來屬下懷歡縣本咸歡二漢屬九真郡晉屬九德郡隋屬日南郡唐武德五年屬歡州并置安人扶演相景西源四縣治安人貞觀元年更名演州十三年省相景十六年州廢省安人扶演西源以咸歡來屬後更咸歡曰懷歡下陸州秦屬象郡漢屬交趾郡晉宋齊因之梁立黃州及寧海郡隋平陳郡廢改黃州曰玉州大業初州廢入寧越郡唐武德五年立玉山州貞觀二年州廢入欽州髙宗上元二年復立更名陸州天寶元年曰玉山郡領縣三下烏雷縣唐曰安海徙陸州治此下華清縣本玉山隋大業初省入安海唐復置天寶中更名下寧海縣本安平梁置及立黃州寧海郡隋改州為玉州改縣曰安海唐立玉州後徙治焉雷改曰陸州至德二載改縣曰寧海下福祿州自隋以前地理與福祿郡同後為生獠所據唐龍朔三年智州刺史謝法成招慰生獠昆明北樓及生獠等七千餘落總章二年置福祿州以處之天寶元年改為福祿郡至德二載改為唐杜郡乾元元年復為福祿郡環州領縣一零縣下龍縣下饒勉縣下思恩縣下武石縣下銅蔡縣下歌良縣下長山縣下其常縣以上皆與福祿州同下湯州本秦象郡地唐立下湯泉縣下緑水縣下羅韶縣以上皆與州同置下演州厯代地理與歡州同自唐武德五年立歡州貞觀九年改為演州而别立歡州十六年演州廢入歡州廣德二年析歡州復立本忠義郡亦曰龍池郡輿地廣記卷三十八
