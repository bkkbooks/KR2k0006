body:
  text: 輿地廣記卷一宋歐陽忞撰禹貢九州晉絳慈隰河中解太原遼威勝平定汾欣代嵐石憲澤潞岢嵐寧化大山保德真定中山趙深冀河間祁保莫雄霸信安永寧順安保定安肅廣信相磁邢洺懷衛晉寧雲應新寰儒毅蔚朔幽涿易檀葪媯平營安北都護鎮北都護單于都護右古冀州地按冀州禹貢不言封界蓋堯都所在以餘州見之疆域尤廣梁州境宇雖遐逺而雜以夷獠中夏惟兾州最大山東之人性緩尚儒仗氣任俠大行恆山之東而鄴郡髙齊國都浮巧成俗自北齊之滅衣冠士人多遷關內惟技巧商販及樂戶實移郡郭由是人情險詖至今好訐訟山西土瘠其人勤儉而河東魏晉以降文學盛興魏杜畿嘗為河東守開置學宫親執經教授郡中化之自後河東時多儒者閭井之間習於成法并州近狄俗尚武藝左右山河古稱重鎮韓信謂陳稀曰代天下精兵處也後漢末天下擾亂髙幹為并州刺史韋招説幹曰并州左有恆山之險右有大河之固北有強胡可以恃也寄任之者必文武兼資焉大名恩開德鄆濟滑濮博德濵棣滄清永靜右古兖州地按禹貢濟河惟兖州東南據濟西北距河地非險固風雜數國衛魏宋齊趙秦漢以降政理混同人情朴厚俗有儒學及晉之末為戰爭之地三百年間傷夷偏甚唐興復如近古之風青齊濰登萊密安東右古青州地按禹貢海岱惟青州東北據海西南距岱古齊號稱強國憑負山海擅利鹽鐵管仲謂楚師曰我齊東至於海西至於河南至於穆陵北至於無棣穆陵山今琅琊郡沂水縣界無棣今景城郡縣又燕王謂蘇秦曰吾聞齊地清濟濁河可以為國長城巨防可以為塞今濟陽郡盧縣界有防門山又有長地東至海太公用之而冨人管仲資之而興霸人情變詐好行機術豈因輕重而為弊乎固知導人之方先務推以誠言漢髙帝罵婁敬曰齊魯以舌得官又汲黯謂公孫𢎞齊人多詐逮於漢氏封立近戚漢初田肯説髙帝曰齊東有琅琊即墨之饒南有太山之固西有濁河之險北有渤海之利隔懸千里齊得十二焉故號東西秦非親子弟勿王武王臨極儒雅甚興晉惠之後淪沒僣偽慕容建國二代而亡今古風頗革文有文學唐初立都督府命親王鎮之漢氏之制信可取也徐宿兖海沂泗淮陽右古齊州地按禹貢海岱及淮惟徐州東至海北至岱南及淮蓋鄒魯舊國漢興猶有儒風自五胡亂華天下分裂二境尤被傷殘彭城要害藩捍南國必爭之地常置重兵數百年中無復講誦况去聖人久逺人情遷蕩大抵徐兖其俗略同揚髙郵楚通泰滁和真夀廬蘄舒濠光平江宣太平池廣德潤常湖杭睦越歙明台處溫婺衢饒信江洪撫吉筠袁虔南康南安臨江建昌福建南劍泉漳汀邵武興化無為秀江寧潮右古揚州地按禹貢淮海為揚州北據淮東南距海人性輕揚而尚鬼好祀每王綱解紐宇內分崩江淮濵海地非形勢得之與失未必輕重故不暇先爭然長淮大江皆可拒守吳晉宋齊梁陳皆以江淮要害之地置兵閩越遐陬僻在一隅憑山負海難以德撫漢武帝時朱買臣上言曰東越數反故東越王居泉山一人守險千人不得上永嘉之後帝室東遷衣冠違難多所萃止藝文儒術斯之為盛今雖閭閻賤品處力役之際吟詠不輟蓋因顔謝徐庾之風扇焉江陵荆門岐歸復郢安嶽漢陽鼎澧辰沅靖施黔信陽珍溱鄂興國潭衡永道郴桂陽全邵黃遵義武岡錦溪漿費西髙右古荆州按禹貢荆及衡陽惟荆州北據荆山及衡山之陽其風俗略同揚州雜以蠻率多徑悍南朝鼎立皆為重鎮然兵強財富地逼勢危稱兵跋扈無代不有晉王敦陶侃桓玄桓溫宋謝晦南郡王義宣袁顗沈攸之桂陽王休範齊陳顯達梁武帝陳王琳華統皆自上流擁兵東下是以上遊之寄必精擇其人焉蔡潁潁昌應天亳陳開封興仁廣隮單河南孟陜虢汝鄭唐鄧隨襄光化均拱右古豫州地按禹貢荆河惟豫州西南至荆山今襄陽郡南漳縣界北距河大抵荆河之間四方輻湊故周人善賈趨利而􅊏嗇韓國分野亦有險阻蘇秦謂韓宣王曰韓北有鞏成臯之固西有宜陽商阪之塞東有苑穰洧水南有陘山也鞏成臯則今密縣汜水也宜陽商阪即今福昌山及商山也苑穰今南陽界陘山今密縣山自東漢魏晉宅於洛陽永嘉以後戰爭不息元魏徙居才過三紀自西晉永嘉五年劉曜陷洛陽執懷帝至後魏太和十九年經百八十七年遷都至永熙三年又經三十九年分為東西魏矣逮乎二魏爰及齊周河洛汝潁迭為攻守夫土中風雨所交宜乎建都立社均天下之漕運便萬國之享獻不恃隘害務修德刑則卜代之期可延久也興元洋金房達開渠廣安梁閬巴蓬昌普恭南平涪合忠梁山萬夔大寧利三泉劍綿梓遂漢成都彭蜀邛雅黎嘉簡懷安眉仙井榮資瀘敘冨順永康祺亨威茂長寧商鳯階成興文龍嶲敘扶翼真當悉恭柘靜姚疊宕乾右古梁州地按禹貢華陽黑水惟梁州東據華山之南西距黑水巴蜀之人少愁苦而輕易淫佚周初從武王勝殷庸蜀羌髳微盧彭濮人是也東遷之後楚子強大而役屬之暨於戰國又為秦有資其財力國以豐贍漢景帝時文翁為蜀郡守建立學校自是蜀土學者比齊魯焉土肥沃無凶歲山重復四塞險固王政微缺跋扈先起公孫述劉備李雄義縱迭據之皆因中原多事故一方之寄非親賢勿居京兆鳯翔隴邠耀同華坊延安保安鄜丹環豐麟府綏德銀涇慶渭鎮戎原德順懷德寧秦鞏熙積石河西安西寧蘭湟會洮岷廓夏宥靈監豐勝甘涼瓜肅沙西伊安西北庭右古雍州地按禹貢黑水西河惟雍州西據黑水東距西河西河龍門河也在兾州西黑水出張掖郡雞山南流至燉煌郡經三危山過南溪郡入南海厥田上上鄠杜之間號稱陸海四塞為固被山帶河秦氏資之遂平海內漢初髙帝納婁敬説而都焉又徙齊諸田楚昭屈景燕趙韓魏之後及豪族者家於關中強本弱末以制天下自是每因諸帝山陵則遷戶立縣率以為常故五方錯雜風俗不一漢朝京輔號為難理其安定彭原之北􅊈陽天水之西接近胡戎多尚武節自東漢魏晉羌氐屢擾旋則苻姚迭據五梁更亂三百餘祀戰爭方息帝都所在是曰浩穰其餘郡縣習俗如舊舜十二州晉絳慈隰河解太原遼威勝平定汾欣代嵐石憲澤潞岢嵐寧化火山保德雲應新寰儒毅蔚朔府安北鎮北單于右並州幽涿易擅葪媯平營右幽州安東上都護府右營州按書舜肇十有二州孔安國云禹治水之後舜分兾州為幽州並州分青州為營州始置十二州餘九州依上七國京兆商華同耀邠鳯翔麟延安丹坊酈銀夏寧慶環原涇渭宥靈鹽鳯秦民山會鞏蘭河熙虢隴綏德保安西安鎮戎德順右秦地開封大名河中興仁晉綘慈隰解衛深祁右魏地秦始皇二十二年王賁代魏引河溝灌大梁遂滅魏鄭潁昌唐鄧均汝陜右韓地秦始皇十七年內史勝滅韓以其地置潁川郡澤潞遼代沂憲汾嵐石勝府豐太原洛相邢磁滄清兾恩真定中山莫河間趙豐平定威勝寧化岢嵐火山保德晉寧永靜順安永寧雲蔚朔勝單于大都護右趙地秦始皇十九年王翦破趙克邯鄲虜趙王遷幽涿霸雄媯易檀葪平營保順信安保定安肅廣信安東右燕地秦始皇二十五年王賁攻遼東虜燕王喜登萊沂密濰青淄濵滄棣齊德博右齊地秦始皇二十六年王賁攻齊齊降房金澕興元雲夔鼎澧辰黔安嶽黃鄂復郢襄峽歸施江陵沅楚通泰楊奚滁濠和夀廬舒光蘄江筠吉潤湖江寧秀池歙宣睦棠平江杭越明台婺溫處衢隋頴海黃饒信洪虔支撫灘衡道永邵全郴漣陳漢陽無為南康興國臨江南安太平廣德光化信陽建昌桂陽武岡荆門溪錦右楚地秦始皇二十四年王翦破楚虜楚王負芻二十五年悉定荆江南地降百越之君置會稽郡西京孟右周地赧王五十九年九鼎入秦周遂亡實秦昭襄王五十一年按漢志秦地於天官東井輿鬼之分野也其界自𢎞農故關以西京兆扶風馮翊北地上郡西河安定天水隴西南有巴蜀廣漢犍為武都西有金城武威張掖酒泉燉煌又西南有牂牱越嶲益州皆宜屬焉魏地觜觽參之分野也其界自髙陵江東盡河東河內南有陳留及汝南之召陵濦疆新汲西華長平潁川之武陽偃許傿陵河南之開封中牟陽武酸棗卷皆魏分也韓地角亢氐之分野也韓分晉得南陽郡及潁川之父城定陵襄城潁陽潁隂長社陽翟郟東接汝南西接引農得新安宜陽皆韓分也趙地昴畢之分野也趙分晉得趙國北有信都真定常山中山又得涿郡之髙陽邸州鄉東有廣平巨鹿清河河間又得渤海郡之東平野中邑文安東州成平章武河以北也南至浮水繁陽內黃斥邱西有太原定襄雲中五原上黨上黨本韓之别都逺韓近趙後卒降趙皆趙分也燕地尾箕分野也燕東有漁陽右北平遼西遼東西有上谷代郡雁門南得涿郡之易容城范陽北新城固安涿縣良鄉新昌及勃海之燕次皆燕分也樂浪玄莵亦宜屬焉齊地虛危之分野也東有淄川東萊琅琊髙密膠東南有泰山城陽北有千乘清河以南勃海之髙密髙城重合信陽西有濟南平原皆齊分也楚翼軫之分野也今之南郡江夏零陵桂陽武陵長沙及漢中汝南郡盡楚分也周地栁七星張之分野也今之河南雒陽榖城平隂偃師鞏尉氏是其分也宗雒邑與宗周通封析東西長而南北短長短相覆為千里至襄王以河南賜晉文公又為諸侯所侵故其分地小秦十四郡衛懷孟開封鄭河南汝陜虢拱右三川郡有河洛伊故曰三川晉絳慈隰解河中右河東郡洛相邢磁趙右邯鄲郡安黃鄂復郢襄峽歸施江陵漢陽興國荆門右南郡楚通泰揚真滁濠和夀廬舒光蘄筠吉饒信洪虔袁撫無為南康臨江南安髙郵建昌右九江郡江寧池歙宣太平廣德右鄣郡常平江秀杭越明台婺溫處衢潤湖睦右會稽郡潁昌陳蔡右潁川郡應天興仁鄆濟單亳廣濟右碭郡徐宿泗右泗水郡兖海淮陽右薛郡博濮大名滑開德右東郡沂密右琅琊郡濰登萊青溫棣德齊濵右齊郡幽涿信安霸保定雄莫河間順安保永寧媯安肅祁廣信易中山右上谷郡檀葪右漁陽郡平右古北平郡營右遼西郡安東上都護右遼東郡蔚右代郡滄清兾恩深真定永靜右巨鹿郡澤潞遼平定威勝右上黨郡代欣憲汾嵐石府太原寧化岢嵐火山保德晉寧右太原郡勝單于大都護右雲中郡豐安北右九原郡雲應朔右雁門郡麟延安丹防鄜銀夏綏德保安右上郡鳯秦岷會鞏蘭河熙右隴西郡寧慶環原涇渭宥靈西安鎮戎德順鹽右北地郡房金洋興元右漢中郡巴蓬閬果普昌瀘恭合忠萬廣安夔大寧開達渠涪梁山右巴郡利三泉劍綿遂梓漢彭成都眉蜀邛雅嘉簡永康仙井資敘縈懷安右蜀郡鼎澧溪辰錦黔沅奬思右黔中郡嶽潭衡邵永道郴逵全桂陽右長沙郡商華京兆同耀邠鳯翔隴右內史郡福建泉南劍邵武汀漳興化右閩中郡潮梅循惠南雄廣韶英端康新恩南恩賀封髙竇藤右南海郡桂昭梧龔潯欎林融象貴栁賔橫雍右桂林郡容化雷亷欽陸愛演歡宜峯福祿安南大都護右象郡按秦始皇十七年滅韓十九年滅趙二十二年滅魏二十四年滅楚二十五年滅燕二十六年滅齊遂并天下分為三十六郡郡置守尉監漢書百官表曰秦郡守掌治其郡有丞尉掌佐守典武職申卒監御史掌監郡於是興師踰江平取百越又置閩中南海桂林象郡凡四十郡其地西臨洮北沙漠東縈西帶皆臨大海焉輿地廣記卷一
