body:
  text: 輿地廣記卷三十三宋歐陽忞撰䕫州路原缺中下巫山縣故楚之巫郡秦昭王伐楚取之以為縣屬南郡二漢因之晉立建平郡宋齊梁西魏後周皆因之隋開皇初郡廢屬信州曰巫山唐屬䕫州有巫山及髙都山昔楚襄王遊髙唐晝寢夢一婦人曰妾居巫山之陽髙唐之岨旦為朝雲暮行雨朝朝暮暮陽臺下覺而命宋玉賦之此其地也有大江下黔州春秋為巴地戰國楚威王使莊蹻將兵循江上略巴縣中以西屬楚秦昭王伐楚取黔中以屬黔中郡二漢屬武陵郡晉宋齊皆因之後不賔服後周武帝時蠻帥以其地歸附初立奉州後改曰黔州不帶縣隋為黔安郡唐武德元年曰黔州天寶元年曰黔中郡蜀王氏升武泰軍節度今縣二中彭水縣漢酉陽縣地隋開皇十三年置以為州治洪杜塞本洪杜縣唐武德二年析彭水置皇朝嘉祐八年省洋水鎮本洋水縣唐武德二年析彭水置曰盈隆先天元年曰盈川天寶元年更今名皇朝嘉祐八年省為寨熙寧二年為鎮信寧鎮本信安縣隋置唐武德二年更名屬義州貞觀十一年來屬皇朝嘉祐八年省都濡鎮本都濡縣唐貞觀二年析盈隆置皇朝嘉祐八年省有三峿山洪杜山伏牛山巴江洪水黔江縣本石城唐武德元年析彭水縣置天寶元年更名有羽人山河蓬水上逹州春秋戰國為巴地秦二漢屬巴郡建安中分屬巴西郡蜀晉因之宋立巴渠郡晉因之梁立萬州以萬頃池為名及改郡為東關西魏改郡曰通州周因之開皇初郡廢大業初州廢立通川郡唐武德元年曰通州天寶元年曰通川郡蜀王氏孟氏因之皇朝乾德三年更名今縣五中通川縣本宕渠縣地東漢置宣漢縣屬巴郡蜀劉氏分屬宕渠郡晉省之屬巴西宋復置及立巴渠郡梁置石城縣立萬州及東關郡西魏曰通州隋改石城縣曰通川置通川郡唐因之皇朝為逹州有鳯凰山有巴江渠江合於縣東南中巴渠縣本巴渠縣地唐永泰元年析石鼓置大和三年屬開州四年來屬有鹿子山渠江下永睦縣本永康梁置又有南榮郡隋開皇初郡廢屬巴州十八年縣更名唐武德二年立萬州貞觀元年州廢來屬有龍驤山巴江下新寧縣唐武德二年析通川置大和三年屬開州後復來屬有濁水山新寧溪故閬英縣唐天寶九載置皇朝乾德五年省入石鼓縣西魏置及亡遷州後周廢州立臨清郡隋開皇初郡廢屬通州唐寶厯元年省大中元年復置故三岡縣梁置屬新安郡西魏改郡曰新寧隋開皇初郡廢屬通州唐寶厯元年省大中五年復皇朝熙寧六年省三岡七年省石鼓分屬通州永睦新寧下東鄉縣本宋下蒲縣地屬巴渠郡後改為東鄉西魏立石州後周廢州立三巴郡隋開皇初郡廢屬通州唐武德三年立南石州又置下蒲縣八年州廢省下蒲縣入焉故宣漢縣本宋東關縣地屬巴渠郡後改為宣溪西魏立井州及永昌郡隋開皇三年郡廢五年州廢屬通州唐武德元年立南井州及置東關縣貞觀元年州廢省東關以宣漢來屬皇朝乾德五年省入東鄉有下蒲江通明院本唐宣漢縣地僞蜀置通明院以催科稅賦皇朝因之有宣漢鹽井地名長腰鹹源在大江龍骨石窟中涌出中下施州春秋為巴地戰國屬楚秦二漢屬南郡吳晉宋齊梁屬建平郡後周立施業二州及清江軍屯二郡隋開皇初郡廢大業初州廢為清江郡義寧二年復施業二州唐貞觀八年廢業州併焉天寶元年曰清化郡後復故二蜀因之今縣二中下清江縣漢巫縣地屬南郡吳置沙渠縣屬建平郡晉因之後省後周立施州及清江郡隋開皇初郡廢五年置清江縣大業初州廢屬清江郡義寧二年立施州為州治焉有施王屯餘址故以名有連珠山夷水以其水色清照十丈分沙故曰清江水出縣西東至宜都入大江中下建始縣後周立業州及軍屯郡隋開皇初郡廢五年置建始縣大業初州廢屬清江郡義寧二年立施州貞觀八年州廢來屬有連天山建始溪下忠州春秋戰國為巴地秦屬巴郡二漢蜀晉宋齊皆因之梁立臨江郡後周兼立臨州隋開皇初郡廢大業初州廢屬巴東郡義寧二年復立臨州唐貞觀八年改曰忠州天寶元年曰南賔郡前蜀後蜀因之今縣四中下臨江縣漢以後屬巴郡梁立臨江郡後周立臨州唐曰忠州有屏風山大江中下墊江縣西魏析臨江置及立容川容山二郡後周改縣曰魏安隋開皇初郡廢屬渠州十八年復故名唐武德元年屬潾州八年來屬故桂溪縣本清水唐武德二年析臨江置天寶元年更名皇朝熙寧五年省入下豐都縣本平都故巴子之别都也漢枳縣地隋義寧二年析臨江復置屬臨州唐屬忠州有平都山大江下南賔縣唐武德二年析武寧置有望塗溪南賔縣尉司州東南一百八十里本䕫州龍渠鎮皇朝乾德六年來屬開寶二年置尉司下萬州春秋戰國為巴地秦二漢屬巴郡建安中分屬巴東郡晉宋齊皆因之後周立安鄉南都二郡兼立南州後改安鄉曰萬州南都曰懷德隋州郡並廢屬巴東郡唐武德二年立南浦州八年州廢屬䕫州九年復立曰浦州貞觀八年曰萬州天寶元年曰南浦郡前蜀後蜀因之今縣二中下南浦縣本羊渠蜀建興八年更名屬巴東郡晉宋齊因之後周立安鄉郡後改郡曰萬川縣曰安鄉隋開皇初郡廢十八年改縣曰南浦屬巴東郡唐武德二年立南浦州八年州廢屬䕫州九年復為萬州治焉有髙梁山大江下武寧縣本漢臨江縣地後周置源陽縣及立南州南都後改郡曰懷德縣曰武寧隋屬巴東郡唐武德二年屬南浦州八年州廢屬臨州九年復來屬有木歷山大江下開州春秋戰國為巴地秦二漢屬巴郡晉宋齊梁屬巴東郡西魏置開州及萬安江會二郡後周置周安萬世二郡省江會入周安隋開皇初郡並廢大業初州廢分屬通州巴東二郡義寧二年析置萬世郡唐武德元年曰開川天寶元年曰盛山郡前蜀後蜀因之今縣二上開江縣本漢豐縣宋置屬巴東郡西魏改曰永寧隋開皇末改曰盛山屬巴東郡唐立開州廣德元年縣更名故西流縣本後魏置漢興縣西魏更名立開州及萬安江㑹二郡後周廢江㑹入周安隋開皇初萬安郡廢大業初州廢屬通川郡義寧二年來屬唐貞觀元年省入故新浦縣宋置屬巴東郡後周立周安郡隋開皇初郡廢屬巴東義寧二年來屬唐因之皇朝慶厯四年省入有盛山疊江中清水縣本萬世後周置及立萬世郡隋開皇初郡廢屬通州郡義寧二年來屬唐貞觀二十三年更名萬嵗寶歷元年省尋復皇朝改曰清水有石門山清水東南五里有靈洞唐貞元九年雷雨震開下涪州春秋戰國為巴地秦二漢屬巴郡建安二十一年蜀分立涪陵郡晋因之後廢而復立隋開皇初又廢屬渝州唐武德元年析置涪州天寶元年曰涪陵郡前蜀後蜀因之今縣三下涪陵縣漢舊縣東漢及晉因之後改曰漢平置涪陵郡隋開皇初郡廢屬渝州十八年改曰涪陵後廢為鎮唐武德元年以鎮立涪州二年置涪陵縣溫山鎮本溫山縣唐置屬南潾州後來屬皇朝熙寧三年省入有雞鳴峽山大江黃石灘一名橫石東漢岑彭破公孫述將侯丹于黃石即此內江即黔江也南通黔中昔秦使司馬錯泝此水南上擊奪楚黔中地下樂溫縣唐武德二年析巴縣置屬南潾州又析巴縣涪陵置永安縣九年樂溫來屬開元二十一年省永安入焉有樂溫山下武龍縣唐武德二年置有武龍山下恭州古巴子之都戰國為秦所併立巴郡二漢因之初平六年分巴為二郡以江州為永寧郡建安六年復為巴郡蜀晉宋齊因之梁兼立楚州西魏後周因之隋開皇初郡廢改州曰渝州大業初州廢為巴郡唐武德元年曰渝州天寶元年曰南平郡蜀王氏因之皇朝崇寧元年更名今縣三中巴縣本江州古巴國地周武王封同姓為巴子七國時與蜀俱稱王秦惠王既滅蜀國因使張儀虜巴王而取其地以立巴郡二漢因之建安中劉璋使嚴顔為太守張飛攻陷之蜀以後皆為巴郡而改江州為巴縣梁曰楚州隋唐曰渝州皇朝曰恭州有縉雲山明月峽大江中下江津縣本漢江州縣地後既改江州為巴縣乃于此别置江州西魏改曰江陽立七門郡隋開皇初郡廢屬渝州十八年曰江津唐因之故萬夀縣本萬春唐武德三年析江津置五年更名皇朝乾德三年省故南平縣唐置屬霸州貞觀十三年州廢來屬皇朝雍熙五年省入江津下壁山縣唐至德二載析巴江津萬夀置有重壁山油溪珍州古蠻夷之地二漢晉隋屬牂牱郡唐屬珍州元和三年州廢屬溱州後復屬西髙山唐襄棄之皇朝大觀二年大駱解上下族帥駱世華駱文貴等獻地東西四百五里南北三百五十一里以立珍州亦曰樂源郡今縣一中樂源縣唐貞觀十六年置屬珍州後廢皇朝大觀二年立珍州復置樂源為州治焉承州春秋戰國及秦為蠻夷地二漢晉屬牂牱郡通代恃險不聞臣服隋煬帝時屬明陽郡兼屬黔安唐武德四年立夷州貞觀元年州廢四年復置天寶元年曰義泉郡唐襄棄之皇朝大觀三年蕨平帥任漢崇等獻地東西三百五十九里南北六百六十五里改為承州今縣五綏陽縣隋末置屬明陽郡唐武德二年屬義州貞觀十一年來屬而自都上徙州治焉有綏陽山都上縣唐武德元年析彭水置屬黔州貞觀四年立夷州十一年州徙治綏陽義泉縣隋末置屬明陽郡唐武德二年屬義州五年屬智州貞觀十一年屬牢州州自信安徙治焉十六年州廢來屬洋川縣唐武德二年置屬義州貞觀十六年州廢來屬寧夷縣隋末置唐初屬思州武德四年立夷州貞觀元年州廢屬務州開元二十五年來屬自都上以下四縣故基荒廢不可考驗皇朝收復但據夷人所指以置縣然源其始析置移屬則都上當近黔州寧夷當近思州也溱州古蠻夷地自漢至隋屬牂牱郡唐貞觀十六年開山洞立溱州天寶元年曰溱溪郡唐襄棄之皇朝熙寧七年招收置榮懿寨屬南平軍崇寧中復立溱州舊縣二中榮懿縣唐貞觀十六年置為州治後廢皇朝以為榮懿寨𨽻南川縣唐又置樂末縣咸亨元年省中下扶歡縣唐貞觀十六年置梁山軍皇朝開寶三年以石氏屯田務立軍今縣一中下梁山縣西魏析胊䏰置隋屬巴東郡唐武德三年屬南浦州八年州廢屬䕫州是年復立浦州又來屬後改為萬州皇朝開寶三年立軍以為治焉有柏枝山髙梁水紵溪同下州南平軍春秋戰國為巴地秦屬巴郡二漢晉宋齊因之後為蠻夷所據唐武德二年開南蠻立南州三年改曰僰州四年復曰南州天寶元年曰南川郡唐襄棄之皇朝熙寧七年招收西南蕃部立南平軍今縣二中下南川縣本隆陽唐武德二年置為南州治先天元年更名唐末廢皇朝皇祐五年復置屬渝州熙寧七年以縣之銅佛坦立南平軍而省南川為鎮入隆化元豐元年復置有松山得勝山七渡水中隆化縣唐貞觀十一年置屬涪州先天元年改為賔化後復故名皇朝熙寧七年來屬有永隆山羅緣溪僰溪胡陽溪同下州遵義軍歷代地理與播州同皇朝大觀二年蕃帥楊文貴獻地東西二百二十二里南北六百一十二里置遵義軍今縣一遵義軍漢且蘭縣地屬牂牱郡唐貞觀元年析牂牱置屬郎州十一年州廢縣亦省十三年復立播州亦復置縣十四年更名羅蒙十六年更名遵義後自播川徙州治焉唐襄播州為楊氏兩族所分據一居播川一居遵義以仁江水為界其後居播州者曰光榮得唐所給州銅牌居遵義者曰文貴得州銅印皇朝大觀二年兩族各獻其地皆自以為播州議者以光榮為族長重違其意乃以播川立州遵義立軍焉同下州大寧監自五代以前地理與䕫州同皇朝開寶六年立監今縣一中下大曷縣本泰昌晉太康初分秭歸置屬建平郡宋齊因之後周避文帝名改曰建昌而立永昌郡尋廢又改縣曰大昌隋屬巴東郡唐屬䕫州皇朝以縣之鹽泉所置大寧監端拱元年來屬為監治焉故比井縣晉屬建平郡宋齊梁因之後周省入有巫溪鹹泉䕫州路化外州下費州古蠻夷地二漢晉宋屬牂牱郡山川險阻為俚獠所居多不賔附至後周始置為費州以費水為名後廢隋屬黔安郡唐武德初屬思州貞觀四年立費州天寶元年曰浯州郡領縣四中下涪川縣隋開皇五年置屬黔安郡後廢唐武德四年析務州置屬思州貞觀四年立費州為州治中下扶陽縣隋仁夀四年置屬巴東郡唐武德四年屬思州貞觀四年來屬中下多田縣唐武德四年置屬思州貞觀八年來屬中下城樂縣唐武德四年置屬思州貞觀八年來屬下西髙州春秋為蠻夷地戰國秦漢為夜郎國元鼎六年開夜郎屬牂牱郡東漢蜀晉宋因之其後不屬唐貞觀十六年開山洞立珍州天寶元年曰夜郎郡元和三年州廢屬溱州後復立西髙州領縣四內樂源地先歸附别立珍州中下夜郎縣本漢夜郎國有豚東南至廣鬱有鬱水又東南至畨禺城下入海所謂牂牱江也武帝伐南越唐䝉言夜郎精兵可得十萬浮船牂牱出不意此制越一竒也上乃使䝉從巴符關入見夜郎侯約為置吏及以為犍為郡後且蘭反殺犍為太守漢滅且蘭立牂牱郡而犍為郡徙治僰道焉夜郎侯入朝上以為夜郎王至成帝時夜郎王興與鈎町漏卧更舉兵相攻牂牱太守陳立渝告興不從命立出行縣至興國且同亭召興入見立數責因斬之以其地為縣屬牂牱郡東漢以後因之後廢唐貞觀十六年開山洞置夜郎縣為珍州治李白流夜郎即此元和三年州廢屬溱州後復立曰西髙州中下麗髙縣或作麗臯唐貞觀十六年置中下榮德縣唐末置輿地廣記卷三十三
