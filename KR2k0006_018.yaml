body:
  text: 輿地廣記卷十八宋歐陽忞撰河東路上大都督府太原府春秋屬晉戰國屬趙秦昭襄王使䝉驁攻趙初置太原郡二漢因之兼置并州魏晉為太原國後魏復為郡北齊後周皆因之隋初曰并州後曰太原郡唐武徳元年為并州天授元年置北都開元十一年曰太原府後領河東節度周初劉崇竊據其地皇朝太平興國四年克復降為并州嘉祐四年升為太原府河東節度今縣九次赤陽曲縣本漢狼孟縣地故城在今縣東北屬太原郡東漢自今定襄縣移陽曲於此晉因之隋開皇六年改曰陽直十六年改曰汾陽唐武徳七年復曰陽曲自劉氏竊據以前府治太原晉陽二縣皇朝太平興國四年王師克復遂徙州治陽曲而空其故城太原縣禹貢所謂既修太原是也秦來為太原郡治東漢以後兼為并州刺史治焉後魏尒朱榮髙歡父子皆據此隋開皇十年於州城中古晉陽置太原縣唐髙祖於此起義師以興王業皇朝太平興國四年省入榆次晉陽縣本漢舊縣北齊置隴山縣隋開皇十年改曰晉陽皇朝建隆四年以為平晉軍太平興國四年廢為平晉縣熈寧三年省入陽曲有龍山晉水所出次畿太谷縣本漢陽邑縣屬太原郡東漢及晉皆因之隋開皇十八年更名唐因之有太谷山次畿榆次縣本涂水晉大夫知徐吾之邑也秦莊襄王三年䝉驁攻趙榆次漢屬太原郡東漢晉因之北齊改曰中都隋開皇初復曰榆次唐因之次畿夀陽縣晉泰始中置屬樂平郡後廢隋開皇十年復置屬并州後曰受陽唐武徳六年受州徙治此貞觀八年州廢來屬十一年復曰夀陽有方山次畿盂縣本晉大夫盂丙邑漢屬太原郡東漢晉因之後廢隋開皇十六年置原仇縣大業初復曰盂唐武徳三年置受州貞觀八年廢來屬次畿交城縣隋開皇十六年分晉陽置屬并州唐先天二年析置靈州縣開元二年省次畿文水縣本太陵縣地昔趙武靈王遊大陵夢處女鼓琴而歌即此漢屬太原郡東漢晉因之後曰受陽隋開皇十年改曰文水屬并州唐武徳中屬汾州貞觀初還屬并州天授元年以武后鄉里改為武興神龍元年復為文水次畿祁縣本晉大夫祁奚邑晉滅祁氏以賈辛為大夫漢屬太原郡東漢晉因之北齊省隋開皇中復置屬并州唐因之次畿清源縣本梗陽晉大夫魏戊邑漢為榆次縣地隋置清源縣以清源水為名屬并州大業初省入晉陽唐武徳元年復置大都督府潞州春秋時為黎侯後赤狄奪其地而潞子嬰兒為晉所滅其地屬晉戰國時曰上黨為韓之别都逺韓近趙秦攻上黨韓不能救其守馮亭以地降趙秦攻取之置上黨郡二漢晉因之後魏亦為上黨郡後周置潞州隋置韓州大業初州廢復置上黨郡唐武徳元年又為潞韓二州貞觀十七年併韓入焉後領昭義軍節度皇朝太平興國元年改昭徳軍建中靖國元年改隆徳軍今縣七望上黨縣故黎侯國書所謂西伯戡黎詩所謂狄人迫逐黎侯是也漢為壺闗縣屬上黨郡東漢晉因之後魏分置上黨縣為上黨郡治後周及唐為潞州治明皇嘗為州别駕有啓聖宫本明皇故第上屯留縣春秋時本為純留屬晉左傳晉人執衛孫蒯於純留即此後趙肅侯奪晉君端氏而徙之屯留漢屬上黨郡東漢晉因之北齊廢焉隋開皇十六年復置屬潞州唐因之有漢余吾縣故城在縣西北三十里上襄垣縣漢屬上黨郡東漢晉皆因之後魏置襄垣郡北齊郡廢後周置韓州隋大業初州廢屬上黨郡唐武徳元年復置韓州貞觀十七年州廢來屬有鹿臺山上潞城縣故潞子國二漢潞縣屬上黨郡晉為郡治後縣廢隋開皇十六年復置潞城縣屬潞州唐因之有潞水為并州浸即濁漳水也中黎城縣漢潞縣地後魏以潞縣被誅遣人置隋開皇十八年改名黎城有壺口故闗中壺闗縣本漢壺闗縣地後魏既以壺闗置上黨縣乃移壺闗於此隋大業初省入上黨唐武徳四年復析上黨置屬潞州中長子縣本周史辛甲之封邑左傳晉人執衛行人石買于長子即此秦為上黨郡治二漢因之晉屬上黨郡北齊廢焉隋開皇九年置曰寄氏縣十八年改曰長子屬潞州唐因之有廢鳩山漳水所出有羊腸坂王莽命左威將王嘉曰羊頭之阨地當燕趙蓋此地也中下涉縣二漢屬魏郡晉屬廣平郡後魏廢焉隋開皇十八年復置屬潞州望晉州堯時為帝都所謂平陽也春秋屬晉戰國屬魏秦屬河東郡二漢因之魏分置平陽郡晉因之劉淵僣位設都於此後魏亦為平陽郡兼置唐州後改曰晉州東魏北齊皆為重鎮隋初郡廢煬帝初置臨汾郡唐武徳元年曰晉州天寳元年曰平陽郡梁開平四年升定昌軍後唐同光元年改曰建雄軍皇朝因之今縣十望臨汾縣本平陽堯所都也戰國時韓武子居之二漢屬河東郡魏置平陽郡晉因之後魏置唐州改曰晉州隋開皇初改郡曰平河改縣曰臨汾尋郡廢大業初置臨汾郡唐置晉州有姑射山緊洪洞縣本楊侯國姬姓也晉滅之為楊邑二漢為楊縣屬河東郡晉屬平陽郡隋屬臨汾郡義寧二年改曰洪洞取縣北洪洞嶺為名唐屬晉州故洪洞城今在縣北東魏北齊鎮此緊襄陵縣二漢舊縣屬河東郡晉屬平陽郡後魏太武以擒赫連昌乃分置擒昌縣北齊廢襄陵入擒昌隋大業初又改擒昌為襄陵屬臨汾郡唐屬晉州晉襄公之陵在西北因以名縣上神山縣唐武徳二年分襄陵置浮山縣東南有羊角山四年以老子祠更名神山趙城縣昔周穆王以趙城封造父即此漢為彘縣地屬河東郡隋義寧二年析霍邑置趙城縣屬晉州上汾西縣後魏置曰臨汾縣及汾西郡隋開皇初郡廢十八年改縣曰汾西屬晉州唐因之中霍邑縣本彘縣周厲王流於彘即此漢屬河東郡順帝陽嘉二年改曰永安晉省之後魏置永安郡隋開皇初郡廢十六年置汾州十八年改為吕州而改永安為霍邑大業初州廢屬臨汾郡唐屬晉州霍太山在東北禹貢所謂太嶽也周封文王子叔處為霍伯其後晉滅之有彘水西南流入汾中冀氏縣漢猗氏縣地屬上黨郡後魏置冀氏縣及冀氏郡北齊郡廢隋屬臨汾郡唐屬晉州中下和川縣中下岳陽縣漢榖逺縣地屬上黨郡後魏置安澤縣隋大業初改曰岳陽屬臨汾郡唐屬晉州縣在太嶽之南禹貢所謂至於岳陽蓋指此而言也中府州漢屬太原郡隋屬樓煩郡唐屬嵐州唐末置府州後唐莊宗以雲中人折從阮為刺史晉出帝時從阮以兵攻契丹取其城堡十餘漢髙祖天福十二年置永安軍以從阮為節度使明年入朝拜從阮子徳扆為本州團練使自此折氏世守府州皇朝因之今縣一下府谷縣有安豐寧府百勝三寨濱河斥侯請化西安三堡有黄河下麟州漢屬五原西河二郡隋屬銀勝二州唐因之開元十二年節度使張説奏置麟州十四年州廢天寳元年王忠嗣復奏置又為新秦郡皇朝乾徳五年升建寧軍節度端拱七年改鎮西軍今縣三上新秦縣唐天寳元年析連谷銀城置為麟州治按漢書食貨志武帝以山東被水灾民多饑乏乃徙貧民於闗以西及充朔方以南新秦中今之郡縣蓋其地也中銀城縣本漢稒陽曼柏二縣地屬五原郡後魏置石城縣後周改為銀城隋屬綏州後廢焉唐貞觀二年復置四年屬銀州八年屬勝州天寳元年來屬漢本紀光禄勲徐自為築五原塞外列城西北至盧朐山即今縣北所謂光禄塞是也下連谷縣本漢圁隂縣地屬西河郡唐貞觀八年以隋連谷戍置縣屬州天寳元年來屬雄絳州春秋為晉都戰國屬魏秦時屬河東郡二漢因之晉屬河東平陽二郡後魏置東雍州西魏後周以為重鎮後周改曰絳州領正平絳二郡隋開皇初郡廢大業初州廢置絳郡唐武徳元年復曰絳州天寳元年曰絳郡皇朝因之今縣七望正平縣本二漢臨汾縣屬東河郡晉屬平陽郡後周置正平郡隋開皇初置絳州十八年改臨汾縣為正平大業初置絳郡唐為絳州有北齊武平闗在縣西三十里故家雀闗在縣西七里並是鎮處有汾澮二水望曲沃縣晉文侯封弟成師於此謂之曲沃桓叔二漢為絳縣地後周置曲沃縣隋屬絳郡唐屬絳州有絳山絳水望太平縣本漢臨汾縣地後魏置太平縣隋屬絳郡唐屬絳州上翼城縣晉穆侯自晉陽徙都於絳至孫孝侯改絳為翼謂之翼侯其後為曲沃武公所并自曲沃徙都之復謂之絳二漢為絳縣地後魏為北絳縣及北絳郡隋開皇初郡廢十八年改縣曰翼城屬絳州義寧元年置翼城郡唐武徳元年曰澮州四年廢縣來屬中稷山縣本二漢聞喜縣地屬河東郡後魏置髙凉縣又置龍門郡後周置勲州改曰絳州隋開皇初龍門郡廢徙絳州治正平十八年改髙凉曰稷山唐因之有玉壁城後周王思政所築為重鎮齊神武再攻圍不克中絳縣本晉之新田魏獻子曰新田土厚水深居之不疾蓋謂此二漢屬河東郡晉屬子陽後周置絳郡隋開皇初郡廢屬絳州唐因之下垣曲縣本垣縣二漢晉屬河東郡後廢焉西魏置卲郡及白水縣後周置邵州改白水為亳城隋開皇初郡廢大業初州廢改亳城為垣縣屬絳郡義寧元年置邵原郡唐武徳元年曰邵州貞觀元年州廢縣來屬龍朔二年屬洛州長安二年復故貞元三年屬陜州元和三年復故今曰垣曲有禹貢王屋山沇水所出東流為濟上代州春秋屬晉戰國屬趙趙武靈王置雁門郡北其南境秦漢屬太原鴈門二郡東漢屬太原鴈門代三郡晉置鴈門郡後魏又置繁畤郡後周置肆州隋開皇五年改曰代州唐因之天寳元年曰鴈門郡皇朝因之今縣四中鴈門縣本漢廣武縣屬太原郡東漢屬代郡晉為鴈門郡治焉元魏後周皆因之隋初郡廢置代州唐因之有夏屋山史記趙襄子北豋夏屋以銅斗擊殺代王即此有勾注山漢擊匈奴於此一名西陘有滹沱水中崞縣二漢晉皆屬雁門郡後廢焉元魏置石城縣東魏置廓州北齊改為北顯州後周廢隋開皇十六年改縣曰平冦大業初又改曰崞縣屬鴈門郡唐屬代州有崞山故樓煩縣本樓煩胡地趙武靈王取之置縣二漢屬雁門郡魏晉廢焉故城在今縣東故唐林縣本武延縣唐證聖元年析五臺崞置唐隆元年改曰唐林皇朝景徳二年省入崞中下五臺縣本慮虒縣二漢屬太原郡魏晉廢焉後魏置驢夷縣隋大業初改曰五臺屬鴈門郡唐屬代州有五臺山慮虒水中下繁畤縣二漢晉皆屬鴈門郡後廢焉元魏復置并置繁畤郡後周郡縣並廢隋開皇十八年復置縣屬代州唐因之下隰州春秋屬晉戰國屬魏秦二漢屬河東郡魏晉屬平陽郡後魏北齊為沁州後周置沁州及龍泉郡隋開皇初郡廢後復置西汾州尋又改為隰州大業初復置龍泉郡唐武徳元年改為隰州天寳元年曰大寧郡今縣六上隰川縣本晉之蒲邑晉獻公使公子重耳居蒲即此漢為蒲子縣屬河東郡晉屬平陽郡後廢焉後周置長夀縣及龍泉郡隋開皇初郡廢改長夀縣為隰川為隰州治唐因之上温泉縣本後周新城縣地隋開皇十年省縣入汾西唐武徳三年置温泉及北温州貞觀元年州廢以縣來屬中蒲縣後周置隋屬龍泉郡唐武徳二年置昌州貞觀元年州廢以縣來屬中大寧縣本漢北屈縣地屬河東郡隋為任城縣地屬文城郡唐武徳二年更名是年置中州貞觀元年州廢以縣來屬中石樓縣本漢吐軍縣屬西河郡東漢省之後魏置吐京縣及吐京郡蓋胡俗語訛也隋開皇初郡廢十八年改縣為石樓屬隰州唐武徳二年置西徳州貞觀元年州廢屬東和州州廢來屬有石樓山中永和縣本漢狐讘縣屬河東郡東漢晉因之後周置臨河縣及臨河郡隋開皇初郡廢十八年改縣為永和屬隰州唐武徳二年置東和州六年析置樓山縣貞觀二年州廢省樓山以永和來屬下慈州春秋屬晉戰國屬魏秦二漢屬河東郡魏晉屬平陽郡東魏置定陽郡及南汾州北齊改為西汾州隋開皇初郡廢十六年改州為耿州後復為汾州大業初州廢置文城郡唐武徳元年復曰汾州五年曰南汾州八年曰慈州取慈烏戍為名天寳元年曰文城郡皇朝熈寧五年州廢屬隰州元祐元年復置今縣一中吉鄉縣本晉之北屈晉獻公使公子夷吾居屈即此地産良馬所謂屈産之乗東魏置定陽縣及定陽郡隋改定陽曰吉昌置文城郡唐曰慈州後唐改吉昌為吉鄉皇朝因之州廢屬隰州州復置仍為州治有禹貢壺口山文城鎮本元魏伍城縣地後置文城縣隋屬文城郡唐屬慈州有孟門山黄門皇朝熈寧五年省入吉鄉唐慈州又領昌寧仵城吕香三縣昌寧縣元魏置并内陽郡隋開皇初郡廢屬文城郡後唐改曰寧鄉皇朝省之伍城縣元魏置曰刑軍縣後改曰伍城又置伍城郡隋開皇初郡廢屬文城郡周顯徳三年省吕香縣隋義寧元年分伍城置平昌縣唐貞觀六年改為吕香周顯徳三年省下忻州春秋屬晉戰國屬趙秦二漢屬太原郡元魏置肆州後周徙州於鴈門郡隋開皇初置新興郡唐廢十八年置忻州取忻口為名大業初州廢屬樓煩郡義寧元年復置新興郡唐武徳元年復為忻州天寳元年曰定襄郡皇朝因之今縣二緊秀容縣本漢汾陽縣地屬太原郡東漢省之元魏置肆州北齊置平冦縣隋開皇初置新興郡十年廢平冦縣而自今宜芳秀容故城移縣治此十八年置忻州唐因之有忻口寨繫舟山上定襄縣本漢陽曲縣地唐武徳四年析秀容置有石嶺闗甚險固輿地廣記卷十八
