body:
  text: 輿地廣記卷三十五宋歐陽忞撰廣南東路中都督府廣州古蠻夷之地春秋戰國為百越在禹貢職方州域之外秦并天下略定陽越立南海郡秦滅南海尉趙他自立為南越武王漢髙帝因立他為南越王元鼎中相吕嘉王建德反武帝興兵滅之及東漢以後皆為南海郡建安十五年建立交州吳永安六年分立廣州晉宋齊梁陳因之隋平陳郡廢仁壽元年曰畨州大業初州廢復立南海郡唐武德四年平蕭銑立廣州天寶元年曰南海郡後建清海軍節度五代為南海劉氏所據皇朝開寶四年收復今縣七望南海縣本秦畨禺縣地為南海郡二世時南海尉任囂召龍川令趙他謂曰畨禺負山險阻南北東西數千里此亦一州之主可為國他後遂自立為南越武王漢末立交州牧吳立廣州後改畨禺為南海縣隋曰畨州唐曰廣州皇朝開寶五年省咸寧常康二縣入焉有羅浮山上畨禺縣秦漢舊縣後改為南海隋平陳分南海置尋省入後復置與南海分治郭下有畨禺山尉他葬於此中清逺縣漢中宿縣地屬南海郡晉宋屬始興郡後立清逺郡隋平陳郡廢置清逺縣屬廣州唐因之中增城縣漢畨禺縣地吳置及晉屬南海郡成帝分立東官郡宋以後因之隋平陳郡廢屬廣州唐因之有猊山增水中懷集縣漢四會縣地晉置懷化縣後改為懷集屬新會郡隋省之後復置屬廣州唐武德五年立威州并置興平霍清威成三縣貞觀元年州廢省三縣入懷集屬南綏州十三年州廢來屬開元二年省永固縣入焉故遊水縣本漢封陽縣地屬蒼梧郡齊置遊安縣隋省之唐復置屬廣州至德二載改今名皇朝開寶五年省入有寶山縱連溪中下東莞縣隋曰寶安唐至德二載更今名皇朝開寶五年省入增城六年復置有寶山下新會縣漢畨禺縣地晉恭帝立新會郡及置新會縣宋以後因之隋平陳郡廢後為封州後又改為允州後又改為岡州以地有金岡名之大業初州廢屬南海郡唐武德四年復立岡州并析置封平封樂二縣貞觀十三年州廢省封樂封平是年復立岡州開寶二十三年州廢以新會來屬有利山中韶州春秋為百越地戰國屬楚秦屬南海郡二漢屬桂陽郡吳甘露元年分立始興郡晉因之宋改曰廣興郡齊復曰始興梁陳因之隋平陳郡廢屬廣州唐武德四年平蕭銑立畨州尋改為東衡州貞觀元年更今名天寶元年曰始興郡唐為盧光潤所據後入南漢今縣五望曲江縣二漢屬桂陽郡吳屬始興郡晉宋以後為郡治焉隋屬南海郡唐立畨州改曰東衡州又改曰韶州有錢石山玉山曲江桂水有韶石髙百仞廣圓五里兩石對峙相去一里小大略等似雙闕州取名焉望翁源縣梁置陳又立清逺郡隋廢屬廣州後省唐武德五年復置屬涯州貞觀元年來屬有靈池山翁水中樂昌縣漢曲江縣地梁置梁化縣又分置平右縣隋開皇十二年省平石入梁化屬廣州十八年更名唐武德四年來屬有昌山武溪溪自臨武東南流入曲江界巖崖峻岨湍浪震驚名曰瀧水韓文公詩南行踰六旬始下樂昌瀧險惡不可狀船石相舂撞是也中仁化縣唐垂拱中析曲江置屬廣州後來屬皇朝開寶五年省入樂昌咸平三年復置有白星山潼溪五渡水建福縣皇朝崇寧元年以岑水場析曲江翁源置下循州古百越之地秦屬南海郡二漢吳晉因之宋分屬南海東官二郡齊因之隋平陳屬循州大業初州廢屬龍川郡唐武德五年屬循州南浦改循州為貞州而析州之北境又立循州於此皇朝因之今縣三望龍川縣秦屬南海郡二世時趙他為令於此二漢晉因之宋以後屬東官郡隋屬循州開皇十一年省入河源南漢復置以為循州治焉有龍川江豐湖望興寧縣漢龍川縣地後置興寧隋屬龍川郡唐屬循州貞觀元年省齊昌縣入焉有揭陽山興寧江上長樂縣皇朝熙寧四年置有宣黃山熱水下潮州春秋為七閩地戰國為越人所居秦屬南海郡漢屬南越後及東漢屬南海隋屬東官郡安帝分立義安郡宋齊以後因之梁立楊州改曰瀛州及陳時州廢隋平陳郡廢立潮州大業初州廢復為義安郡唐武德五年曰潮州天寶元年曰潮陽郡五代為南漢所有今縣二望海陽縣漢揭陽縣地屬東海郡東越王餘喜請以卒八千擊南越立石揭陽以海風波為解即此地也後置海陽縣為義安郡治隋唐曰潮州有鳳凰山鯨溪溪有鯨魚為害刺史韓退之為文以祭之是夕大風雨鯨魚南徙自此無患緊潮陽縣陳以前屬義安郡隋唐屬潮州有東山下連州春秋為百越戰國屬楚秦屬長沙郡二漢屬桂陽郡吳晉屬始興郡宋明帝立宋安郡後廢屬廣興郡齊復屬始興郡梁立陽山郡隋平陳郡廢置建州大業初州廢置熙平郡唐武德四年蕭銑立連州天寶元年曰連山郡唐末為楚馬氏所有後入南漢今縣三望桂陽縣二漢屬桂陽郡所謂小桂也唐曰連州有金銀山桂陽山湟水漢討南越伏波將軍路博德出桂陽下湟水是也一名滙水一名涯水有海陽湖正女峽相傳昔有女子取螺遇風雨晝晦化為石中陽山縣漢屬桂陽郡東漢改曰隂山吳省之晉復置陽山屬始興郡宋屬廣興郡梁屬陽山郡隋屬熙平郡唐屬連州有陽巖山茂溪水中連山縣晉武帝分桂陽立廣惠縣梁改曰廣德隋改曰廣澤屬連州仁夀元年更今名唐因之有銅山滑水下封州古百越地秦屬南海郡二漢屬蒼梧郡晉屬晉康郡宋齊因之梁分立梁信郡兼立城州隋平陳廢改州曰封州大業初州廢屬蒼梧郡唐武德四年平蕭銑立封州天寶元年曰臨封郡五代為南漢所有今縣二下封川縣二漢廣信縣地屬蒼梧郡晉屬晉康郡梁為梁信郡治焉隋唐曰封州隋大業初省封興縣入村州唐武德四年復置後省下開建縣漢封陽縣地隋蒼梧郡宋文帝分置開建縣以縣立宋建郡大明元年郡廢屬臨慶國梁立南靜郡隋平陳郡廢屬連州後省唐武德四年復置來屬有忠讜山封溪水下端州古百越地秦屬南海郡二漢吳晉屬蒼梧郡宋齊屬南海陳立髙要郡隋平陳郡廢立端州大業初州廢立信安郡唐武德元年曰端州天寶元年曰髙要郡五代為南漢所有皇朝建中靖國元年升興慶軍節度今縣二中髙要縣二漢晉屬蒼梧郡宋齊屬南海郡陳立髙要郡隋立端州又曰信安郡唐曰端州貞觀十三年省博林入焉故平興縣唐武德中析置清泰縣貞觀十三年省入平興皇朝開寶五年省平興入髙要有爛柯山端溪西江鵠奔亭漢交趾刺史何敞行部半夜有婦人訴寃自謂廣信蘇施妻名始珠敞命掘之有雙鵠奔其處下四會縣二漢吳晉屬南海郡隋屬廣州大業初省始昌縣入焉唐武德五年立南綏州貞觀八年更名滇州十三年州廢屬廣州皇朝熙寧六年來屬有雞籠山龍江水下新州古百越地秦屬南海郡二漢屬合浦郡晉屬蒼梧郡穆帝分立新寧郡宋齊因之梁立新州隋平陳郡廢大業初州廢屬信安郡唐武德二年平蕭銑立新州天寶元年曰新昌郡後改曰新興五代為南漢所有今縣一中新興縣二漢臨光縣地屬合浦郡晉置新寧縣屬蒼梧郡穆帝分立新寧郡後改曰析興梁改新州隋因之大業初省索盧入焉唐武德二年析置索盧新昌單牒永順四縣後省新昌單牒乾元後又省索盧皇朝開寶五年省永順皆入焉信安鎮本義寧縣宋置屬新會郡隋屬廣州開皇十年省新夷初賓二縣入義寧省始康縣入封平大業初省封平入焉唐屬廣州皇朝太平興國元年改曰信安熙寧五年省入新興元祐元年復置紹聖二年又省有天露山利山新江封水望康州古百越地秦屬南海郡二漢吳晉屬蒼梧郡穆帝分立晉康郡宋以後因之梁又立開陽平原羅陽等郡隋平陳郡俱廢屬端瀧二州大業初屬信安永熙二郡唐武德四年立瀧州六年立康州天寶元年康州曰晉康郡瀧州曰開陽郡五代為南漢所有皇朝開寶五年廢康州入端州尋復立六年廢瀧州入晉康州今縣二下端溪縣二漢屬蒼梧郡晉立晉康郡唐武德六年立南康州九年州廢貞觀元年復立十一年又廢十二年又立更名康州初武德五年析博林置撫納縣後省入焉梲城鎮本樂城縣隋屬信安郡都城鎮本都城縣隋屬蒼梧郡故晉康縣本遂安唐至德二載更名三縣皆屬康州皇朝開寶五年並省入端溪有端山西江端溪下瀧水縣漢端溪縣地梁置開陽平原羅陽三郡隋平陳並廢以名縣屬瀧州開皇十八年改平原縣曰瀧水羅陽縣曰正義大業初以瀧水立永熙郡而省開陽正義入焉唐武德四年立瀧州復置開陽正義正義後省故鎮南縣本安南隋大業初省入永熙唐武德四年析瀧水復置屬南建州貞觀八年改州曰藥州十八年州廢屬瀧州至德二載更名故安遂縣梁立建州及廣熙郡尋郡廢隋大業初州廢屬永熙郡唐武德四年屬南建州州廢入焉故建水縣本永熙隋屬永熙郡唐武德四年屬南建州五年改為永寧貞觀十八年屬瀧州天寶元年更名皇朝開寶六年州廢三縣皆省有靈陽山羅田水下南恩州古百越地秦屬南海郡二漢屬合浦郡吳屬髙興郡晉以後因之齊立齊安郡梁立桂陵陽春二郡隋平陳郡廢屬髙州後屬髙涼郡唐武德四年立春州貞觀二十年立恩州天寶元年改恩州曰恩平郡春州曰南陵郡五代為南漢所有皇朝開寶五年廢春州入恩州六年復立熙寧六年又廢入焉慶厯八年加南字今縣二中陽江縣晉海安縣地屬髙興郡隋末置陽江懸唐屬恩州後為州治焉故恩平縣本齊立齊安郡隋平陳郡廢屬髙州開皇十八年改曰海安唐武德五年復曰齊安貞觀二十三年屬恩州至德二載改曰應平大順二年自西平徙治後又徙陽江故西平縣晉屬髙興郡後省入髙涼梁為髙州隋為髙涼郡唐武德五年改曰西平貞觀二十三年以縣立恩州而髙州徙良德後州徙治恩平而西平省入焉故杜陵縣梁立杜陵郡隋平陳郡廢屬髙州開皇十八年改縣曰杜原唐武德五年復曰杜陵貞觀二十三年來屬皇朝開寶五年省恩平杜陵入陽江有恩平江下陽春縣漢髙涼縣地復置陽春縣梁立陽春郡隋平陳郡廢屬髙州唐武德四年平蕭銑立春州天寶元年曰南陵郡皇朝開寶元年州廢來屬六年復立縣還屬焉大中祥符九年州廢屬新州改曰新春天禧四年復立縣又屬焉熙寧六年州廢來屬故銅陵縣本龍潭宋置後改焉隋屬信安郡唐武德四年屬春州是年以縣立勤州五年州廢萬嵗通天二年復立長安中復廢開元十八年復立州治富林洞因析銅陵置富林縣皇朝開寶五年州廢省富林入銅陵屬春州熙寧六年州廢省入陽春有鸞山漢陽江下梅州春秋為七閩地戰國屬越秦屬南海郡漢屬南越後及東漢屬南海郡晉屬東官郡後又屬義安郡宋以後因之隋唐屬潮州五代時南漢立敬州皇朝開寶四年改曰梅州熙寧六年州廢入潮州元豐五年復立今縣一中程鄉縣隋屬義安郡唐屬潮州南漢立敬州皇朝曰梅州州廢屬潮州復立又來屬為州治有西陽山程江下南雄州春秋為百越地戰國屬楚秦屬南海郡二漢屬豫章郡吳晉屬始興郡宋改為廣漢齊復為始興梁陳因之隋廢郡屬廣州唐屬韶州五代時南漢立雄州皇朝加南字今縣二望保昌縣本湞昌唐光宅元年析始興置屬韶州南漢立雄州皇朝加南字而縣改名有大庾嶺淨水所出龍州界西徑湞陽南右注溱水有樓船水漢討南越楊僕為樓船將軍出豫章下橫浦即此淨水矣下始興縣漢南野縣地屬豫章郡吳屬南康郡孫皓分置始興縣屬始興郡晉以後因之齊改曰正階梁復曰始興亦安逺郡陳置東衡州隋平陳郡廢屬廣州唐屬韶州皇朝開寶四年來屬有東嶠山即大庾嶺在五嶺之最東故曰東嶠有修仁水斜皆水齊范雲為始興太守賦詩云且汲修仁水不飲斜皆流下英州古越地戰國屬楚秦屬南海郡二漢屬桂楊郡吳屬始興郡晉宋以後因之梁又立衡州入楊山郡隋平陳郡並廢改州曰涯州開皇二十年州廢屬廣州唐因之五代時南漢立英州今縣二望真陽縣本湞陽二漢屬桂林郡晉宋屬始興郡泰始二年改湞為貞後復為湞隋省入曲江後復曰真陽唐屬廣州貞觀元年復曰湞陽南漢立英州皇朝乾興元年改曰真陽有臯石山始興江上浛光縣本浛洭二漢屬桂陽郡晉宋屬始興郡隋唐屬廣州皇朝更名開寶四年𨽻連州六年來屬有堯山白鹿山晉張方為浛洭令有德化感白鹿羣遊因以名山有洭水下惠州古百越地秦屬南海郡二漢吳晉因之成帝以後及宋齊屬南海東官二郡隋平陳立循州大業初州廢立龍川郡唐武德元年曰循州天寶元年曰海豐郡五代時南漢改曰貞州而别立循州於北境皇朝天禧五年改曰惠州今縣四中歸善縣漢博羅縣地屬南海郡宋置歸善縣隋立循州及龍川郡唐析置龍川縣貞觀元年省入焉南漢改曰貞州皇朝改曰惠州有寅山緊河源縣隋屬循州有新豐縣開皇十八年改曰休吉大業初省入焉唐亦屬循州武德五年析置石城縣貞觀九年省入南漢屬貞州有龍穴山中博羅縣二漢屬南海郡晉以後因之隋屬循州唐析置羅陽縣貞觀元年省入南海屬貞州有羅浮山下海豐縣宋置屬東官郡隋屬循州唐武德五年析置陸安縣貞觀元年省南漢屬貞州輿地廣記卷三十五
