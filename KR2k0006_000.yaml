body:
  text: 輿地廣記地理類二總志之屬提要臣等謹案輿地廣記三十八卷宋歐陽忞撰朝公武讀書志謂實無其人乃著書者所假託陳振孫書録解題則以為其書成於政和中忞歐陽修從孫以行名皆連心字為據按此書非觸時忌何必隱名疑振孫之說為是然修廬陵人而此本有忞自序乃自稱廣陵豈廣廬字形相近傳寫致訛歟其書前四卷先叙厯代疆域提其綱要五卷以後乃列宋郡縣名體例特為清析其前代州邑宋不能有如燕雲十六州之類者亦附各道之末名之曰化外州亦足資考證雖其時土宇狹隘不足括輿地之全而端委詳明較易尋覽亦地理家之佳本也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀輿地廣記自序古者風俗醇厚士大夫安於所習而無外慕不足之心故其藝必専兊之戈和之弓僚之於圎秋之於奕皆以此終其身而名後世而人亦未有能加之者及至後世日益奢靡未始不欲以其一身擅天下之能事而終無所至嗚呼此後之君子所以有愧於古歟地理之書雖非有深逺難見之事然自厯世以來更張改作先王之制無一存者自非専門名家而從事於此者其孰能知之豫不佞自少讀書私嘗留意於此嘗自堯舜以來至於今為書凡三十八篇命之曰輿地廣記凡自昔史官之作與夫山經地志旁見雜出莫不入於其中庶幾可以成一家之言備職方之考而非口傳耳受嘗試之說者也傳曰執璿璣以觀大運則天地之動未足怪也據㑹要以觀方來則六合輻凑未足多也統之有宗㑹之有源則繁而不能亂衆而不能惑矣地理之書紛雜殽亂卒然視之漫不可省雖深識博聞之君子亦且以為病而又安知是非之所在其所以處之將必有道矣夫以今之州縣而求於漢則為郡以漢之郡縣而求於三代則為州三代之九州散而為漢之六十餘郡漢之六十餘郡分而為今之三百餘州雖其間或離或合不可討究而吾胸中蓋已了然矣譬如三十輻之車制之以轂二篇之䇿統之以乾坤豈不約而易操乎是以願廣其書於世必有能辨之者世之君子其試以是觀之政和闕年三月日廣陵歐陽忞序
