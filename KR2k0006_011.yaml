body:
  text: 輿地廣記卷十一宋歐陽忞撰河北西路次府真定府春秋時屬鮮虞為晉所滅戰國時屬趙秦屬巨鹿郡漢髙帝置恆山郡後避文帝諱改曰常山亦屬真定國東漢屬常山國魏晉復為郡元魏因之後周兼立恆州隋開皇初郡廢大業初州廢復立常山郡唐武德初復曰恆州後升為成德軍節度元年十五年避穆宗諱曰鎮州五代時曰真定府梁以諱改曰武順唐復曰成德晉曰順德漢復曰成德周及皇朝因之今縣九次赤真定縣本中山國之東烜邑漢十一年代相陳豨反其將趙利守東垣髙帝攻拔之改曰真定元鼎四年立真定國東漢併入常山魏晉為郡治在今縣南元魏道武移郡治於此今府城是也自唐寶應後叛將李寶臣王武俊王廷凑等相繼據之有滹沱水次畿槀城縣漢屬真定國北齊立巨鹿郡後周因之隋開皇初郡廢十年立亷州大業初廢義寧元年復立巨鹿郡唐武德元年改曰亷州貞觀元年州廢來屬九門縣二漢屬常山郡魏晉元魏因之北齊省隋開皇六年復置皇朝開寶六年省入次畿欒城縣春秋晉大夫欒氏之邑漢為牛棘縣地東漢置欒城縣北齊省隋開皇十六年復置屬欒州大業初州廢屬趙郡唐本屬趙州大厯三年來屬次畿元氏縣本趙公子元之封邑漢髙帝立恆山郡治此故城在焉東漢為國魏晉元魏屬趙國北齊省隋開皇六年復置唐屬趙州五代時來屬次畿井陘縣漢屬恆山郡東漢魏晉元魏皆因之後省北齊廢石邑以置井陘隋開皇六年復石邑分置井陘有徑山其道險隘李左車所謂車不得方軌騎不得成列是也有綿蔓水韓信攻趙背水為陳即此次畿獲鹿縣漢石邑縣地隋開皇十六年分置鹿泉縣唐天寶十五載更名獲鹿石邑鎮本漢縣皇朝開寶六年省有井陘口亦曰土門秦始皇興兵塞井陘口漢韓信出井陘破陳軍唐李光弼出土門破史思明軍皆在此地有萆山滹池水次畿平山縣本晉之蒲邑二漢為蒲吾縣屬常山郡魏晉皆因之後徙焉隋開皇十六年置房山縣唐天寶十五載改為平山次畿行唐縣二漢曰南行唐屬常山郡魏晉以後皆因之隋曰行唐屬恆山郡唐屬鎮州五代屬真定府有禹貢恆水次畿靈夀縣漢屬常山郡魏晉以後皆因之後周立蒲吾郡隋開皇初郡廢唐屬鎮州五代時屬真定府皇朝熙寧八年省元祐二年復置焉有禹貢衛水望相州商王河亶甲居相此其地也春秋時屬晉戰國時屬魏後屬趙秦屬邯鄲郡二漢為魏郡曹公為魏王都此晉亦為魏郡後趙石季龍前燕慕容俊皆都之後魏置相州東魏北齊又都焉改為清都尹後周復置相州及魏郡隋初郡廢大業初州廢復置魏郡唐為相州天寶元年曰鄴郡故屬天雄軍節度梁分置昭德軍而天雄軍亂遂入于晉莊宗滅梁復屬天雄晉髙祖置彭德軍今縣四緊安陽縣漢為侯國曹魏時併入鄴徐廣晉紀曰石遵自孚城北入斬張豹于安陽後周移鄴縣及相州于安陽故城遂改為安陽縣魏郡治焉唐為相州有韓陵山髙歡破爾朱兆于北永和鎮本漢內黃縣地隋開皇十四年置長樂縣十八年改曰堯城屬魏郡唐屬相州天祐三年改曰永定皇朝天聖七年改曰永和熙寧六年省入安陽緊湯隂縣本二漢蕩隂縣屬河南郡晉屬魏郡後廢焉隋開皇六年復置屬汲郡唐屬相州貞觀元年改為湯隂有羑里城商紂囚周文王之所緊臨漳縣本漢鄴縣地東漢天平初析置臨漳縣屬魏郡後周及隋因之唐屬相州魏文侯七年始封此地以西門豹為鄴令民不敢欺至襄王時史起為鄴令引漳水溉鄴民賴其用漢髙十二年置魏郡治此漢末袁紹為冀州牧鎮鄴曹公取之以為鄴都作三臺皆因城為基晉亂胡作石季龍慕容俊皆都之後魏置相州東魏北齊又都焉後周平齊復置相州隋文輔政總管尉遲逈舉兵不順韋孝寬討平之乃焚燒鄴縣徙其居民南遷四十里以安陽城置鄴縣屬魏郡唐屬相州皇朝熙寧六年省入臨漳中林慮縣本漢隆慮縣屬河內郡後漢避殤帝名改曰林慮晉屬魏郡後魏置林慮郡北齊廢之後復置隋開皇初又廢之大業初屬魏郡唐屬相州次府中山府堯時都于此春秋時為鮮虞戰國初為中山國後為魏所并後又屬趙秦屬上谷巨鹿二郡漢髙帝置中山郡景帝三年改為國後漢晉皆因之後燕慕容垂移都于此置中山尹後魏為中山郡兼置安州大唐改為定州升義武軍節度皇朝太平興國元年改定武軍政和三年改中山府中山郡今縣七緊安喜縣古中山國魏文侯使樂羊伐取之以封太子擊漢為盧奴縣城內西北隅有水淵而不流色正黑或云黑水曰盧不流曰奴故以取名後魏皇始二年滅慕容寶立安州道武帝天興三年改曰定州北齊改為安喜後周置鮮虞郡隋開皇初郡廢置鮮虞縣大業初廢安喜入焉屬博陵郡唐屬定州武德四年改鮮虞曰安喜故陘邑縣本漢苦陘屬中山國後漢章帝改曰漢昌魏改曰魏昌晉元魏因之北齊廢焉隋開皇十六年復置曰隋昌屬博陵郡唐武德四年改曰唐昌屬定州天寶元年改曰陘邑皇朝康定元年省入安喜緊無極縣二漢為無極屬中山國晉省之後魏復置隋屬博陵郡唐屬定州武后改毋極為無極景福二年置祁州周徙治蒲陵皇朝景德元年來屬上曲陽縣漢為上曲陽屬常山郡後漢屬中山國晉屬常山郡北齊去上字隋開皇六年改為石邑屬博陵郡七年改曰恆陽唐屬定州元和十五年改為曲陽在北嶽常山西中唐縣昔堯為唐侯國于此春秋時屬北燕昭十二年齊髙偃納北燕伯欵于唐是也漢屬中山國後漢及晉皆因之北齊廢焉隋開皇十六年復置屬博陵郡唐屬定州舊治中人城縣西四十里有中人亭左傳昭十三年晉荀吳侵鮮虞及中人大獲而歸是也聖厯元年徙治今所中望都縣昔堯母慶都所居有堯山在北慶都山在南登堯山見慶都山故以望都名縣漢屬中山國後漢及晉皆因之北齊省入北平唐武德四年復置屬定州初治安險故城貞觀八年徙治今所中新樂縣古鮮虞國子姓漢為新市縣屬中山國後漢及晉皆因之後廢焉隋開皇十六年置曰新樂縣屬博陵郡唐屬定州中下北平縣漢屬中山國後漢及晉皆因之後魏置北平郡北齊郡廢隋屬博陵郡唐屬定州萬嵗通天二年契丹攻之不下更名徇忠神龍元年復舊漢曲逆縣濡水于城北曲而西流故曰曲逆左傳哀四年齊國夏伐晉取曲逆是也漢髙帝過之曰壯哉吾行天下唯洛陽與是耳詔封陳平為曲逆侯屬中山國後漢章帝醜其名改曰蒲隂晉因之北齊廢入北平上邢州春秋時為邢國衛人滅之戰國時屬趙秦屬巨鹿邯鄲郡常山王張耳都焉漢屬趙國廣平巨鹿常山郡後漢因之晉屬巨鹿趙國後趙石勒亦都焉後魏為巨鹿郡隋置邢州後為襄國郡唐復為邢州天寶元年屬巨鹿郡梁升保義軍節度後唐改為安國軍今縣八上龍國縣故邢國秦時謂之信都項羽立張耳為常山王居此更名曰襄國漢屬趙國後漢因之晉省焉石勒陷皇州干寶曰襄國因山慿險形勝之地可都也大興元年勒僣號于襄國其後為慕容氏所滅隋開皇九年改為龍岡縣襄國郡焉唐為邢州有夷儀城在縣北一百五十里春秋僖五年邢遷于夷儀即此上沙河縣漢襄國縣地隋開皇十六年置沙河縣屬襄國郡唐武德元年置溫州四年州廢來屬有湯水上巨鹿縣本漢南蠻縣屬巨鹿郡後漢因之晉省焉隋于南蠻故城置巨鹿縣屬襄國郡唐武德四年屬趙州貞觀元年來屬有禹貢大陸澤上平鄉縣本巨鹿縣秦始皇二十五年滅趙以為巨鹿郡秦將王離圍趙王歇于此漢因之後漢及晉徙治廮陶而巨鹿屬焉北齊縣廢置平鄉縣屬襄國郡唐屬邢州皇朝熙寧六年省入巨鹿元祐元年復置上內丘縣本中丘縣漢屬常山郡後漢屬趙國晉因之元魏屬南趙郡隋曰內丘屬襄國郡唐武德四年屬趙州五年來屬有干言山詩所謂出宿于干飲餞于言是也中堯山縣本柏人春秋晉邑也漢屬趙國髙帝過趙欲宿心動問縣名何曰柏人上曰柏人者迫于人也去弗宿趙相貫髙等果有逆謀後漢及晉皆屬趙國元魏屬南趙郡隋屬襄國郡唐屬邢州天寶元年改為堯山皇朝熙寧六年省入內丘元祐元年復置中南和縣地屬廣平國後漢屬巨鹿郡晉省之後復置後周置南和郡隋開皇初郡廢屬襄國郡唐屬邢州中任縣春秋晉邑也鄭皇闕于晉為任大夫漢屬廣平國後漢屬巨鹿郡晉省之隋開皇初六年復置屬襄國郡大業初省入南和唐武德四年復置屬邢州皇朝熙寧三年省入南和元祐元年復置雄懷州禹貢三懷之地太行山在焉春秋時周襄王以陽樊溫原攢茅之國賜晉武公晉于是始啓南陽又云武王克商蘇忿生以為溫司冦其左有隤懷是也戰國時屬魏兼屬衛秦滅衛徙其君相于野至二世廢角為庶人以其地屬三川郡項羽立司馬邛為殷王都此漢初為殷國尋更名河內郡後漢因之晉分屬汲郡後魏置懷州兼置河內郡隋初郡廢而懷州如故煬帝初州廢復置河南郡唐為懷州天寶初曰河內郡今縣三緊河內縣本野王秦始皇徙衛君角于此阻其山而保之漢屬河內郡後漢因之晉為郡治後魏兼置懷州隋開皇十六年改野王為河內唐為懷州西北三十里有䢴城故䢴國也周武王子所封太行山在西北武德鎮本秦縣始皇東巡自以武德定天下因以名縣焉二漢屬河南郡晉為郡治後置武德郡隋開皇初郡廢十八年改州縣為邢丘大業初又改曰安昌屬河內郡唐武德二年復名武德屬懷州皇朝熙寧六年省入河內漢射犬縣故城在北平臯縣故城在西中武陟縣本漢懷縣地隋開皇十六年析置武陟大業初省焉唐武德二年置陟州及修武縣四年州廢改修武為武陟屬懷州故懷縣本禹貢覃懷之地後為晉邑春秋時赤狄伐晉圍懷是也二漢為河內郡晉屬河內隋大業初廢之後復置唐貞觀元年省入武陟故城在今縣之西上修武縣本商之寧邑周武王伐紂勤兵于寧更名修武晉始啓南郡即此故有南陽城二漢屬河內郡晉屬汲郡隋屬河內郡唐武德四年改修武為武陟而别置修武縣于隋修武故城屬懷州漢山陽縣屬河內郡後漢晉皆因之魏阮籍嵇康等同居山陽時人號竹林七賢後縣廢故城在今縣西北有雍城故雍國周文王子所封左傳僖二十四年富辰曰郜雍曹滕文之昭也有濁鹿城漢獻帝為山陽公居此望衛州春秋時分屬於晉衛戰國時屬魏秦屬三川郡二漢屬河內郡魏置朝歌郡晉改為汲郡後魏因之東魏置義州後周改為衛州又置修武郡隋初郡廢煬帝初州廢復置汲郡唐為衛州天寶元年曰汲郡今縣四中汲縣故商都牧野之邑水經注云太公生於汲城北三十里有太公泉泉上有太公廟相傳云太公之故居也二漢屬河內郡魏屬朝歌郡晉為汲郡治焉太康初縣人有發魏安釐王冡大得古書皆簡編科斗文字所謂汲冡書也北齊置五城郡後周廢為五城縣隋開皇六年復改為汲屬汲郡唐屬衛州上獲嘉縣本漢汲縣地武帝南越相吕嘉反發兵討之元鼎六年行幸至汲新中鄉得吕嘉首因以為獲嘉縣屬河內郡後漢因之晉屬汲郡後周置修武郡隋開皇初郡廢十六年置殷州大業初州廢屬河內郡唐屬衛州緊新鄉縣隋開皇初析汲獲嘉二縣於古新樂城置屬河內郡唐屬衛州皇朝熙寧六年省入汲元祐三年復置東北有故臨清關東南有故延津關中共城縣故共國左傳隱元年鄭太叔出奔共是也二漢屬河內郡晉屬汲郡北有共山隱者孫登所處北齊縣廢隋開皇六年復置曰故城屬河內郡唐屬衛州望洺州春秋時為赤狄所有後屬晉戰國時屬趙秦屬邯鄲郡漢置漢平國後漢國廢為巨鹿郡之西境魏置廣平郡晉及後魏皆因之後周置洺州隨大業初置武安郡後為洺州天寶元年曰廣平郡今縣五上永年縣今曲梁左傳宣十五年晉荀林父敗赤狄于曲梁是也漢屬廣平國後漢屬魏郡魏晉屬廣平郡地齊省曲梁入洺州廣平縣廣平漢為國治自魏至隋皆為郡隨仁夀元年避太子名改廣平曰永年為武安郡治唐為洺州漢廣平縣故城在今縣北臨洺鎮本漢易陽縣屬趙國後漢因之晉屬廣平郡東魏屬魏郡隋開皇六年改易陽曰邯鄲十年改邯鄲為臨洺屬武安郡唐屬洺州皇朝熙寧六年省入永年望肥鄉縣漢為邯溝縣地屬魏郡曹魏置肥鄉縣屬廣平郡晉因之東魏省焉隋開皇十六年復置屬武安郡唐屬洺州漢列人縣屬廣平國後漢屬巨鹿郡晉屬廣平郡故城在今縣東北緊平恩縣本漢館陶之别鄉元帝分置立恩以封石父許伯為侯國屬魏郡後漢因之晉及元魏屬廣平郡隋屬武安郡唐屬洺州中雞澤縣春秋襄三年公㑹諸侯同盟于雞澤漢為曲梁縣地隋開皇初置雞澤縣屬洺州大業初省入永年唐武德四年復置杜預注左傳云雞澤在曲梁西南曲梁今永年也此縣在永年東北非古雞澤地矣上曲周縣漢武帝建元四年置屬廣平國東漢屬巨鹿郡晉省之唐武德四年復置屬洺州皇朝熙寧三年省入雞澤元祐四年復置洺水鎮本漢斥漳縣屬廣平國後漢屬巨鹿郡魏晉屬廣平郡北齊省入平恩隋復置改曰洺水屬武安之郡唐屬洺州㑹昌三年入曲周望深州春秋時屬晉戰國時屬魏秦蜀巨鹿郡漢屬信都國後漢屬安平國魏晉為博陵國後魏北齊後周為博陵郡隋開皇初郡廢十六年置深州大業初廢屬博陵郡唐武德四年置深州貞觀十七年州廢先天二年復置天寶元年曰饒陽郡今縣五望靜安縣本下博漢屬韓信都國後漢屬安平國光武避王郎自龍陽南出至下博城西惶惑不知所之有白衣老父在道旁指曰努力信都為長安守去此八十里光武即馳赴之晉亦屬安平國隋屬信都唐初屬冀州後來屬後周為州治焉皇朝太平興國八年置靜安軍雍熙二年軍廢還蜀三年縣省四年復置改為靜安故陸澤縣本郻縣漢屬巨鹿郡後漢作鄡晉屬趙國唐先天二年析饒陽鹿城于故鄡城陸澤縣為深州州治所後周徙治靜安皇朝雍熙四年省入焉有禹貢大陸澤望束鹿縣本漢郻縣地屬巨鹿郡北齊改郡曰安國隋開皇六年改曰安定十八年改曰鹿城屬信都郡唐屬深州天寶十五載改曰束鹿五代時屬真定國皇朝淳化元年來屬漢貫縣故城在西南望安平縣漢屬涿郡後漢屬安平國魏晉為博陵國治焉此齊置博陵郡隋開皇初郡廢十六年置深州大業初州廢屬博陵郡唐武德四年屬深州貞觀十七年還故屬先天二年來屬望饒陽縣漢屬涿郡後漢屬安平國魏晉屬博陵國後魏屬博陵郡隋開皇中分置安平蕪萎二縣大業初省入焉屬河間郡唐武德四年置深州治此貞觀十七年州廢屬瀛州先天二年置州後復來屬而州徙之陸澤焉東北有無蔞亭漢光武避王郎于此望武彊縣本武隧秦破趙將扈輒于武隧即此漢屬河間國後漢屬安平國晉因之後分置武彊縣元魏屬武邑郡隋開皇初郡廢省武遂入焉屬信都郡唐初屬冀州貞觀元年屬深州十七年屬冀州先天二年復來屬開元二年屬冀州永泰元年又來屬唐末屬冀州五代時又來屬輿地廣記卷十一
