body:
  text: 輿地廣記卷十宋歐陽忞撰河北東路北輔開德府春秋時屬衛國秦置東郡二漢屬東魏二郡晉屬濮陽國頓丘郡隋屬東武陽二郡唐屬澶濮魏三州晉天福中移濮陽于澶州南邦為治所九年升鎮寧軍莭度皇朝大觀元年升開德府崇寧四年建為北輔今縣七中濮陽縣本漢頓丘縣地其濮陽故城在今縣東帝顓頊之墟也謂之帝丘夏后相嘗居于此夏伯昆吾亦都之春秋時衛成公自楚丘徙焉夢康叔曰相奪豫享公命祀相秦始皇東徙衛君角而置東郡二漢皆因之晉置濮陽國隋屬東郡唐屬濮州晉天德中移縣于澶州南郊為治所有鮒鰅山帝顓頊所葬有瓠子口漢元光中河決瓠子東南注巨野望觀城縣古觀國嘗叛命為夏所伐左傳所謂夏有觀扈是也漢為畔觀縣屬東郡光武更名衛國以封周後晉屬頓丘郡隋開皇六年更名觀城屬武陽郡唐屬澶州有臨黃縣漢畔觀縣地也後魏置隋因之屬武陽郡唐始屬魏州大厯七年來屬皇朝雍熙四年省入觀城有新臺衛宣公作緊臨河縣漢黎陽縣地屬魏郡隋開皇六年析黎陽置臨河縣十六年置澶淵縣並屬汲郡春秋諸侯之大夫會于澶淵此其地也後避唐髙祖諱改澶淵為澶水武德四年于澶水置澶州貞觀七年州廢省澶水入臨河屬魏州五代來屬中清豐縣漢頓丘縣地唐大厯七年析頓丘昌樂置清豐縣以孝子張豐為名屬澶州頓丘本衛邑在淇水南故詩言送子涉淇至于頓丘二漢屬東郡晉置頓丘郡後郡廢焉隋屬武陽郡唐始屬魏州大厯七年于頓丘復置澶州晉天福四年移濮陽于澶州南郭為治所而以頓丘為德清軍皇朝熙寧四年省頓丘入清豐中衛南縣本楚丘也衛文公自曹邑徙此始建城市而營宫室隋開皇十六年置楚丘縣屬東郡大業初以梁郡有楚丘乃改為衛南唐屬滑州五代時來屬畿朝城縣本二漢東武陽縣屬東郡臧洪為東郡太守據此以拒袁紹紹圍之城陷為紹所殺魏晉屬陽平郡北齊廢之後周復置武陽縣隋屬武陽郡唐屬魏州貞觀十七年省永昌元年復置武聖縣開元七年更名朝城晉屬大名府皇朝崇寧四年來屬畿南樂縣漢東郡之樂昌也宣帝封王武為樂昌侯後漢省之晉置昌樂縣水經樂昌縣故城東西注引漢書表志以為東郡之屬縣漢宣帝封王稚君為侯國此則以樂昌為昌樂矣隋屬武陽郡開皇六年置繁水縣大業初廢昌樂縣入繁水唐置昌樂廢繁水入焉後唐避諱改為南樂晉屬大名府皇朝崇明四年來屬次府河間府春秋時屬晉戰國時屬趙秦屬上谷郡漢屬涿郡後漢為河間國晉因之後魏為河間郡孝文帝置瀛州隋廢郡而州如故大業初州廢置河間郡唐為瀛洲皇朝大觀二年升河間府瀛海軍節度今縣二望河間縣本漢州鄉武垣縣地屬涿郡後漢省州鄉入武垣屬河間國晉因之後分置河間縣郡徙治此隋開皇初郡廢為瀛州大業初復置郡省武垣入焉唐為瀛州束城鎮本漢束川縣屬渤海郡後漢屬河間國晉屬章武國北齊廢之隋開皇十六年置曰東城屬瀛州大業初屬河間郡唐屬瀛州皇朝熙寧六年省入河間望樂夀縣本漢樂成縣為河間國治焉後漢及晉皆因之隋開皇十八年改為廣城屬瀛州仁夀初改為樂夀屬河間郡唐屬瀛州後屬深州景城鎮本漢景成成平縣地屬渤海郡後漢省景成入成平屬河間國晉因之隋開皇十八年改為景城屬瀛州大業初屬河間郡唐屬瀛州皇朝熙寧六年省入樂夀上滄州春秋戰國時為齊趙二國之境秦屬巨鹿上谷郡漢置渤海郡後漢晉因之宋文帝置樂陵郡孝武分置渤海郡後魏因之太武初改渤海為滄水孝文時復舊孝明帝分瀛冀二州置滄海及浮陽樂陵二郡隋置棣州後改為滄州尋為渤海郡唐為滄州天寶元年改為景城郡今縣五望清池縣本漢浮陽縣在浮水之陽髙帝置渤海郡治此後漢及晉皆屬焉隋開皇十八年改曰清池屬渤海郡唐屬滄州貞觀元年州自胡蘇徙治于此長蘆鎮以水為名本漢參户縣地屬渤海郡後省焉隋開皇初置長蘆縣及漳河郡尋廢十六年置景州大業初州廢屬河間郡唐武德四年又置景州貞觀元年州廢屬滄州周省入清池饒安鎮本漢千童縣屬渤海郡靈帝改曰饒安晉因之後置滄州及浮陽郡隋開皇初郡廢大業初州廢屬渤海郡唐屬滄州皇朝熙寧五年省入清池乾符寨本二漢章武縣屬渤海郡晉屬章武郡後省焉隋開皇十六年置魯城縣屬瀛州大業初屬河間郡唐貞觀元年屬滄州乾符元年生野稻水榖二千餘頃燕魏飢民就食之因改名曰乾符周省入清池有徒駭河禹貢九河之一也望無棣縣本齊地昔周成王賜齊太公履北至于無棣是也漢為陽信縣地隋開皇六年置無棣縣屬渤海郡取縣南無棣溝為名唐屬滄州貞觀元年省入陽信八年復置無棣溝通坂後屬河東郡二漢及晉因之後魏後周皆為郡焉隋開皇初郡廢十六年析置河東縣大業初復置郡省蒲坂入焉唐初為蒲中州後為河中府次畿臨晉縣本桑泉左傳僖二十四年晉公子重耳濟河入桑泉是也漢為解縣地隋開皇十六年析猗氏置桑泉縣屬河東郡唐屬河中府天寶十三年改為臨晉解本春秋時解梁二漢及晉屬河東郡後徙焉故城在今縣東南次畿猗氏縣本令狐左傳僖二十四年晉公子重耳濟河圍令狐是也縣南對澤即猗頓之故居頓魯之窮士聞朱公富往問術焉朱公曰子欲速富當畜五牸于是乃適西河大畜牛羊十年之間其畜不可計資擬王公故遂以猗氏名縣漢屬河東郡後漢晉皆因之西魏改曰梁泉後周復故隋屬河東郡唐屬河中府有郇城周文王子所封詩所謂郇伯勞之者也次畿虞鄉縣本漢解縣地元魏分置虞鄉縣隋因之唐武德元年改虞鄉為解縣而于解西五十里别置虞鄉縣屬蒲州後屬河中府次畿萬泉縣唐武德三年析稷山安邑猗氏汾陽龍門置屬絳州大順二年來屬次畿龍門縣古耿國商祖乙自相徙居之春秋晉獻公滅耿以賜大夫趙夙戰國時屬魏為皮氏縣秦惠王渡河取皮氏二漢屬河東郡魏晉屬平陽郡後魏改為龍門兼置郡隋開皇初郡廢屬河東郡唐武德二年秦州徙治此貞觀十七年州廢屬絳州元和初來屬有龍門山禹貢所謂導河積石至于龍門是也次畿榮河縣本魏之汾隂縣秦惠王渡河取汾隂即此漢屬河東郡武帝立后土祠于汾隂脽上親望拜如上帝禮後漢亦屬河東郡晉省之後魏復置兼置汾隂郡隋開皇初郡廢屬河東郡唐武德元年改曰秦州貞觀十七年州廢來屬開元十年明皇祀后土獲寶鼎因改為寶鼎縣皇朝大中祥符四年改寶鼎縣曰榮河置慶成軍熙寧元年廢軍以榮河來屬永樂縣古魏國詩序所謂魏地狹隘者也春秋時晉獻公滅魏以賜大夫畢萬漢為虢北縣屬河東郡魏晉皆因之後縣東徙焉唐武德元年分芮城置永樂縣以永樂澗為名屬芮州州廢屬鼎州貞觀八年來屬後又屬虢州神龍元年復來屬禹貢雷首山在北山南曰首陽伯夷叔齊隱居其下大都督府陜州昔周公分陜之所春秋虢國之地所謂北虢也戰國屬韓秦屬三川郡二漢及晉皆屬𢎞農郡後魏置𢎞農郡兼置陜州隋開皇初郡廢大業初州廢屬河南郡義寧元年置𢎞農郡唐武德元年曰陜州天寶元年更曰陜郡天佑元年昭宗居陜升為興唐府哀帝初復故號曰保義軍皇朝太平興國元年改保平軍今縣八上陜縣古虢國所謂上陽也故城在今縣東漢屬𢎞農郡後漢及晉皆因之後魏置陜州及𢎞農郡後周因之隋屬河南郡唐復為陜州有焦國周武王封炎帝之後于此有莘原魯莊公三十二年有神降于莘即此石壕鎮本崤縣後魏置唐武德八年來屬貞觀十四年改為硤石縣姚崇其邑人也皇朝熙寧六年省為鎮有禹貢底柱山山有三門河所經唐太宗勒銘于此上平陸縣本虞虢之地吳山在西上有虞城舜始封于此至周武王時封太王子仲雍之後是為虞公春秋時晉所滅虢下陽邑在東北漢為太陽縣屬河東郡後漢及晉皆因之後廢焉而置河北縣及河北郡隋開皇初郡廢屬蒲州唐貞觀元年來屬天寶元年太守李齊物開三門以利運漕得古劔有篆文曰平陸因更名有傅巖在北即傅説築處有茅津在西南對陜城魯文公時秦伯伐晉晉人不出遂自茅津濟即此上夏縣本夏禹之都漢為安邑縣地後置夏縣及安邑郡隋開皇初廢屬虞州唐貞觀十七年屬絳州乾元三年來屬有巫咸山蓋神巫所遊故山得其名上靈寶縣古函谷關秦人恃之以為險固漢武帝徙關于新安而以故關置𢎞農郡及𢎞農縣東漢晉因之元魏置𢎞農郡隋開皇十六年置桃林縣屬洛州唐武德元年來屬天寶元年得天寶靈符于古函谷關因改元兼改靈寶關在縣西南十里老子西遊至關關令尹喜先見其氣知真人當過物色而得之曰子將隱矣強為著書孟嘗君自秦逃歸夜半至關其客效雞鳴遂得出關戰國時九國叩關而攻秦秦人開關延敵九國之師逡巡而不敢進曹陽亭在縣東十三里秦章邯敗陳涉將周文於此漢獻帝歸至此為李傕郭汜所逼遂露次焉曹公改為好陽縣西南境即古桃林之野東北有桑田亭春秋虢公敗戎于桑田即此中下芮城縣本魏國城魯桓公時芮伯萬為母薑氏所逐自今馮翊縣界出居于魏即此地也漢為河北縣地後周改曰芮城置永樂郡郡後廢焉隋屬河東郡唐武德二年置芮州貞觀元年州廢來屬中下湖城縣本曰湖廣帝采首山之銅鑄鼎于荆山下鼎既成有龍垂胡髯下迎黃帝後世因名其處曰鼎湖漢武帝改曰湖屬京兆尹戾太子敗亡至此自殺後漢屬𢎞農郡晉因之下陽信縣本漢富平縣後改為厭次屬平原郡後漢永平五年復故晉為樂陵國治焉元魏屬樂陵郡北齊廢之隋開皇十六年復置屬棣州大業初屬渤海郡唐武德四年屬棣州八年州廢屬滄州貞觀十七年復置屬棣州皇朝大中祥符八年徙州城及厭次縣于陽信而徙陽信于故厭次焉上莫州漢為鄭縣屬涿郡後漢屬河間國晉因之隋屬河間郡唐武德四年屬清州貞觀元年屬瀛州景雲二年置鄚州開元十三年以鄚鄭文相類更名莫州今縣一上任丘縣本漢鄚縣地平帝時使中郎將任丘築城因以為名後置任丘縣隋省之唐武德五年復屬蒲州景雲元年屬鄚州開元十三年改鄚縣為莫皇朝熙寧六年省莫縣入焉長豐縣本利豐唐開元十年析文安任丘置屬鄚州是年更名長豐皇朝熙寧六年省中雄州春秋戰國皆屬燕秦屬六合郡唐屬涿易二郡晉時入于契丹周克復之置雄州皇朝政和三年為易陽郡今縣二中歸信縣本漢易縣地屬涿郡後漢屬河間國公孫瓚有幽州童謡曰燕南垂趙北際中央不合大如礪唯此中可避世瓚自以為易地當之遂徙鎮焉易京故城在縣南十八里晉亦屬河間國北齊省入鄚縣隋屬河間郡唐武德五年置歸義縣屬幽州貞觀元年省之八年復置景雲二年屬莫州是年還屬幽州大厯四年屬涿州晉時入于契丹周顯德六年世宗克瓦橋關置雄州治歸義縣皇朝太平興國元年改為歸信中容城縣漢屬涿郡後漢省之晉復置屬范陽國隋開皇初改為遒縣屬上谷郡唐武德五年置北義州貞觀元年州廢以縣屬易州聖厯二年契丹入冦固守不陷因改名全忠神龍二年復名遒天寶元年改為容城周顯德六年屬雄州尋廢皇朝建隆四年復置中霸州漢屬渤海郡後漢屬廣陽國河間郡晉屬燕國章武後屬河間燕郡隋屬河間涿郡唐屬幽州莫州晉時入于契丹周克復之置霸州皇朝政和三年為永清郡今縣二上文安縣漢屬渤海郡後漢屬河間國晉屬章武國隋初屬瀛州大業初屬河間郡唐屬瀛州景雲二年屬莫州周顯德六年屬霸州皇朝景祐元年省永清入焉永清本漢安次縣地屬渤海郡唐如意元年析置武隆縣屬幽州景雲元年曰會昌天寶元年曰永清晉時入于契丹周世宗克益津關置霸州治永清縣後省入文安上大城縣五代時置屬瀛州周顯德六年屬霸州上德州春秋戰國時屬齊秦屬齊郡漢置平原郡後魏因之晉屬平原國宋屬平原郡後魏後周皆因之隋初置德州後復為平原郡唐為德州天寶元年曰平原郡今縣二望安德縣漢屬平原郡後漢及晉皆因之後為郡治焉隋開皇初郡廢九年置德州大業初復置平原郡唐為德州天寶末安祿山反河北皆陷獨顔真卿為平原太守帥衆討賊漢髙縣屬平原郡後漢及晉皆因之北齊省入故城在縣西北漢重平縣屬渤海郡後漢省之後魏復置北齊省之故城亦在縣西北德平鎮蓋後平昌縣屬平原郡後漢省之晉為西平昌屬平原國後魏置東安郡北齊郡廢隋開皇初屬德州大業初屬平原郡唐屬德州後謂之德平疑後唐避諱更名皇朝熙寧六年省入安德緊平原縣齊之西邑韓信夜渡平原襲擊齊厯下軍於此漢髙帝六年置平原郡故城在今縣西南後漢及晉皆因之後郡徙治安德隋屬平原郡唐屬德州漢鄃縣屬清河郡後漢及晉因之北齊省入平原故城亦在縣西南上濱州自唐虞以下地理與涿州同初五代之際置𣙜鹽務于海傍後置贍國軍周世宗顯德三年置以其濱海為名割棣州之渤海蒲臺為屬縣而治渤海今領縣二望渤海縣唐垂拱四年析蒲臺縣次置屬棣州周顯德三年置濱州治此蒲臺與本漢鬲縣地屬平原郡臺髙八丈方二百步昔秦始皇東遊海上于臺下紫蒲繫馬至今蒲生猶有縈繫之狀隋開皇十六年置蒲臺縣屬渤海郡唐屬淄州景龍元年屬棣州周屬濱州皇朝大中祥符三年省入渤海緊招安縣皇朝慶厯六年析渤海縣地置下恩州春秋時屬齊其後屬晉戰國屬趙秦屬巨鹿郡漢置清河郡後漢為清河國桓帝改曰甘陵魏復故晉因之後魏為清河郡北齊後周皆因之兼置貝州隋初郡廢後廢州而後復置郡廢為貝州天寶元年曰清河郡皇朝慶厯八年改恩州今縣三望清河縣本漢厯縣屬清河郡後漢安帝以孝德皇后葬于厝改曰甘陵為清河國治焉桓帝時周福其縣人也晉改曰清河縣後曰武成縣置清河郡隋開皇初郡廢改武成縣為清河大業初復置清河郡唐屬貝州故清陽縣漢為清河郡治後漢省之徙治甘陵後復置曰清河縣北齊省貝丘入焉改為貝丘隋開皇六年復名清陽屬清河郡唐屬貝州皇朝熙寧四年省入清河望武城縣在趙時曰東武城平原君勝封于此邑漢屬清河郡後漢及晉皆因之隋為武城屬清河郡唐屬貝州緊厯亭縣漢東陽縣地隋分武城鄃置厯亭縣屬清河郡唐屬貝州漳南鎮本漢東陽縣屬清河郡後漢省之隋分棗強清平復置于古東陽城改為漳南縣屬清河郡唐屬貝州皇朝至和元年省入厯亭清州自唐虞以下地理與滄州同五代時置乾寧軍後入契丹周顯德六年世宗北伐取乾寧軍御龍舟樓船戰艦首尾數十里至益津關後廢焉皇朝太平興國七年以滄州永安縣復置大觀二年河清七晝夜因改為清州政和三年為乾寧郡今縣一乾寧縣本永安縣之范橋鎮皇朝太平興國七年置熙寧六年省為鎮後復置縣崇寧三年又省之同下州永靜軍自唐虞以下地理與滄德冀州同唐置景州周降為定逺軍屬滄州皇朝太平興國六年以軍直棣京師景德元年改為永靜今縣二緊東光縣二漢屬渤海郡隋開皇初郡廢九年置觀州大業初州廢屬平原郡唐屬滄州貞元三年屬景州周顯德元年為定逺軍治所弓髙鎮本漢縣屬河間國後漢因之晉省焉隋開皇十六年復置屬平原郡唐置景州治此周顯德二年州廢省弓髙入東光望將陵縣漢重丘縣地隋開皇十六年于重丘故城置屬平原郡唐屬滄州後屬景州周顯德二年州廢還屬皇朝慶厯七年屬永靜軍安陵鎮本漢修市縣地屬渤海郡晉置安陵縣隋大業初省入東光唐武德四年復置屬觀州貞觀十七年州廢屬德州景福二年屬景州周復屬後省入將陵中阜城縣漢屬渤海郡後漢屬安平國晉屬渤海郡隋屬信都郡唐屬冀州皇朝淳化元年屬永靜軍同下州信安軍自唐虞以下地理與霸州同五代時地入契丹周顯德六年世宗北伐取淤口關置寨屬霸州皇朝太平興國六年以淤口寨為被虜軍景德二年改為信安軍同下州保定軍自唐虞以下地理與雄州同皇朝太平興國六年以涿州歸信縣新鎮置平戎軍景德元年改為保定軍輿地廣記卷十
