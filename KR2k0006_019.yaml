body:
  text: 輿地廣記卷十九宋歐陽忞撰河東路下望汾州春秋屬晉戰國屬趙秦屬太原郡二漢屬太原西河二郡魏因之晉屬西河國元魏置西河郡兼置汾州北齊置南朔州後周改曰介州隋開皇初郡廢大業初州廢復置西河郡唐武徳元年改曰浩州三年改曰汾州皇朝因之今縣五望西河縣本漢隰城屬西河郡東漢省之晉復置屬西河國元魏為西河郡及汾州治隋唐皆因之肅宗上元元年改隰城曰西河漢京陵縣地屬太原郡即趙文子與叔向觀於九原之所漢兹氏縣屬太原郡魏黄初二年置西河國有西河恭王司馬子盛碑望平遥縣本漢平陶縣屬太平郡東漢晉因之元魏以諱改陶為遥隋屬西河郡唐屬汾州上介休縣二漢屬太原郡晉屬西河國元魏分置平昌縣後周置介休郡省介休縣入平昌隋開皇初郡廢十八年改平昌曰介休屬西河郡義寧元年復置介休郡唐武徳元年改為介州正觀元年州廢來屬有綿上山今謂之介山有介子推祠漢鄔縣屬太原郡東漢晉因之澤在北是為昭餘祁漢中都縣文帝為代王都此屬太原郡東漢晉因之後皆入介休上孝義縣漢中陽縣屬西河郡東漢因之隋曰永安貞觀元年更名孝義有隠泉山中靈石縣本漢介休縣地隋開皇十年置屬汾州唐因之有賈胡堡唐髙祖討宋金剛次於此地有髙壁嶺雀䑕谷汾水闗皆險固之處上澤州春秋屬晉戰國屬韓後屬趙秦屬上黨郡二漢屬上黨河東二郡魏晉因之元魏置逹州及髙都長平安平三郡北齊置長平髙都二郡後周併二郡為髙平郡隋開皇初郡廢改州為澤州大業初州廢置長平郡置澤州天寳元年曰髙平郡皇朝因之統縣六緊晉城縣本髙都縣二漢晉屬上黨郡元魏置建州北齊置長平髙都二縣後周併為髙平郡隋開皇初郡廢十八年改縣為丹川大業初置長平郡唐武徳元年置建州三年析丹川縣置晉城六年州廢𨽻蓋州徙蓋州來治九年省丹川入晉城貞觀元年州廢𨽻澤州來治有天井闗在縣南太行山上上髙平縣本泫氏縣地二漢屬晉上黨郡後析置平髙縣北齊改曰髙平省泫氏入焉隋屬長平郡唐武徳元年置蓋州貞觀元年州廢屬澤州秦将白起坑趙降卒四十萬人於長平即此地今有頭顱山上陽城縣本漢澤縣二漢屬河東郡晉屬平陽郡隋置澤州取濩澤為名後屬長平郡唐武徳元年復置澤州八年徙治端氏天寳元年改縣為陽城有禹貢析城山王屋山濩澤水中端氏縣韓趙魏既分晉徙晉君於端氏即此二漢屬河東郡晉屬平陽郡元魏置安平郡隋開皇初郡廢屬澤州唐武徳六年徙州來治此貞觀元年徙治晉城中陵川縣本漢泫氏縣北齊省之隋開皇十六年置陵川縣屬澤州唐武徳元年屬蓋州貞觀元年來屬中下沁水縣二漢晉皆屬河内郡元魏置廣寧郡北齊郡廢改縣為永寧隋開皇十八年復為沁水屬澤州唐武徳元年屬蓋州貞觀元年來屬中憲州自唐以前地理與嵐州同本樓煩監牧以嵐州刺史兼領貞元十五年别置監牧使龍紀元年節度使李克用表置憲州及樓煩縣皇朝因之咸平五年以樓煩屬嵐州以嵐州之静樂來屬熈寧三年州廢十年復置統縣一中静樂縣漢汾陽縣地屬太原郡後置岢嵐縣隋開皇十八年改曰汾源大業四年又改為静樂屬樓煩郡唐武徳四年置管州六年州癈以靜樂屬嵐州皇朝咸平中來屬熈寧三年屬嵐州十年復來屬有管涔山汾水所出有隋汾陽宫故天池縣唐龍紀三年置屬憲州咸平省入静樂下嵐州春秋屬晉後為胡地有樓煩王居焉其後屬趙秦屬太原郡二漢晉因之後魏末置嵐州隋大業四年置樓煩郡唐武徳四年置東㑹州六年更名嵐州皇朝因之統縣三中宜芳縣本漢汾陽縣屬太原郡髙帝封蔪强為侯國積粟所在謂之羊膓倉有羊膓坂石磴縈回若羊腸焉隋末置嵐城縣屬樓煩郡唐武徳四年更名宜芳六年為嵐州治有古秀容城魏土地記曰秀容胡人徙居之立秀容護軍治之中下合河縣北齊置蔚汾縣隋大業四年改曰臨泉屬樓煩郡唐武徳三年改曰臨津六年屬嵐州貞觀元年又改為合河東有蔚汾闗西有合河闗下樓煩縣唐龍紀元年於樓煩監西一里置為憲州治皇朝咸平中以縣來屬下石州戰國時趙之離石邑後為秦魏二國之境秦屬太原郡地漢屬西河郡東漢為郡治焉晉置西河國北齊置西汾州及懐政郡後周改州為石州郡為離石郡隋開皇初郡廢大業初州廢復置離石郡唐武徳元年復為石州天寳元年曰昌化郡皇朝因之統縣三中離石縣本戰國趙邑秦昭王伐趙取離石是也後屬太原郡漢屬西河郡而東漢徙郡治此晉為西河國治自漢末匈奴入居内郡魏武帝分其衆為五部在離石者以左賢王去卑監之去卑之豹豹子淵世據此地謂之左國城晉恵帝時淵起兵於此後趙石勒置永石郡後縣廢焉北齊置昌化縣及懐政郡後周郡縣並改曰離石隋因之唐為石州中平夷縣後周析離石縣置隋屬離石郡唐屬石州中方山縣後周置窟胡縣及窟胡郡隋開皇初郡廢後縣改為修化屬離石郡後周又置盧山縣大業初并入修化唐為方山縣武徳二年置方州三年州廢來屬按舊史言方山隋縣隋史石州無方山有修化豈隋末更名而史官失紀歟有方山赤洪水下遼州春秋屬晉戰國屬韓後屬趙秦二漢屬上黨郡晉為樂平郡後魏為遼陽郡隋屬遼州大業初州廢屬太原郡唐武徳三年復屬遼州六年州徙來治此八年曰箕州先天元年改曰儀州天寳元年曰樂平郡中和三年復曰遼州皇朝因之熈寧七年州廢屬平定軍元豐八年復置今縣四下遼山縣本湼氏縣地二漢屬上黨郡晉屬遼陽縣屬樂平郡元魏曰遼陽北齊省之隋開皇十年復置更名遼山十六年屬原州大業初州廢屬太原郡唐武徳三年復屬遼州六年州治徙此有遼陽山古箕城春秋晉人敗狄於箕先軫死焉即此中下榆社縣本湼氏縣地二漢屬上黨郡晉置武鄉縣唐武徳元年屬韓州三年以縣及并州之平城置榆州六年州廢來屬下平城縣下和順縣本韓之閼與邑趙奢破秦軍於閼與即此漢為沾縣屬上黨郡後置梁榆縣晉盧諶征艱賦云訪梁榆之虚郭乃閼與之舊平是也隋開皇十年改曰和順屬太原縣唐武徳三年來屬熈寧七年省為鎮入遼山元祐元年復置下豐州自五代以前地理與府州同皇朝嘉祐七年以府州蘿泊川掌地置東南接府州西接麟州不統縣同下州威勝軍自五代以前地理與潞州同皇朝太平興國二年置威勝軍併沁州入焉今縣四中銅鞮縣本晉大夫羊舌之邑漢髙帝破韓王信於此縣二漢及晉屬上黨郡隋唐屬潞州皇朝為威勝軍有舊湼縣後魏改為陽城開皇十八年改為甲川大業初省入銅鞮上武鄉縣漢湼縣地晉置武鄉縣屬上黨郡石勒其縣人也有漚麻池勒與李陽争池相毆即此及僣位置武鄉郡後魏去武字隋開皇初郡廢屬潞州十六年分置榆社縣大業初省入唐武后復加武字屬潞州皇朝太平興國二年來屬中下沁源縣本榖逺縣二漢屬上黨郡晉省之元魏置沁源縣及義寧郡隋開皇初廢十六年置沁州大業初初州廢屬上黨郡唐武徳元年復置沁州天寳元年曰陽城郡皇朝太平興國六年廢州以沁源來屬中下綿上縣隋開皇十六年分介休縣之南境置屬汾州唐武徳元年屬沁州皇朝太平興國六年屬大通監寳元二年來屬晉文公以綿上為介之推田曰以志吾過且旌善人即此同下州平定軍春秋屬晉戰國屬趙秦及二漢屬太原上黨二郡晉置樂平郡元魏為西陽郡後復為樂平隋開皇初郡廢十六年置遼州大業初州廢屬太原縣唐武徳三年復置遼州治樂平領遼山平城石艾等縣後州徙治遼山而樂平石艾還屬并州皇朝太平興國二年置平定軍今縣二中平定縣本上艾縣漢屬太原郡東漢屬常山國晉屬樂平郡後改曰石艾隋屬太原郡唐武徳三年屬遼州六年屬受州八年州廢屬并州天寳年改曰廣陽皇朝太平興國四年改曰平定置平定軍中樂平縣本沾縣二漢屬上黨郡晉置樂平郡元魏北齊後周皆因之隋開皇初廢郡為樂平縣屬太原郡唐武徳三年以縣置遼州六年徙治遼山而樂平屬并州皇朝太平興國四年來屬同下州岢嵐軍自五代以前地理與嵐州同皇朝太平興國四年析置岢嵐軍今縣一下嵐谷縣唐長安三年析宜芳縣置屬嵐州并以岢嵐柵為軍景龍中張仁亶徙其軍於朔方留者號岢嵐守捉𨽻大同軍皇朝復以縣置軍有岢嵐水岢嵐山同下州寧化軍自五代以前地理與嵐州同皇朝太平興國四年析嵐州地置寧化縣五年於縣置軍領寧化一縣熈寧三年縣廢後復置崇寧三年又廢有雪山汾水同下州火山軍自五代以前地理與嵐州同皇朝太平興國七年以嵐州雄勇鎮置軍治平七年置火山縣四年縣廢有火山黄河同下州保徳軍自五代以前地理與嵐州同皇朝淳化四年析嵐州地置定羌軍景徳二年改曰保徳不領縣有黄河同下州晉寧軍自五代以前地理與石州同中下臨泉縣後周置曰烏突及置烏突郡隋開皇初郡廢縣尋改曰太和屬石州唐武徳三年改縣曰臨泉置北和州貞觀三年州廢屬石州有湫水皇朝置軍來屬中定胡縣漢離石縣地後周置及置定胡郡隋開皇初郡廢屬石州有孟門闗其地險固河東路化外州單于大都䕶府本戎狄地戰國屬趙秦漢屬雲中郡魏晉皆屬新興郡隋屬榆林郡唐龍朔三年置雲中都䕶府麟徳元年改為單于大都䕶府升振武軍節度東北至朔州南至勝州領縣一中金河縣唐天寳四年置有金河有燕然山東漢竇憲勤銘於此有李陵臺有王昭君墓名曰青冢唐咸通中李國昌為節度使恣横拒命而子克用盗據雲州侵掠代北為邊患焉安北大都䕶府唐龍朔三年立曰瀚海都督府總章二年更名開元二年治中受降城十年徙治豐勝二州之境十二年徙天徳軍領縣二中隂山縣故北戎之地隂山東西千餘里草木茂盛多禽獸匈奴依岨其中治弓矢出來為冦是其苑囿也戰國屬趙趙武靈王築長城自代並隂山下至髙闕為塞秦始皇斥逐匈奴自榆中並河以東屬之隂山以為三十四縣漢初復為匈奴所有武帝出師征伐斥奪此地置隂山縣屬西河郡匈奴失隂山過之未嘗不哭東漢省入西安陽屬五原郡唐天寳元年置隂山縣上通濟縣鎮北大都䕶府唐立領縣二上大同縣上長寧縣下都督雲州本戎狄地戰國屬趙秦屬鴈門定襄代三郡二漢晉因之後魏道武徙都平城置司州代尹孝文遷都洛陽改代尹曰萬年尹隋屬馬邑郡唐武徳四年置北常州七年州廢貞觀十四年置雲州天寳元年曰雲中郡升大同軍節度領縣一上雲中縣本平城縣地漢晉屬鴈門郡後魏以為代都北齊置大平縣後周改曰雲中隋開皇初改曰雲内屬馬邑郡唐貞觀十四年自朔州北定襄城移雲州於雲内之常安鎮置因改雲内為定襄縣永淳元年為黙啜所破州縣俱廢開元二十年復置改定襄曰雲中有故隂館縣漢屬鴈門郡東漢為郡治後魏置平齊郡尋廢有故髙柳城漢屬代郡東漢屬代郡東漢為郡治有㕘合坡韓王信又與胡騎入居恭合柴將軍屠㕘合斬信於此有故桐過城二漢屬定襄郡有故武進城漢屬定襄郡東漢屬雲中郡有故盛樂縣漢曰成樂屬定襄郡東漢屬雲中郡後魏昭成徙居盛樂宫即此有白豋山匈奴圍漢髙帝於此有單于臺漢武出長城登單于臺勒兵十八萬騎旌旗徑千餘里威震匈奴即此望應州唐末置後唐天成元年升彰國軍節度領縣二望金城縣後唐明宗其縣人也故置彰國軍而以金城為望縣上混源縣上新州唐末置後唐同光二年升威勝軍節度領縣四中永興縣礬石縣龍門縣懐安縣下蔚州本代地在常山之北趙簡子與諸子約曰吾藏寳符於常山上先得者賞諸子馳之常山無所得毋䘏還曰已得符矣從常山上臨代代可取也於是簡子以毋䘏為賢其後繼立是為襄子襄子北登夏屋請代王使厨人以銅㪷擊殺之遂發兵定代地及武靈王置代郡秦及漢晉皆因之後魏置懐荒禦夷二鎮及靈丘郡後周置蔚州隋開皇初郡廢大業初州廢屬鴈門上谷二郡唐武徳六年置蔚州天寳元年曰安邊郡至徳二載曰興唐郡統縣三中下靈丘縣有趙武靈王墓因以為名漢屬代郡東漢省之後魏復置及置靈丘郡後周置蔚州隋屬鴈門郡唐初没於突厥武徳六年置蔚州僑治陽曲七年僑治繁畤八年僑治秀容故北常州城貞觀五年破突厥復故地還治靈丘有􅋤水發源於髙氏山東入河漢志注以為靈丘之號在趙武靈王之前此説非也齊地别有靈丘孟子謂蚳鼃辭靈丘而請士師是也此靈丘趙之之北境非齊趙兵交之地中興唐縣本安邊縣唐開元十二年置治横野軍至徳二載更名興唐下飛狐縣本唐昌縣漢屬代郡東漢省之晉復置隋仁夀初改曰飛狐屬上谷郡唐屬蔚州有飛狐谷飛狐闗在代國南四十里漢酈食其説髙帝所謂距飛狐之口是也晉劉琨為胡人所攻自代出飛狐口奔於安次即從此道下朔州本戎狄地戰國屬趙秦漢屬代鴈門二郡靈帝末羌胡大擾定襄靈中五原朔方上郡之民並流徙分散建安二十年魏武帝始集塞下荒地置新興郡晉恵帝改曰晉昌郡後魏置懐朔鎮及朔州北齊置廣安郡隋開皇初郡廢大業初州廢置代郡尋改為馬邑郡唐武徳四年復曰朔州統縣二中善陽縣本劇陽縣漢屬鴈門郡王莽改曰善陽東漢復曰劇陽晉省之北齊置招逺縣及廣安郡隋開皇初郡廢改縣曰善陽置代郡尋曰馬邑唐置朔州有故桑乾縣二漢屬代郡後魏置桑乾郡北齊改為廣寧郡後周廢之有秦馬邑城晉太康地記云秦時建此城城輒崩不成有一馬周旋馳走反覆父老異之依以築城城乃不壞遂名馬邑漢武帝使聶壹翁佯為賣馬邑城以誘匈奴單于信之乃以十萬騎入武周塞覺漢兵謀引去即此地也二漢及晉屬鴈門郡故武州縣二漢鴈門郡所謂武周塞是也有紫河發源於此中禹邑縣唐開元五年析善陽置治大同軍城下寰州唐末置領縣一下寰清縣下儒州唐末置領縣一下縉山縣下毅州本武州唐末置後唐長興元年改曰毅州領縣一下文徳縣輿地廣記卷十九
