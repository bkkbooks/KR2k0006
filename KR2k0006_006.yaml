body:
  text: 輿地廣記卷六宋歐陽忞撰京東東路望青州少昊之世有爽鳩氏虞夏時有季萴湯末有逢公伯陵殷末有蒲姑氏皆為諸侯國于此周成王時蒲姑氏與四國作亂成王滅之以封太公是為齊國所謂營丘後徙都臨淄亦其地其後為田氏地有秦滅之置齊郡漢髙帝封子肥為齊王故為齊郡亦屬北海千乘後屬齊國北海樂安兼置青州晉屬齊國濟南樂安永嘉之亂陷于石勒刺史曹嶷為晉守造廣固城終為季龍所陷季龍末假龕自號齊王據之慕容恪滅趙克青州苻氏平燕盡有其地及苻氏敗苻朗以州降晉置幽州以辟閻渾為刺史鎮廣固隆安四年為慕容恪所陷遂都之為南燕劉裕滅南燕以羊穆之為青州刺史築東陽城而居之宋及後魏皆置青州後周為齊郡樂安北海隋並廢之大業初復置北海郡唐武德四年曰青州天寶元年曰北海郡升平盧軍節度皇朝淳化五年改鎮海軍政和元年曰齊郡今縣六望益都縣本二漢廣縣地屬齊郡晉廢之廣固縣在縣西四里晉書曹嶷所築有大澗甚廣因曰廣固城為青州刺史治焉假翕慕容德皆據此東陽城北即郡治東城是也晉時城宋將竺夔守之後魏攻圍不下益都本漢侯國武帝封災川王子胡為益都侯故城在今夀光縣南元魏置益都縣北齊移入青州城北門外為治所後置齊郡隋開皇初廢大業初置北海郡唐為青州有五龍口劉裕圍慕容超于廣固塞五龍口城中男女悉皆腳弱病者大半遂拔之望夀光縣本漢博昌夀光縣地後漢晉並屬樂安國隋徙夀光治所于博昌屬北齊郡唐屬青州有淄澠二水有灌亭禹後斟灌氏之國有紀國故城春秋紀侯國也漢曰劇屬北海郡文帝十八年置災川國後漢併入北海郡故城在縣西南緊臨朐縣二漢臨朐昌國縣並屬齊郡晉省臨朐入昌國隋開皇六年故昌國為逢山大業初改曰臨朐屬北海郡唐屬青州有伯氏駢邑上博興縣本漢樂安縣屬千乘郡後漢屬樂安國晉省之其後復置隋改為博昌屬北海郡唐屬青州後唐避諱改為博興上千乘縣漢舊縣後漢屬樂安國晉省之後復置為樂安郡治隋開皇初郡廢以千乘屬北海郡唐屬青州有薄姑城商末為諸侯居此周時與四國作亂成王滅之有遄臺齊景公飲酒于臺上曰古而無死其樂若何晏子對曰昔爽鳩氏始居此地季萴因之有逢伯陵因之蒲姑氏因之而後太公因之古若無死爽鳩氏之樂非君所願也顔師古言武王初封太公於齊未得爽鳩氏地成王以益之在漢博昌縣地上臨淄縣城臨淄水故曰臨淄即營丘也周封太公於此南郊山下有天齊淵齊所以為齊以天齊也戰國時齊威王項羽封田都漢齊悼惠王皆都之後置齊郡復漢晉為齊國元魏為齊郡北齊廢之隋開皇十六年復置屬北海郡唐屬青州漢西安縣故城在西北本曰渠丘齊大夫雍廩之邑有葵丘牛山時水上密州戰國時屬齊秦置琅邪郡漢屬琅邪郡及髙密城陽二國後漢屬琅邪郡北海國晉屬城陽郡元魏屬髙密後置膠州隋開皇初郡廢五年改膠州為密州大業初州廢復為高密郡唐武德五年曰密州天寶元年曰髙密郡皇朝開寶五年升安化軍節度今縣五望諸城縣本漢東武諸二縣地東武為琅邪郡治所後漢屬琅邪國晉屬城陽郡後魏置髙密郡隋開皇初改為密州十八年改東武為諸城大業初復為髙密郡唐為密州諸本魯邑春秋城諸及鄆是也漢屬琅邪郡後漢屬琅邪國晉屬城陽郡元魏屬東莞郡其後省入東武至隋改焉漢琅邪縣在東境初越王勾踐欲霸中國徙都於此起觀臺于山上周七里以望東海秦始皇置琅邪郡後東逰過齊登山大樂之因留三月乃徙黔首三萬户于山下刋石立碑記秦功德漢武帝亦登焉晉省琅邪縣後復置元魏屬平昌郡後又省隋開皇十六年置縣曰豐泉大業初復改為琅邪唐省之望安丘縣今莒之渠丘也漢為安丘屬北海郡後漢屬北海國晉屬東莞郡元魏屬平昌郡其後並廢隋開皇十六年置牟山縣大業初改名安丘屬髙密郡唐乾元二年以安祿山亂改為輔唐皇朝開寶四年復為安丘漢梧城朱虛昌安三縣故地在此望莒縣東莒國戰國時燕將樂毅破齊獨莒不下漢文帝置城陽國以封朱虛侯劉章光武併入琅邪國魏晉復置城陽郡後魏置東莞郡北齊郡廢屬義唐郡唐初廢之以莒屬琅邪後屬密州漢海曲縣故城在縣東吕母起於此上髙密縣縣有密水故以為名漢文帝置膠西國宣帝本始元年更名髙密國後漢屬北海郡魏晉屬陽城郡隋屬髙密郡唐屬密州漢夷安縣屬髙密國本春秋萊國之夷雒邑晏平仲其邑人也後漢屬北海郡晉以來省之唐武德六年移髙密治故夷安城淳于本春秋州國漢為縣屬北海郡後漢屬北海國晉屬城陽郡元魏屬平昌郡北齊省入髙密膠西縣春秋介葛盧國二漢為黔陬縣屬琅邪郡晉屬城陽郡元魏屬髙密郡後置平昌郡隋開皇初郡廢十六年置縣曰膠西大業初省黔陬入焉屬髙密郡唐武德元年省膠西入髙密後以其地為板橋鎮皇朝元祐三年復置膠西縣上齊州春秋戰國皆屬齊郡二漢屬濟南平原東郡晉濟南郡領平夀下密膠東即墨祝阿五縣而以平夀為郡治方今考其屬邑乃漢北海平原膠東地非濟南地也或云魏平蜀將徙其豪將家于濟河北改為濟岷郡而太康地理志無此郡名豈永嘉喪亂簡編𣪚落故失其傳乎宋為濟南郡復置兾州後魏改為濟州隋開皇初郡廢大業初州廢置齊郡唐武德元年曰齊州天寶元年曰臨淄郡五年曰濟南郡皇朝治平三年升興德軍今縣三緊厯城縣二漢屬濟南郡宋元魏為郡治焉隋置齊郡唐為濟州有厯山漢韓信度平原襲破齊厯下軍即此有華不注山左傳晉郤克敗齊師逐之三周華不注是也漢末平陵縣本談國二漢為濟南郡治其後郡徙厯城而平陵又廢唐武德二年置談州并平陵縣貞觀六年州廢屬齊州十七年齊王祐起兵平陵人李君求據縣不從因改名全節元和十五年省入厯城漢臺縣故城在縣西緊禹城縣本祝柯齊邑也春秋襄十九年諸侯盟於祝柯即此二漢曰祝柯屬平原郡晉屬濟南郡隋屬齊郡唐屬齊州天寶元年更名禹城東有野井亭齊侯唁魯昭公之所中章丘縣本漢陽丘縣屬濟南郡後漢省之復置髙唐縣隋開皇十六年改為章丘屬髙密郡唐屬齊州有東陵山盜跖死處臨濟鎮本漢朝陽縣隋開皇十六年改曰臨濟别置朝陽大業初省入焉唐屬齊州皇朝咸平四年省入章丘管縣二漢屬濟南郡晉以後廢之地入臨濟中長清縣本齊之石窖邑二漢及晉為盧縣地隋開皇十四年置長清縣屬濟北郡唐屬齊州武德元年置山茌縣二漢茌縣也屬泰山郡天寶元年改為豐齊元和十五年省入長清中臨邑縣二漢屬東郡晉及元魏屬濟北國隋屬齊郡唐屬齊州有石門有盧縣故城春秋齊侯鄭伯盟于石門尋盧之盟是也有朝陽城漢朝陽縣也屬濟南郡後漢為東朝陽屬濟南國晉屬樂安國其後廢入臨邑上沂州春秋時齊魯三國之地戰國時屬齊楚秦屬琅邪郡漢屬琅邪東海二郡後置琅邪國魏晉因之宋為琅邪郡後魏置北徐州後周改為沂州隋開皇初郡廢大業初州廢復為琅邪郡唐武德四年曰沂州天寶元年曰琅邪郡今縣五望臨沂縣本魯地春秋城中二在縣東北二漢屬東海郡晉屬琅邪國隋為琅邪郡唐為沂州漢即丘縣故城在縣東南本祝丘春秋夫人薑氏享齊侯于祝丘是也二漢晉皆屬琅邪國隋大業初省入臨沂漢開陽縣屬東海郡本鄅國也後更名啓陽春秋叔孫州仇帥師城啓陽是也漢避景帝諱改為開陽後漢晉為琅邪國治其後廢入臨沂故城在縣南漢襄賁縣屬東海郡後漢及晉皆因之其後廢入臨沂故城在縣南望承縣本漢承縣屬東海郡後漢晉因之隋大業初改承為蘭陵屬彭城郡唐武德四年復更為承以縣置鄫州貞觀元年州廢來屬蘭陵鎮戰國時屬楚春申君以荀卿為蘭陵令二漢晉屬東海郡元康元年置蘭陵郡其後郡縣俱廢唐武德四年置蘭陵縣貞觀元年省入鄫故鄫國漢屬東海郡後漢晉皆屬琅邪隋大業初省入承望沂水縣漢東莞東安二縣地東莞本莒之鄆邑魯取之漢屬琅邪國晉太康中置東莞郡隋屬髙密郡後省入東安東安漢屬城陽國後漢及晉屬琅邪國其後改沂水縣及南青州東安郡後周改州為莒州隋開皇初郡廢改縣曰東安十六年又改曰沂水大業初州廢屬琅邪郡唐屬沂州有沂山禹貢沂水所出有浮來山春秋公及莒人盟于浮來是也有穆陵山昔召康公賜齊太公履南至于穆陵即此漢陽都縣春秋賜國也漢屬城陽國後漢晉屬琅邪國其後廢焉故城在縣南有大峴山為齊南境其地險固晉將劉裕伐南燕大將公孫五樓請慕容超據守大峴超不從故敗望費縣魯季氏邑公山弗擾以費畔即此漢屬東海郡後漢屬泰山郡晉屬琅邪國隋屬琅邪郡唐屬沂州有蒙山禹貢所謂蒙羽其藝是也顓臾城在縣西北魯附庸國為東蒙主冉有以為固而近于費勸季氏伐之隋開皇十八年改南武陽曰顓臾屬琅邪郡唐貞觀元年省入費漢南武陽縣屬泰山郡後漢及晉因之有顓臾城隋因改焉故城在縣西漢南城縣屬東海郡後漢屬泰山晉屬南武城即古之武城子遊為宰有絃歌之聲處也故城在費縣中新泰縣本漢東上陽縣屬泰山郡後漢省之晉復置惠帝元康元年改為新泰屬泰山郡隋屬琅邪郡唐屬沂州漢蒙隂縣屬泰山郡後漢省之晉復屬琅邪國北齊省入新泰故城在縣東南堂阜在東齊地也有夷吾亭管仲以囚自魯歸鮑叔解其縛於此上登州春秋牟子國戰國屬齊秦屬齊郡二漢晉屬東萊郡元魏屬東牟郡隋屬東萊郡唐置登州天寶元年曰東牟郡今縣四望蓬萊縣本漢黃縣屬東萊郡後漢為郡治所晉屬東萊國元魏置東牟郡北齊廢東牟入長廣郡隋開皇初廢長廣屬東萊郡唐如意元年置登州初治牟平神龍三年更名黃為蓬萊徙治焉望黃縣漢舊縣唐神龍三年更名蓬萊先天元年析蓬萊置黃縣屬登州有萊山漢㡉縣地在此有蹲狗山緊牟平縣二漢舊縣屬東萊郡晉省之後復置隋屬東萊郡唐屬登州漢東牟腄縣地在此有東牟山之罘山秦始皇漢武帝嘗登之中文登縣漢不夜腄縣地屬東萊郡後漢以來省之北齊置文登縣後周因之隋屬東萊郡唐武德四年置登州貞觀元年州廢如意元年屬登州有文登山有成山漢武帝禮日於成山即此有不夜城古有日夜出見於東萊故萊子立此城以不夜為名有秦始皇石橋中萊州禹貢所謂萊夷作牧之地春秋為萊國齊侯滅之還萊子於郳戰國屬齊秦屬齊郡二漢為東萊郡晉為東萊國宋為東萊郡後魏兼置光州北齊後周因之隋開皇初郡廢五年改州曰萊州大業初州廢置東萊郡唐武德四年曰萊州天寶元年曰東萊郡今縣四望掖縣漢髙帝置東萊郡後漢郡徙治黃晉復為郡治焉後魏以來因之隋開皇初郡廢大業初復置唐為萊州有掖水因以名縣有三山有萬里沙見史記封禪書漢曲成當利二縣在此望萊陽縣二漢昌陽縣屬東萊郡晉省之其後復置隋屬東萊郡唐屬萊州後唐避廟諱改為萊陽有奚飬津周禮幽州其藪奚飬望膠水縣本漢長廣縣地屬琅邪郡後漢屬東萊郡晉咸寧三年屬長廣郡其後郡廢復屬東萊郡隋仁壽元年改曰膠水唐屬萊州中即墨縣燕將樂毅破齊唯田單守即墨不下卒破燕軍項羽立田車為膠東王都此後屬齊漢文帝十六年復為膠東國後漢國廢屬北海國晉屬北海郡北齊省之隋開皇十六年復置屬東萊郡唐屬萊州漢不其縣屬琅邪郡後漢屬東萊郡晉置長廣縣其後郡廢北齊省之隋開皇十六年復置尋省入即墨故城在今縣西漢壯武縣屬膠東國故夷國也左傳紀人伐夷即此後漢屬北漢國晉屬城陽郡其後廢焉故城在即墨西有沽水左氏曰沽尤以東即此上濰州春秋戰國皆屬齊秦屬齊郡二漢為北海郡晉為濟南國元魏復置北海郡北齊改郡曰髙陽隋開皇初郡廢十六年分置雄州大業初州廢屬北海郡唐初置濰州尋廢屬青州皇朝以青州北海縣置軍後升為湖州政和元年曰北海郡今縣三望北海縣本漢平夀下密桑犢縣地後漢省桑犢餘屬北海國晉以平夀置濟南郡下密屬焉元魏復為北海郡北齊改曰髙陽隋開皇三年罷郡置下密縣於廢郡城大業二年改為北海縣而别置下密唐武德二年以北海置濰州八年州廢省下密入北海屬青州皇朝建隆三年置北海軍乾德二年升為濰州有斟亭禹後斟尋氏之國有寒亭羿相寒浞之國有溉源山溉水所出古所謂覆甑山也望昌邑縣二漢都昌縣地屬勃海郡元魏屬北海郡隋因之後省為北海縣地皇朝建隆三年析置昌邑縣有濰水出箕山北至都昌入海漢末北海相孔融為黃巾賊管亥所圍劉先主救之於此緊昌樂縣二漢營陵縣地屬北海郡晉屬髙密國元魏屬平昌郡後改為營丘北齊廢之隋開皇十六年復置屬北海郡唐貞觀八年省入北海皇朝乾德三年以營丘城置安仁縣尋改為昌樂上淄州春秋戰國皆屬齊秦屬齊郡漢屬濟南樂安國後漢因之晉屬樂安國後魏置東清河郡北齊郡廢隋置淄州大業初州廢併入齊郡唐武德元年置淄州天寶元年曰淄川郡今縣四望淄川縣本漢般陽縣地屬濟南郡後漢屬齊國晉省之後魏置貝丘縣及東清河郡北齊郡廢隋開皇十六年置淄州十八年改貝丘為淄川屬齊郡唐屬淄州有淄水出泰山萊蕪縣蔡山東北過臨淄縣東又東北過利縣東又東北入于海漢萊蕪故城在東南災川國亦在此古齊長城中長山縣本二漢於陵縣地屬濟南郡晉省之後置武強縣隋開皇十八年改曰長山屬齊郡唐屬淄州有長白山陳仲子夫妻隱處中下鄒平縣古鄒國二漢屬濟南郡晉曰鄒屬樂安國後改為平原縣隋開皇十八年復曰鄒平屬齊郡唐屬淄州下髙苑縣漢屬千乘郡後漢晉屬樂安國北齊改曰長樂隋開皇十八年改曰會城大業初復名髙苑屬齊郡唐屬淄州漢被陽縣在此漢狄縣田儋兄弟殺狄令起兵於此漢屬千乘安帝永初二年改為臨濟屬樂安國其後省入髙苑同下州淮陽軍春秋戰國屬宋魯秦屬薛郡漢屬東海郡後漢為下邳國晉宋因之梁為武州及下邳郡後魏為東徐州後周為邳州隋開皇初郡廢大業初州廢復屬下邳郡唐置邳州後州廢屬泗州又屬徐州皇朝置淮陽軍今縣二望下邳縣夏時奚仲自薛徙此秦末為東陽郡治秦嘉其邑人也韓信為楚王都此國徐屬東海郡後漢永平十五年置下邳國晉宋因之城有三重大城南門謂之白門曹公擒陳宫處也中城吕布所守也小城晉荀羡郤曇所治也梁置武州下邳郡後魏置東徐州後周置邳州隋皆廢之後復置下邳郡於宿豫而以下邳縣屬焉唐武德四年置邳州貞觀元年州廢屬泗州而省郯良城淮陽三縣入下邳元和四年屬徐州皇朝太平興國七年置淮陽軍縣處沂泗之會城東南有小沂水水上有橋楚人謂橋曰圯張良遇黃石公於下邳圯上即此葛嶧山在西禹貢所謂嶧陽也郯陽故已姓國春秋郯子來朝是也秦置郯郡二漢晉皆為東海郡治兼為徐州刺史治焉後魏復置郯郡隋開皇初郡廢屬下邳郡唐省之故城在縣北良城縣左傳昭十三年晉侯會吳子於良是也漢屬東海後漢晉皆屬下邳梁置武原郡隋開皇初郡廢屬下邳唐省之淮陽縣在漢凌縣泗陽之間有淮陽切梁置淮陽郡東魏置綏化縣後周改為淮陽隋開皇初郡廢屬下邳唐省之漢睢陵縣故城在此中宿遷縣秦下相縣地城在西北項羽即此縣人也屬臨淮軍晉元帝督運軍儲以為邸閣因置宿豫縣及宿豫郡焉明帝大寧中兖州刺史劉遐自彭城退屯泗口即此安帝義熙中置城在今縣東南臨泗水南近淮水自後為重鎮後魏太和中南徐州治此後省州為戍隋開皇初廢宿豫郡以縣屬下邳唐屬泗州寶應元年避諱改為宿遷屬徐州皇朝太平興國七年來屬輿地廣記卷六
