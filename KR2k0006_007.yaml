body:
  text: 輿地廣記卷七宋歐陽忞撰京東西路襲慶府大都督府兖州春秋戰國為魯邾二國之境秦置薛郡二漢屬魯國泰山山陽郡晉屬魯郡山陽兼置兖州宋屬魯郡泰山髙平後魏為魯郡北齊改為任城郡隋開皇三年郡廢大業二年改兖州為魯郡唐武徳初克徐圓朗復曰兖州天寳元年曰魯郡後升泰寧軍節度周降防禦皇朝建隆元年復泰寧軍大中祥符元年升都督府今縣七上瑕丘縣本魯負瑕邑春秋季康子入邾以邾子益來囚諸負瑕是也瑕丘在縣西南昔衛公叔文子升之蘧伯玉從文子曰樂哉斯丘死則我欲𦵏焉伯玉曰吾子樂之則瑗請前二漢屬山陽郡晉省入南平屬髙陽隋開皇十三年復置瑕丘為魯郡治唐為兖州漢楚屬國後漢屬任城國晉因之其後廢焉故城在今縣西南有檀鄉上奉符縣本漢博縣屬泰山郡後漢晉因之後魏為郡治北齊改郡曰東平隋開皇初郡廢十六年改縣曰汶陽尋改為博城屬魯郡唐武徳五年置東泰州貞觀元年州廢屬兖州乾封元年更名乾封皇朝大中祥符元年改為奉符漢奉髙縣為泰山郡治後漢晉因之其後郡徙治博隋開皇六年改縣曰岱山大業初省入博城漢梁父牟二縣並屬泰山郡牟故國春秋牟人來朝是也隋省之唐省梁父皆入博城有泰山梁父山昔秦始皇禪梁父即此有龜䝉山魯頌所謂奄有龜䝉是也漢鉅平縣屬泰山郡後漢晉因之其後廢地入博城有亭亭山社首山上泗水縣本魯卞邑春秋夫人姜氏㑹齊侯於卞是也漢屬魯國後漢晉因之其後廢焉隋開皇十六年於卞故城置泗水縣屬魯郡唐屬兖州有陪尾山泗水所出有云云山有尼丘山孔子母顔氏所禱即此漢汶陽縣屬魯國後漢晉因之後廢故城在縣西上龔丘縣本漢寧陽縣屬泰山郡後漢屬東平國晉省之北齊置平原縣隋開皇十六年改曰龔丘屬魯郡唐屬兖州漢剛縣屬泰山郡本魯之闡鄉春秋齊人取讙及闡是也後漢屬濟北國晉曰剛平屬東平國其後廢焉故城在今縣東北漢蛇丘縣屬泰山郡城下有水即魯之蛇淵囿也春秋為鑄遂二國地鑄為蛇丘治所而遂在西北十里後漢晉屬濟北國後廢按水經注云汶水又西洸出水焉又西逕蛇丘縣南又云蛇水西南逕下讙城南蛇水即讙水也今洸水讙水在龔丘則亦蛇丘地矣中下仙源縣本夀丘黄帝所生之地亦為少昊氏之墟有大庭氏之庫周封伯禽為魯侯宅曲阜曲阜在城中委曲長七八里楚滅魯以為縣秦置薛郡漢髙后元年改為魯國後漢因之晉為魯北齊改為任城郡隋開皇三年郡廢四年改魯縣為汶陽十六年改曰曲阜屬魯郡唐屬兖州皇朝大中祥符元年改為仙源有闕里孔子所居漢魯恭王殿階猶存中下萊蕪縣漢屬泰山郡後漢晉因之後廢後魏于萊蕪故城置嬴縣隋屬魯郡唐貞觀元年省入博城長安四年復置萊蕪屬兖州嬴本齊邑春秋公㑹齊侯於嬴是也漢屬泰山郡後漢晉因之後廢地入萊蕪有源山淄水汶水所出淄水東北流至千乗入海汶水西南流至中都入大野陂有肅然山漢武帝禪肅然即此下鄒縣春秋時邾文公卜遷於繹即此後改為鄒戰國時為楚所滅城北有孟子塚二漢屬魯國晉隋屬魯郡唐屬兖州嶧山在北秦始皇上嶧山命李斯勒石頌秦徳焉有鳬山魯頌所謂保有鳬繹是也南平陽縣二漢屬山陽郡晉屬髙平國後廢入鄒大都督府徐州春秋屬宋戰國時屬楚秦屬泗水郡項羽為西楚覇王都二漢屬楚國沛郡後漢晉皆屬彭城沛國兼置徐州宋因之後魏亦屬彭城沛郡置徐州後周廢沛郡隋開皇初廢彭城郡大業初復為彭城郡唐為徐州號建寜軍今縣三望彭城縣故大彭國彭剪所封春秋時宋封魚石為采邑周顯王四十二年九鼎淪於泗水秦始皇過彭城使千人求之不得項羽都之號西楚漢髙帝封弟友為楚元王後漢光武封其子英為楚王晉為彭城國兼置徐州治此為重鎮劉裕為宋公嘗居之後宋將薛安都舉城歸魏以為彭城郡兼置徐州隋開皇初郡廢大業初復置唐為徐州望沛縣有沛澤因以為名秦屬泗水郡二漢屬沛郡髙帝縣人起兵於此號沛公後破黥布還置酒沛宫蜀先主屯小沛袁術遣紀靈攻劉吕布來救之即此晉屬沛國隋屬彭城郡唐屬徐州漢廣戚縣屬沛郡後漢晉屬彭城後廢入沛望蕭縣故國春秋時楚子滅之漢屬沛郡後漢晉屬沛國北齊改為承髙隋開皇六年改為龍城十八年改為臨沛大業初復改曰蕭屬彭城郡唐屬徐州漢扶陽縣屬沛郡後漢省之故城在縣西北緊滕縣故國漢地理志云周懿王子錯叔繡所封而左傳云郜雍曹滕文之昭也恐地理志誤戰國時為齊所滅漢封夏侯嬰為滕文後為公丘縣屬沛郡後漢屬沛國晉屬魯郡後廢公丘入蕃縣蕃縣二漢屬魯國晉屬魯郡後置蕃郡北齊郡廢隋改蕃縣曰滕屬彭城郡唐屬徐州薛縣故國奚仲所封戰國時屬齊謂之徐州秦屬薛郡二漢屬魯國晉屬魯郡後廢故城在今縣東昌慮縣故小邾國漢屬東侯郡後漢晉因之後廢故城在今縣東南𦂳豐縣秦泗水郡沛縣之豐邑漢髙帝生於此後以為縣屬沛郡後漢晉屬沛國隋屬彭城郡唐屬徐州大澤在西髙帝斬白蛇於此東輔拱州春秋屬宋陳戰國屬楚魏秦屬三川碭郡漢屬陳留淮陽梁國後漢屬陳留濟隂陳梁國晉屬陳留濟陽梁國隋屬梁郡淮陽唐屬宋城曹州梁屬開封宋州後唐復屬宋陳曹州晉漢周皆屬開封宋州皇朝屬開封應天府崇寧四年建名輔州以為東輔又改為拱州治襄邑縣今縣六畿襄邑縣本宋承匡襄陵鄉也襄公所𦵏故曰襄陵秦始皇以承匡卑濕乃徙縣於襄陵謂之襄邑漢晉屬陳留郡北齊廢之隋開皇十六年復置屬梁郡唐屬宋州梁開平元年屬開封府後唐同光初還舊晉天福中又屬開封皇朝崇寧四年立拱州畿考城縣本子姓戴國春秋宋人蔡人伐戴是也秦謂之榖縣楚漢兵起邑多遇火因名甾縣漢屬梁國後漢屬陳留郡章帝東廵詔改曰考城取越乃光烈考武王之義也後魏曰考陽置北梁郡北齊並廢之以為城安縣隋開皇十八年復改曰考城屬梁郡唐屬曹州梁開平元年屬開封府皇朝崇寧四年來屬漢薄縣屬山陽郡故城在東北湯都亳即此水經注言梁有二亳南亳在榖熟北亳在䝉皆為湯所都學者多謂亳在河洛之間以今偃師城二十里尸鄉為是皇甫謐以為孟子言湯居亳與葛為鄰今寧陵古葛國地湯地七十里葛又伯耳封域有限而寧陵去偃師八百里安能使亳衆往為之耕而童子饋食哉乃知梁之二亳為湯都審矣畿太康縣本陽夏縣漢屬淮陽國後漢屬陳晉屬梁國後置淮陽郡隋開皇初郡廢七年改陽夏曰太康屬淮陽郡唐屬陳州梁開平元年屬開封府皇朝崇寧四年來屬有後漢扶樂縣故城在北畿寧陵縣古葛伯國書所謂湯征自葛是也戰國屬魏為信陵君無忌所封漢屬陳留郡晉屬梁國北齊廢之隋開皇十六年復置屬梁郡唐屬宋州皇朝屬應天府崇寧四年來屬畿楚丘縣春秋戎州已氏之邑葢昆吾之後别在夷狄者周襄入居於此漢為已氏縣屬梁國後漢屬濟隂郡晉屬濟陽郡後魏置北譙郡北齊並廢之隋開皇四年復置已氏縣六年改曰楚丘屬梁郡唐屬宋州皇朝屬應天府崇寧四年來屬水經云昔衛文公徙居即此非也衛為狄所滅東徙渡河野處曹邑文公徙居楚丘曹邑在今滑之白馬楚丘在今澶之衛南二邑相近且不出邦域之内宜文公之所徙也今拱州楚丘在戎州之邑廹近宋都春秋所謂戎伐凡伯于楚丘是也非衛之所遷也然則今縣有景山京岡乃後人附㑹而名之耳畿柘城縣二漢為柘縣屬淮陽國其後廢焉隋開皇十六年置柘城縣屬梁郡唐屬宋州皇朝屬應天府崇寧四年來屬都督興仁府周武王封弟叔振鐸為曹國其後為宋所滅戰國屬魏秦屬碭郡漢立彭越為梁王都之景帝中六年别為濟隂國甘露二年更名定陶又改為濟隂郡後漢因之晉為濟陽郡後魏置沛郡及西兖州北齊郡廢後周改西兖為曹州隋復為濟隂郡唐復為曹州晉號為威信軍節度漢罷之周改彰信軍皇朝建中靖國元年改為興仁軍後升興仁府大觀三年升都督今縣四望濟隂縣本漢定陶縣地汜水西分濟瀆東北逕縣南又東北入於河瀆高帝既定天下即位于汜水之陽取其汜愛洪大而潤下也二漢置濟隂郡晉為濟陽郡後魏分定陶置濟隂縣及沛郡北齊郡廢屬濟隂郡隋開皇六年分濟隂置黄縣十八年改為蒙澤大業初省入焉唐為曹州貞觀元年省定陶入焉望寃亭縣本曰寃句二漢屬濟隂郡晉屬濟陽郡隋屬濟陰郡唐屬曹州皇朝大觀二年改為寃亭有故煮棗城史記蘇秦説魏襄王曰大王之地東有淮潁煮棗是也有漆園莊周為䝉漆園吏則寃句亦䝉縣地矣𦂳乗氏縣春秋魯莊公敗宋師於乗丘即此二漢屬濟隂郡晉屬濟陽郡隋屬濟隂郡唐屬曹州二漢句陽縣屬濟隂郡左傳桓十二年公及宋公盟於句瀆之丘是也晉屬濟陽郡其後廢焉故城在今縣西上南華縣本漢離狐縣屬東郡後漢屬濟隂晉屬濟陽後魏置北濟隂郡北齊郡縣並廢唐復置離狐縣屬曹州天寳元年更名南華有濮水莊子釣於濮水是也東平大都督府鄆州春秋為須句國及屬魯戰國屬宋秦屬碭郡漢屬東郡東平國後漢因之晉為東平國及屬濟北隋為鄆州及屬濟州後為東平郡及屬濟北唐為鄆州及屬濟州後廢濟州入焉皇朝大觀元年升大都督府今縣六望須城縣故須勾國風姓太昊之後春秋邾人滅須勾須勾子奔魯魯伐邾取須勾反其君焉奏置須昌縣須昌在須勾城北葢須勾子所遷也漢屬東郡後漢屬東平晉為東平治所北齊郡廢隋開皇十六年改須昌為宿城而於宿城西北三十二里别置須昌屬東平郡唐屬鄆州貞觀八年州自鄆城移治須昌後唐避廟諱改為須城宿故風姓國太昊之後春秋及宋人盟於宿二漢為無鹽縣東平國治焉晉屬東平其後廢之隋置宿城縣屬東平唐屬鄆州貞觀八年省入須昌景雲三年復置宿城貞元四年改曰東平移於郭下太和四年改曰天平六年省入須昌有郈鄉亭魯大夫郈伯食邑也望陽榖縣春秋齊侯宋公江人黄人㑹于陽榖杜預云齊地在須昌北隋開皇十六年置陽榖縣屬濟北郡唐屬濟州天寳十三載州廢來屬有盧縣本齊地漢屬泰山郡後漢屬濟北國晉因之後魏置濟州隋大業初置濟北郡唐武徳四年復置濟州天寳十三載州𤼵來屬其後省焉有碻磝城為濟州治所宋寧朔將軍王𤣥䕶前鋒入河平碻磝守之其城臨水西南圯於河今濟州徙置鉅野而盧縣廢乆唯碻磝津在陽榖境則亦盧地矣𦂳中都縣本古厥國漢為東平陸縣屬東平國後漢及晉皆因之北齊改曰樂平隋開皇十六年改為平陸縣屬魯郡隋屬魯州天寳元年更名中郡貞元十四年來屬中都魯邑孔子之所宰也𦂳東阿縣本齊之柯邑春秋莊十三年公㑹齊侯盟于柯曹沫刼盟于此二漢曰東阿屬東郡晉屬濟北國隋屬濟北郡唐屬濟州天寳十三載州廢來屬有阿井嵗常煮膠以貢天府榖城齊地也春秋莊公七年夫人姜氏㑹齊侯于榖三十二年魯城小榖以為管仲私邑城中有管仲井後漢置榖城縣屬東郡晉屬濟北國其後廢入東阿故城在縣東有榖城山漢張良得榖城山下黄石取而寳祠之即此上夀張縣本春秋之良邑漢置夀良縣屬東郡後漢光武叔父名良改為夀張屬東平國晉因之隋屬濟北郡唐屬鄆州有蚩尤祠上平隂縣本齊地春秋襄十八年公㑹諸侯同伐齊齊侯禦諸平隂漢晉為盧縣地隋開皇十四年置榆山縣屬濟北郡大業初改曰平隂唐屬濟州天寳十三載州廢來屬漢肥城縣故肥子國也屬泰山郡後漢省之其後復焉宋置濟北郡後魏因之北齊郡廢後周置肥城郡隋開皇初郡廢縣屬濟北郡唐省之故城在平隂東南上濟州春秋屬魯戰國屬宋秦為碭郡二漢屬山陽郡東平國晉屬髙平任城國隋屬東平濟隂魯郡唐屬鄆兖二州舊濟州治盧唐廢入鄆州其地今在陽榖西北周别置濟州扵鄆州之鉅野皇朝因之今縣四望鉅野縣二漢屬山陽郡晉屬髙平國其後廢焉隋開皇十六年復置屬東平郡唐屬鄆州周廣順二年置濟州禹貢大野澤在東北左傳襄十四年西狩于大野獲麟以為不祥仲尼曰麟也然後取之望任城縣故任國大夫氏之後漢屬東平國後漢置任城國晉因之後置髙平郡隋開皇初郡廢縣屬魯郡唐屬兖州周廣順二年來屬漢廢入縣屬東平國後漢屬任城國晉因之其後廢焉故城在今縣南望金鄉縣漢昌邑縣地縣所治名金鄉山漢司𨽻校尉魯恭嘗於山北鑿石為冢得白兎白蛇不𦵏更𦵏山南鑿而得金故曰金鄉山後漢置縣屬山陽郡晉屬髙平國隋屬濟隂郡唐屬兖州周廣順二年來屬昌邑故屬梁漢景帝十六年别置山陽國武帝天漢四年更名昌邑以封子昌邑哀王其後國除復為山陽郡後漢因之兼為兖州刺史治晉為髙平國其後廢入金鄉隋開皇十六年分置昌邑大業初省入焉故城在縣西有東緍縣本宋邑春秋僖二十三年齊侯伐宋圍緡是也二漢屬山陽郡後省入昌邑今併入金鄉望鄆城縣今魯西邑左傳成十六年晉人執季文子于莒丘公還待于鄆漢晉皆為廪丘縣地後周置清澤縣及髙平郡隋開皇初郡廢改縣曰髙安十八年改曰鄆城大業初置東平郡唐為鄆州貞觀八年州徙治於須昌周廣順二年來屬上軍州春秋屬宋魯戰國屬宋秦置碭郡漢屬山陽梁國後漢屬濟隂梁國晉屬濟陽梁國隋屬濟隂梁郡唐屬宋曹兖州唐末以宋州之碭山梁太祖鄉里也為置輝州已而徙治單父後唐滅梁改為單州其屬縣置徙傳記不同今領單父碭山成武魯臺四縣望單父縣本魯邑宓子賤為宰彈琴不下堂而治者也漢屬山陽郡後漢屬濟隂郡晉屬濟陽郡後魏曰離狐置北濟隂郡北齊並廢之隋開皇六年更置曰單父屬濟隂郡唐屬宋州後屬輝州光化三年自碭山徙輝州來治後唐改為單州望碭山縣碭文石也山出文石故以名之秦置碭縣及碭郡漢髙帝隠於芒碭山澤間有雲氣吕后與人俱求常得之髙帝五年置梁國後漢屬焉晉省入下邑後魏置曰安陽隋開皇十八年改名碭山屬梁郡唐屬宋州朱全忠此縣人也光化二年表置輝州三年徙治單父後唐屬單州𦂳成武縣漢屬山陽郡後漢屬濟隂郡晉屬濟陽郡北齊置永昌郡隋開皇初郡廢十六年置戴州大業初州廢縣屬濟隂郡唐屬曹州光化二年屬輝州後唐屬單州上魚臺縣本魯之棠邑春秋隠五年公矢魚于棠二漢為方與縣屬山陽郡晉屬髙平國元魏屬髙平郡北齊廢之隋開皇十六年復置屬彭城郡唐屬兖州寳應元年更名魚臺以城北有魯侯觀魚臺故也其後來屬漢胡陵縣屬山陽郡後漢章帝改為胡陸晉屬髙平國其後廢焉故城在今縣東上濮州春秋戰國時皆屬衛秦屬東郡二漢屬濟隂東郡晉屬濮陽濟陽東平國隋屬東平濟北郡唐為濮州今縣四望鄄城縣本衛地春秋莊十四年單伯㑹諸侯于鄄二漢為鄄城縣屬濟隂郡曹公為兖州刺史創業始於此焉晉屬濮陽國後置濮陽郡隋開皇初郡廢十六年置濮州大業初州廢縣屬東平郡唐為濮州𦂳雷澤縣本成國周武王弟成叔武所封其後遷于成之陽故為成陽縣二漢屬濟隂郡晉屬濟陽郡北齊廢之隋開皇十六年復置曰雷澤屬東平郡唐屬濮州禹貢雷夏澤在西北廩丘本齊邑左傳襄二十四年齊烏餘以廪丘奔晉漢屬東郡後漢屬濟隂郡晉屬濮陽國隋大業初省焉故城在縣北上臨濮縣漢濮陽成陽縣地隋開皇十六年分雷澤置大業初省入焉唐武徳四年復置屬濮州春秋宣十一年晉人宋人衛人曹人同盟于清丘杜預注云清丘衛地在濮陽縣東南其地今入臨濮上范縣二漢屬東郡晉屬東平國北齊廢之隋開皇十六年復置屬濟北郡唐屬濮州春秋晉大夫士會之邑也同下州廣濟軍自唐虞以下地理與興仁府同皇朝置廣濟軍今縣一上定陶縣故三朡國周封曹叔振鐸於此范蠡變姓名寓居扵陶曰陶朱公秦相魏冉以陶邑封焉梁王彭越都之漢宣帝封子為定陶恭王後為濟隂郡晉為濟陽郡後魏屬西兖州後周屬曹州隋屬濟隂郡唐貞觀元年省定陶入濟隂縣皇朝太平興國三年以定陶鎮置廣濟軍熈寜四年軍廢屬曹州元祐元年復置禹貢陶丘在西南荷澤在東北輿地廣記卷七
