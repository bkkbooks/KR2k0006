body:
  text: 輿地廣記卷二十宋歐陽忞撰淮南東路大都督府揚州春秋屬吳吳滅屬越越滅屬楚秦屬九江郡漢髙帝六年為荆國十一年為吳國景帝曰江都國武帝曰廣陵國東漢為郡魏為重鎮後吳得之西晉屬廣陵郡東晉時以郗鑒都督青兖二州諸軍事鎮此宋置廣陵郡文帝兼置南兖州齊梁因之北齊改曰東廣州陳復曰南兖州後周改為吳州隋開皇九年改為揚州大業初置江都郡唐武德二年曰南兖州七年曰𨝍州以刊溝為名左傳所謂吳城𨝍溝以通江淮是也九年曰揚州天寶元年曰廣陵郡領淮南節度唐末楊行密竊據其地後為李升所取今縣三緊江都縣漢屬廣陵國東漢晉因之自梁至隋或廢或置隋為江都郡治唐為揚州有江水祠俗謂之子胥廟蓋以祭江神而子胥配食耳緊廣陵縣漢吳王濞所都後為江都廣陵國及郡治焉魏文帝征吳幸廣陵故城臨江觀兵歎曰天所以限南北也北齊置廣陵江陽二郡開皇初郡廢十八年改縣曰邗江大業初改曰江陽為江都郡治後省入江都唐貞觀十八年復置與江都分治後改曰廣陵唐韓臯號知音常論廣陵散以為王凌母丘儉諸葛誕皆欲以揚州興兵正復魏室而不克魏由是散亡此説非也凌等為都督時揚州治夀春至隋始以廣陵為揚州治凌等起事與廣陵殊不相涉望天長縣本千秋縣唐天寶元年析江都六合髙郵置七載更名望亳州春秋屬陳戰國屬宋秦屬碭郡漢屬沛郡東漢屬沛國兼為豫州刺史治焉魏置譙郡晉宋因之後魏亦曰譙郡兼立南兖州後周改州曰亳州隋開皇初郡廢大業初州廢置譙郡唐初曰譙州貞觀八年更名亳州天寶元年復曰譙郡皇朝大中祥符七年升集慶軍節度今縣七望譙縣春秋陳邑漢屬沛郡魏武帝其邑人也置譙郡後周曰亳州置小黃縣及陳留郡隋開皇初郡廢大業二年改小黃曰譙縣唐因之望城父縣春秋陳邑左傳楚昭王救陳師于城父是也漢屬沛郡東漢屬汝南郡晉屬譙郡後魏曰浚儀隋開皇十八年改曰城父屬亳州唐因之南有乾溪楚靈王敗於此望蒙城縣本山桑縣漢屬沛郡東漢屬汝山郡晉屬譙郡後魏置譙州及渦陽縣兼置南譙郡梁改州曰西徐州東魏改曰譙州隋開皇初郡廢十六年改渦陽縣為肥水大業初州廢改肥水曰山桑屬譙郡唐屬亳州天寶元年改為蒙城蒙館鎮本梁置北新安郡東魏改為蒙郡北齊郡廢置蒙縣後廢為鎮望鄼縣顔師古云字本作音中古以來皆借鄼字為之讀皆作而莽呼為贊治則此縣亦有贊音二漢屬沛郡晉屬譙郡後廢隋開皇十六年復置屬譙郡唐屬亳州馬頭鎮本建平縣漢屬沛郡東漢省之後魏置馬頭郡北齊廢為鎮望永城縣本芒敬丘二縣地二漢屬沛郡昭帝更敬丘曰大丘光武更芒曰臨睢後皆省焉隋末置永城縣唐屬亳州芒縣故城在今縣北有芒山與碭山相接漢髙帝隱於此大丘縣故城在今縣西北東漢陳實為此縣長望衛真縣本苦縣城東有賴鄉祠老子所生之地漢屬雎陽國東漢屬陳國晉屬梁國後魏為谷陽縣屬陳留郡北齊省之隋開皇六年復置屬亳州唐乾封元年改名真源載初元年曰仙源神龍元年復曰真源皇朝大中祥符七年改曰衛真緊鹿邑縣本曰嗚鹿春秋晉邑左傳諸侯侵陳至於鳴鹿即此東漢置武平縣屬陳國晉屬梁國隋開皇十八年改為鹿邑屬淮陽郡唐屬亳州戰城鎮本漢鄲縣屬沛郡東漢屬沛國晉省之上宿州春秋戰國屬宋秦屬泗水郡漢屬沛郡東漢屬晉沛國梁置睢州北齊置睢南郡隋開皇初郡廢三年州廢屬徐泗亳三州唐因之元和四年初泗州之虹徐之符離蘄置宿州太和三年廢七年復置左徐州南界泗水上今縣五望苻離縣二漢晉屬沛郡北齊置睢南郡唐置宿州漢竹縣屬沛郡東漢為竹邑及晉皆屬沛國梁置睢州隋開皇三年廢竹邑入符離漢相縣為沛郡治東漢晉因之後廢故城在今縣西北項羽破漢軍於靈璧東睢水為之不流即此縣界望蘄縣本秦縣二世元年七月陳勝率戍卒起蘄即此二漢屬沛郡西有會甀鄉髙帝破黥布於此晉屬譙郡梁置蘄郡北齊置仁州隋開皇初郡廢大業初州廢屬鼓城郡唐屬宿州漢龍亢縣屬沛郡東漢屬廢國晉屬譙郡北齊置龍亢郡隋開皇初郡廢入蘄緊臨渙縣本銍縣漢屬沛郡東漢屬沛國晉屬譙郡後魏改為臨渙屬臨渙郡北齊郡廢隋屬譙郡唐武德四年置北譙州貞觀十七年州廢屬亳州天祐四年來屬皇朝大中祥符七年復屬亳州天禧元年來屬有稽山中虹縣本􅧾夏丘二縣地漢皆屬沛郡東漢􅧾屬沛郡夏丘屬下邳國晉因之後皆廢焉北齊復置夏丘縣及夏丘郡兼置潼州後周改為宋州改縣為晉陵隋開皇初郡廢十八年州廢縣復曰夏丘屬泗州唐武德四年置仁州又析夏丘置虹縣六年省夏丘貞觀八年州廢以虹屬泗州元和四年來屬靈璧縣緊楚州春秋屬吳戰國屬楚秦屬九江郡漢屬臨淮郡東漢屬廣陵郡下邳國晉屬臨淮廣陵二郡東晉為重鎮元帝使劉隗守淮隂是也安帝置山陽郡宋齊因之後魏置淮隂郡東魏改為淮州隋開皇初山陽郡廢十二年置楚州大業初州廢屬江都郡唐武德四年曰東楚州八年更名天寶元年曰淮隂郡今縣四望山陽縣本漢射陽縣屬臨淮郡東漢建武十五年封子荆為山陽公治此十七年為三國後屬廣陵郡晉因之義熙七年置山陽郡改射陽縣為山陽縣宋因之隋置楚州大業初州廢屬江都郡隋末臧君相竊據之號東楚州唐武德四年君相降因之八年曰楚州緊寶應縣本平安縣二漢屬廣陵國晉省之後置安宜縣隋屬江都郡唐武德四年以縣置倉州七年州廢來屬上元三年以獲定國寶十三枚因改元寶應兼改縣魏鄧艾築石鱉城在今縣西八十里以營田上鹽城縣本漢鹽瀆縣屬臨淮郡東漢晉屬廣陵郡後安帝改曰鹽城縣宋因之北齊置射陽郡陳改曰鹽城郡隋開皇初郡廢屬揚州隋末盜章徹據其地置射州及射陽安樂新安三縣唐武德四年來歸因之七年州廢省三縣而置鹽城來屬中淮隂縣漢屬臨淮郡韓信其邑人也今城東有漂母冢東漢屬下邳國晉為廣陵郡治後魏置淮隂郡東魏改為淮州北齊置懷恩縣後周改曰夀張隋開皇初改曰淮隂大業初州廢省縣入山陽唐乾封二年復置屬楚州上海州春秋戰國為魯東境後屬楚秦屬薛郡後分為郯郡漢改郯為東海郡東漢晉宋因之宋僑立青冀二州梁置南北二青州後入元魏東魏置海州隋開皇初郡廢大業初州廢為東海郡唐武德四年復曰海州天寶元年復曰東海郡今縣四緊朐山縣本朐縣二漢晉屬東海郡後魏置琅邪郡後周改縣曰朐山并胊山郡隋開皇初郡廢大業初置東海郡唐為海州秦始皇立石於朐縣海上以為秦之東門即此中懷仁縣本祝其利城二縣地二漢晉屬東海郡後皆廢梁置南北二青州東魏州廢置義塘郡及懷仁縣隋開皇初郡廢屬海州唐武德四年置利城新樂二縣六年改新樂曰祝其八年省入懷仁有夾山春秋公會齊侯於夾谷傳謂之祝其是也有羽山舜殛鯀於此中沭陽縣本原丘縣地二漢晉屬東海郡後廢梁置潼陽郡東魏改曰沭陽郡及置懷文縣後周改縣曰沭陽隋開皇初郡廢屬海州唐武德四年置原丘縣八年省為鎮入沭陽中東海縣本贛榆縣地漢屬琅邪郡東漢晉屬東海郡後廢後魏置東海郡及廣饒縣隋開皇初郡廢仁夀元年改廣饒曰東海屬海州唐武德四年置環州并置青山石城贛榆三縣八年州廢省三縣以東海來屬縣治鬱洲四靣環海齊王田橫入海所保鬱洲也有郁州山一名蒼梧山俗傳此山在蒼梧徙來上有南方株楰上泰州春秋屬吳秦屬九江郡漢屬臨淮郡東漢晉屬廣陵郡安帝分置海陵郡宋齊因之隋開皇初郡廢屬江都郡唐武德三年置吳州七年州廢屬揚州五代吳楊氏置海陵制置院南唐李氏升為泰州皇朝因之後曰海陵郡今縣四望海陵縣漢屬臨淮郡有吳太倉枚乘傳不如海陵之倉是也東漢省之晉復置屬廣陵郡安帝置海陵郡唐武德三年改縣曰吳陵置吳州七年州廢復故名吳置海陵制置院南唐為泰州緊興化縣南唐置中泰興縣南唐置中下如臯縣晉安帝置寧海如臯二縣隋開皇初置如臯入寧海屬江都郡南唐復置上泗州春秋屬徐戰國屬吳秦屬泗水郡漢屬臨淮郡東漢屬下邳國兼置徐州晉屬臨淮郡元魏置盱眙郡梁置髙平郡又置濟隂郡隋開皇初郡皆廢屬揚泗濠三州唐屬楚泗濠三州今縣三緊盱眙縣漢為臨淮都尉治東漢屬下邳國晉為臨淮郡治明帝兖州刺史劉遐自彭城退屯泗口即此安帝時置角城鎮在淮泗之會後魏置盱眙郡陳置北譙州尋省隋開皇初郡廢屬揚州唐武德四年置西楚州八年廢屬楚州光宅初改曰建中後復故名建中二年屬泗州後復屬楚州皇朝乾德元年又屬泗州州徙治此有都梁山龜山禹治水以鐵鎖鎖淮渦水神無支竒於龜山之足唐永泰中刺史李湯以大牛五十引鎖出之鎖末有一青猿髙五丈許復拽牛沒水上臨淮縣本漢下相僮二縣地屬臨淮郡東漢屬下邳國晉以下屬臨淮郡而省僮縣後下相亦廢焉唐長安二年析徐城南境置臨淮縣屬泗州開元二十五年州自宿預徙來治此漢下相縣故城在今縣西北僮縣故城在西南徐城鎮本徐國嬴姓有徐君墓季札挂劒之所漢屬臨淮郡東漢屬下邳國晉屬臨淮郡梁置髙平郡東魏置髙平縣隋開皇初郡廢十八年改縣曰徐城屬泗州唐因之皇朝建隆二年省為鎮入臨淮上招信縣本淮陵縣地漢屬臨淮郡東漢屬下邳國晉屬臨淮郡宋曰睢陵置齊隂郡後州改縣曰招義隋開皇初郡廢大業初改縣曰北明屬鍾離郡隋末縣民馬簿盜據號化州唐因之武德三年改縣曰招義貞觀八年州廢屬濠州皇朝乾德元年來屬太平興國元年更名上滁州春秋屬吳戰國屬楚秦及二漢屬九江郡晉屬淮南郡宋置新昌郡齊置南譙州北齊改郡為臨滁後周改曰北譙隋開皇初郡皆廢改南譙州為滁州大業初州廢屬江都郡唐武德二年復置天寶元年曰永州郡今縣三望清流縣本漢全椒縣地後魏置頓丘縣及新昌郡南譙州故城在今縣西南八十里北齊徙來治此隋開皇初改為滁州廢郡為新昌縣十八年改曰清流大業初州廢屬江都郡唐置滁州周世宗征南唐李景使皇甫暉屯清流關為周師所敗暉被擒於此望來安縣本永陽縣唐景龍三年析清流縣置屬滁州後改為來安緊全椒縣二漢屬九江郡晉屬淮南國後廢梁置北譙縣及北譙郡北齊改縣曰臨滁後周復曰北譙隋開皇初郡廢改縣曰滁水大業初改為全椒屬江都郡唐屬滁州二漢阜陵縣屬九江郡明帝時淪為麻胡晉屬淮南郡後廢焉故城在今縣南上真州自五代以前地理與揚州同南唐以永貞縣地置迎鑾鎮皇朝乾德二年置建安軍大中祥符六年以聖像成功升為真州統縣二中揚子縣唐永淳元年析江都縣置屬揚州後改為永貞縣皇朝於縣之迎鑾鎮置軍雍熙二年以永貞為屬後復改為揚子屬真州望六合縣本楚之棠邑伍尚為棠邑大夫是也漢屬臨淮郡東漢屬廣陵郡晉元康七年置棠邑郡安帝時改置秦郡後别置尉氏縣北齊兼置秦州後周改州曰方州改郡曰六合隋開皇初郡廢四年改尉氏為六合縣省堂邑入焉大業初州廢屬江都郡唐屬揚州皇朝至道二年來屬有瓜步山後魏太武南伐起行宫於瓜步山諸軍同日皆臨江即此中通州自唐以前地理與泰州同南唐李氏置靜海制置院周顯德中世宗克淮南升為軍後以為通州皇朝天聖元年改曰崇州明道二年復故今縣二望靜海縣本海陵之東境周顯德中置望海門縣本海陵之東境周顯德中置同下州髙郵軍歷代地理與揚州同皇朝開寶四年置髙郵軍熙寧五年廢元祐元年復置今縣一望髙郵縣漢屬廣陵國東漢屬廣陵郡吳省之晉武帝太康元年復立屬臨淮郡宋屬廣陵郡梁析置竹塘三歸二縣及置廣業郡尋以有嘉禾改為神農郡隋開皇初郡廢又省竹塘三歸臨潭三縣入焉屬江都郡唐屬揚州皇朝置軍有神居山輿地廣記卷二十
