body:
  text: 輿地廣記卷十六宋歐陽忞撰陜西秦鳯路下下府渭州秦屬北地郡二漢屬安定郡晉因之元魏屬太平郡隋初屬原州後屬平凉郡唐屬原州寳應元年渭州没吐蕃元和四年以原州之平凉縣置行渭州廣明元年為吐蕃所破中和四年復置後曰隴西郡今縣五中平凉縣漢朝那涇陽二縣地屬安定郡後周置平凉縣屬原州隋屬平凉郡唐屬原州元和四年置行渭州今因之有笄頭山禹貢涇水所出西有隴山有六盤闗西北五里有吐蕃㑹盟壇唐貞觀五年築中潘原縣本隂盤二漢屬安定郡晉省之後復置元魏置平凉郡隋開皇初郡廢屬安定郡唐屬涇州天寳元年改為潘原縣周顯徳六年來屬中安化縣故屬儀州皇朝熈寧五年州廢來屬中崇信縣皇朝乾徳元年以舊崇信軍地置崇信縣屬鳯翔府淳化中屬儀州熈寧五年州廢來屬中下華亭縣隋大業初置屬安定郡唐元和三年省入汧源後復置儀州皇朝熈寧五年州廢來屬望原州自唐已上地理與涇州同廣徳元年原州没吐蕃置行原州於靈臺之百里城貞元十九年徙治平凉元和三年又徙治臨涇大中三年收復闗隴歸治平髙廣明後沒吐蕃又僑治臨涇本屬涇州後唐清泰三年割屬原州後曰平凉郡今縣二中臨涇縣漢屬安定郡東漢及晉為郡治焉元魏亦屬安定後廢之隋大業初置湫谷縣尋改曰臨涇屬安定郡唐屬涇州後為原州治所有漢朝那縣故城中彭陽縣二漢屬安定郡晉省之後復置元魏置西北地郡隋改縣為彭原唐武徳二年析彭原置豐義縣屬寧州皇朝太平興國元年改曰彭陽至道三年來屬中下階州古為白馬氏國西戎之别種也漢武帝開之置武都郡東漢晉因之後沒於氐楊茂搜元魏置武街郡西魏置武州隋開皇初郡廢大業初州廢置武都郡唐武徳元年置武州天寳元年曰武都郡因没吐蕃廢大厯二年復置為行州咸通中始得故地龍紀初遣使招葺之景福元年更名階州今縣二中下福津縣漢武都縣地元魏置翫當縣及武街郡西魏又於今縣東北三十里萬郡故城置覆津縣後周省翫當入覆津隋開皇初武階郡廢屬武州唐因之景福元年改覆津曰福津後為州治故盤堤縣本西魏置南五部縣後改名隋屬武都郡唐屬武州没蕃後不復置中下將利縣故白馬氐國漢為武都縣為郡治焉天池大澤在其西東漢及晉皆因之元魏改武都縣曰石門西魏改曰安育置武州後周改安育曰將利仍置武都郡隋開皇初郡廢大業初復置唐為武州治後徙福津上河州古西羌地秦屬隴西郡漢屬金城隴西二郡東漢屬隴西郡漢末宋建自稱河首平漢王據此曹公遣夏侯淵討平之晉恵帝時置晉興郡前秦苻堅置河州西秦乞伏乾歸又據於此元魏亦置河州後周置枹罕郡隋開皇初郡廢大業初州廢復置枹罕郡唐武徳二年平李軌置河州天寳元年曰安昌郡領縣三中下枹罕縣本罕羌侯邑漢為枹罕縣屬金城郡東漢省之晉屬晉興郡苻秦置河州元魏因之後周置枹罕郡隋因之唐為河州中下大夏縣漢屬隴西郡東漢因之晉屬進興郡前凉張駿置大夏郡隋屬枹罕郡唐屬河州貞觀八年省入枹罕五年復置中下鳯林州本白石縣漢屬金城郡東漢屬隴西郡張駿改白石為永固屬晉興郡唐貞觀七年於縣置烏州十一年州廢置安昌縣來屬天寳元年更名鳯林廣徳元年州没吐蕃皇朝熈寧六年收復置枹罕縣七年省之今曰安鄉郡縣一寧河縣本寧河寨皇朝崇寧四年升為縣下蘭州古西羌地秦屬隴西郡漢屬金城隴西二郡東漢魏晉因之前凉張實分置廣武郡張駿又分置武始郡後為西秦乞伏國仁南凉秃髪烏孤所分據元魏後周屬武始郡隋開皇初郡廢置蘭州大業初州廢復置金城郡唐武徳二年平薛舉置蘭州以臯蘭山為名天寳元年曰金城郡領縣二下五泉縣本金城縣漢屬金城郡為氐羌所據東漢及晉因之有故苑川城西秦乞伏國仁據此後曰子城縣置金城郡隋開皇初郡廢置蘭州大業初州廢置金城郡復改縣曰金城後改曰五泉唐咸亨二年復曰金城天寳元年復曰五泉下金城縣本漢允吾縣為金城郡治所張駿置廣武郡南凉秃髪烏孤據此隋廢郡為廣武縣唐屬蘭州乾元二年更名金城漢浩亹允吾二縣故城在西南廣徳元年州陷吐蕃皇朝元豐四年收復今縣一蘭泉縣鞏州古雍州地春秋時屬羌戎秦屬隴西郡二漢因之靈帝分立南安郡晉屬隴西南安二郡元魏為隴西南安安陽三郡兼置渭州後周併為南安郡隋開皇初郡廢大業初州廢復置隴西郡唐武徳元年置渭州天寳元年曰隴西郡寳應元年沒吐蕃後廢皇朝皇祐四年以渭州地置古渭寨熈寧五年改通逺軍崇寧三年改為鞏州今縣三隴西縣本襄武縣地二漢屬隴西郡晉為郡治焉元魏置渭州隋為隴西郡唐渭州沒吐蕃廢皇朝為通逺軍元祐五年於郭下置隴西縣隋舊有隴西縣本獂道縣漢屬天水郡在襄武之東靈帝置南安郡晉因之又置中陶縣後省獂道入中陶隋開皇初南安郡廢改中陶為内陶又改為武陽十年又改為隴西唐因之沒蕃後廢永寧縣本永寧寨皇朝升為縣寧逺縣本寧逺寨皇朝崇寧四年升為縣㑹州古為西羌秦屬隴西郡漢屬金城安定二郡地後漢屬金城武威二郡西魏置㑹州後周廢之隋屬平凉郡唐武徳二年平李軌置㑹州天寳元年曰㑹寧領縣二上㑹寧縣本漢枝陽縣地屬金城郡晉張寔分屬廣武郡西魏置㑹州後周廢之隋開皇十六年置㑹寧縣屬平凉郡唐置㑹州上烏蘭縣本漢祖厲縣地屬安定郡東漢屬武威郡晉省之後周置烏蘭闗唐武徳九年置縣後州沒吐蕃皇朝收復今縣一敷川縣西安州秦漢屬北地郡唐屬靈州皇朝置西安州西寧州古西羌所居漢武帝西逐諸羌乃渡河湟築令居塞昭帝時屬金城郡東漢末置西平郡晉因之永嘉後秃髪烏孤初稱西平王其弟利鹿孤復都西平即此地也後魏置鄯州後周置樂都郡隋開皇初郡廢大業初州廢置西平郡唐武徳二年平薛舉置鄯州天寳元年曰西平郡領縣三中湟水縣二漢破羌縣地屬金城郡建安中改為西平郡晉因之元魏置鄯州後周置樂都郡隋開皇十八年改西都曰湟水大業初為西平郡唐為鄯州破羌縣故城在縣西中龍支縣漢允吾縣地東漢為龍耆縣元魏改曰北金城西魏改曰龍支隋屬枹罕郡唐屬鄯州中鄯城縣唐儀鳯三年置屬鄯州漢西平郡故城在西有土樓山上元二年州没於吐蕃至皇朝收復始置莭度加號寳徳軍湟州古雍州地漢晉後屬西平郡唐屬鄯州皇朝置湟州有湟水東入河廓州古西羌地東漢延熹中䕶羌校尉段熲追燒何大豪至河首積石山出塞二千餘里即此地也漢末屬西平郡前凉置湟河郡元魏屬鄯州後周武帝逐吐谷渾置廓州及洮河郡隋開皇初州郡並廢大業初置澆河郡唐武徳二年置鄜州天寳元年曰寧塞郡領縣三下廣成縣本燒當羌地元魏置廣威縣隋仁夀初改為化隆縣屬西平郡唐置廓州先天元年改化隆曰化成天寳元年曰廣威下逹化縣後周置逹化郡并縣隋開皇初郡廢屬澆河郡有故澆河城晉時吐谷渾主阿豺所築在縣西一百二十里下米川縣漢枹罕縣地屬金城郡唐貞觀五年置米州及米川縣十年州廢屬河州永徽六年來屬廣徳元年州沒吐蕃皇朝收復同下州鎮戎軍秦屬北地郡東漢因之晉屬新平郡元魏太武置髙平鎮後為髙平郡兼置原州隋初郡廢大業初州廢置平凉郡唐武徳元年曰原州天寳元年曰平凉郡廣徳元年没吐蕃後廢皇朝至道元年以故平髙縣地置鎮戎軍髙平寨慶厯二年置本漢髙平縣為安定郡治焉東漢屬安定郡光武自征隗囂河西太守竇融率五郡太守與車駕㑹髙平是也晉省之元魏置髙平鎮後改為平髙縣置原州隋為平凉郡唐為原州同下州徳順軍自五代以前地理與渭州同皇朝慶厯三年以渭州隴干地置徳順軍今縣一隴干縣皇朝元祐八年置同下州懐徳軍本平夏城皇朝大觀二年升為懐徳軍以蕭闗等寨𨽻之與西安鎮戎互為聲援應接蕭闗為邊面之壯焉蓋唐之武州蕭闗縣地也同下州積石軍本漢之金城郡河闗縣地唐置軍𨽻隴右節度府後没吐蕃皇朝復置有積石山禹導河自此始河水出崑崙自古言者皆失其實禹本紀山海經水經固已迂恠誕妄而班固所載張騫窮河源事亦為臆説騫使大夏見葱嶺于闐二河合流注蒲昌海其水停居皆以為潜行地中南出於積石為中國河此乃意度之非實見蒲昌海與積石河通流也漢武帝以于闐山出玉按古圗書因名河所出曰崑崙至唐之時吐蕃為大國居積石西唐之聘使徃來非一始見黄河在吐蕃中西南數千里向東北流與積石河相連而吐蕃又言崑崙在其國内長慶中劉元鼎為盟㑹使言河之上流由洪濟裹西南行二千里水益狹冬春可渉夏秋乃勝舟其南三百里三山中髙而四下曰紫山直大羊同國古所謂崑崙者也吐蕃人曰悶摩泰山東距長安五千里河源出其間流澄緩下稍合衆流色亦行益逺它水并注則濁河源東北直莫賀延磧尾隠測其地蓋劒南之西元鼎所經見大畧如此下洮州古為諸𦍑之地後為吐谷渾所據至後周武帝逐吐谷渾置洮陽郡兼置洮州隋開皇初郡廢大業初州廢置臨洮郡唐武徳二年置洮州天寳元年曰臨洮洮郡領縣一中臨潭縣本吐谷渾地後周置美相縣唐貞觀四年徙治洪和城以故地置旭州五年又置臨潭縣八年州廢以臨潭屬洮州徙州來治復遷于洮陽城仍于舊洪和城置美相縣天寳中省美相併入有禹貢西傾山後名西强山吐谷渾主阿豺嘗升西强山觀勢江源問于羣僚曰此水東流更有何名由何郡國入何水也其長史曽和曰此水經仇池過晉夀出宕渠號墊江至巴郡入江度廣陵㑹于海阿豺曰水尚知歸吾雖塞表小國而獨無所歸乎遣使通宋獻其方物宋少帝封為澆河公西傾之北則洮水所出北流入河寳應元年州陷吐蕃皇朝收復輿地廣記卷十六
