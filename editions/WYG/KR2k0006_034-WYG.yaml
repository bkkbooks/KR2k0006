body:
  text: 輿地廣記卷三十四宋歐陽忞撰福建路大都督府福州春秋為七閩地戰國越王無疆為楚所滅子孫分散或居閩地以州服於楚秦為閩中郡而越後世曰無諸從諸侯平秦漢髙帝五年封為閩越王都此及武帝時閩越反國除徙其民於江淮之間其地遂空後有逃遁山谷者頗出立為治縣屬會稽郡東漢因之吴分屬建安郡晉太康三年立晉安郡宋齊因之陳兼立閩州後改曰豐州隋平陳郡廢改州曰泉州大業初州廢立建安郡唐武徳六年曰泉州景雲二年曰閩州開元十三年改今名天寳元年曰長樂郡後升威武軍節度唐末為閩王氏所據石晉時入吳越後周改彰武軍皇朝太平興國二年復曰威武軍今縣十二望閩縣漢封閩越王無諸都此後𨽻治縣屬會稽郡東漢為侯官都尉吳屬建安郡晉太康三年分立晋安郡及置源豐縣以為郡治宋齊因之後省入東侯官隋開皇九年郡廢改縣曰原豐十二年更今名大業初置建安郡唐曰泉州又曰閩州又曰福徳有九仙山福山金﨑山望侯官縣東漢置侯官都尉晋曰侯官縣屬晋安郡宋齊因之後曰東侯官而省原豐入焉隋開皇九年改東侯官曰原豐唐武徳六年復置與閩縣分治郭下八年省長安二年析閩復置元和三年省五年復置有閩山螺江昔閩人謝端釣得異螺因名之有侯官浦望福清縣本禺安唐聖厯二年析長樂置天寳元年改為福清唐朱梁改為永昌後唐同光初復故名晋天福初改為南臺後復故後更今名有練門江望懐安縣皇朝太平興國二年析閩豐有方洪塘江望長溪縣唐武徳六年置尋省入連江長安二年復置有仙遊山白水江望連江縣本温麻晉太康四年以温麻船屯置縣屬晉安安郡宋因之後省唐武徳六年析閩地置尋更名有材塘唐貞觀元年築望古田縣唐永泰二年析侯官尤溪置有石塘山古田口𦂳長樂縣本新寜唐武徳六年析閩置尋更名有海壇山演江𦂳永福縣本永泰唐咸通二年析連江及閩置皇朝崇寜元年更名有髙蓋山中閩清縣朱梁乾化元年王審知扵梅溪塲置有竹山鍾湖中羅源縣本永州自五代置皇朝天寳五年改為永昌乾興元年改今名有四明山中寜徳縣五代置有大海上建州春秋為七閩地戰國為越人所居秦屬閩中郡二漢屬會稽郡吳永安三年分置建安郡晋宋齊梁因之陳屬閩州後屬豐州隋平陳郡廢屬泉州大業初州廢屬建安郡唐武徳四年立建州天寶元年曰建安郡唐末為閩王氏所有升鎮武軍節度石晉時入南唐改永安軍又改忠義軍後降軍事皇朝端拱元年升建寜軍今縣七望建安縣葢越王句踐冶鑄之所漢誅閩越徙其民以空其地有遁逃山谷者後頗出焉乃立為冶縣屬㑹稽郡東漢分冶地為㑹稽東南二部都尉東部台州是也南部今縣是也吳置建安縣以為郡治晉以後因之隋廢郡屬泉州州廢屬建安郡唐立建州有白鶴山茶山建安水東溪望甌寜縣皇朝治平三年析建安建陽浦城置與建安分治郭下咸寜三年省元祐四年復置望建陽縣晉太康中置屬建安郡宋以後因之後省唐武徳四年復置八年省入建安垂拱三年復置有浮石山建陽溪望浦城縣漢末置漢興縣吳改曰吳興屬建安郡晉宋因之後省隋末復置唐武徳四年改為唐興後省入建安載初元年復置天授二年曰武寜神龍元年復名曰唐興天寳元年更今名有孤山太湖山望崇安縣皇朝淳化五年升崇安場為縣有武夷山𦂳開𨽻縣皇朝咸平五年升開𨽻鎮為縣有洞宫山上松溪縣五代時置有松溪上泉州春秋為七閩地戰國為越人所居秦屬閩中郡漢屬閩越國後及東漢屬㑹稽郡吳屬建安郡晉屬晉安郡宋齊因之後置南安郡隋平陳郡廢屬泉州唐初亦屬焉聖厯二年立武榮州三年廢乆視元年復置景雲二年更名天寳元年曰清源郡唐末為閩王氏所有石晋時附于南唐升清源軍節度皇朝太平興國三年改平海軍今縣七上晉江縣唐開元八年析南安置而自南安徙州治此有泉山晉江中南安縣吳置東安縣晉改曰晉安屬晉安郡宋以後因之後置南安郡隋平陳郡廢改縣曰南安屬泉州唐武徳五年置豐州貞觀元年州廢屬泉州聖厯二年立武榮州後改為泉州而徙治晉江有金雞山晉水中同安縣晉屬晉安郡後省五代復置中恵安縣皇朝淳化五年析晉江置有錦田山洛陽江中永春縣五代置有石鼓山下清溪縣五代置有廬山溪水下徳化縣五代置有靈馨山上南劍州春秋為七閩地戰國為越人所居秦屬閩中郡漢屬閩越國後及東漢屬㑹稽郡吴屬建安郡晉宋齊梁陳因之隋屬泉州唐屬建福汀三州南唐李景立劍州亦曰劍浦郡皇朝太平興國四年為南劍州今縣五𦂳劍浦縣本延平晉屬建安郡後省五代置及劍浦縣南唐立建州初治延平後徙劍浦而延安省入有延平津晉張華雷煥所佩龍泉太阿二寳劍後躍入水化為二龍即此津也上將樂縣晉宋屬建安郡後省唐武徳五年析邵武復置撫州七年省垂拱四年析邵武及故綏城地復置屬建州元和三年省五年復置皇朝太平興國四年來屬上左溪縣唐開元二十九年開山洞置屬福州南唐時來屬中沙縣宋曰沙村縣屬建安郡後省唐武徳四年置沙縣屬建州後省入建安永徽六年復置大業十二年屬汀州下順昌縣南唐置下汀州春秋為七閩地戰國為越人所居秦屬閩中郡漢屬閩越閩後及東漢屬會稽郡吳屬建安郡晉宋以後屬晉安郡隋屬泉州唐開元二十四年開福撫二州山洞置汀州天寳元年曰臨汀郡唐末為閩王氏所有石晉時附南唐後改南州皇朝乾徳四年復故名今縣五望長汀縣本晉新羅縣地屬晉安郡唐開元二十四年開山洞置治新羅大厯四年徙治白石皆長汀縣地有靈蛇山鄞江溪望寜化縣唐開元二十四年開山洞置有鐡石山黄連洞上上杭縣本長汀縣之上杭場皇朝淳化五年升為縣有香嶺山鍾嵒上武平縣本長汀縣之武平場皇朝淳化五年升為縣有靈洞山清流縣皇朝元符元年析長汀寜化置下漳州春秋七閩地戰國為越人所居秦屬閩中郡漢屬閩越國後及東漢屬㑹稽郡吳屬建安郡晉宋以後屬晉安郡隋屬泉州唐垂拱二年析福州西南境置天寶元年曰漳浦郡唐末為閩王氏所有石晉時入南唐今縣四望龍溪縣梁置屬南安郡隋唐屬泉州聖厯二年屬武榮州開元二十九年來屬乾元二年州自李澳川徙治焉有九龍山望漳浦縣唐垂拱二年置為州治開元四年徙治李澳川故懐恩縣與漳浦同置二十九年省入有九侯山李澳溪望龍巖縣唐開元二十四年置屬汀州大厯十二年來屬望長泰縣五代置屬泉州皇朝太平興國五年來屬有鼓鳴山同下州邵武軍厯代地理與建州同皇朝太平興國五年立邵武軍今縣四望邵武縣本昭武吳置屬建安郡晉武帝更名宋齊因之後省隋開皇十二年復置屬撫州唐武徳四年復置綏城縣屬建州七年邵武亦屬貞觀三年省綏城入焉皇朝太平興國五年立軍有飛猿嶺邵武溪望光澤縣皇朝太平興國六年析邵武置有烏君山烏嶺望泰寜縣本歸化南唐置屬建州皇朝太平興國五年來屬元祐元年更名有梅溪望建寜縣本歸化南唐置屬建州皇朝太平興國五年來屬有百丈山三溪同下州興化軍厯代地理與泉州同皇朝太平興國四年為興化軍今縣三望莆田縣隋開皇中屬泉州尋省入南安唐武徳五年析南安復置皇朝以縣之㳺洋百丈二鎮地立太平軍尋改興化有壺公山昔有人隠於此遇一老翁引至絶頂見宫闕臺殿翁曰此壺中日月也望仙逰縣本清源唐聖厯二年析莆田置屬泉州天寶元年更名皇朝太平興國四年來屬有九仙大目溪中興化縣皇朝太平興國四年析莆置有百丈溪輿地廣記卷三十四
