body:
  text: 輿地廣記卷二十一宋歐陽忞撰淮南西路緊夀州春秋戰國屬楚漢屬九江沛二郡東漢屬九江郡兼置揚州魏晉宋齊梁屬淮南郡齊兼置豫州後魏曰揚州梁曰南豫州東魏曰揚州陳曰豫州後周曰揚州隋屬汝隂淮南二郡唐屬潁夀二州後唐天成三年升為忠正軍節度周顯徳中自夀春徙治潁州之下蔡皇朝因之今縣五緊下蔡縣故州來國為楚所㓕左傳楚靈王狩于州來次于潁尾地蓋在淮潁之㑹後吳取之以封季札至夫差時蔡成公自新蔡徙此謂之下蔡秦相李斯其縣人也漢屬沛郡東漢屬九江郡晉屬淮南郡梁置汴郡北齊郡廢隋屬汝隂郡唐屬潁州周世宗伐南唐克夀春乃自夀春徙州治此有硤石山潁水淮水梁大同中於硤石山築城距東魏即縣城也望安豐縣漢陽泉安風蓼三縣地屬六安國東漢屬廬江郡魏置安豐郡晉後魏梁陳皆因之隋開皇初郡廢屬夀州唐因之有芍陂楚相孫叔敖所造徑百里灌田萬頃魏太尉王凌與吳將張休文戰於芍陂即此有六國故城在縣南又有蓼國皆臯陶之後偃姓後項羽封黥布為九江王都六漢髙帝元年别為衡山國五年屬淮南國文帝十六年復為衡山武帝元狩二年别為六安國治六而以蓼為屬東漢國廢以六蓼屬廬江郡晉省蓼而六屬廬江後省六入安豐陂中有大冢即臯陶冢楚人謂之公琴望霍丘縣漢安豐松滋二縣地晉屬安豐郡後立霍丘戍隋開皇十九年置霍丘縣屬夀州唐武徳四年以松滋霍丘二縣置蓼州七年州廢來屬縣北有安豐津魏母丘儉既敗藏水草中安豐津都尉部民張屬斬之即此松滋漢屬廬江郡晉屬安豐郡唐省緊夀春縣戰國時楚考烈王自陳徙都夀春命曰郢秦㓕楚置九江郡漢髙帝封子長為淮南王長子安謀反誅地入又為九江郡東漢因之為揚州刺史治魏王凌母丘儉諸葛誕皆以揚州相繼起兵欲興魏室並為司馬氏所誅晉為淮南郡兼置揚州避鄭皇后諱改夀春曰夀陽後復曰夀春元魏因之隋改揚州曰夀州唐因之周世宗伐南唐劉仁曕固守不降世宗以其難克遂徙州治下蔡而復其軍曰忠正軍曰吾以旌仁曕之節也有八公山上有淮南王安廟圖安及八公像後晉謝𤣥北禦苻堅祈八公山及陳於淝水堅望見山上草木皆為旌旗之狀秦師遂敗中六安縣本漢潜安豐二縣地晉永和中謝尚鎮馬頭城在今縣北梁置霍州及岳安郡及岳安縣北齊州廢隋開皇初郡廢改縣為霍山屬廬州唐武徳四年以霍山應城潜城三縣置霍州貞觀元年州廢省應城潜城以霍山來屬神功元年曰武昌神龍元年復改名開元二十七年改為盛唐皇朝開寳四年改為六安霍山鎮唐天寳初析盛唐别置霍山縣開寳元年省為鎮入盛唐有霍山有禹貢大别山潜本楚邑漢屬廬江郡東漢晉因之後省焉唐武徳五年復置潜縣貞觀中省入霍山有汶水潜水上廬州春秋屬舒戰國屬楚秦屬九江郡漢屬廬江九江二郡東漢因之曹公用劉馥為揚州刺史以合肥空城建立州治魏遂以為重鎮晉屬淮南廬江二郡梁置南豫州尋改曰合州隋開皇初改曰廬州大業初州廢唐長興二年升為昭順軍節度周顯徳五年改為保信軍皇朝因之今縣三上合肥縣應劭曰夏水自城父東南至此與肥合故曰合肥二漢屬九江郡魏以張遼守之吳孫權率衆十萬攻圍不克明帝時滿寵都督揚州諸軍鎮北於西北三十里築新城孫權欲圍之不敢下船後諸葛恪圍新城亦失利而退晉屬淮南郡後廢焉梁置汝隂縣及汝隂郡隋開皇初郡廢為合肥置廬州唐因之有金牛山淝水淮水中慎縣本浚遒縣二漢屬九江郡故城在今縣南晉屬淮南郡後改為慎縣東魏置平梁郡陳曰梁郡隋開皇初郡廢屬廬州唐因之下舒城縣古舒國偃姓後為楚所滅二漢舒縣為廬江郡治後廢焉唐開元二十三年析合肥廬江置舒城縣屬廬州有龍舒山龍舒水望蘄州春秋戰國屬楚秦屬九江郡二漢屬江夏郡吳置蘄春郡晉廢屬弋陽郡北齊置雍州及齊昌郡後周改州曰蘄州隋開皇初郡廢大業初州廢置蘄春郡唐武徳四年曰蘄州天寳元年曰蘄春郡皇朝因之今縣五望蘄春縣二漢屬江夏郡吳置蘄春郡晉屬弋陽郡改縣曰蘄陽梁改曰蘄水北齊改曰齊昌郡隋開皇初郡廢置蘄州十八年縣復曰蘄春唐因之望蘄水縣漢蘄春縣地宋置浠水縣及永安郡隋開皇初郡廢屬蘄州唐武徳四年改縣曰蘭溪天寳元年改曰蘄水羅田縣望廣濟縣唐武徳四年析蘄春置永寧縣天寳元年改名廣濟有積布山黄石山望黄梅縣漢蘄春縣地晉元帝置新蔡郡及永興縣後郡廢隋開皇初改縣為新蔡十八年又改為黄梅屬蘄州有黄梅山上和州春秋屬吳戰國屬楚秦漢屬九江郡漢末揚州刺史自夀春徙治此吳為重鎮晉屬淮南郡恵帝永興元年分置歴陽郡宋兼置南豫州齊梁皆因之北齊置和州隋開皇初郡廢大業初州廢復置歴陽郡唐武徳三年改為和州天寳元年曰歴陽郡皇朝因之今縣三緊歴陽縣秦漢屬九江郡漢末為揚州治晉置歴陽郡宋置南豫州北齊置和州隋唐因之有歴湖中含山縣唐武徳四年析歴陽置八年省長安四年復置更名武夀神龍元年復故名有濡湏水吳孫權築濡須塢以拒曹公漢建安二十年公自圍之不克後黄武二年魏軍又攻之不㧞中烏江縣本秦東城縣之烏江亭項羽欲渡烏江即此二漢屬九江郡晉置烏江縣屬淮南郡魏置江都郡北齊改為齊江郡陳改為臨江郡後漢改為同江郡隋開皇初郡廢屬和州上舒州春秋為皖國及羣舒地戰國屬楚秦屬九江郡二漢屬廬江郡呉孫權克皖城遂為重鎮晉亦屬廬江郡安帝置晉熈郡宋齊因之梁兼置豫州後改曰晉州北齊改曰二州陳又改曰晉州隋開皇初郡廢置熙州大業初州廢置同安郡唐武徳四年改為舒州天寳元年復為同安郡皇朝因之今縣五上懐寧縣故皖國二漢為縣屬廬江郡漢末吳克皖城赤烏四年諸葛恪死之晉亦屬廬江郡後改皖縣為懐寧置晉熈郡隋郡廢置熈州復置同安郡東改為舒州有潜山一名天柱山漢武帝嘗登此上桐城縣本漢樅陽縣屬廬江郡武帝自尋陽浮江薄樅陽而出是也東漢省之梁復置及置樅陽郡隋開皇初郡廢屬熈州十八年改縣曰同安唐屬舒州至徳二載更名桐城有漢朱邑祠有盛唐山樅陽水上宿松縣本漢皖縣地梁置髙塘郡隋開皇初郡廢置髙塘縣屬熈州十八年改縣曰宿松唐武徳四年置嚴州八年州廢來屬有長葛山雷水上望江縣本漢皖縣地晉置新治縣陳置大雷郡隋開皇初郡廢十一年改縣曰義鄉十八年又曰望江屬熈州唐武徳四年置髙州尋改曰智州七年州廢屬嚴州八年州廢來屬上太湖縣本漢皖縣地宋置太湖縣隋開皇初改曰晉熈後復故名屬熈州唐屬舒州上濠州本鍾離子國春秋時楚滅之以為縣吳又取之戰國復屬楚秦及二漢屬九江郡晉屬淮南郡東晉置鍾離郡宋齊梁因之齊兼置北徐州北齊改曰西楚州隋開皇初郡廢置濠州大業初州廢置鍾離郡字初作豪唐元和三年改從濠天寳元年復曰鍾離郡皇朝因之今縣二望鍾離縣故鍾離三國嬴姓後為楚邊邑楚平王時吳之邊邑卑梁處女與鍾離小童争桑兩家交怒相攻㓕兩邑長又怒而起兵相攻遂㓕卑梁吳王聞之又怒使公子光伐楚㧞鍾離而還東晉置鍾離郡隋置濠州唐因之又後魏置當塗縣及馬頭郡北齊改為馬頭縣置荆山郡隋開皇初郡廢改縣曰塗山屬濠州唐武徳七年省入鍾離有塗山禹之所娶也有濠水莊子與恵子觀魚之所梁武帝堰淮水於鍾離以灌夀陽即此望定逺縣本漢東城縣屬九江郡項羽兵敗東城即此地東漢因之晉屬淮南郡梁改東城曰定逺置臨濠郡北齊改郡曰廣安隋開皇初郡廢屬濠州唐因之晉曰西曲陽屬淮南郡北齊省入定逺上光州春秋為黄弦二國皆為楚所㓕戰國屬楚秦屬九江郡二漢屬汝南江夏郡至魏分置弋陽郡晉宋齊梁因之兼置光州後魏亦為弋陽郡北齊置南郢州後周置淮南郡隋開皇初州郡俱廢大業初復置弋陽郡唐曰光州天寳元年曰弋陽郡皇朝因之今縣四上定城縣故黄國也楚人㓕之二漢為弋陽縣屬汝南郡故城在今縣西魏置弋陽郡北齊置南郢州後廢為南北二弋陽縣又省北弋陽入南弋陽改為定城縣後周又置淮南郡隋初州郡俱廢後屬弋陽郡唐武徳三年置弦州貞觀元年州廢屬光州太極元年州自光山徙來治此有黄水望固始縣本􅐛丘楚孫叔敖子所封之邑秦之㓕楚䝉恬攻􅐛即此漢為􅐛縣屬汝南郡光武更名固始晉屬汝隂郡梁置蓼縣北齊復故名置北建州後周改為澮州隋開皇初州廢後屬弋陽郡唐屬弋州商城鎮本蔣國周公之後楚㓕之以為期思縣漢屬汝南郡東漢因之晉屬弋陽郡後廢宋置包信縣梁置義城郡及建州隋開皇初並廢改包信為殷城屬弋陽郡唐武徳元年置義州貞觀元年州廢來屬皇朝建隆元年改曰商城後省為鎮入固始中下光山縣故弦國楚人㓕之漢為西陽縣屬江夏郡晉為弋陽郡治梁置光州及光城郡隋開皇初郡廢置光山縣大業初置弋陽郡唐為光州太極元年州徙治定城中下仙居縣本二漢􅋴縣地屬江夏郡故城今在縣北四十里晉屬弋陽郡宋分􅋴縣置樂安縣梁置宋安郡隋開皇三年郡廢後屬弋陽郡唐屬光州有僕僕先生居縣黄土山常餌杏丹乗雲徃來刺史李休光以為妖叱左右執之龍虎見乎側先生乗之而去天寳元年乃詔改樂安縣為仙居下黄州春秋戰國屬楚秦屬南郡二漢屬江夏郡晉初屬弋陽郡後屬西陽郡宋因之齊分置齊安郡北齊兼置衡州後周因之隋開皇初郡廢改衡州曰黄州大業初州廢置永安郡唐武徳三年復為黄州天寳元年復曰齊安郡皇朝因之今縣三望黄岡縣本漢西陵縣地屬江夏郡晉屬弋陽郡後屬西陽國北齊置南安縣及齊安郡隋開皇初郡廢改縣曰黄岡置黄州大業初置永安郡唐復曰黄州邾縣故城在今縣東南一百二十里楚宣王㓕邾徙之於此故曰邾項羽封吳芮為衡山王都此漢屬江夏郡東漢因之晉屬弋陽郡後廢東晉毛寳守邾城為石季龍所敗有卒投江水遇白龜救之上黄陂縣本漢西陵縣地北齊置南司州後周置黄陂縣改南司州曰黄州隋開皇初移州治黄岡縣唐武徳三年置南司州七年州廢來屬中麻城縣本漢西陵縣地梁置信安縣陳置定州後周改曰亭州隋開皇初郡廢十八年改縣曰麻城屬黄州唐武徳三年置亭州八年州廢來屬同下州無為軍自五代以前地理與廬州同皇朝太平興國三年以巢縣之無為鎮置無為軍今縣三望無為縣漢襄安縣屬廬江郡東漢晉因之梁改曰蘄縣隋開皇初復改為襄安屬廬江郡後併入巢縣置無為鎮皇朝太平興國三年以鎮置無為軍熈寧三年析巢廬江二縣置無為縣望巢縣古曰南巢成湯放桀於此周初巢伯來朝春秋為羣舒邑叛楚故楚人圍巢二漢為居巢縣屬廬江郡晉因之隋曰襄安縣唐武徳三年置巢州七年州廢改襄安為巢縣屬廬州皇朝太平興國三年來屬有巢湖在縣東南望廬江縣本漢龍舒縣地屬廬江郡東漢晉因之齊改曰廬江縣置廬江郡梁置湖州北齊州廢隋開皇初郡廢屬廬州唐因之皇朝太平興國三年來屬輿地廣記卷二十一
