body:
  text: 輿地廣記卷二十六宋歐陽忞撰荆湖南路上潭州古三苗國之地春秋戰國屬楚秦置長沙郡漢為國東漢復為郡晉屬長沙及衡陽郡永嘉元年兼置湘州宋齊梁陳因之隋平陳郡廢置潭州以昭潭為名大業初州廢置長沙郡唐武徳四年曰潭州天寳元年曰長沙郡升為武安軍節度皇朝因之今縣十一望長沙縣故青陽地秦始皇二十六年荆王獻青陽以西是也漢為臨湘縣髙帝五年以封吳芮為長沙王都此其城即芮所築東漢及晉為郡宋為國齊梁陳為郡隋為潭州唐因之唐宋馬氏父子竊據其地後為南唐所取有嶽麓山昭山山下有旋泉深不可測人以為昭潭無底有湘水溈水有賈誼宅并仍存望衡山縣本湘南縣地吳析置衡陽縣及置衡陽郡晉恵帝改縣曰衡山宋齊梁陳因之隋平陳郡廢屬潭州唐神龍三年屬衡州皇朝淳化四年来屬禹貢衡山在西南有三峰曰祝融紫盖石廪韓愈詩紫葢連延接天柱石廪騰擲堆祝融有湘水望安化縣本益陽縣地皇朝熈寧六年置有浮青山資水緊醴陵縣本漢臨湘縣地髙后封長沙相越為醴陵侯即此東漢置醴陵縣属長沙郡建安八年縣有大山常鳴如牛呴聲積數年後豫章賊攻没縣亭晉宋皆屬長沙郡後省唐武徳四年復置屬潭州有王喬山醴泉上攸縣漢屬長沙國東漢晉宋屬長沙郡後改為攸水隋平陳省入湘潭縣後復置唐武徳四年置南雲州貞觀元年州廢屬衡州五代時来屬有雲陽山攸水中湘鄉縣本湘南縣之湘鄉東漢置縣屬零陵郡晉宋属衡陽郡後省唐武徳四年析衡山置屬潭州有漣水歴石魚山下石色黒而理若雲毋開發一重輒有魚形長數寸鱗鰭首尾若刻畫焼之作魚膏腥中湘潭縣本湘南縣地禹貢衡山在東南湘中記曰衡山有玉牒禹案其文以治水遥望衡山如陣雲沿湘十里九向九背廼不復見漢屬長沙國東漢屬長沙郡晉宋屬衡陽郡後省而置湘潭縣隋屬衡州唐元和後来屬有湘水㳙湖中益陽縣漢屬長沙國東漢晉宋齊梁陳属長沙郡隋唐屬潭州有浮丘山益水水經注以益水為資水之殊目縣南十里有平岡岡有井數百淺者四五尺深者不測俗云昔有金人以杖撞地輒便成井中瀏陽縣本漢臨湘地吳置瀏陽縣属長沙郡晉宋因之後省唐景龍二年析長沙復置潭州有瀏水中湘隂縣本羅縣地宋元徽二年分置湘隂縣屬湘東郡齊因之梁置羅州及岳陽郡陳廢州隋平陳郡廢省湘隂入岳陽縣置玉州尋改岳陽為湘隂縣開皇十一年州廢屬岳州唐因之皇朝淳化四年来屬故羅縣羅國本在襄州宜城之西楚文王徙羅子居此秦為羅縣屬長沙郡二漢晉宋齊因之梁陳屬岳陽郡隋平陳屬岳州唐武徳八年省入湘隂故城在今縣東北有湘山湘水汨水出艾縣桓山西逕羅縣北又西逕吳昌縣北東漢置曰漢昌吳更名隋省入羅又西逕玉笥山又西為屈潭楚屈原被䜛放逐懐沙自沉於此又逕汨羅戍南又西入于湘春秋所謂羅汭也有黄陵水上承太湖西流入湘逕二妃廟南世謂之黄陵廟秦始皇遊至湘山逢大風問博士曰湘君何神博士對曰堯女舜妻而𦵏此始皇大怒使刑徒三千人伐湘山木赭其山焉中寧鄉縣吳新陽縣地晉太康元年改為新康屬衡陽郡宋以後因之隋平陳省入益陽縣唐武徳四年復置七年又省皇朝太平興國二年析長沙置有大溈山青陽山溈水上衡州春秋戰國屬楚秦屬長沙郡二漢屬長沙桂陽二郡吳置湘東衡陽二郡晉宋齊梁陳皆因之隋平陳省二郡置衡州大業初州廢置衡山郡唐武徳四年曰衡州天寳元年曰衡陽郡皇朝因之今縣五望衡陽縣本酃縣地漢屬長沙國東漢屬長沙郡吳置湘東郡及臨烝縣東南去酃縣十五里晉因之太元二十年省酃入焉宋齊梁陳因之隋平陳置衡州改臨烝為衡陽縣唐因之亦漢鍾武縣地屬零陵郡東漢改為重安晉宋以後屬衡陽郡隋省入衡陽縣後復置唐武徳七年又省入有岣嶁山即南岳之别名有湘水烝水有合江亭韓愈詩江亭枕湘江烝水㑹其左有酃湖周回三里取水為酒極醇美晉武帝平吳始荐酃酒於太廟中茶陵縣漢屬長沙國東漢屬長沙郡晉屬湘東郡宋齊梁陳因之隋省入湘潭縣唐武徳四年析攸縣復置屬南雲州貞觀元年又省聖厯元年復置来屬有雲陽山茶水漢地理志茶陵有泥水西入湘水經謂之沫水即今茶水是也茶弋奢反中耒陽縣二漢屬桂陽郡晉宋以後因之隋平陳改曰洡隂屬衡州唐武徳四年復曰耒陽有侯曇山洡水出郴縣西北過耒陽又北衡陽入湘中下常寧縣漢分耒陽置新寧縣晉屬湘東郡宋齊梁陳皆因之隋屬衡州唐天寳元年改曰常寧有逍遥山湘水宜水下安仁縣皇朝乾徳三年以安仁場置後析衡陽衡山二縣地入焉中道州春秋戰國屬楚秦屬長沙郡漢分屬零陵郡東漢晉因之穆帝分置營陽郡宋齊因之梁改為永陽郡隋平陳郡廢屬永州大業初州廢屬零陵郡唐武徳四年平蕭銑置營州五年改為南營州貞觀八年改為道州天寳元年曰江華郡皇朝因之今縣四𦂳營道縣本漢營浦縣屬零陵郡晉置營陽郡宋齊因之而析置營陽縣為郡治梁改郡縣皆曰永陽隋開皇中郡廢省營浦入永陽屬永州唐武徳四年置營州改永陽為營道縣貞觀八年改營州為道州天寳元年改營道為𢎞道縣皇朝建隆三年復曰營道有營道山營水出冷道縣西流逕九疑山下又西逕營道又屈而東北逕營涌又北流注于湘亦虞時鼻國之地有象祠唐元和中刺史薛伯髙毁之栁宗元作斥鼻亭神記𦂳永明縣本漢營浦縣地唐既徙置營道於永陽乃徙置永陽於此屬道州貞觀八年省天授二年復置天寳元年更名皇朝熈寧五年省為鎮入營道元祐二年復置𦂳江華縣漢為乗縣地属蒼梧郡唐武徳四年析置江華縣屬道州貞觀十七年屬永州上元二年復来屬文明元年改曰雲漢神龍元年復故有吳望山沲水𦂳寧逺縣漢冷道營道二縣地並屬零陵郡東漢及晉皆因之東晉屬營陽郡宋齊因之梁陳屬永陽郡隋省冷道入營道而徙營道於冷道廢城屬永州唐武徳四年徙置營道於永陽縣乃於此地置唐興縣為營州貞觀八年屬道州長夀二年改曰武盛神龍元年復曰唐興元寳元年改曰延唐梁改曰延昌後唐復故晉天福初曰延喜皇朝乾徳三年改為寧逺有九疑山虞舜所𦵏其山九谿相似故名有冷水出此山北流逕冷道西南又北流入都溪水故大厯縣本漢冷道之舂陵鄉長沙定王封其子置是為舂陵節侯後省吳復置屬零陵郡東晉屬營陽郡宋齊因之梁陳屬永陽郡隋平陳省入營道唐大厯二年析延唐縣置於舂陵故城北十五里名曰大厯屬道州皇朝乾徳三年省入寧縣有舂陵水即所謂都溪也西北流入于營水中永州春秋戰國屬楚秦屬長沙郡漢元鼎六年置零陵郡東漢吳晉宋齊梁陳因之隋開皇初郡廢置永州大業初州廢復置零陵郡唐武徳四年平蕭銑置永州天寳元年曰零陵郡皇朝因之今縣三望零陵縣本漢泉陵縣屬零陵縣東漢為郡治晉宋齊梁陳因之隋置永州改泉陵為零陵縣唐因之泉陵故城在今縣北二里亦晉應陽縣地恵帝分觀陽置屬零陵郡宋齊梁陳因之隋省入零陵縣應水東南流入湘有臯墟象之所封也有萬石山瀟湘水縣有香茅自古貢之禹貢荆州菁茅也中祁陽縣吳分泉陵置屬零陵郡晉宋齊梁陳因之隋省入零陵縣唐武徳四年復置屬永州亦呉永昌縣地晉宋齊梁陳屬零陵郡隋省入零陵縣後分入祁陽有石燕山石色紺而狀似燕或大或小若母子及雷風相薄則羣飛頡頏有湘水中東安縣皇朝雍熈元年以零陵縣之東安塲置中郴州春秋戰國屬楚秦屬長沙郡項羽尊楚懐王為義帝都郴漢髙帝二年置桂陽郡東漢晉宋齊梁陳因之隋開皇中平陳郡廢置郴州大業初州廢復置桂陽郡唐武徳四年平蕭銑置郴州天寳元曰桂陽郡皇朝因之今縣四𦂳郴縣義帝所都項羽使英布害之縣南有義帝冢漢屬桂陽郡東漢以後因之隋置郴州唐因之有靈夀山古所謂萬嵗也有石室室有鍾乳上悉生靈夀木下有千秋溪又有渌水出縣東侯公山西北流而南屈注于來謂之程鄉溪昔置酒宫醴醖于山下名曰程酒獻同酃酒焉中桂陽縣漢郴縣地東晉分置汝城縣屬桂陽郡宋齊梁因之陳改為廬陽縣及置廬陽郡隋平陳郡廢以縣屬郴州唐天寳元年改為義昌後唐改曰郴義皇朝太平興國元年改為杜陽有耒山耒水所出西北流逕汝城縣北又西北逕晉寧縣北又北過郴縣西又北過便縣西又西北過耒陽縣東又北過酃縣東又西北至臨烝而右注湘水中宜章縣隋大業未蕭銑析郴置義章縣屬郴州唐因之皇朝太平興國元年改曰宜章亦二漢臨武縣地屬桂陽郡晉宋齊梁陳因之隋唐屬郴州後廢有武溪南入樂昌有嵐領中永興縣漢便縣屬桂陽郡東溪吳晉因之宋省焉唐開元十三年置安陵縣屬郴州天寳元年改為髙亭皇朝熙寧六年改為永興有髙亭山安陵山中邵州春秋戰國屬楚秦屬長沙郡二漢屬長沙零陵二郡吳寳鼎元年分置邵陵郡晉宋齊梁陳因之隋平陳郡廢屬湘州唐武徳四年平蕭銑置南梁州貞觀十年改為邵州天寳元年曰邵陽郡皇朝因之今縣三望邵陽縣漢曰昭陵屬長沙郡吳置邵陵郡晉改縣曰邵陵宋因之後省入邵陽邵陽本昭陽東漢置屬零陵郡晉武帝改焉屬邵陵郡宋因之後併邵陵入而以邵陽為郡治隋郡廢屬湘州唐武徳四年復置邵陵縣七年省入邵陽後置邵州又吳置髙平縣屬邵陵郡晉宋因之後省入邵陽有文斤水邵陵水望新化縣皇朝收復梅山以其地置新化縣屬邵州有長龍山澬水下蒔竹縣皇朝元豐四年以洞溪徽州置蒔竹縣屬邵州有九龍山蒔竹水下全州自後唐以前地理與永州同石晉天福三年楚王馬希範奏置全川皇朝因之今縣二望清湘縣漢零陵洮陽二縣地並屬零陵郡東漢晉宋齊梁陳皆因之隋置省而置湘源縣屬永州唐因之後改為湘川楚又改為清湘而置全州有湘山宜湘水漢洮陽故城在今縣西北零陵故城在南觀陽縣漢零陵縣地吳分置觀陽屬零陵郡晉宋齊梁陳皆因之隋省入湘源縣大業末蕭銑復置屬永州唐武徳七年省上元二年復置石晉時來屬有灌水同下州武國軍自五代以前地理與邵州同皇朝因之中武岡縣二漢都梁縣地屬零陵郡晉武帝分置武岡縣屬零陵郡宋因之後省入都梁縣隋又省都梁入邵陽縣後復置曰武攸唐武徳四年改為武岡屬南梁州後屬邵州皇朝置武岡軍縣左右一岡對峙重岨齊秀間可二里舊傳東漢伐五溪蠻蠻保此岡故曰武岡亦二漢夫夷縣地屬零陵郡吳屬邵陵郡晉宋齊梁陳皆因之隋省入邵陽唐分屬武岡故城在縣東北晉武帝置建興縣屬邵陽郡晉宋因之後省焉唐武德四年復置七年省入武岡有唐糾山濵水所出同下州桂陽監自五代以前地理與郴州同後置桂陽監皇朝因之今縣二上平陽縣按舊唐史志云晉分郴置平陽縣陳廢蕭銑復置唐武德七年省八年復置郴州然晉宋二志皆無縣五代時廢焉皇朝天禧元年復置桂陽監治此有大凑山靈星江中藍山縣本二漢南平縣屬桂陽郡晉宋因之後省唐咸亨二年復置屬郴州天寶元年改為藍山皇朝景德元年來屬有藍山輿地廣記卷二十六
