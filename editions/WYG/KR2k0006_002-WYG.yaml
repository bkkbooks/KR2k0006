body:
  text: 輿地廣記卷二宋歐陽忞撰漢十三郡晉絳慈隰阿中解懐衛河南孟陕虢汝鄭商京兆鳯翔隴邠耀同華坊右司𨽻校尉領京兆扶風馮翊𢎞農河東河内河南等郡國凡七宿蔡潁潁昌應天亳右豫州領潁州汝南布郡梁國魯國等郡國凡五真定中山趙深兾河間祁相磁邢洺大名恩永寜右兾州領魏郡鉅鹿常山清河廣平真定中山信都河間趙國等郡國凡十開徳鄆濟滑濮博陳開封興仁單兖抉廣濟右兖州領東郡陳留山陽濟隂㤗山城陽淮陽東平等郡國凡八宻徐海沂楚泗通㤗淮陽右徐州領琅琊東淳臨淮泗水楚國等郡國凡三徳濱棣青齊淄濰登萊右青州領平原千乗濟南齊郡北海東萊膠東髙宻菑川等郡國凡九江陵峡歸復郢安岳鼎澧辰沅靖施黔鄂潭衡永桂道郴韶全邵連黄唐鄧隨㐮均楊蘄光英荆門漢陽興桂陽信陽光化錦溪奨費右荆州領南陽南郡江夏桂陽武陵零陵廣陵長沙等郡國凡八滁和真夀廬舒平江宣池潤常湖杭睦越歙明台處温婺衢饒信江洪撫吉筠袁䖍福建泉漳汀濠秀江寜髙郵太平廣徳南康南安臨江建昌南劍邵武興化無為南雄右揚州領廬江九江㑹稽丹陽豫章六合等郡國凡六興元洋金房達開渠果閬巴蓬昌普恭涪合忠萬䕫利劍緜梓遂漢成都彭蜀邛雅黎嘉簡眉榮資瀘叙祺亨威茂文龍珍承溱廣安南平遵義大寜三泉梁山懐安仙井冨順長寜永康嶲扶姚翼右益州領漢中廣漢巴郡蜀郡犍為越嶲牂牁益州等郡國凡八鳯階成興涇慶渭原寜秦鞏熈河蘭湟㑹環岷鎮戎懐徳西寜西安徳順積石甘凉𤓰肅沙靈鹽宥右凉州領安定北地隴西武陵金城天水武都張掖酒泉敦煌等郡國凡十太原遼汾忻代嵐石憲澤潞延安鄜坊丹銀豊府麟威勝平定岢嵐寜化火山保徳綏徳保安晉寜雲應新夏勝豊單于右并州領太原上黨上郡西河朔方五原雲中定㐮雁門等郡國凡七雄霸滄清莫保信安順安保安安肅廣信蔚朔幽􅃰易檀薊媯平營安東右幽州領涿郡渤海代郡上谷漁陽右北平遼西遼東廣陽樂浪𤣥莵等郡國凡十一廣循賀昭封端新康恵容邕象融梧藤龔潯貴栁賔横化髙雷欽亷瓊峯愛驩陸長演林景山潮梅南恩欎林昌化萬安朱崖福祿安南右交州領南海欎林倉梧交阯合浦九真日南等郡國凡七始皇罷侯置守郡縣天下漢興以秦地太大更加置郡國至武帝攘却胡越開地斥境改雍曰凉改梁曰益又置徐州復禹舊號置交阯初為交阯後為交州朔方初為朔方後為并州凡十三州部刺史而不常所理至哀平之際新置郡國六十三與秦四十合一百三焉晉絳慈隰河中解懐衛孟河南陜虢汝鄭商京兆鳯翔隴邠耀同華坊宿蔡潁潁昌應天拱亳開徳鄆濟滑濮博陳開封興仁廣濟單徳濵棣青齊淄濰登萊宻徐兊海沂泗淮陽成涇慶渭鎮戎原懐忠寜秦鞏熈積石河西安西寜蘭湟㑹真定中山趙深兾河間祁保莫相磁邢洺大名恩雄霸信安永寜順安保定安肅廣信滄清永静太原遼威勝平定汾忻代嵐石憲澤潞岢嵐寜化火山保徳楊髙郵楚通㤗滁真夀廬黄光郢㐮唐鄧隨均金房延安鄜丹岷麟府綏徳銀豊徳順坊保安晉寜無為甘凉𤓰肅沙蔚朔幽􅃰易檀葪媯平營雲應新豐夏宥靈鹽安東單于右魏地江陵荆門峡歸岳漢陽鼎澧辰沅靖施黔鄂興國潭衡永桂道郴桂陽韶全邵連信陽光化和蘄舒平江宣太平池廣徳潤常湖杭睦越歙明合處温婺衢饒信江洪撫吉筠袁䖍南康南安臨江建昌福建南劍泉漳汀邵武興化廣循賀昭封端新康南恩南雄英恵容邕象融梧藤龔潯貴栁宜巖賔横化髙欎林雷欽亷瓊昌化萬安朱崖峯愛驩陸福祿長湯演林景山瀼田環寵潮梅安南錦溪奨費右吴地興元鳯階興洋達開渠廣安果閬巴蓬昌普恭南平涪合忠梁山萬䕫大寜利三泉劍緜梓遂漢成都彭蜀邛雅黎嘉簡懐安眉仙井榮資瀘叙冨順永康祺亨威茂又龍珍遵義承溱長寜嶲松扶翼真姚右蜀地漢末三國並起魏氏據中原都洛有州十二司𨽻理河南豫理譙兖理武威青理臨淄徐理彭城凉理分凉置秦理上邽兾理鄗幽理葪并理晉陽楊理夀春雍理京兆有郡國六十八東自廣陵揚州張遼鎮之夀春青州毋邱儉諸葛誕皆鎮之合肥今廬江郡滿寵鎮之沔口今濮陽郡建安十五年文聘為江夏太守鎮焉重兵以備吴西自隴西渭州南安隴西縣祁山今同谷郡漢陽今天水郡陳倉今􅃫翔府重兵以備蜀蜀主全制巴蜀都成都置益理成都梁理漢中二州有郡二十二以漢中今興元府蒋琬姜維皆鎮之興勢今洋川郡王平鎮之白帝今雲安郡為重鎮吴王北據江南都鄂後遷建業盡海置交埋龍編廣理番禺今南海郡荆理南郡今江陵府郢理江夏今郡揚理建業今丹陽郡五州有郡四十三以建平今巴東東郡陵今夷陵郡陸遜陸抗並鎮之樂郡今江陵松滋縣東南郡今江陵郡巴邱今巴陸郡魯肅孫松並鎮之夏口今江夏郡孫慎鎮之武昌今江夏郡皖郡今同安郡諸葛恪屯此牛渚圻今宣城郡當塗縣濡須塢今厯陽縣西南百八十里為重鎮其後得沔口孫權嘉禾後陸遜諸葛恪屯守邾城今齊安郡東西界臨江興江夏武昌相對廣陵自三國鼎立更相侵伐互有勝負疆境之外彼此不常纔得遽失則不暇存今畧紀其久經屯守及要害之地焉其守将亦略紀其知名者餘不可徧舉晉十九道河南汝鄭虢陜華商隰慈晉絳解河中衛懐洺大名磁相開徳孟右司州領河南滎陽𢎞農上洛平陽河東汲郡河内廣平陽平魏郡頓邱等郡國凡十二開封濮􅉸廣濟興仁鄆單拱右兖州領陳留濮陽濟陽髙平任城東平濟北㤗山等郡國凡八庸建平宜陽南平武陵天門長沙衡陽湘東零陵邵陵桂陽武昌安武等郡國凡二十二江寜潤池宣滁濠夀舒廬洪和常平江秀杭睦湖越明汀婺衢歙合福建泉漳江撫筠饒信䖍温處太平廣徳無為南劍邵武建昌興化臨江南安右揚州領丹陽宣城淮南廬江毘陵吴郡吴興㑹稽東陽新安臨海建安晉安豫章臨川鄱陽廬陵南康等郡國凡十八蘭凉甘肅沙𤓰積石河西寜湟㑹伊右凉州領金城西平武威張掖西郡酒泉敦煌西海等郡國凡八京兆鳯翔同隴邠涇原耀渭寜靈環鎮戎徳順右雍州領京兆馮翊扶風安定北地始平新平郡國凡七熈岷秦鳯興階文龍成鞏右秦州領隴西南安天水畧陽武都隂平等郡國凡六富順資仙井榮嘉眉彭成都蜀卭威茂黎雅瀘昌普簡懐安叙永康長寜遵義嵩翼松溱珍西髙承亨右益州領蜀郡犍為汶山漢嘉江夏朱提越嶲牂牱等郡國凡八劍緜洋興元漢遂寜潼川忠合恭涪蓬達渠廣安閬果大寜䕫開梁山萬巴南平利三泉右梁州領漢中梓童廣漢新都涪陵巴郡巴西漢昌巴東等郡國凡九姚右寜州興古建寜永昌凡三郡幽􅃰易檀葪媯平蔚安肅廣信右幽州領范陽燕國北平上谷廣宻代郡遼西郡凡七安東上都䕶府右平州領昌黎遼東樂浪𤣥莵帶方等郡國凡五雷欽㢘瓊峯愛驩陸福祿長湯演林景山容安南右交州領合浦交趾新昌武平九真九徳日南等郡國凡八韶連梅潮廣循封端新康南恩南雄英惠桂融邕象賀昭梧藤龔潯貴栁巖賔横化髙欎林右廣州領南海臨賀始安始興蒼梧欎林桂林髙凉髙興寜浦凡十郡晉武帝太康元年平吴分為十九州部置司州理洛陽兖理廪邱今濮陽郡雷澤縣荆河理項今淮陽郡項城兾理房子今趙郡縣井理晉陽青理臨淄徐理彭城荆初理㐮陽後理江陵揚初理夀春後理建業凉理武威分三輔為雍理京兆分隴山之西為秦理上邽益理成都分巴漢之地為梁理南鄭分雲南為寜理雲南幽理􅃰分遼東為平理昌黎今安東府交理昌編今安南府分合浦之北為廣理番禺又増置郡國二十有一凡州百五十有六縣千百有九以為冠帶之國盡秦漢之土及永嘉南渡境宇殊狭九州之地有其一焉初元帝命祖逖鎮雍邱今陳留郡逖死北境日促於是荆豫青兖四州及徐州之半䧟劉曜石勒以合肥戴若思鎮之淮隂今山陽郡劉遐鎮之夀陽今夀春郡祖約鎮之泗口今泗州劉隗鎮之角城今泗州為重鎮成帝時都守将退屯㐮陽今穀城縣穆帝時平蜀國復梁益之地又遣軍西入闗至灞上再北伐一至洛陽一至枋頭所得郡縣軍旅又失洎苻堅東平慕容暐西南陷蜀漢西北冦姑臧則漢水長淮以北悉為堅有及堅敗再復梁益青徐兖荆河司之地其後青兖陥於慕容徳荆河司陥於姚興以彭城為北境藩扞朱序鎮之後益梁又陥於譙縱每因劉石苻姚攘亂之際則進兵屯戍在於漢中㐮陽彭城然大抵上明今江陵松滋縣江陵夏口武昌合肥夀陽淮隂甞為晉氏鎮守義熈以後又復青兖司荆河梁益之地而政移於宋矣輿地廣記卷二
