body:
  text: 輿地廣記卷三宋歐陽忞撰唐十五道採訪使闗内道京兆華同商鳯翔邠右京畿採訪使治京城内隴涇原渭武威今定安雄今廢寜慶鄜丹延亦今延安靈㑹鹽夏綏今綏徳宥麟勝豐單于大都䕶安北大都䕶鎮北大都䕶右闗内採訪使以京官領河内道河南汝右都䕶採訪使治東都城内陜虢滑鄭潁許今潁昌陳蔡汴今開封宋今應天亳徐泗濠宿鄆齊曹今興仁濮青淄登萊棣兖海沂宻右河南採訪使治汴州河東道河中晉絳慈隰太原汾沁今威勝遼嵐憲忻代雲朔蔚武今毅州新潞澤右河東採訪使治河中河北道孟懐魏今大名博相衛貝今恩州澶今開徳刑洺恵今磁州鎮今真定兾深趙滄景今永静徳定今中山易􅃰幽瀛今河間莫平媯檀葪營安東上都䕶右河北採訪使治魏州山南道江陵峡歸䕫澧朗今鼎州忠涪萬㐮泌今唐州隋鄧均房復郢金右東道採訪使治㐮州興元洋利鳯興成文扶集今廢壁今廢巴蓬通今達州開閬果渠右西道採訪使治梁州隴右道秦河渭今鞏州鄯今湟州蘭臨今臨州階洮岷廓疊石凉沙𤓰甘肅伊西西大都䕶北庭大都䕶右隴右採訪使治鄯州淮南道揚楚滁郵夀廬舒光蘄安黄信今信州右淮南採訪使治揚州江南道潤昇今江寜常蘓今平江湖杭睦越明衢處婺温台福建泉汀漳右東道採訪使治蘇州宣歙池洪江鄂岳饒䖍吉袁信撫漳衡永道郴邵右西道採訪使治洪州黔辰錦施叙今沅州奬夷今永州播思費南今南平溪溱右黔中採訪使治黔中劍南道成都彭闕溪嘉眉卭簡資嶲闕黎茂翼維今威州戎今叙州姚松當悉静柘恭保今棋州真霸乾梓遂緜劍合龍普渝今恭州陵今仙井榮昌瀘保寜都䕶今廢右劍南採訪使治益州嶺南道廣韶循潮康瀧今廢端新封潘今廢春今廢勤今廢辯今廢髙恩今南恩雷崖今廢瓊振儋今昌化萬安邕澄今廢賔横潯巒今廢貴龔象藤巖宜瀼籠田環桂梧賀連栁富今廢昭蒙今廢嚴今廢融思唐今廢古容牢今廢白今廢順今廢繡今廢欎林黨今廢竇今廢禺今廢亷義今廢安南中都䕶陸峯愛驩長福祿芝今廢武峩今廢演武安今廢湯右嶺南採訪使治廣州按唐志云自秦變古始郡縣天下下更漢晉分裂為南北至隋滅陳天下始合為一乃改周為郡依漢制置太守以司𨽻刺史相統治唐興髙祖改郡為州太守為刺史又置都督府以治之然天下初定權置州郡頗多太宗元年始命併省又因山川形便分天下為十道一曰闗内二曰河南三曰河東四曰河北五曰山南六曰隴右七曰淮南八曰江南九曰劍南十曰嶺南至十三年定簿凡州府三百五十八縣一千五百五十一明年平髙昌又増州二縣六其後北殄突厥頡利西平髙昌北踰隂山西抵大漢其地東極海西至焉耆南盡林州南境北接臨延陀界開元二十一年又因十道分山南江南為東西道増置黔中道及京畿都畿置十五採訪使檢察如漢制刺史之職天寳盗起中國用兵而河西隴右不守䧟於吐蕃至大中咸通始復隴右乾符以後天下大亂至於唐亡然唐之盛時開元天寳之際東至安東西至安西南至日南北至單于府盖南北如漢之盛東不及而西過之唐藩鎮貝博魏相磁洺衛右魏博傳五世至田𢎞正入朝十年復亂更四姓傳十世有州七恒兾深趙右成徳更二姓傳五世至王承元入朝眀年王庭凑反傳六世有州四幽􅃰營瀛莫平葪媯檀右盧龍更二姓傳五世至劉總入朝六月朱克融反傳十二世有州九淄青齊海登莱沂宻曹濮兖鄆右淄青傳三世而滅有州十二滄景徳棣右滄景傳三世至程灌入朝十六年而李全畧有之至其子同㨗而滅有州四汴潁宋亳右宣武傳四世而滅有州四申光蔡右彰義傳三世而滅有州三邢汾晉澤潞右澤潞傳三世而滅有州五按唐賛云安史亂天下至肅宗大難畧平君臣皆幸安故𤓰分河北地付授叛将䕶養孽萌以成禍根亂人乗之遂擅署吏以賦稅自私不朝獻於庭效戰國肱髀相依以土地傳子孫脅百姓加鋸其頸利怵逆汙遂使其人自視猶羌狄然一冦死一賊生訖唐亡百餘年卒不為王土五代梁有州七十八汴洛都雍兖沂宻青淄齊棣登莱徐宿鄆曹濮宋亳單潁陳蔡許汝鄭滑㐮均房鄧隨郢唐復安申蒲孟懐晉絳浹虢華商同耀邠寜慶衍鄜坊丹延夏銀綏宥靈鹽魏博貝衛澶相邢洺磁鎮兾深趙易祁定唐有州一百二十三汴洛都雍兖沂宻青淄齊棣登萊徐宿鄆曹濮宋亳單潁陳蔡許汝鄭滑㐮均房鄧隨郢唐復安申蒲孟懐晉絳陜虢華商同耀寜慶衍鄜坊丹延夏銀綏宥靈鹽岐隴涇原渭武秦成階鳯乾魏博貝衛澶相邢洺磁鎮冀深趙易祁定滄景徳瀛莫幽􅃰檀葪順營平蔚朔雲應新媯儒武忻代嵐石憲麟府并汾慈隰澤潞沁遼晉有州一百九汴洛都雍兖沂宻青淄齊棣登萊徐宿鄆曹濮宋亳單潁陳蔡許汝鄭滑㐮均房金鄧隨郢唐復安申蒲孟懐晉絳陕虢華商同耀邠寧慶衍威鄜坊丹延夏銀綏宥靈鹽岐隴涇原渭武秦成階鳯乾魏博貝衛澶相邢洺磁鎮兾深趙易祁定滄景徳忻代嵐石憲麟府并汾慈隰澤潞沁遼漢有州一百六汴洛都雍兖沂宻青淄齊棣登萊徐宿鄆曹濮宋亳單潁陳蔡許汝鄭滑㐮均房金鄧隨郢唐復安申蒲孟懐晉絳陜虢華商同耀解邠寜慶衍威鄜坊丹延夏銀綏宥靈鹽岐隴涇原渭武乾魏博貝衛澶相邢洺磁鎮冀深趙易祁定滄景徳忻代嵐石憲麟府并汾慈隰澤潞沁遼周有州一百一十八汴洛都雍兖沂宻青淄齊棣登萊徐宿鄆曹濮濟宋亳單潁陳蔡許汝鄭滑㐮均房金鄧隨郢唐復安申蒲孟懐晉絳陜虢華商同耀解邠寜慶威鄜坊丹延夏銀綏宥靈鹽岐隴涇原渭秦成階鳯乾魏博貝衛澶相邢洺磁鎮冀深趙易祁定滄徳濱瀛莫雄霸府慈隰澤潞楊楚泗滁和光黄舒蘄廬夀海㤗濠通右按五代史職方考云唐自僖昭以來日益割裂梁初天下别為十一南有吴浙荆湖閩漢西有岐蜀北有燕晉劉仁恭稱燕李克用稱晉李茂貞稱岐錢鏐稱吴越楊行宻稱吴王審知稱閩馬殷稱楚王建稱蜀髙季興稱南平劉隐稱南漢而朱氏所有七十八州以為梁朱温荘宗初起并代取幽滄有州三十五其後又取梁魏博等十六州魏博貝衛澶相邢洺磁鎮兾深趙易祁定合五十一州以滅梁岐王稱臣又得其州七岐隴涇原渭武乾同光破蜀已而復失惟得秦鳯階成四州而營平四州陷於契丹其増置之州一寰合一百二十三州以為唐荘宗李􅂶用之子石氏入立獻十有六州於契丹瀛莫幽􅃰檀薊順蔚湖雲應新媯儒武寰而得蜀金州又増置之州一威合一百九州以為晉石敬塘劉氏之初秦鳯階成復入於蜀隠帝時増置之州一解合一百六州以為漢劉暠郭氏代漢十州入於劉旻沂代嵐石憲麟并汾沁遼世宗取秦鳯階成瀛莫及淮南十四州揚楚泗滁和光黄舒蘄廬夀海㤗濠又増置之州五濟溪雄霸通而廢者三衍武景合一百一十八州以為周郭威宋興因之此中國之大畧也其餘外屬者强弱相并不常其得失至於周末閩已先亡閩有州五建汀漳泉入於石晉福入於吴越而在者七國自江以南二十一州潤常宣歙鄂昇池饒信江洪撫袁吉䖍筠建汀劍漳泉為南唐晉天福二年吴楊􅄎遜位於徐知誥知誥改姓李名昇號南唐自劍以南及山南西道四十六州益漢彭蜀緜眉嘉劍梓遂果閬普陵資滎簡卭􅀺雅維茂文龍黔施䕫忠萬興利開通涪渝瀘合昌巴蓬集壁渠戍梁洋為蜀前蜀王建梁時稱帝於成都建死子衍立唐莊宗同光三年衍降孟知祥鎮成都明宗時封蜀王為後蜀自湖南北十州為楚潭衡豊朗岳道永卲全辰自浙東西十三州為吳越福杭越蘇湖温台明處衢婺睦秀自嶺南北四十七州為南漢融郴連昭宜桂賀梧䝉嚴富栁象容邕端康封恩春新髙竇雷化韶藤白廣欽亷横賔潯忠欎林英雄瓊崖儋萬安羅潘勤瀧辨自太原以北十州為東漢劉旻而荆歸峡三州為南平合中國所有二百六十八州而軍不在焉輿地廣記卷三
