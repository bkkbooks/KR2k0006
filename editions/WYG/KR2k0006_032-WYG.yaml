body:
  text: 輿地廣記卷三十二宋歐陽忞撰利州路次府興元府春秋屬蜀戰國屬楚秦惠王立漢中郡二漢因之髙帝始封漢王都此建安中為張魯所據改曰漢寧曹公克魯復曰漢中蜀劉備破魏將夏侯妙才遂有其地以為重鎮漢中常以巴蜀扞蔽故劉備初得漢中曰曹公雖来無能為也大抵巴蜀有難漢中輙没自公孫述劉備李雄譙縱據蜀漢闕所䧟魏末平蜀兼立梁州晉宋齊梁皆因之西魏亦立梁州并立漢中郡後周末改郡曰漢川隋開皇初郡廢大業初州廢復置漢川郡唐武徳元年曰梁州開元十三年改曰褒州二十年復故名天寳元年曰漢中郡後升山南西道興元元年始因徳宗巡幸升為興元府皇朝因之今縣四次赤南鄭縣故鄭之附庸周時鄭桓公死於犬戎鄭人南奔居此因曰南鄭顯王之世蜀有其地至六國楚闕弱秦畧取焉自秦以来皆為漢中郡治闕王蕭何曰天漢美名也遂都南鄭大城周曰闕城南憑北結環雉金墉漆井皆漢所修築地沃闕既克張魯方之雞肋謂食之無所得而棄之為可惜也蜀先主以魏延後主以蔣琬姜維相繼守之魏末平蜀兼立梁州晉以後皆因之齊建武二年蕭懿為刺史魏將元英率兵十萬通斜谷圍南鄭懿拒守百餘日不㧞而退梁天監二年刺史夏侯道遷以地入魏大同元年魏刺史元羅復以地入梁承聖二年尉遲向平蜀乃入西魏焉後周末改郡曰漢川隋唐因之後為興元府朱梁時王建得其地後唐克之又為孟知祥所有周顯徳中節度使張䖍釗以地歸附有玉女山黄牛山中梁山仙䑓山漢水有胡城漢張騫使匈奴與胡妻及堂邑父俱還漢中築城以居之晉義熈十五年城上有宻雲五色昭章及曉城崩半許淪漢出銅鍾十二枚以為宋室之瑞次畿城固縣二漢屬漢中郡蜀改為樂城晉復故及宋齊梁西魏後周皆屬漢中隋屬漢川郡唐屬梁州武徳二年改曰唐固貞觀二年復故有通闗山古曰通闗勢山髙百餘丈闕城方五里濬塹三重漢王北定三秦蕭何守漢中欲修此道以通闗中故名曰通闗勢有黒水出縣北大山南流入漢諸葛亮牋云朝𤼵南鄭暮宿黒水謂此有韓信䑓即漢髙祖築壇設九賔之禮以拜信為大將次畿褒城縣故褒國周幽王后褒姒生於此漢置漢中郡并褒中縣及東漢晉皆屬漢中郡隋開皇初闕元年闕未印更給改曰褒城義寧二年改曰褒中唐貞觀三年復曰褒城屬梁州漢陽平闗在西北有石闕山通道六丈有餘昔秦欲伐蜀闕以金置尾下言能糞金欲以闕蜀王負力闕道引之秦因使張儀司馬錯以兵闕漢永平中司𨽻校尉犍為楊闕以石門是也有女郎山上有女郎廟俗言張魯所𦵏有褒水西北出衙嶺山東南逕大石門厯故闕諸葛亮死于五丈原魏延先退而焚之即此褒水又闕交城又東南得丙水口又東南厯小石門又東南厯褒闕南口又東南厯褒城縣東又南入於漢水次畿西縣本沔陽縣地二漢晉宋皆屬漢中郡後省元魏置嶓冢縣後周因之隋大業初改為西縣屬漢川郡唐武徳三年置褒州八年州廢來屬有沔陽故城在西漢蕭何所築劉備北定漢中即漢王位於此有西樂故城在西南甚險固即諸葛亮所築晉梁州刺史楊亮守之為苻堅所破後刺史姜維潘孟亦相仍居此城側有客裘溪闕北濟入漢今謂之洛水有定軍山在東南曹公克漢水命夏侯淵守之劉備自陽平闗南渡沔水破斬淵于此諸葛亮將死遺令葬此山下闕隴婎深松茂柏攅蔚川阜莫知墓所在山東地名髙闕廟蜀歩兵校尉習隆等所表立也有張魯城官西魯沛國闕陵孫也行五斗米道劉焉以為督義司馬住漢中因闕焉有濫水北𤼵武都氐中南逕城闕逕張魯治城南流入沔謂之濜口張魯治謂仙官所治也有闕山舊有張闕師堂今曰濜口化有百牢闗闕南闕都督府利州春秋戰國為蜀地秦屬蜀郡闕主分属闕郡晉孝武分立晉夀郡宋齊因之世號小諡闕梁曰黎州西魏復曰益州又改曰闕郡隋大業初州廢為義城郡唐武徳元年闕益闕郡王屬知昭武軍節度後唐闕曰益州皇朝景祐四年改寧武軍今縣四中綿谷縣故葭萌縣本蜀王弟葭闕封為苴侯邑史記郡謂苴屬相攻是也二漢屬廣漢郡劉備又曰漢夀屬梓潼郡晉太康元年改曰晉夀太元十五年立晉夀郡宋分置興安郡後復併焉而改晉夀曰興安後魏兼立益州西魏曰闕開皇十八年改興安曰綿谷唐因之有龍門山嘉陵水闕綿谷中葭萌縣漢舊縣地東晉安帝置晉安縣属新邑都宋齊因之元魏為郡治焉隋開皇初郡廢十八年改晉安為葭萌縣屬利州唐因之有嘉陵江中下嘉川縣漢葭萌縣地宋置興樂闕嘉川隋開皇初郡廢屬利州唐武徳闕年州廢来屬故平蜀縣本義城西魏置隋屬利州義寧二年改曰義清唐武徳七年置南平州貞觀二年州廢来屬天寳元年改曰𦙍山皇朝乾徳三年改曰平蜀熈寧三年省入嘉州有石鷰山中昭化縣漢葭萌縣地宋置益昌縣屬白水郡隋唐屬利州皇朝開寳五年改為昭化白水鎮闕郡晉屬梓潼郡孝武分屬晉夀闕又曰平興置白水郡後改縣為闕初郡廢復改縣為平興屬利闕置闕貞觀元年州廢来屬寳闕輿地廣記卷三十二
