body:
  text: 輿地廣記卷九宋歐陽忞撰京西北路南輔潁昌府春秋許國戰國屬韓秦置潁川郡漢髙帝為韓國尋復故後漢因之獻帝暫都之魏晉並為潁川郡後魏亦同西魏初得之後入東魏改曰鄭州後周曰許州隋開皇初郡廢大業初州廢復置潁州郡唐武徳四年曰許州天寳元年曰潁川郡後升忠武軍節度梁改為匡國軍唐滅梁復曰忠武皇朝元豐三年升潁昌府崇寧四年建為南輔今縣七次赤長社縣本都長葛邑其社中木暴長因名長社二漢及晉屬潁川郡後魏為郡治焉酈道元為郡守于南城西側修立客館土下得一木根其壯大疑是故社怪長暴茂者也隋開皇初改為潁川縣唐武徳四年復為長社屬許州許田鎮本許國二漢為縣屬潁川郡獻帝都之魏文帝改曰許昌故城在今鎮南三十里晉為郡治焉隋屬潁川郡唐屬許州後唐避諱改曰許田皇朝熙寧四年省入長社次畿郾城縣戰國時為魏邑史記楚昭陽伐魏収郾是也二漢及晉屬潁川郡其後廢焉隋開皇初置郾城縣屬潁川唐始屬蔡州長慶元年屬許州有漢召陵縣故城在東春秋齊桓公伐楚次于召陵是也後漢征羌縣故城在東南次畿陽翟縣本夏禹之别都後為鄭櫟邑戰國韓景侯自新鄭徙都此秦置潁川郡二漢因之晉屬河南郡東魏置陽翟郡隋開皇初郡廢屬襄城郡唐始屬河南府㑹昌三年屬許州有鈞臺在南左傳所謂夏后有鈞臺之饗即此次畿長葛縣本漢許縣地隋開皇六年分許昌置取長葛舊名屬潁川郡唐屬許州次畿臨潁縣漢舊縣屬潁川郡東漢至隋皆因之唐屬許州繁城鎮本漢潁陰縣之繁陽亭魏文帝受禪于此置繁昌縣帝既受禪自壇而降曰舜禹之事吾知之矣壇前有二碑後其碑六字生金論者以為司馬金行故曹氏六世遷魏西事晉晉屬襄城郡隋屬潁川郡貞觀元年省入臨潁後唐避諱改為繁城次畿舞陽縣漢樊噲所封二漢屬潁川郡晉屬襄城郡後改為北舞置定陵郡隋開皇初郡廢屬潁川唐貞觀元年屬許州尋廢開元四年復置更名舞陽有漢定陵縣故城中郟縣春秋時為楚邊邑令尹子瑕城郟是也漢屬潁川郡後漢省之魏復置青龍元年有龍見于郟之摩陂明帝幸陂觀龍于是改摩陂曰龍陂城曰龍城晉屬襄城郡其後廢之置龍山縣隋開皇初改曰汝南十八年改曰輔城大業初改曰郟城屬襄城郡唐屬汝州皇朝崇寧四年來屬西輔鄭州髙辛氏火正祝融之墟周武王封管叔鮮及為虢鄶之國鄭武公與平王東遷武公滅二國而徙都焉後鄭為韓所滅韓又徙都之秦屬三川郡二漢及魏屬河南郡晉置滎陽郡後魏為東恒農郡東魏置廣武郡東周置鄭州隋開皇十六年曰管州煬帝初復為鄭州尋廢置滎陽郡唐貞觀元年州廢自武牢移鄭州治此天寳元年曰滎陽郡皇朝景祐元年號奉寧軍節度崇寧四年建為西輔今縣六望管城縣故管國周武王弟叔鮮所封春秋晉師救鄭楚子次于管以待之即此漢晉為京縣地隋開皇十六年析内牟以置管城屬滎陽郡十八年改内牟曰圃田省入管城唐貞觀七年自武牢移鄭州治此東有圃田為豫州藪有邲城為縣南左傳晉楚戰處緊滎陽縣故虢國所謂東虢也二漢屬河南郡晉泰始二年置滎陽郡後魏因之北齊改曰成臯郡隋開皇初郡廢屬鄭州唐因之有鴻溝在西楚漢中分天下處漢京縣故城在東古鄉邑也莊公弟叔段居之謂之京城太叔二漢屬河南郡晉及後魏屬滎陽郡北齊省入焉又有索水楚漢戰京索間即此上新鄭縣古有熊國黄帝所都也亦為髙辛氏火正祝融之墟其後世為鄶國亦作檜詩之國風所謂檜羔裘者也鄭桓公始封在今華州之鄭其子武公與平王東遷乃取鄶而徙居焉是為新鄭戰國時鄭滅于韓韓哀侯自平陽徙都之二漢屬河南郡晉以後不置隋開皇十六年復之屬滎陽郡大業初省菀陵縣入焉唐屬鄭州有溱洧二水中原武縣二漢屬河南郡晉以後不置隋開皇十六年復之屬滎陽郡唐鄭州漢卷縣故城在東中滎澤縣禹貢所謂濟水溢為滎者也杜佑云今濟水不復入滎漢晉後魏為滎陽縣地隋開皇四年置廣武縣仁夀元年更名滎澤屬滎陽郡唐屬鄭州有廣武山上有東西二城中有絶澗漢髙帝項羽相與臨廣武之間而語即此有敖山商王仲丁自亳遷此周宣王嘗狩其地故詩言搏獸于敖秦于此置倉所謂敖倉也故王宫城在今縣西北左傳作王宫于踐土即此今故城内東北隅有踐土臺是也畿宻縣本鄭邑春秋諸侯伐鄭圍新宻二漢屬河南郡晉屬滎陽郡唐屬河南府皇朝因之崇寧四年來屬輔滑州古豕韋氏之國春秋時屬衛戰國時亦屬衛其西境屬魏秦屬東郡二漢因之晉為陳留濮陽二國宋武帝平河南置兖州以為邊鎮後魏置東郡隋置杞州後為滑州又改為兖州後復為東郡唐復為滑州天寳元年更名靈昌郡大厯七年升義成軍節度後避梁王父諱改曰宣義軍後唐復故而改靈昌曰靈河皇朝太平興國四年改武成軍今縣三中白馬縣本衛國曹邑左傳閔二年狄滅衛立戴公以廬于曹即此二漢為白馬縣屬東郡袁紹遣顔良攻東郡太守劉延於白馬闗侯為曹操斬良以報焉晉屬濮陽國宋置兖州後魏置東郡隋開皇初郡廢置杞州十六年改為滑州大業二年改為兖州後復為東郡唐又為滑州有黎陽津一曰白馬津酈生云守白馬之津是也有靈河津晉時石勒襲劉耀途出于此以河水泮為神靈之助故號為靈昌津後唐改為靈河津靈河鎮漢南燕縣地隋開皇十六年置靈昌縣以津為名屬東郡唐屬滑州後唐改為靈河縣皇朝治平三年省入白馬有滑臺本鄭之廩延邑其城甚固望韋城縣故豕韋氏國商時為伯焉韋賢詩曰肅肅我祖國自豕韋是也二漢為白馬縣地屬東郡晉屬濮陽國隋開皇六年置韋城縣屬東郡唐屬滑州緊胙城縣故南燕國二漢為南燕縣屬東郡晉省之其後復置曰東燕隋開皇十八年改曰胙城屬東郡唐屬滑州胙城周公諸子所封左傳富辰曰凡蔣邢茅胙祭周公之嗣也杜預注東郡燕縣之南有胙亭而晉史地理志中無此郡縣豈永嘉䘮亂簡編失亡故耶望孟州春秋戰國皆屬周自漢晉至隋皆屬河内郡唐顯慶二年割屬河南府建中二年乃以河南之河陽河清濟源温四縣租税入河陽三城使又以汜水軍賦益之㑹昌三年遂以此五縣為孟州今縣六望河陽縣古孟津也周武王伐紂師度孟津即此亦曰富平津魏尚書杜畿試船沉溺之所浮橋即晉杜預所立自漢至隋屬河内郡唐屬河南府置河陽三城使後置孟州今縣西南十三里有􅃒馬堤舊為河陰縣地後魏爾朱榮害朝士千三百餘人於此望温縣本周畿内國司冦蘇忿生所封也春秋僖十年狄滅温蘇子奔衛于是襄王以賜晉文公二漢屬河内郡晉因之其後廢焉隋開皇十六年復置屬河内郡唐武徳四年屬懐州顯慶二年屬洛州後屬孟州望濟源縣周大夫蘇忿生之原邑周襄王以賜晉文公文公伐原以示信二漢為軹縣地晉為沁水縣地俗以濟水重源所𤼵因謂之濟源城隋開皇十六年置濟源縣屬河内郡唐武徳四年屬懐州顯慶二年屬洛州徐屬孟州漢軹縣屬河内郡後漢及晉皆因之隋大業初省入河内後復置唐貞觀元年省入濟源故城在縣東南有溴水春秋襄十六年公㑹諸侯于溴梁即此上汜水縣本東虢國鄭滅之為制邑所謂制巖邑即此有故虎牢城周穆王獵于鄭圃獲虎命畜之因名曰虎牢二漢為城臯縣屬河南郡晉因之宋時毛徳祖戍虎牢後漢晝夜攻圍二百日乃克後魏置東中府東魏置北豫州後周置榮州隋開皇初曰鄭州十八年改成臯縣曰汜水大業初置虎牢都尉府屬滎陽郡唐屬鄭州顯慶二年屬洛州垂拱四年曰廣武神龍元年復故後屬孟州有汜水闗皇朝大中祥符中改為行慶闗東南有成臯故闗西南有旋闗故闗中河陰縣漢成臯滎陽懐縣地唐開元二十九年割汜水滎澤武陟三縣置以便運漕屬河南府領河陰倉汴渠在縣南二百五十步即古莨蕩渠今名通濟渠首受黄河後屬孟州有三皇山亦曰㟼鄗山山上有三城即劉項相持處中王屋縣古召公之邑漢垣縣獲澤地屬河東郡晉屬河東平陽郡後魏置長平縣後周改曰王屋又置懐州及平齊州廢置王屋郡隋開皇初郡廢屬河内郡唐武徳元年更名邵伯屬邵州貞觀元年屬懐州顯慶二年復故名屬洛州皇朝慶厯三年來屬有禹貢王屋沇水所出緊蔡州春秋時屬沈蔡戰國屬楚魏秦屬穎川郡漢置汝南郡後漢及魏晉皆因之宋及後魏兼置豫州以為重鎮東魏置行臺後周置總管府後改曰舒州尋復曰豫州後改曰蔡州隋開皇初郡廢大業初州廢復置汝南郡唐武徳三年曰豫州天寳元年曰汝南郡寳應元年改曰蔡州皇朝景祐二年升淮康軍節度今縣十上汝陽縣漢平輿宜春安城縣地屬汝南郡後漢及晉皆因之後魏曰上蔡置汝南郡城之西北汝水枝别左出而北流又屈而東轉又西南㑹汝若垂瓠故謂之懸瓠城宋元嘉二十七年後魏太武攻懸瓠汝南太守陳憲拒守四十餘日不拔隋開皇初郡廢大業初復置縣曰汝陽唐為蔡州漢有汝陽縣在西華南頓之間非今縣也漢宜春縣屬汝南郡後漢曰北宜春晉因之後廢焉故城在今縣西南漢平輿縣故沈國漢髙帝四年置汝南郡後漢因之晉屬汝南郡後徙焉故城在今縣東漢安城縣屬汝南郡後漢及晉皆因之後廢焉故城縣今縣東南上上蔡縣故蔡國蔡叔始封地秦為上蔡縣李斯其邑人也漢屬汝南郡後漢及晉因之後魏改為臨汝北齊廢之隋開皇中置曰武津大業初復改為上蔡屬汝南郡唐屬蔡州中新蔡縣古吕國春秋時蔡平侯自上蔡遷此故曰新蔡二漢屬汝南郡魏晉屬汝陰郡南齊置北新蔡郡後魏曰新蔡郡北齊曰廣寧郡隋開皇初郡廢十六年置廣寧縣仁夀元年改曰汝北大業初改曰新蔡屬汝南郡唐屬蔡州漢鮦陽縣屬汝南郡後漢因之晉屬汝陰郡北齊廢之隋開皇十一年復置屬淮陽郡後廢焉故城在今縣北有葛陂中褒信縣後漢縣屬汝南郡魏晉屬汝陰郡宋改曰包信隋大業初復故名屬汝南郡唐屬蔡州西南有白亭楚王孫勝為白公即此處中平輿縣漢舊縣後廢隋大業初改新蔡為平輿屬汝南郡唐屬蔡州有葛陂水經云億水左迤為葛陂方數十里水物含靈多所包育後漢費長房投竹化成龍處中遂平縣故房子國國語所謂周昭王娶于房曰房后是也楚靈王遷房于楚而有其地後以封吳王之弟夫槩為堂谿氏故曰吳房漢屬汝南郡後漢及晉皆因之後曰遂寧隋大業初改曰吳房屬汝南郡唐屬蔡州元和十二年平吳元濟更名遂平中新息縣故息國二漢屬汝南郡晉為郡治焉後魏置東豫州梁曰西豫州又改曰淮州東魏復曰東豫州後周曰息州隋大業初州廢屬汝南郡唐屬蔡州漢安陽縣故江國也漢及晉皆屬汝南郡後廢焉故城在今縣西中確山縣本漢安昌縣屬汝南郡後漢省之其後復置郡隋開皇十八年改為朗山屬汝南郡唐屬蔡州皇朝大中祥符五年改為確山漢朗陵縣屬汝南郡後漢及晉皆因之後廢焉故城今在縣西南有道城故道國左傳曰江黄道栢皆弦姻也在漢為陽安縣後漢及晉皆因之後廢焉中真陽縣本漢慎陽縣屬汝南郡慎字本作滇音真永平五年失印更刻遂誤以水為心也後漢及晉皆因之後魏置郢州東魏廢州置義陽郡北齊廢郡入保城縣隋開皇十一年廢保城十六年置真丘縣大業初改曰真陽屬汝南郡唐屬蔡州漢新陽縣屬汝南郡後漢因之晉省焉故城在今縣西南中西平縣故栢子國漢舊縣屬汝南郡後漢及晉皆因之後魏置襄城郡北齊改曰文城郡隋開皇初郡廢屬汝南郡唐屬蔡州上陳州包犧氏都曰太昊之墟周封舜後媯滿于此以備三恪為陳國楚滅為縣楚頃襄王自郢徙都此兼為魏境秦屬潁川郡二漢屬淮陽國汝南郡後漢因之晉屬梁國汝南郡後魏置陳郡及北揚州北齊改為信州隋為陳州後置淮陽郡唐為陳州晉開運二年置鎮安軍節度漢初軍廢周廣順二年復之今縣五緊宛丘縣周時陳都楚頃襄王滅之自郢徙都焉陳勝反秦據陳自立為張楚漢髙帝置淮陽國章和二年改為陳國晉併入梁國後魏曰項置陳郡隋開皇初改縣曰宛丘而郡廢焉大業初為淮陽郡唐為陳州爾雅曰丘上有丘曰宛丘今其地形則然有固陵城項羽南走固陵即此上項城縣本項國戰國屬楚項羽家世楚將封于項故姓項氏二漢屬汝南郡皆屬梁國後魏置揚州及秣陵縣梁改曰殷州東魏改曰北平州後齊改曰信州後周改曰陳州隋開皇初改秣陵為項城縣大業初州廢屬淮陽郡屬陳州中商水縣本漢汝陽縣地屬汝南郡後漢及晉皆因之後魏置汝陽郡北齊郡廢隋開皇十六年置溵水縣大業初省汝陽入焉屬淮陽郡唐屬陳州皇朝建隆元年改為商水漢地理志汝南有㶏疆縣水經注云㶏水出潁川陽城縣少室山東經㶏疆縣故城東又南逕西華縣故城南又東逕汝陽故城北東注于潁中南頓縣故頓子國應劭曰頓迫于陳其後南徙故曰南頓二漢及晉汝南郡後魏置南頓郡北齊郡廢隋開皇六年改縣曰和成大業初復改曰南頓屬淮陽郡唐屬陳州皇朝熙寧六年省入商水元祐元年置中西華縣二漢屬汝南郡晉省之後置長平縣隋開皇十八年改曰鴻溝大業初復改曰西華屬淮陽郡唐武徳元年更名箕城屬陳州景雲元年復故名長華鎮漢為長平縣屬汝南郡後漢屬陳國北齊省入國晉屬梁西華上潁州春秋時為胡國及楚地秦為潁川郡地二漢屬汝南郡魏置汝陰郡晉因之後魏置潁川郡隋亦為潁川復為汝陰郡唐為潁州皇朝元豐二年升順昌軍節度今縣四望汝陰縣西北有胡城故胡國二漢為汝陰縣屬汝南郡魏置汝陰郡後廢晉泰始二年復置隋開皇初郡廢大業初復置唐為潁州二漢細陽郡屬汝南郡晉省之故城在今縣西北緊萬夀縣葢二漢細陽縣地皇朝開寳六年析汝陰之百尺鎮置萬夀縣屬潁州水經注云百尺水承次塘細陂南疏注于潁鎮實因水為名緊潁上縣本楚慎縣地二漢屬汝南郡晉屬汝陰郡後廢焉梁置下蔡郡北齊郡廢隋大業初置潁上縣于故鄭城屬汝陰郡唐武徳四年移于今治屬潁州慎縣故城在今縣西北緊沈丘縣本漢項縣地屬汝南郡後置沈丘縣隋開皇十六年置沈州領沈丘宛丘二縣唐初州廢以宛丘屬陳州沈丘屬潁州後省沈丘入汝陰神龍二年復置有武丘聚曰丘頭魏王陵鎮夀春欲興兵討司馬宣王宣王自往征之軍至丘頭陵懼靣縛水次故號為武丘即此輔汝州東周為王畿春秋為戎蠻子邑及屬楚鄭戰國屬韓秦屬三川郡二漢屬河南潁川郡魏晉屬河南襄城郡後魏屬汝北魯陽郡東魏置北荆州後周改曰和州隋初置伊州煬帝初改為汝州後廢州以其地屬襄城潁川二郡唐為汝州天寳元年曰臨汝郡今縣五中梁縣本漢周承休邑武帝元鼎四年行幸至洛陽詔封姬嘉為周子南君以奉周祀初元五年以周子南君為周承休侯邑屬潁川郡後魏曰汝源縣置汝北郡後改曰汝陰郡後周郡廢隋大業初改汝源為承休置襄城郡唐為汝州貞觀元年改承休為梁縣梁本周南鄭之邑在承休西南四十二里有霍陽聚左傳哀四年楚人為晉之期襲梁及霍是也戰國曰南梁以别大梁少梁焉漢屬河南郡後漢及晉皆因之隋屬襄城郡唐屬承州貞觀元年省梁入承休而更名承休曰梁西有澤後漢作菀為逰獵之地鄧太后臨朝世士以為文教可興宜廢蒐狩之禮于是馬融作頌以諷焉後桓帝復校獵廣成今曰廣潤河葢避朱梁廟諱也有􅓆狐聚秦滅西周徙其君于此有陽人聚秦滅東周徙其君於此臨汝鎮唐先天元年置縣屬汝州貞元八年以梁縣西界二鄉益之兼移縣于石驛後入梁緊襄城縣本鄭地南有汜城周襄王避叔帶之難出適鄭處于汜是也以襄王所居因曰襄城楚靈王築又有古不羮城在西北二漢屬潁川郡晉置襄城郡隋開皇初初郡廢屬汝州大業初州廢屬潁川郡唐武徳元年置汝州貞觀元年州廢屬許州開元二十六年來屬上葉縣本楚地惠王以封沈諸梁謂之葉公葉公好龍神龍下焉二漢屬南陽郡明帝時王喬為葉令每月望常乘雙鳬入朝今有墓在焉晉屬南陽國北齊置襄州後周廢州置南襄城郡隋開皇初郡廢屬許州唐開元三年置仙州二十六年州廢大厯四年復置仙州又析置仙鳬縣五年州廢省仙鳬入葉來屬二漢父城縣屬潁川郡晉屬襄城郡後廢入葉有應鄉故應國按汲冢古文商時王有應國矣周武王以封其子為應侯故左傳邘晉應韓武之穆也戰國為秦所有以封范睢為應侯有方城左傳所謂楚國方城以為城即此又有昆陽城即光武破王尋之所也中魯山縣在夏為魯縣陶唐氏既衰其後有劉累為御龍氏以事夏孔甲龍一雌死潜醢以食夏后既而使求之懼而避于魯縣是也漢為魯陽屬南陽郡後漢及晉皆因之後魏置荆州尋廢立魯陽郡後置魯州隋開皇初郡廢大業初州廢以魯縣屬襄城郡唐為魯山武徳四年復置魯州貞觀九年州廢以魯山來屬故犨縣本鄭邑漢屬南陽郡後廢故城在今縣東南後周置三鵶鎮在縣西南十九里又置平髙城以備齊北齊置魯城在縣東北十七里以御周中龍興縣本湍陽縣唐武徳四年置屬伊州貞觀元年省證聖七年復置曰武興屬汝州神龍元年更名為中興尋改曰龍興皇朝熙寧四年省入魯元祐元年復置同下州信陽軍春秋時屬申其後屬楚秦屬南陽郡二漢屬南陽江夏郡晉置義陽郡宋置宋安郡南齊置司州梁因之有三闗之隘比接陳汝控帶許洛宋以來省為邊鎮後魏改曰郢州後周改曰申州隋開皇初郡廢大業二年改曰義州尋為義陽郡唐為申州天寳元年曰義陽郡皇朝開寳九年降為義陽軍太平興國元年改為信陽今縣二中下信陽縣二漢平氏縣地屬南陽郡晉分置義陽縣屬義陽郡後廢焉宋曰平陽縣置宋安郡隋開皇初郡廢改平陽縣為義陽大業初置義陽郡唐為申州皇朝為義陽軍太平興國元年改義陽縣為信陽漢鐘武縣屬江夏郡後漢省焉故城在今縣東南漢鄳縣屬江夏郡後漢及晉因之北齊改為齊安置齊安郡隋開皇初郡廢改縣曰鐘山屬義陽郡唐屬申州皇朝開寳九年省入義陽有鐘山桐栢山淮水中下羅山縣二漢鄳縣地北齊置髙安縣隋開皇初廢十六年復置曰羅山屬義陽郡唐屬申州皇朝屬信陽軍有石城山甚髙峻史記曰魏攻㝠阨葢謂此山也吕氏春秋言九塞㝠阨其一焉輿地廣記卷九
