body:
  text: 輿地廣記卷八宋歐陽忞撰京西南路望襄州春秋已來楚地秦南郡之北界二漢屬南陽南郡魏置襄陽郡晉因之兼置荆州東晉置雍州宋文帝割荆州置雍州襄陽去江陵􅇍道五百勢同唇齒無襄陽則江陵受敵自東晉庾翼為荆州刺史將謀北伐遂鎮襄陽齊梁皆因之後梁蕭詧都此西魏改曰襄州隋開皇初郡廢大業初州廢復置襄陽郡唐武徳四年曰襄州天寳元年曰襄陽郡後為山南東道節度今縣六𦂳襄陽縣二漢屬南郡劉表為荆州牧鎮曹魏屬襄陽為重鎮蜀將闗侯攻没于禁曹仁勢甚盛徐晃屯守不下曹公謂晃曰全襄陽子之功後孫權帥兵向西時曹仁鎮之司馬懿曰襄陽水陸之衝禦㓂要地不冝失也晉因之兼為荆州刺史治羊祜杜預皆鎮焉東晉僑置雍州宋齊梁皆因之郡亦自宜城徙治焉後梁蕭詧都此而為西魏附庸後周置襄州隋開皇初郡廢大業初復置唐為襄州有峴山羊祜與鄒湛等嘗登之今墮淚碑在焉有鹿門山龎徳公隠居之所有望楚山古馬鞍山也晉劉𢎞山簡九日晏游扵此武陵王愛其峯秀故曰望楚山望鄧城縣故鄧國二漢為鄧縣屬南陽郡晉曰鄧城屬㐮陽郡其後廢入樊城樊周仲山甫所封也東漢建安中闗侯圍于禁於樊後晉樊城縣後周省入安飬隋屬襄陽郡唐屬襄州天寳元年改安飬曰臨漢王元二十一年移治古鄧城復改曰鄧城有樊城鎮𦂳襄城縣故糓國二漢為筑陽縣屬南陽郡晉屬順陽郡其後廢焉孝武置義城縣及義城郡後周郡廢隋開皇十八年改縣曰榖城屬襄郡唐屬襄州中下宜城縣故鄢楚之别都也秦為南郡之北部漢惠帝三年改曰宜城屬南郡建安十三年魏武平荆州分置襄陽郡晉因之宋曰華山縣置華山郡後魏改為宣城郡分華山置率道縣西魏改華山縣曰漢南後周郡廢隋屬襄陽郡唐屬襄州貞觀八年省漢南入率道天寳七載改率道曰宜城有黎丘城後漢初秦豐阻兵於黎丘即此郡縣故郡國春秋時自商宻遷此為楚附庸楚滅之昭王畏吳自郢遷焉後復還郢二漢及晉屬南郡隋屬襄陽郡唐改為樂鄉武徳四年置郡州貞觀八年州廢屬襄州周省入冝城中下中廬縣故廬戎國二漢為中廬縣屬南郡晉屬襄陽其後廢焉梁置穰縣西魏改為義清屬歸義郡後周廢隋屬襄陽郡唐屬襄州皇朝太平興國元年復改為中廬中下南漳縣本漢臨沮縣屬南郡晉屬襄陽其後廢焉西魏置重陽縣後周改曰思安隋開皇十八年改曰南漳屬襄陽郡唐屬襄州武徳二年析南漳置荆山貞觀八年省南漳入義清開元十八年徙荆山于故南漳禹貢荆山在東北荆豫二州於是分境楚卞和得玉之處上鄧州本夏禹之國春秋時申鄧二國地戰國屬韓自後屬楚秦置南陽郡二漢因之晉屬南陽國及順陽義陽二國之境宋齊為南陽郡後魏兼置荆州西魏為重鎮隋開皇初改為鄧州大業初州廢復置南陽郡唐武徳二年曰鄧州天寳元年曰南陽郡梁升為宣化軍節度後唐改曰威勝周改曰武勝今縣五上穰縣本楚别邑秦取之以封魏冉為穰侯後屬南陽郡二漢因之晉屬義陽郡後魏為南陽郡治及荆州刺史治焉隋開皇初改為鄧州後為南陽郡唐復為鄧州二漢朝陽縣屬南陽郡晉屬義陽郡其後廢焉故城在今縣東南二漢新野縣屬南陽郡晉置義陽郡後曰棘陽置新野郡後周郡廢隋開皇初復改縣曰新野屬南陽郡唐乾元元年省入穰漢冠軍縣本穰盧陽郡武帝以封霍去病去病仍出征匈奴功冠諸軍故曰冠軍屬南陽郡後晉隋皆因之唐貞觀元年省入臨瀬漢湼陽縣屬南陽郡後漢及晉皆因之隋開皇初改曰課陽唐貞觀元年省入穰故臨瀬縣本漢冠軍縣之北境魏置新城縣西魏改為臨湍隋開皇初復名新城屬南陽郡唐屬鄧州天寳元年復名臨湍漢改曰臨瀬皇朝建隆初省入穰中下南陽縣故申國戰國時秦周王以為宛縣置南陽郡漢因之王莽以宛為南陽後漢復為宛晉如之後魏置上陌縣後周併宛入焉更名上宛隋開皇初改為南陽郡唐屬鄧州博望鎮漢博望縣也武帝置以封張騫屬漢陽郡後漢及晉皆因之其後廢焉安衆鎮二漢安衆縣也屬南陽郡晉省之漢杜衍縣屬南陽郡後漢省之故城在今縣西二漢育陽縣屬南陽郡晉因之其後廢焉故城在今縣南漢雉縣屬南陽郡東漢及晉皆因之元魏曰北雉後省即陳倉人所逐二童子名寳雞者雄止陳倉為石雌止此縣故名之漢西鄂縣屬南陽郡東漢及晉皆因之元魏省入北雉西魏向城縣屬雉陽郡隋開皇初郡廢屬淯陽郡唐屬鄧州復省入南陽中下内鄉縣本楚之白羽邑春秋昭十八年許遷于白羽後改為析漢屬𢎞農郡後漢屬南海郡晉屬順陽郡後曰西淅置淅陽郡後周改縣曰中鄉省淅川入焉隋改中鄉曰内鄉屬淅陽郡唐屬鄧州菊潭鎮本漢酈縣屬南陽郡後漢及晉皆因之隋開皇初改為菊潭縣北有菊水其旁悉生甘菊水極甘馨中有三十家不復穿井仰飲此水上夀至百二三十唐屬鄧州周省之丹水鎮漢丹水縣也屬𢎞農郡後漢屬南陽郡晉屬順陽郡後置丹川郡後周郡廢隋屬淅陽郡其後廢焉東有張村張儀説楚絶齊許以商於之地六百里即此中下淅川縣本後漢南鄉縣魏置南鄉郡晉改為順陽郡後魏復為南鄉郡又分置淅川縣後周省之隋開皇初郡廢大業初置淅陽郡其後淅陽及南鄉縣皆廢焉五代時復置淅川縣屬鄧州中下順陽縣漢屬南陽郡哀帝改為博山晉屬順陽郡西魏併置鄭縣尋改為清鄉後周省順陽入焉隋開皇初復改為順陽其後省入内鄉為鎮皇朝太平興國六年升為縣上隨州春秋隨國戰國屬楚秦屬南陽郡二漢因之晉屬義陽郡惠帝置隨郡宋齊因之西魏置并州後改曰隨州隋開皇初郡廢大業初州廢置漢東郡唐武徳三年曰隨州天寳三年曰漢東郡皇朝乾徳三年升崇義軍節度太平興國元年改崇信軍今縣三上隨縣故隨國左傳所謂漢東之國隨為大者也其後楚滅之以為縣二漢屬南陽郡晉屬義陽郡惠帝置隨郡宋齊因之西魏置隨州隋置漢東郡唐復為隨州光化鎮本隨縣地南齊分置安化縣西魏改為新化後周改為光化隋屬漢東郡唐屬隨州皇朝熈寧元年省焉有斷蛇丘隋侯出而見大蛇中斷舉而藥之後蛇銜明珠報徳故名中下唐城縣故唐國屬楚漢為上唐鄉屬舂陵縣晉屬安昌縣後置上唐縣後魏曰厥西置義陽郡西魏改縣曰下溠隋開皇初郡廢十六年改縣曰唐城屬漢東郡其後省入棗陽唐開元二十六年復置屬隨州梁改為漢東後唐復故晉又改為漢東漢又復故中下􅀥陽縣本二漢蔡陽縣屬南陽郡晉屬義陽郡後廢焉置廣昌縣及廣昌郡後魏置南荆州西魏改曰昌州隋開皇初郡廢仁夀元年避太子名改廣昌縣曰􅀥陽大業初州廢置舂陵郡唐武徳初郡廢五年改昌州為唐州九年州徙治比陽貞觀十年以􅀥陽來屬漢舂陵縣本蔡陽之白水鄉元朔五年以零陵冷道之舂陵鄉封長沙王子買為舂陵侯至戴侯仁以舂陵地形下濕上書請徙南陽元帝許之以蔡陽白水鄉徙仁為舂陵侯光武其後也故張衡賦云龍飛白水晉改為安昌縣後復曰舂陵置安昌郡隋開皇初郡廢屬昌州大業初屬舂陵郡後省之故城在今縣東後漢襄鄉縣屬南陽郡後廢為故城在今縣東北上金州春秋戰國皆屬楚秦及二漢屬漢中郡魏以漢中遺入在東陲者置魏與郡晉宋齊皆因之梁兼置南梁州西魏改曰東梁州以其地出金又改為金州置金城郡隋開皇初郡廢大業三年州廢置西城郡唐武徳元年曰金州天寳元年曰安康郡至徳二載改曰漢隂郡後復曰安康石晉升懷徳軍尋罷皇朝乾徳五年升昭化軍今縣五下西城縣本媯墟舜常居之二漢屬漢中郡建安中置西城郡劉先主以申儀為太守儀據郡降魏魏文帝改為魏興郡晉因之後周省入吉安隋大業三年改縣曰金川復置西城郡義寧二年縣復曰西城唐為金川有伏羲山下平利縣漢長利縣屬漢中郡東漢省之晉復置屬魏興郡宋改為錫縣後廢梁初置上亷縣後改曰吉陽西魏改曰吉安後廢唐武徳元年置平利縣大厯六年省長慶初復置皇朝熈寧六年省元祐二年復置有女媧山中洵陽縣北山洵水所出南入沔故以名縣漢屬漢中郡後漢省之晉復置屬魏興郡後置洵陽郡隋開皇初郡廢屬西城郡唐屬金州淯陽鎮本西魏淯陽郡後周郡廢置黄土縣隋屬西城郡唐屬金州天寳元年更名淯陽皇朝乾徳四年省入洵陽中下漢隂縣本漢安陽縣屬漢中郡東漢因之晉改為安康屬魏興郡後改曰寧都南齊置安康屬西城郡唐屬金州至徳二載以安禄山姓改為漢隂縣下石泉縣南齊曰永樂縣置晉昌郡西魏改郡曰魏昌改縣曰石泉後周郡廢隋屬西城郡唐屬金州下房州春秋時為麋庸二國戰國屬楚秦二漢屬漢中郡魏置新城郡晉宋齊梁因之西魏置光遷國後周國廢為郡隋開皇初郡廢大業初改州為房州州廢置房陵縣唐武徳元年曰遷州貞觀十年州廢自竹山徙房州治此天寳元年曰房陵郡皇朝雍熈三年升保康軍節度今縣三上房陵縣秦徙趙王遷于房陵即此二漢屬漢中郡魏置新城郡以孟達為太守達叛附蜀司馬宣王討平之西魏置光遷國後周郡縣並改為光遷隋置房陵郡唐貞觀十年改縣曰房陵為房州治焉武后廢中宗為盧陵王遷之扵此故永清縣本房陵縣地後魏分置大洪縣後周改焉隋屬房陵郡唐屬房州皇朝開寳中省下竹山縣故庸國嘗從周武王伐紂牧誓所謂庸蜀羌髳二漢為上庸縣屬漢中郡魏分置上庸郡晉宋因之後廢梁置安城縣西魏改為竹山置羅州隋開皇初改為房州大業初州廢屬房陵郡唐武徳元年置房州貞觀十年徙治房陵故上庸縣亦漢上庸縣地梁置新豐縣西魏改為上庸後周改曰孔陽隋開皇十八年復曰上庸屬房陵郡唐屬房州皇朝開寳中省有白馬塞山孟達嘗登之嘆曰此金城千里上均州春秋時屬麋戰國屬韓二漢屬南陽漢中二郡魏屬南鄉郡晉屬順陽郡宋置始平郡後置武當郡齊扵此僑立始平郡尋改為齊興郡梁兼置興州後周改曰豐州隋開皇初郡廢改州為均州大業初州廢屬淅陽郡唐武徳元年置均州天寳元年曰武當郡今縣二上武當縣二漢屬南陽郡魏屬南鄉郡晉屬順陽郡後置武當郡隋開皇初郡廢置均州大業初州廢屬淅陽郡唐復置均州有古塞城在縣北戰國時楚築以備秦所據之山髙峻險峭今名大塞山有武當山上鄖鄉縣本漢錫縣地屬漢中郡魏屬魏興郡晉太康三年置鄖鄉縣宋因之隋屬淅陽郡唐屬均州有錫穴左傳文十一年楚潘崇伐麋至於錫穴是也豐川縣本漢長利縣地屬漢中郡梁置南上洛郡西魏改郡曰豐利而分錫置豐利縣後周郡廢隋以縣屬西城郡唐屬均州皇朝乾徳六年省入鄖鄉上郢州春秋戰國皆屬楚秦屬南郡二漢屬江夏郡晉宋皆為竟陵郡梁屬南司北新二州西魏屬安州後周置石城郡兼置郢州隋開皇初郡廢大業初州廢置竟陵郡唐武徳四年曰鄧州貞觀元年州廢𨽻郢州十七年復置天寳元年曰富水郡今縣二上長夀縣本漢竟陵縣地晉羊祜鎮荆州立石城因山為固惠帝元康元年分江夏西部置竟陵治此宋太始六年置長夀縣後周置石城郡隋大業初置竟陵郡唐為郢州下京山縣晉置新陽縣梁置新州梁寧郡西魏改縣為角陵隋開皇初郡廢大業初州廢改角陵曰京山屬安陸郡唐武徳四年置温州貞觀十七年州廢屬郢州富水鎮本後漢南新市縣地屬江夏郡晉因之西魏改為富水置富人郡隋開皇初郡廢屬安陵郡唐屬温州貞觀十七年來屬上唐州春秋時屬楚戰國屬韓秦屬南陽郡二漢及晉皆因之後魏置東荆州西魏改為淮州為重鎮置兵以備東魏隋開皇五年改為顯州州廢置淮安郡唐武徳四年曰顯州貞觀十年改為唐州天寳元年曰淮安郡今縣五中下泌陽縣漢湖陽舞隂平氏縣地屬南陽郡後魏置石馬縣後語訛為上馬隋屬舂陵郡唐屬唐州貞觀元年省入湖陽開元十五年復置天寳元年改為泌陽天祐二年州自比陽徙治於此改為泌州後復故平氏鎮本漢平義陽晉為西平氏屬義陽郡後置漢廣郡隋開皇初郡廢以平氏屬淮安郡唐屬唐州皇朝開寳五年省入泌陽有泌水在縣南即後漢光武初起兵破王莾將甄直梁丘賜死處中下湖陽縣故蓼國二漢屬南陽郡晉省入棗陽後魏復焉置西淮安郡及南襄州後郡廢改州為南平州西魏改曰昇州後又改曰湖州後周改置昇平郡隋開皇初郡廢仁夀初改曰昇州大業初州廢以湖陽屬舂陵郡唐屬唐州棗陽故謝國詩所謂申伯畨畨既入于謝者也二漢為棗陽縣屬南陽郡晉屬義陽郡其後省焉故城在今縣西北中下比陽縣漢屬南陽郡後漢及晉皆因之後魏曰陽平置東荆州西魏改為淮州隋開皇五年又改為顯州七年改陽平縣為饒良大業初又改曰比陽置淮安郡唐屬梁州方城山自比陽相比連百里號曰方城亦曰長城馬仁陂在縣北溉田萬頃下桐栢縣漢平氏縣地屬南陽郡梁置淮安縣及華州上川郡西魏改州為淮州後改曰純州尋廢隋開皇初郡廢更名縣曰桐栢屬顯州後屬淮陽郡唐屬唐州禹貢桐柏山淮水所出縣因山為名下方城縣本漢堵陽葉縣地屬南陽郡後漢及晉皆因之其後廢焉西魏置方城縣及襄邑郡隋開皇初郡廢屬淯陽郡唐屬唐州有方城山左傳所謂楚國方城以為城者也水經注云方城邑西有黄城山是長沮桀溺耦耕之所有水出黄城山東流注潕水則子路問津處同下州光化軍春秋戰國皆屬楚二漢屬南陽郡晉宋屬順陽郡西魏置鄼城郡後周郡廢隋屬襄陽郡唐屬襄州皇朝乾徳縣本楚地隂國所遷即春秋左傳云遷隂于下隂者也二漢為隂縣屬南陽郡西魏置鄼城郡後周郡廢屬襄州隋曰隂城屬襄陽郡唐貞觀八年省入榖城縣屬襄州皇朝乾徳三年以隂城鎮置光化軍及置乾徳縣熈寧五年廢軍改乾徳為光化縣屬襄州後復置漢鄼縣蕭何所封屬南陽郡後漢因之晉置順陽郡初治鄼焉西魏置鄼城郡後周廢入隂城故城在今縣東北輿地廣記卷八
