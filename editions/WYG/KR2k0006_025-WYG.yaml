body:
  text: 輿地廣記卷二十五宋歐陽忞撰江南西路都督洪州春秋戰國屬楚秦屬九江郡漢髙帝改為淮南國分置豫章郡東漢晉因之東晉置江州初治此後徙尋陽宋齊梁陳皆為豫章郡隋平陳郡廢置洪州大業初州廢復置豫章郡唐武徳五年復曰洪州天寳元年曰豫章郡後升鎮南軍節度皇朝因之今縣八望南昌縣秦為九江郡南部漢髙帝六年置豫章郡其城即灌嬰所築東漢以後因之後改南昌曰豫章縣隋置洪州唐武徳五年析置南昌鍾陵縣以南昌置孫州八年州廢省南昌鍾陵寳應元年避肅宗諱改豫章曰鍾陵貞元中又改曰南昌應劭漢官儀曰有豫章生於庭中故以名郡此木嘗中枯晉永嘉中一旦更茂咸以為中興之祥其後元帝果興大業於江南故郭璞南郊賦云弊樟擢秀於祖邑以司馬宣王之祖甞為豫章太守故也有武陽水望新建縣皇朝太平興國六年析南昌縣置與南昌分治郭下有西山草水望奉新縣本新吳縣漢中平中置晉以後屬豫章郡隋平陳省入建昌永淳元年復置屬洪州五代時改為奉新縣有華林山大雄山望豐城縣吳分南昌縣地置富城縣晉太康元年改曰豐城屬豫章郡雷煥得龍淵太阿於此宋齊梁陳皆屬豫章郡隋平陳省之開皇十二年復置曰廣豐仁夀初改曰豐城屬洪州唐因之望分寜縣本艾縣地左傳吳公子慶忌驟諌吳王弗聴出居于艾是也二漢屬豫章郡晉宋齊梁陳因之隋平陳省入建昌唐貞元十五年析武寜置分寜縣屬洪州有旌陽山昔旌陽令許遜嘗逰此有脩水𦂳武寜縣本西安縣地漢建安中孫權置晉太康元年改為豫寜屬豫章郡宋齊梁陳皆因之隋省入建昌唐長安四年復置武寜縣屬洪州景雲元年改曰豫寜寶應元年復曰武寜有幕阜山中靖安縣五代時置有藥王山進賢縣上䖍州春秋時百越之地戰國時吳起相楚悼王南平百越于是屬楚秦屬九江郡二漢屬豫章郡吳屬廬陵郡晉太康三年置南康郡宋為南康國齊梁陳復為南康郡隋平陳郡廢置䖍州大業初州廢置南康郡唐武徳五年曰䖍州天寳元年曰南康郡後唐長興二年升為昭信軍節度皇朝因之今縣十望贑縣二漢屬豫章郡吳為廬陵南部都尉治晉置南康郡宋齊梁陳皆因之隋置䖍州改贑縣為南康大業初復改為贑唐因之有贑水東源出雩都曰湖漢水西源出南野曰彭水二水皆北流合扵贑縣總為豫章水北流入大江後人因贑字以湖漢水為貢水彭水為章水而劉澄之遂以為章貢合流因以名縣葢失之矣平固鎮本平固縣吳曰平陽晉太康元年更名屬南康郡宋因之後省為鎮望䖍化縣漢贑縣地吳置陽都縣晉太康元年改曰寜都後省焉宋復置大明五年以䖍化屯别置䖍化縣並屬南康郡後省䖍化入寜都隋平陳改寜都曰䖍化屬䖍州唐因之上有梅嶺山漢時閩越反武帝令諸校屯豫章梅嶺待命閩越發兵入梅嶺殺漢校尉即此縣地有石鼓山望興國縣本贑縣地皇朝太平興國八年以險江鎮置興國縣有覆笥山望信豐縣本南康地唐永淳元年分置南安縣屬䖍州天寳元年改為信豐望雩都縣二漢屬豫章郡晉宋屬南康郡後省隋平陳復置屬䖍州唐因之有金雞山云時見金雞出於石上有盎固山望㑹昌縣本雩都縣地皇朝太平興國八年以九州鎮置有君山望瑞金縣本雩都縣地有金唐天祐元年置瑞金監後升為縣屬䖍州有銅鉢山綿上𦂳石城縣五代時置屬䖍州上安逺縣唐貞元四年析雩都縣置屬䖍州中龍南縣本漢南野縣地五代時置屬䖍州有聶都山山海經曰贑水出聶都山即此上吉州春秋時百越之地戰國屬楚秦屬九江郡二漢屬豫章郡興平元年孫䇿分置廬陵郡吳寶鼎二年孫皓又置安城郡晉宋齊梁陳皆因之隋平陳二郡俱廢置吉州大業初復置廬陵郡唐武德五年曰吉州天寳元年曰廬陵郡皇朝因之今縣八望廬陵縣二漢屬豫章郡孫䇿改為石陽縣分置廬陵郡晉宋因之後改石陽為廬陵縣隋置吉州唐因之有有玉笥山望吉水縣本吉陽縣地吳置晉宋屬廬陵郡後省焉皇朝太平興國九年置吉水縣有仁山吉水望安福縣本漢安成縣屬長沙國東漢屬長沙郡吳屬安成郡晉改縣曰安復宋齊梁陳皆因之隋平陳郡廢改安復縣為安成十八年又曰安復屬吉州唐武徳五年改縣曰安福置潁州七年廢來屬有廬水東至廬陵入贑江望太和縣吳置西昌東昌二縣晉宋皆屬廬陵郡後西昌省東昌入焉改為太和縣屬吉州唐因之有贑石山遂興水望龍泉縣五代時置屬吉州有石含山望永新縣吳置屬安城郡晉宋因之後省唐武徳五年後置屬南平州八年州廢省入太和顯慶三年復置來屬有永新山勝業水望永豐縣本吉水縣地皇朝至和元年以報恩鎮置永豐縣有雲葢山報恩江望萬安縣本龍泉縣地皇朝熙寧四年以萬安鎮置有龍頭山雲洲上袁州春秋為百越之地戰國屬楚秦屬九江郡二漢屬豫章郡吳屬安城郡晉宋齊梁陳因之隋平陳郡廢置袁州大業初州廢置宜春郡唐武徳四年曰袁州天寳元年曰宜春郡皇朝因之今縣四望宜春縣二漢屬豫章郡吳屬安城郡晉孝武改為宜陽宋以後因之隋復改為宜春屬宜春郡唐因之有仰山袁江有宜春泉醖酒入貢望分宜縣本宜春縣地皇朝雍熙元年置有鍾山郡國志云晉永嘉元年因水有大鍾從山上墜水中驗其銘是秦時樂器故以名山有昌山望萍鄉縣吳置屬安城郡晉以後因之隋屬宜春郡唐因之有羅霄山陽岐水緊萬嵗縣本陽樂縣地吳黄武中置晉太康元年改為康樂屬豫章郡宋因之謝靈運襲封康樂公即此後省焉唐武徳五年復置陽樂縣屬靖州八年州廢省入髙安五代時以其地置萬嵗縣屬洪州後屬筠州皇朝開寳八年來屬有康樂故城有謝山康樂水上撫州春秋時百越之地戰國屬楚秦屬九江郡二漢屬豫章郡吳太平二年分置臨川郡晉以後因之隋平陳郡廢置撫州大業初州廢置臨川郡唐武徳五年曰撫州天寳元年曰臨川郡皇朝因之今縣四望臨川縣本南昌縣地東漢永元八年置臨汝縣屬豫章郡吳孫亮分置臨川郡晉以後因之隋置撫州改臨汝縣為臨川唐因之有峩峯山本曰銅山唐天寳中改名臨川水望崇仁縣本吳置巴丘縣屬廬陵郡置新建縣屬臨川郡晉宋因之梁改巴丘為巴山及置巴山郡隋平陳郡縣俱廢置崇仁縣屬撫州唐因之有崇仁山寳唐水望宜黄縣唐武徳五年析崇仁置屬撫州八年省皇朝開寳八年以宜黄場復置宜黄縣望金谿縣本臨川縣地皇朝開寳五年以金谿場置有靈秀山金谿水上筠州自唐以前地理與洪州同南唐李景置筠州皇朝因之今縣三望髙安縣本建城縣二漢屬豫章郡晉以後因之縣出然石石色黄白而疎理以水灌之則熱著鼎其上足以熟物元康中雷煥入洛賫石以示張華華曰此謂然石於是始識其名隋屬洪州唐武徳五年改建城曰髙安置靖州七年改為米州又改為筠州八年州廢屬洪州南唐復置筠州有飛川鐘口江望上髙縣五代時置屬洪州南唐來屬有八疊山斜口水望新昌縣皇朝太平興國三年以髙安監步鎮置有黄蘗山同下州興國軍五代以前地理與鄂州同皇朝太平興國二年置興國軍今縣三望永興縣本鄂縣地二漢屬江夏郡孫權改鄂為武昌既而别置陽新縣屬武昌郡晉以後因之江左又析置永興縣隋平陳改陽新曰富川開皇十一年省永興入焉十八年改富川縣曰永興屬鄂州唐因之皇朝置興國軍有闔閭山吳王闔閭與楚相持屯此𦂳大冶縣皇朝乾徳五年以大冶塲置屬鄂州太平興國三年來屬有磁湖中通山縣五代時置屬鄂州皇朝太平興國二年來屬有翠屏山本名石城唐天寳中改名同下州南安軍自五代以前地理與䖍州同皇朝淳化元年置今縣三中大庾縣唐神龍元年析南康縣置屬䖍州皇朝置南安軍有大庾嶺五嶺之最東者亦曰東嶠有横浦闗漢討南越楊僕為樓船將軍出豫章下横浦是也有凉熱水水經注云連溪出南康縣凉熱山即此水也望南康縣本漢南野縣地吳分置南安縣晉太康元年改曰南康屬南康郡宋因之改曰贑縣隋大業初復日南康屬南康郡唐屬河州皇朝淳化元年來屬南黔鎮本南野縣二漢屬豫章郡晉屬廬陵郡宋屬南康郡後省為鎮有君山章水上上猶縣五代時置屬䖍州皇朝淳化元年來屬有猶水同下州臨江軍自五代以前地理與筠袁吉三州同皇朝淳化三年置今縣三望清口縣五代時置屬洪州南唐屬筠州皇朝置臨江軍望新淦縣二漢屬豫章郡晉宋因之隋屬廬陵郡唐屬吉州皇朝淳化三年來屬有玉笥山淦水望新喻縣吳分宜春置晉宋屬安成郡隋屬宜春郡唐屬袁州皇朝淳化三年來屬本曰新渝唐天寳後相承作喻有渝水同下州建昌軍自唐以前地理與撫州同南唐析置建武軍皇朝太平興國四年改名今縣二望南城縣二漢屬豫章郡晉以後屬臨川郡隋唐屬撫州南唐置軍有麻姑山望南豐縣吳置屬臨川郡晉宋因之後省唐景雲二年析南城置屬撫州皇朝淳化二年來屬有軍山輿地廣記卷二十五
