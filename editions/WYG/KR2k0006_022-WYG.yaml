body:
  text: 輿地廣記卷二十二宋歐陽忞撰兩浙路上大都督府杭州春秋屬越戰國屬楚秦屬㑹稽郡漢因之東漢順帝以後屬吳郡晉屬吳興吳二郡宋齊梁因之陳置錢塘郡隋開皇中郡廢置杭州大業初州廢置餘杭郡唐武徳四年置杭州天寳元年曰餘杭郡升鎮海軍節度五代為吳越王錢氏所有皇朝太平興國四年來歸淳化五年改曰寧海軍今縣九望錢塘縣五代時晉改縣為錢江後别置錢塘縣與錢江分治州郭下有靈隠山昔楚僧云自天竺鷲山飛來望仁和縣本錢塘縣初郡功曹華信議立此塘以防海水始開募有能致一斛土石者即與錢一千旬月之間來者雲集塘未成譎不復取皆棄土石而去塘遂成故曰錢塘漢屬㑹稽郡東漢省之晉復置屬呉郡陳置錢塘郡隋平陳郡廢自餘杭徙州治此後曰餘杭郡唐復曰杭州晉天福中避髙祖名改錢塘曰錢江皇朝太平興國四年改曰仁和有臨平湖傳言此湖塞天下亂此湖開天下平吳孫皓天璽元年吳郡言臨平湖自漢末穢塞今更開通斯晉氏平吳一天下之符也望餘杭縣秦始皇南游至錢塘臨浙江水波惡乃西百二十里從狹中渡因置餘杭縣漢屬吳稽郡東漢晉屬吳郡隋置杭州後州徙治錢塘屬杭州有由拳山望臨安縣本漢餘杭縣地吳孫權分置臨水縣晉武改曰臨安屬吳郡後廢唐武徳七年復置臨水縣屬潜州八年省入於潜垂拱四年析餘杭於潜以故臨水城復置臨安縣屬杭州吳越王錢鏐其縣人也鏐既貴以素所居營為安國衣錦軍鏐歸宴故老山林皆覆以錦梁改臨安縣曰安國縣以尊之皇朝太平興國三年復曰臨安緊富陽縣本富春縣漢屬㑹稽郡東漢屬吳郡吳王孫權其縣人也置東安郡晉皇后名春孝武改曰富陽屬吳郡隋屬餘杭郡唐屬杭州緊於潜縣二漢屬丹陽郡晉屬吳興郡隋屬餘杭郡唐屬杭州北有天目山上新城縣本富春縣地晉咸和中置新城縣隋平陳省入錢塘後復置唐武徳七年省入富陽永淳元年復置屬杭州梁改曰新登皇朝太平興國四年復改曰新城有桐溪上鹽官縣本漢海鹽縣地吳王濞煑海為鹽盖在此有鹽官吳因置鹽官縣晉屬吳郡隋屬餘杭郡唐屬杭州中昌化縣本於潜縣地唐垂拱二年析置紫溪縣萬嵗通天元年曰武隆縣皆屬杭州神龍元年更武隆為唐山縣大歴二年皆省長慶初復置唐山梁改曰金昌唐同光初年復故名晉改為横山皇朝太平興國四年改曰昌化有百丈山紫溪水所出東南流逕新城謂之桐溪又逕桐廬入浙江大都督越州春秋為越國之都周顯王時越王無彊西伐楚楚威王興兵大敗之盡取故吳地至浙江而越以此散服朝於楚秦屬㑹稽郡漢因之東漢置㑹稽郡乃自吳縣徙治山隂晉宋齊梁陳皆因之宋兼置東陽州尋廢梁復置東揚州隋平陳郡廢改州曰吳州大業初置越州尋廢置㑹稽郡唐復為越州天寳元年曰㑹稽郡升為鎮東軍皇朝因之統縣八望㑹稽縣本於越地禹㑹諸侯江南計功而崩因葬焉命曰㑹稽㑹稽者㑹計也其後帝少康封庶子杼於㑹稽以奉守禹祀即越王允常之先也秦置山隂縣屬㑹稽郡漢因之東漢順帝以後為郡治晉因之後分置㑹稽縣隋為吳州越州及㑹稽郡治唐因之南有㑹稽山秦始皇於此刻石紀功有禹冡禹穴有秦望山在州城正南為衆峯之傑始皇登之以望東海山南有嶕峴峴有大城越之先君無餘舊都於此有鏡湖若耶溪雷門望隂山縣秦漢以來故縣隋平陳省入㑹稽縣唐垂拱二年復置在州郭下與㑹稽分治有鑑湖東漢水和五年太守馬臻所創開周囬三百餘里溉田九千餘頃創湖之始多浸冡墓有千餘人怨訐臻因被刑於市及遣使覆按總不見人籍乃知死者所訐也有龜山一名怪山一名自來山本自琅邪東武飛來於此其形似龜故名有蘭溪溪口有亭曰蘭亭晉太守王羲之作曲水序於此望剡縣漢屬㑹稽郡東漢晉隋皆因之唐武徳四年平李子通置嵊州六年州廢來屬有天姥山望諸暨縣本曰句無越王允常之故邑國語所謂南至句無是也漢為諸暨縣屬㑹稽郡東漢晉隋皆因之唐屬越州望餘姚縣二漢晉皆屬㑹稽郡隋省入句章縣有句餘山在餘姚南句章北故二縣因以為名唐武徳四年復置及置姚州七年廢屬越州緊蕭山縣本餘暨縣二漢屬㑹稽郡漢末童謡曰天子常興東南三餘之間故孫權改曰永興縣晉因之隋省入㑹稽縣唐儀鳯二年復置屬越州天寳元年改曰蕭山潘水所出水經以為疑是浦陽江之别名自外無水以應之越人西施出於此縣緊新昌縣本剡縣地五代時置新昌縣屬越州有沃州水望平江府周初封太伯為吳國春秋末為越所併戰國屬楚秦置㑹稽郡漢因之東漢順帝置吳郡晉宋齊梁陳皆因之陳兼置呉州隋平陳郡廢改州曰蘇州因姑蘇山為名大業初州廢復置吳郡唐武徳四年曰蘇州天寳元年曰吳郡南唐升為中吳軍節度皇朝太平興國三年改曰平江軍政和三年升為平江府今縣五望吳縣本曰句吳太伯避公季奔荆蠻荆蠻歸之號曰句吳武王克商因封之至夫差為越所滅後越破更屬楚秦置㑹稽郡項梁初起吳中使項籍斬㑹稽守殷通即此地漢髙帝以封吳王濞後國除復為㑹稽郡東漢順帝分置吳郡隋曰蘇州唐因之有姑蘇山虎丘山即吳王闔廬墓也太湖中有苞山亦曰夫椒山左傳吳伐越敗之夫椒是也山有洞室入地潜行北通瑯邪東武俗謂之洞庭望長洲縣吳有長洲苑在東漢枚乗諫吳王不如長洲之苑即此唐萬歲通天元年析吳置長洲縣在州郭與吳分治望崑山縣本漢婁縣地屬㑹稽郡東漢晉屬吳郡陸機陸雲生於此故名其山曰崑山梁置崑山縣隋平陳省之開皇十八年復置屬呉郡唐屬蘇州望常熟縣本漢吳縣地晉分置海虞縣屬吳郡梁分置南沙常熟二縣隋平陳徙常熟於南沙而省海虞入焉屬蘇州唐因之有常熟山緊吳江縣朱梁開平三年吳越錢鏐奏於松江置吳江上承太湖更逕笠澤國語曰越伐吳吳禦之笠澤是也望潤州春秋屬吳戰國屬越後屬楚秦屬㑹稽鄣二郡漢髙帝以封荆王劉賈後屬㑹稽郡東漢屬吳郡吳王孫權初鎮丹徒謂之京城晉平吳置毗陵郡宋置南東海郡及南徐州梁改郡曰南蘭陵郡陳曰南東海郡自宋至陳常以京口為重鎮隋平陳郡廢開皇十五年置潤州太業初州廢屬江都郡唐武徳三年復置潤州天寳元年改為丹陽郡後升鎮海軍節度皇朝改鎮江軍今縣三緊丹徒縣春秋時謂之朱方齊慶封奔吳予之朱方是也秦時望雲者言其地有天子氣乃使赭衣徒三千人鑿長坑以敗其勢故曰丹徒漢屬㑹稽郡東漢屬呉郡孫權鎮此曰京城晉置毗陵郡宋置南東海郡及南徐州隋開皇九年置延陵縣省丹徒入焉置潤州以潤浦為名唐因之武徳三年以故延陵縣地復置丹徒縣有北固山金山緊丹陽縣古雲陽秦始皇改為曲阿漢屬㑹稽郡東漢屬吳郡晉屬毗陵郡隋屬江都郡唐武徳三年置雲州五年曰簡州八年州廢來屬天寳元年改為丹陽延陵鎮本曲阿縣地唐武徳三年以延陵縣地置丹徒乃别置延陵縣於今所屬茅州七年州廢屬蔣州九年來屬皇朝熈寧五年省入丹陽緊金壇縣本曲阿縣地隋末盗起土人保聚因為金山縣唐屬蔣州武徳八年省入延陵垂拱四年復置來屬更名金壇有茅山上湖州春秋屬吳吳滅屬越戰國屬楚秦屬㑹稽鄣二郡漢屬㑹稽丹陽二郡東漢屬呉郡吳孫皓分置呉興郡晉宋齊梁陳因之梁兼置震州隋開皇九年平陳郡廢仁夀中置湖州大業初州廢屬餘杭吳二郡唐武徳四年復置湖州天寶元年復曰吳興郡周升為宣徳軍節度皇朝景祐元年改昭慶軍今縣六望烏程縣漢屬㑹稽郡東漢屬吳郡吳置吳興郡梁置震州隋置湖州唐因之有太湖禹貢震澤也周官謂之具區有苕溪霅溪入焉有卞山衡山左傳吳伐楚至於衡山即此望歸安縣本烏程縣地皇朝太平興國七年析置歸安縣於郭下與烏程分治望安吉縣本漢故鄣縣地吳興記曰光和末張角亂此鄉守險助國漢嘉之中平二年分故鄣之南鄉置安吉縣屬丹陽郡晉屬吳興郡梁陳屬陳留郡隋平陳郡廢省安吉入綏安義寧二年沈法興復置唐武徳四年賊平因之屬姚州七年省入長城麟徳元年復置屬湖州望長興縣本烏程故鄣二縣地吳王闔閭使弟夫概居此築城狹而長晉武帝因置長城縣屬吳興郡隋平陳省之仁夀中復置屬吳郡唐武徳四年更置綏州因故綏安縣為名又改曰雉州七年州廢來屬梁避廟諱改曰長興秦鄣郡故城在縣西南八十里二漢為故鄣縣屬丹陽郡晉屬吳興郡梁陳屬陳留郡隋省入綏安俗號為府頭緊徳清縣本武康縣地唐天授元年分置武原縣景雲二年改為臨溪天寶元年改為徳清上武康縣本防風氏之國漢為烏程縣之餘不鄉漢童謡言天子當興東南三餘之間吳乃分餘不鄉置永安縣晉以平陽已有永安故改此永安為永康又改曰武康屬吳興郡隋屬餘杭郡大業末李子通置安州又曰武州唐武徳四年賊平因之七年州廢來屬梁屬杭州皇朝太平興國四年復來屬有封嵎山餘不溪上婺州春秋戰國皆屬越秦屬㑹稽郡二漢因之吳孫皓分置東陽郡晉宋齊因之梁置金華郡陳因之隋平陳郡廢置婺州以當天文婺女之分為名大業初州廢復置東陽郡唐武徳四年置婺州天寳元年曰東陽郡石晉升武勝軍節度皇朝淳化元年改寳寧軍今縣七望金華縣本漢烏傷縣地屬㑹稽郡初平三年分縣南鄉置長山縣呉為東陽郡治晉以後因之或云本曰長仙赤松子采藥此山因而居之故以為名後傳呼乖訛字亦隨改梁置金華郡隋開皇中郡廢置婺州改長山縣為呉寧十二年改曰東陽十八年又改曰金華大業初復置東陽郡唐復曰婺州有金華山赤松澗望東陽縣本漢烏傷縣地唐垂拱二年分義烏置屬婺州有峴山望義烏縣本二漢烏傷縣屬㑹稽郡異苑曰東陽顔烏以淳孝著聞父死負土成城羣烏銜土助焉而口皆傷因以名縣自晉至隋皆屬東陽郡唐武徳七年改烏傷為義烏有靈黄山望蘭溪縣本金華縣地唐咸亨五年分縣西界置屬婺州有九峯山緊永康縣呉赤烏中分烏傷縣上浦置晉至隋皆屬東陽郡唐武徳四年置麗州八年州廢來屬有石城山上武義縣呉赤烏八年置後廢唐天授二年分永康復置屬婺州後改曰武城天祐中復曰武義有八素山上浦江縣唐天寳十三載分義烏蘭溪及杭州富陽置浦陽縣屬婺州後改為浦江輿地廣記卷二十二
