body:
  text: 輿地廣記卷三十宋歐陽忞撰成都府上黎州漢屬蜀越巂二郡晉時李特據蜀置漢源郡後周置黎州隋仁夀初置金州大業初州廢唐武德元年復置九年又廢大足元年置黎州神龍三年州廢開元四年復置天寶元年曰洪源郡後曰漢源郡今縣一下漢源縣本嚴道縣地李特置漢源郡桓溫平蜀廢之隋大業初置漢源縣屬臨卭郡唐武德四年置登州九年州廢屬雅州貞觀二年屬巂州永徽三年復故大足元年置黎州取古沈黎郡為名有卭崍九折坂漢王陽為益州刺史行部至此嘆曰奉先人遺體奈何數乘此險後王尊為刺史至坂叱其馭曰驅之王陽為孝子王尊為忠臣漢源鎮本縣所治後徙治於州郭而以故縣為鎮通望鎮本陽山縣唐武德元年析巂州之臺登置屬登州九年州廢屬雅州貞觀二年屬巂州大足元年屬黎州天寶元年改曰通望皇朝慶厯七年省入漢源故飛越縣唐儀鳯二年析漢源置以飛越山為名初屬雅州後屬黎州五代之際省入漢源按沈黎郡本莋都地漢武帝開之置郡既而罷之李特據蜀復置沈黎郡桓溫平蜀廢宋齊以來復置後周置黎州及沈黎郡尋並廢隋開皇初置沈黎縣仁夀初置登州大業初州廢後縣亦省其地在今化外巂州之域所謂古沈黎城是也上雅州秦屬蜀郡西漢因之東漢為蜀郡屬國劉備置漢嘉郡晉因之永嘉後亂離此地蕪廢西魏開生獠置䝉山郡隋初郡廢置雅州煬帝初州廢置臨卭郡唐復曰雅州天寶元年曰盧山郡今縣五中嚴道縣漢屬蜀郡漢制縣冇蠻夷曰道晉屬漢嘉郡西魏置始陽縣及䝉山郡隋開皇初郡廢十三年改始陽曰䝉山尋置雅州大業初置臨卭郡改䝉山縣曰嚴道唐復曰雅州有蔡山禹貢所謂蔡蒙旅平是也今曰周公山始陽鎮本漢徙縣屬蜀郡晉曰徙陽屬漢嘉郡西魏曰始陽唐以為鎮上盧江縣本漢青衣縣地屬蜀郡隋置盧山鎮仁夀末升為縣屬臨卭郡唐屬雅州儀鳯二年析置大渡縣長安二年省靈關寨本漢靈關道屬越嶲郡後廢唐初置靈關縣武德六年省晉左思蜀都賦云廓靈關而為門謂此也中名山縣本漢青衣縣地西魏置䝉山縣隋開皇十三年改始陽曰䝉山而改蒙山曰名山屬臨卭郡唐屬雅州漢彭越徙蜀青衣蓋在此也有禹貢䝉山中百丈縣唐武德中置百丈鎮貞觀八年升為縣屬雅州有百丈山中上榮經縣本嚴道縣地晉屬漢嘉郡唐武德三年置榮經縣屬雅州有卭崍山漢淮南厲王徙嚴道卭郵即此有故銅山漢文帝賜鄧通嚴道銅山得自鑄錢蓋此山也上茂州本冉駹國漢武帝開其地置文山郡尋罷屬蜀郡東漢靈帝時復置汶山郡晉宋齊皆因之梁置繩州及北部郡後周改繩州曰汶州隋初郡廢改汶州為蜀州尋改曰㑹州大業初州廢復置汶山郡唐武德元年復曰㑹州四年曰南㑹州貞觀八年更名茂州取茂濕山為名天寶元年曰通化郡今縣二下汶山縣本漢汶江湔氐三縣地文山郡治焉故城在今縣北二里郡罷屬蜀郡後復置汶山郡及汶山縣晉因之宋曰廣陽縣梁置北部郡開皇初郡廢屬㑹州仁夀元年復改廣陽曰汶山唐置茂州禹貢岷山在西北俗謂之鐵豹嶺禹之導江發跡於此河圗括地象曰岷山之精上為井絡帝以㑹昌神以建福故泉流深逺為四瀆之首下汶川縣本漢綿虒廣柔二縣地初屬汶山郡尋屬蜀郡晉屬汶山郡後周置汶川縣及汶山郡隋開皇初郡廢屬㑹州唐屬茂州皇朝熙寧九年即縣治置威戎軍使有玉壘山與導江相連湔水所出下簡州秦屬蜀郡漢為犍為郡東漢及晉皆因之宋齊屬蜀郡西魏置資州及武康郡後周移州治資中隋置簡州以賴簡池為名煬帝初州廢併其地入蜀郡唐武德三年後置簡州天寶元年曰陽安郡今縣二上陽安縣本漢牛鞞縣屬犍為郡東漢及晉皆因之西魏改牛鞞為陽安置武康郡隋開皇初郡廢仁夀初置簡州大業初州廢唐復置中平泉縣本漢牛鞞縣地西魏置婆閏縣隋開皇十八年更名屬蜀郡唐屬簡州貴平鎮本漢廣都縣地西魏置貴平縣及和仁郡隋開皇初郡廢屬陵州唐因之皇朝熙寧五年省入平泉下威州蓋古冉駹國漢武帝開之屬文山郡蜀劉備禪時姜維馬忠等討汶山叛羌即此地也唐武德七年白狗羌降附乃於姜維故城置維州領金山定廉二縣貞觀元年羌叛州縣俱罷二年復立維州移治於姜維城東麟德二年自羈縻州為正州天寶元年曰維川郡廣德元年沒吐蕃初吐蕃巴陷河西隴右更欲圗蜀川纍攻維州不下乃以婦人嫁維州門者二十年中生二子及蕃兵攻城二子內應城遂陷吐蕃得之號無憂城韋皋在蜀收復不克大和中守將悉怛謀以州歸唐李德裕受之而為牛僧孺所沮復棄其地大中三年社悰鎮蜀吐蕃亂離首領內附乃復屬西川皇朝景祐三年以京遞發濰州斷獄文書誤至維州因改曰威州謂唐置此州以威制羌戎故也今縣二下保寧縣本薛城隋初蜀師討叛羌以其地置薛城戍大業末沒於羌唐武德元年置維州貞觀二年自姜維故城徙州治此及置薛城縣後改曰保寧有沱水自羈縻悉州流出東徑保寧又東徑祺春又東徑通化又東徑嘉㑹又東至汶州與大江合下通化縣本漢廣柔縣地隋開皇初置金川縣仁夀初改曰通化屬汶山郡後廢焉唐咸亨二年以生羌户置小封縣後復改曰通化屬茂州後屬維州皇朝天聖元年改曰金川景祐四年復舊治平三年即縣治置通化軍使縣在保霸二州之間祺州唐開元二十八年以維州之定廉縣置奉州及雲山郡天寶八年徙治天保軍更郡名曰天保郡廣德元年沒吐蕃乾德元年嗣歸誠王董嘉俊以州來歸更州名保州以嘉俊為刺史又更曰古州其後復曰保州領縣四曰定廉本隋定廉鎮後沒於羌武德七年招白狗羌置曰歸順曰雲山皆天寶八年析定廉置曰安居沒蕃後縣皆廢唯首領董氏世襲刺史羈縻於威州皇朝政和四年刺史董氏入朝以其地置祺州今縣一春祺縣本定廉縣地皇朝政和四年置亨州漢為廣柔縣地屬蜀郡晉屬汶山郡唐天寶元年招附生羌置霸州及靜戎郡領縣四曰安信曰牙利曰保寧曰歸化廣德元年沒吐蕃後縣皆廢首領董氏歸附世襲刺史羈縻於威州皇朝政和四年刺史董氏入朝以其地置亨州今縣一嘉㑹縣本信安縣地皇朝政和四年置舊保霸二州在威州之裏名為羈縻而據吾腹脅不與它等雖受爵命而猶以蕃夷自待恭順之心未能純一往往多幸生羌擾攘藉已與之和好因挾以自重而邀厚賞近緣二酋挈籍自獻於是有詔令建築郡邑置吏以治之無亡矢遺鏃之費而土為王土民為王民自茂如威不涉異域有久逸永寧之道焉同下州永康軍自秦至隋屬蜀郡唐屬彭蜀二州皇朝乾德四年置永康軍治導江之灌口鎮熙寧五年軍廢元祐初復置今縣二望導江縣本漢郫綿虒二縣地屬蜀郡蜀置都安縣屬汶山郡後周改都安曰汶山隋改廣陽曰汶山在茂州郭下而此縣廢舊治灌口唐武德元年以其地置龍縣尋更名曰導江移於今治屬益州三年屬濛州貞觀元年州廢屬益州後改曰灌寧垂拱二年屬彭州開元中復為導江皇朝乾德四年來屬而以灌口為軍治熙寧五年軍廢復屬彭州元祐初來屬有玉壘山與汶州相連左思蜀都賦所謂包玉壘而為宇是也有蠶崖關以扼西山之走集秦時蜀守李氷作大堰於江以溉諸縣作三石人於白沙郵立立水中刻字為約口水竭不至是盛不沒腰是以蜀人不知饑饉沃野千里世號陸海有廣濟王廟所以祠氷也望青城縣本漢江源縣地後置齊基郡後周郡廢改曰清城縣隋屬蜀郡唐垂拱二年屬蜀州開元十八年去水作青城皇朝乾德四年來屬熙寧五年軍廢復屬蜀州元祐初來屬有青城山同下州仙井監秦屬蜀郡二漢屬犍為郡晉及宋齊皆因之梁置懷仁郡後周置陵州取陵井為名隋置隆山郡唐武德元年復為陵州天寶元年曰仁夀郡皇朝熙寧五年廢為陵井監政和三年改為仙井今縣二望仁夀縣漢武陽縣地晉置西城戍以為鹽井之防梁置懷仁郡西魏改西城戍置普寧縣隋開皇初郡廢十八年改普寧為仁夀縣大業初置隆山郡唐為隆州有陵井東漢張道陵所開有毒龍藏井中及鹽神玉女十二為祟天師以道力驅出毒龍禁玉女於井下然後人獲鹹泉之利皇朝不欲斥天師名故改陵井為仙井有天師廟今為至道觀有玉女祠今號靈真夫人中下井研縣漢武陽縣地東漢置西陽郡西魏置蒲亭縣隋改為井研屬隆山郡唐屬陵州始建鎮隋開皇十一年置縣𨽻隂山郡唐屬陵州皇朝咸平四年省入井研成都府路化外州下都督府松州本諸羌之地後周置扶州及龍涸郡隋𨽻同昌汶山二郡唐武德元年置松州以地産甘松為名天寶元年曰交川郡東至扶州南至翼州西北接吐蕃領縣四下嘉誠縣後魏時白水羌豪治據此地其子舒彭遣使朝貢乃封為甘松縣子始置甘松縣魏亂又絶後周復招慰之天和六年置扶州領龍涸郡隋開皇二年郡廢而州徙治于同昌改甘松縣為嘉城屬同昌郡唐置松州有甘松嶺江水之所發源也下交川縣隋開皇初置屬汶山郡唐武德元年來屬下平唐縣唐垂拱元年析交州及當州之通軌翼針置屬當州天寶元年來屬下鹽泉縣下當州本諸羌之地後周置覃州及覃州榮鄉二郡隋開皇初郡廢四年州廢屬汶山郡唐貞觀二十一年析松州置當州以地産當歸為名天寶元年曰江源郡東至翼州南至翼水縣東北至松州西北接生羌領縣三中下通軌縣後周置隋屬汶山郡唐屬松州貞觀中羌酋董和那蓬固守松州有功於是析松州之通軌置當州以和那蓬為刺史後其子屈寧襲焉下利和縣顯慶二年析通軌置下谷利縣文明元年開生羌置下悉州本生羌之地後周置廣年左封二郡隋開皇初並廢屬汶山郡唐顯慶元年析當州置悉州以悉唐川為名天寶元年曰歸誠郡東南至翼州西北至當州領縣二中左封縣本廣年後周置隋仁夀初改曰左封屬汶山郡唐武德元年屬翼州貞觀二十一年屬當州顯慶元年生羌首領董係北射內附乃以左封置悉州并置悉唐識臼二縣治悉唐以係北射為刺史咸亨二年徙治左封而以悉唐置靜州下歸誠縣垂拱二年析左封置下靜州本諸羌之地唐置悉州後州徙焉儀鳯二年置南和州天授二年改為靜州天寶元年曰靜川郡東至悉州南至威州西至平戎城北至當州領縣三中悉唐縣唐顯慶元年置為悉州治焉咸亨元年悉州徙治左封而以悉唐置翼州都督府儀鳯元年翼州還治翼針乃於悉唐置南和州後改曰靜州中靜居縣有靜川州縣所以取名也下清道縣下恭州本諸羌之地唐為廣平縣屬靜州開元二十四年分置恭州天寶元年曰恭化郡東至柘州南至威州北至吐蕃白崖鎮領縣三下和集縣本廣平縣屬靜州開元二十四年置恭州天寶元年改曰和集下博恭縣開元二十四年析廣平置下烈山縣開元二十四年析廣平置下柘州本諸羌之地唐顯慶三年開置天寶元年曰蓬山郡東至靜州南至威州北至恭州松嶺鎮領縣二下柘縣下喬珠縣下翼州本漢蠶陵縣地屬文山郡郡廢屬蜀郡晉復屬汶山郡後周置翼針縣及翼針郡隋開皇初郡廢屬㑹州後屬汶山郡唐武德元年析置翼州天寶元年曰臨翼郡東至石泉縣南至茂州西至悉州北至松州領縣三下衛山縣本翼針天寶元年更名下翼水縣後周置曰龍求及置清江郡隋開皇初郡廢改縣曰清江十八年又改曰翼水漢蠶陵縣故城在今縣西下峨和縣下真州本隋翼水縣地唐屬翼州天寶五載析置昭德郡乾元元年改曰真州領縣四中下真符縣天寶五載析雞川昭德二縣以為州治中下雞川縣先天元年析翼水縣開生獠置屬悉州天寶元年屬翼州五載來屬下昭德縣本識臼縣顯慶元年開生獠置屬悉州天寶元年屬翼州改曰昭德五載來屬中下昭逺縣下乾州本諸羌之地唐大厯三年開西山置領縣二下招武縣下寧逺縣下姚州本南夷故滇池國漢武帝開之置益州郡東漢分益州置永昌郡蜀劉氏分永昌置建寧郡又分永昌建寧置雲南郡晉及宋齊皆因之兼置寧州西魏周隋不能逺有唐武德四年安撫大使李英奏置姚州於漢之雲南故地以此州內人多姚姓因以為名麟德元年徙州治於弄棟川雲南郡後南詔蠻閣羅鳯舉攻殺雲南太守張䖍陀自是姚州沒於南詔自巂州南西至瀘經陽蓬鹿谷菁口㑹川四百五十里至瀘州乃南渡瀘水經裒州徽州三百五十里至姚州州西距南詔羊苴咩城三百里領縣三下姚城縣故漢弄棟縣地下瀘南縣本長城垂拱元年置天寶初更名下長明縣中都督府巂州本南夷故卭都國漢武帝開之置越巂郡東漢晉宋皆因之後周置嚴州隋開皇六年改曰西寧州十八年又改曰巂州大業初復置越巂郡唐武德元年改曰巂州至德二載沒吐蕃貞元十三年節度使韋皋以兵收復之本治越巂縣太和五年為蠻寇所破六年李德裕徙州治臺登縣南至姚州北至黎州領縣九中臺登縣漢屬越巂郡有孫水司馬相如檄文所謂梁孫源是也晉因之一名白沙江後周置白沙郡隋開皇初郡廢屬越巂郡唐為郡治中越巂縣本漢中都縣地為越巂郡治焉後置越巂縣中卭部縣本漢蘭縣屬越巂郡後周置卭部縣及卭部郡隋開皇初郡廢來屬中蘇祁縣本漢蘇夷縣屬越巂郡後周平南夷於故城復置及置亮善郡隋開皇初郡廢來屬中西瀘縣本卭都縣地梁置可泉縣及宣化郡隋開皇初郡廢來屬唐天寶元年改可泉曰西瀘中昆明縣本漢定莋縣屬越巂郡後周置定莋鎮唐武德二年改為昆明縣昆明在巂之西南今羈縻南寧諸爨所居是也中和集縣唐貞觀八年置中昌明縣唐貞觀二十二年開松外蠻置牢州及松外尋聲林開三縣永徽三年州廢省三縣入昌明中㑹川縣本卭都縣唐上元二年徙治㑹川因更名有瀘津關瀘水出曲羅東下三百里始曰瀘水兩峰有殺氣暑月舊不行故諸葛亮表言五月渡瀘深入不毛也其水下合繩水若水孫水淹水徑馬湖總曰馬湖江東北至叙州與岷江合輿地廣記卷三十
