body:
  text: 輿地廣記卷三十七宋歐陽忞撰廣南西路下下宜州秦屬象郡後復沒於蠻夷唐開置粵州乾封中更名天寶元年曰龍水郡五代時為楚馬氏所有後入南漢皇朝慶厯三年廢芝州入焉今縣五上龍水縣唐與州同置崖山東璽等縣後皆省故洛曹縣本洛封唐屬桞州元和十三年更名皇朝淳化元年來屬後改曰洛下嘉祐七年省入龍水有宜江龍江中下圻城縣唐置及立芝州治此後為羈縻州皇朝慶厯三年廢州以縣來屬下天河縣唐與州同置有溪江下思恩縣唐貞觀十二年開生獠與環州同置屬焉後州沒于蠻夷皇朝熙寧八年以縣來屬下河池縣本屬羈縻智州皇朝治平二年來屬下賔州秦屬桂林郡自漢至齊屬鬱林郡梁立領方郡隋屬鬱林郡唐武德四年屬南方州貞觀三年立賔州天寶元年曰安城郡五代為南漢所有皇朝開寶五年州廢入雍州六年復立端拱三年以澄州入焉今縣二下嶺方縣二漢屬鬱林郡晉宋以後因之梁立領方郡唐立賔州皇朝開寶五年屬雍州六年復為賔州治故琅邪縣故保城縣本安城至德二載更名屬賔州開寶五年並屬雍州六年皆省入焉有古漏山賔水中遷江縣本思剛州唐為羈縻州𨽻雍州都督府皇朝天禧四年廢為遷江縣來屬有都泥山賀水中下上林縣唐武德四年析嶺方置及立南方州貞觀八年改曰澄州天寶元年曰賀水郡皇朝開寶五年州廢以縣屬雍州端拱三年來屬故止戈無虞二縣與上林同置屬澄州故賀水縣武德四年析馬平置屬桞州八年屬澄州開寶五年皆省入上林有上林洞都灃水下橫州春秋戰國為駱越之地秦屬桂林郡漢屬鬱林合浦二郡吳立寧浦郡晉宋齊因之梁分立簡陽郡隋平陳二郡並廢立簡州開皇十八年改為緣州大業二年州廢屬鬱林郡唐武德四年立簡州六年改曰南簡州貞觀八年更名橫州天寶元年曰寧浦郡二代為南漢所有皇朝開寶五年廢蠻州入焉今縣二下寧肅縣本漢廣鬱縣地吳分置寧浦縣及立郡晉以後因之梁分立簡陽郡隋立簡州改為緣州唐為南簡州改為橫州故從化縣本淳風武德四年分寧浦置貞觀元年更名故樂山縣本漢廣鬱縣地屬合浦郡梁立樂陽郡隋平陳郡廢為樂陽縣屬簡州開皇十八年更名唐武德四年來屬皇朝開寶二年並省入寧浦下永定縣唐武德四年立淳州及置永定武羅靈竹三縣而州治永定天寶元年曰永定郡永貞元年曰蠻州皇朝開寶五年州廢省武羅靈竹二縣入永定來屬熙寧四年省永定入寧浦元祐三年復置下化州古百越之地秦屬象郡漢屬南越後及東漢屬合浦郡吳屬髙興郡晉以後屬髙凉郡梁復髙興隋平陳郡廢屬羅州大業初州廢屬髙凉郡唐武德五年屬羅州六年立南石州貞觀九年改為辨州天寶元年曰陵水郡天祐元年朱全忠以辨汴聲近更名勳州後復故五代為南漢所有皇朝開寶五年廢羅州入焉太平興國五年改曰化州今縣二下石龍縣本漢髙凉縣地屬合浦郡皇朝改曰化州故陵羅龍化二縣與石龍同置開寶五年省入焉有陵水羅水中吳川縣隋屬髙凉郡唐屬羅州皇朝開寶五年州廢以吳川來屬故廉江縣本石城昔宋將檀道濟於陵羅江口築石城立羅州梁陳因之唐天寶元年更名故幹水縣本石龍唐改曰招義又改曰幹水零緑鎮本零緑縣三縣皆屬羅州招義郡開寶五年州廢晉省屬吳川下髙州古百越之地秦屬南海郡漢屬南越東漢屬合浦蒼梧二郡吳立髙凉郡晉以後因之梁兼立髙州隋平陳郡廢大業初州廢復立髙凉郡唐武德六年立髙州本治髙凉貞觀二十二年徙治良德天寶元年置髙凉郡大厯十一年徙治電白五代為南漢所有皇朝開寶五年廢潘州熙寧四年廢竇州皆入焉今縣二下電白縣梁立電白郡隋廢屬髙州唐大厯中州自良德徙治此故良德本務德陳置後更名隋屬永熙郡唐武德中來屬貞觀中州自髙凉徙治此而髙凉更名西平分屬恩州故保寧縣本連江梁立連江郡隋平陳郡廢屬髙州唐開元五年改曰保安至德二載更名皇朝開寶三年皆省入焉有髙凉山中下信宜縣本信義唐武德二年析懷德置而自懷德徙南扶州治焉貞觀元年州廢屬龍州二年復置五年又廢屬隴州六年復置八年更名竇州天寶元年曰懷德郡皇朝太平興國元年改縣曰信宜熙寧四年州廢來屬故懷德縣本漢端溪縣地屬蒼梧郡梁置梁德縣及梁德郡隋平陳郡廢開皇十八年改縣曰懷德屬隴州大業初屬永熙郡唐武德四年立南扶州後徙治信義故潭峩縣武德四年置故亮縣五年置皇朝開元六年三縣皆省入信宜有潭峩山信義水下茂名縣西甌之地後置茂名縣屬髙興郡隋屬髙州唐貞觀元年屬南宕州八年改州曰潘州後自定川徙州治此後州廢屬髙山永徽元年立天寶元年曰南潘郡皇朝開寶五年廢州省南巴潘水二縣入茂名來屬下雷州古百越之地秦象郡地二漢以後屬合浦郡梁分立合州大同末以合淝為合州以此為南合州隋平陳復為合州大業初州廢屬合浦郡武德五年復立南合州貞觀元年改為東合州八年又更今名天寶元年海康郡五代為南漢所有今縣一下海康縣本漢徐聞縣地屬合浦郡梁立南合州隋為合州置海康縣唐復為南合州改曰雷州故遂溪縣本隋鐡把椹川二縣屬合浦郡唐武德四年來屬後併省更名故徐聞縣本隋康貞觀二年更名皇朝開寶四年皆省入有擎雷山擎雷水下欽州古百越之地秦屬象郡漢以後屬合浦郡宋立宋夀郡齊以後因之梁兼立安州隋平陳郡廢開皇十八年改州曰欽州大業初州廢立寧越郡唐武德四年改曰欽州天寶元年曰寧越郡五代為南漢所有今縣二望靈山縣本漢合浦縣地隋開皇十八年置南賔縣唐貞觀十年更名後自欽江徙州治此皇朝開寶五年省欽江遵化內亭三縣入焉下安逺縣本安京舊置安京郡隋平陳郡廢屬欽州唐至德二載改曰保京後復曰安京皇朝景德三年改曰安逺有安京山如洪水下鬱林州古蠻夷之地春秋戰國為西甌秦立桂林郡後為南越尉他所并漢以後屬合浦鬱林二郡隋平陳郡廢屬尹越二州大業初復屬合浦鬱林二郡唐立黨牢鬱林二州天寶元年為定川寧仁鬱林三郡五代皆為南漢所有皇朝開寶七年廢黨牢二州致和元年廢定川皆入焉今縣三中下南流縣本隋北流縣地屬合浦郡唐屬牢州為州治焉皇朝開寶七年廢州省定川安川二縣入南流來屬而自鬱林縣徙州治此故撫安縣本西甌之地唐永淳元年開古黨洞立黨州并置撫安善勞善文寧仁安仁懷義福陽古符八縣二年析安仁以下四縣立平琴州垂拱三年州廢神龍元年復置天寶元年黨州曰寧仁郡平琴州曰平琴郡至德中更安仁曰容山後廢平琴州入黨州後又省善文寧仁福陽古符四縣開寶七年廢黨州省撫康善勞文山懷義入南流有大觀山牢江下興業縣本石南縣地梁置石南郡隋屬鬱林郡唐貞觀中屬貴州麟德二年以石南立鬱州乾封元年更名鬱林州而析石南置興業縣後州徙治鬱林而省石南入興業後又徙治興業皇朝開寶五年省鬱林興德二縣入焉中博白縣本漢合浦縣地唐武德四年析立南州兼置博白周羅建興等縣而州治博白六年更名白州天寶元年曰南昌郡皇朝開寶五年廢白州省周羅建寧南昌三縣入博白屬廉州七年復立政和元年又廢以博白來屬有鍾山博白溪下廉州古百越之地秦屬象郡漢合浦郡東漢因之吳改曰珠官郡晉復曰合浦宋分立臨瘴郡兼立越州齊梁陳因之隋平陳郡廢大業初改州曰祿州尋改為合州又廢而立合浦郡唐武德四年立越州貞觀八年改名天寶元年曰合浦郡五代為南漢所有皇朝太平興國八年廢為太平軍咸平元年復立今縣二上合浦縣漢立合浦郡吳曰珠官郡晉復為合浦郡宋兼立越州時州始立以西江督護陳伯紹為刺史鑿山為城門以威服俚獠齊梁陳因之隋廢大業初復立唐為越州貞觀中改為廉州以本大廉洞也皇朝開寶五年省封山蔡龍大廉三縣入合浦太平興國八年省合浦入石康咸平元年復置故封山蔡龍唐武德五年置屬姜州貞觀十年來屬故大廉縣武德五年分合浦置有糠頭山昔南越王他屯軍於此舂榖積糠如山有廉江瘴江一名合浦有珠母海郡人採珠之所東漢時郡政煩苛珠徙交趾孟伯周為守有惠化去珠復還下石康縣本常樂州南漢立及置博電零緑鹽場三縣皇朝開寶五年廢州省縣以其地置石康縣來屬下瓊州漢珠崖縣地自合浦徐聞南入海得大州東西南北方千里武帝元封元年略以為儋耳珠崖郡自初為郡縣吏卒中國人多侵陵之故率數嵗一反昭帝廢儋耳併珠崖元帝用賈捐之言又棄珠崖郡東漢置珠崖縣屬合浦郡吳赤烏五年復立珠崖郡晉平吳郡廢入合浦後復立朱崕郡梁兼立崖州隋陳因之唐貞觀五年析崖州立瓊州天寶元年曰瓊山郡自乾封後沒山洞蠻貞元五年嶺南節度使李復討平之五代為南漢所有今縣五中瓊山縣隋末置屬崖州唐貞觀五年立瓊州十三年析置曾口顔羅容瓊三縣貞元七年省容瓊入焉五代時省曾口顔羅故舍城縣隋末置唐武德四年立崖州皇朝開寶五年州廢以縣來屬熙寧四年省入瓊山自縣北渡海便風揚帆一日夜至雷州有瓊山中澄邁縣隋屬桂崖郡唐屬崖州皇朝開寶五年來屬有澄邁山下文昌縣本平昌唐武德五年置𨽻崖州貞觀元年更名皇朝開寶五年來屬下臨髙縣本臨機唐初𨽻崖州貞觀五年來屬開元元年更名下樂會縣唐顯慶五年置州貞觀五年來屬開元元年同下州昌化軍漢屬珠崖郡梁兼入崖州隋以為珠崖郡治焉唐武德五年立儋州天寶元年曰昌化郡五代為南漢所有皇朝熙寧六年廢州為昌化軍今縣三下宜論縣本義倫隋為珠崖郡治唐立儋州州城即漢儋耳郡城也皇朝太平興國元年改義倫曰宜倫有毗耶山昭山倫江下昌化縣隋屬珠崖郡唐武德五年來屬皇朝熙寧六年省為鎮入宜倫元豐三年復置有昌化石極為靈異祈禱多應有南崖山下感恩縣隋屬珠崖郡唐武德五年來屬皇朝熙寧六年省為鎮入宜倫元豐四年復置有感勞山湳龍江故富羅縣本毗善隋屬珠崖郡唐武德五年更名來屬南漢省之故洛陽縣唐乾元復置皇朝省之同下州萬安軍隋珠崖郡地唐貞觀五年屬瓊州十三年屬崖州龍朔二年立萬安州天寶元年曰萬安郡至德二載更名萬全郡後復故名五代為南漢所有皇朝熙寧七年廢州為萬安軍今縣二下萬安縣本交昌唐貞觀五年析交昌置屬萬安州開元九年州徙治陵水至德二載曰萬全貞元元年州復徙治此後復故名皇朝改為萬寧有赤隴山金仙水下陵水縣唐置本𨽻振州後來屬皇朝熙寧七年省為鎮入萬安元豐三年復置有靈山陵柵水故富雲博遼二縣唐貞觀五年置南漢皆省之同下州朱崖軍隋珠崖郡地唐武德五年立振州臨振郡又曰寧逺郡天寶元年曰延德郡五代為南漢所有皇朝開寶五年改為崖州熙寧六年廢州為朱崖軍今鎮二臨川鎮本臨川縣隋末置藤橋鎮初唐振州鎮寧逺言德吉陽臨川落屯五縣南漢時省延德臨州落屯三縣熙寧六年省寧逺吉陽二縣為臨川藤橋二鎮焉輿地廣記卷三十七
