body:
  text: 輿地廣記卷二十四宋歐陽忞撰江南東路次府江寧府春秋屬吳戰國屬越後屬楚秦屬鄣郡二漢屬丹陽郡吳王孫權初鎮丹徒謂之京城後徙都秣陵改為建業晉平吳以為丹陽郡及揚州刺史治東晉元帝渡江復都焉改丹陽太守為尹宋齊梁陳因之常以京口為重鎮隋平陳郡廢夷蕩耕墾更於石頭城置蔣州大業初復置丹陽郡唐武德三年置揚州七年平輔公祏復改為蔣州八年又改為揚州九年州徙治江都以其地屬潤州至德二載析置江寧郡乾元元年曰升州上元三年州廢光啓三年復置五代時南唐李氏竊據升為江寧府皇朝開寶八年克復降為升州天禧一年復升江寧府建康軍節度今縣五次赤上元縣本楚邑楚威王以其地有王氣埋金以鎮之故曰金陵秦改曰秣陵二漢屬丹陽郡吳建安十六年改曰建業因都焉晉武帝平吳復曰秣陵本治去京邑六十里故治村是也安帝義興九年移治京邑宋齊梁陳因之隋平陳省秣陵入江寧縣置蔣州唐武德三年改江寧曰歸化屬揚州八年改歸化曰金陵九年改金陵曰白下屬潤州貞觀九年復改白下曰江寧肅宗上元二年改曰上元乾元元年置升州南唐置江寧府故建康縣本建鄴晉武帝既復改建業為秣陵太康三年又分秣陵之水北置建業縣後避愍帝名改曰建康隋省入江寧湖熟鎮本湖熟縣二漢晉宋屬丹陽郡後省入焉有蔣山石頭城六朝以為重鎮次赤江寧縣晉武太康元年分秣陵置臨江縣二年更名唐既改江寧為上元南唐復析上元置江寧分治郭下次畿句容縣二漢晉宋屬丹陽郡隋屬江都郡唐武德三年置茅州七年州廢屬蔣州九年屬潤州乾元元年屬升州有茅山一名句曲山形如句字之曲縣取名焉次畿溧水縣本溧陽縣二漢晉宋屬丹陽郡隋改為溧水縣屬蔣州唐武德三年屬揚州七年屬宣州乾元元年屬并州伍子胥自楚出奔未至吳而疾止中道乞食於溧陽即此次畿溧陽縣唐武德三年析溧水縣置屬揚州九年屬宣州上元元年屬升州望宣州春秋屬吳戰國屬越後屬楚秦屬鄣郡二漢屬丹陽郡吳為重鎮晉徙丹陽於建業而以其地置宣城郡宋齊梁陳因之梁兼置南豫州隋平陳郡廢改州為宣州大業初復置宣城郡唐武德三年曰宣州天寶元年曰宣城郡吳升為寧國軍節度皇朝因之今縣六望宣城縣本宛陵縣二漢為丹陽郡治晉置宣城郡宋齊梁陳因之隋廢郡而改宛陵曰宣城置宣州唐因之亦吳懷安縣地屬丹陽郡晉屬宣城郡宋齊梁陳因之隋省入宣城有敬亭山望南陵縣漢春榖縣地屬丹陽郡東漢晉因之孝武改為陽榖後省梁置南陵縣及南陵郡陳置北江州隋平陳州郡並廢屬宣城郡唐武德四年屬池州州廢來屬亦漢宣城縣地屬丹陽郡東漢省之晉復置宣城郡後省故城在今縣東緊涇縣二漢屬丹陽郡晉屬宣城郡宋齊梁陳因之唐武德三年置南徐州尋更名猷州八年州廢來屬故安吳縣吳分宛陵置晉宋齊梁陳屬宣城郡隋省入涇唐武德三年復置八年又省亦陵陽縣地二漢晉屬丹陽郡成帝以皇后諱改為廣陽縣宋因之後省有陵陽山列仙傳云陵陽子明釣得白龍放之後三年龍迎子明上陵陽山仙去因以名縣緊寧國縣吳分宛陵置晉宋齊梁陳皆屬宣城郡隋省入宣城唐武德三年復置屬宣州六年又省天寶三載復置緊旌德縣唐寶應二年析太平縣置屬宣州有棲真山中太平縣唐天寶十一載析當塗涇縣置屬宣州大歷中省永泰中復置上歙州春秋屬吳戰國屬越後屬楚秦屬鄣郡二漢屬丹陽郡吳孫權分置屬都郡晉武帝改為新安郡宋齊因之後廢隋平陳置歙州大業初置新安郡廢武德四年復置歙州天寶元年曰新安郡皇朝因之統縣六望歙縣二漢屬丹陽郡吳孫權使賀齊平山越於是立始新都尉於歙之華鄉令齊守之遂置始新縣及新都郡晉太康元年改郡曰新安後郡廢而省始新入歙隋平陳廢歙開皇十一年復置屬歙州大業初屬新安郡唐為歙州治焉望休寧縣孫權分歙置休陽縣晉武帝改為海寧屬新安郡宋因之隋開皇十八年改為休寧大業初置新安郡唐屬歙州望祈門縣本黟縣地唐代宗時歙州賊方清據此為壘永泰二年平賊因其壘置祈門縣屬歙州有祁山閶門灘善覆舟望婺源縣唐開皇二十八年析休寧置屬歙州望績溪縣唐永徽五年分歙置北野縣屬歙州後更名績溪緊黟縣二漢屬丹陽郡晉宋屬新安郡隋平陳縣廢開皇十一年復置屬歙州唐因之有林歷山吳賀齊討山越賊保林歷山四靣險絶齊使以鐵杙琢山而升出其不意遂平賊上江州古揚荆二州之境春秋戰國屬楚秦屬九江郡二漢屬廬江豫章二郡晉惠帝置尋陽郡兼置江州初治豫章成帝咸康六年移治尋陽中流襟帶常為重鎮宋齊梁陳因之隋平陳郡廢大業初州廢置九江郡唐武德四年復置江州天寶元年曰尋陽郡皇朝因之今縣五望德化縣本尋陽縣二漢屬廬江郡吳屬蘄春郡晉復屬廬江永興元年置尋陽郡咸康六年江州自豫章徙治尋陽縣本在江北溫嶠移置江南後省入柴桑縣二漢屬豫章郡曹公攻劉備於夏口時孫權擁兵柴桑以觀成敗諸葛亮說權與并力拒曹公故城在今縣南所謂楚城鎮是也宋齊梁陳皆為尋陽郡及江州治焉隋平陳郡廢復改縣曰尋陽開皇十八年改曰彭蠡大業初改曰湓城置九江郡唐復曰尋陽置江州五代時改為德化禹貢九江在州西北始别於鄂陵終㑹於江口有廬山柴桑山彭蠡湖緊德安縣本歷陵縣地二漢屬豫章郡晉屬鄱陽郡後省五代時置德安縣屬江州有禹貢敷淺原中瑞昌縣五代時置屬江州有王喬山清虛玉華洞中湖口縣五代時置屬江州晉盧循之敗悉力柵左里宋武帝攻其柵循單舸走衆皆降即彭蠡湖口今縣是也中彭澤縣禹貢彭蠡澤在西因以名縣二漢晉屬豫章郡宋省之後復置梁置太康郡隋梁陳郡縣並廢而置龍城縣屬江州開皇十八年復改曰彭澤唐因之有馬當山上池州春秋屬吳戰國屬越後屬楚秦屬鄣郡二漢屬丹陽郡晉屬宣城郡宋齊梁陳隋因之唐武德四年析宣州置池州貞觀元年州廢永泰元年復置後曰池陽郡皇朝因之今縣六望貴池縣本石城縣地二漢屬丹陽郡晉以後屬宣城郡隋平陳縣廢開皇十九年置秋浦縣屬宣州唐分置池州五代時改秋浦為貴池有烏石山貴池上青陽縣本臨城縣吳置晉屬宣城郡宋齊梁陳因之隋省入南陵唐天寶元年析置青陽縣屬宣州後屬池州有九華山上銅陵縣本南陵縣地唐析置義安縣又廢義安為銅官五代時置銅陵縣屬江寧府皇朝開寶八年來屬有梅根山利國山上建德縣本至德縣唐至德二年析鄱陽秋浦置屬江州乾元元年屬饒州永泰元年來屬五代時省後復置改為建德有石門山䦨溪上石埭縣唐永泰中析青陽秋浦置治又石埭城屬池州中下東流縣五代時置屬江州皇朝太平興國三年來屬上饒州春秋屬楚後屬吳戰國屬越後復屬楚秦屬九江郡二漢屬豫章郡吳孫權分置鄱陽郡晉宋齊梁陳因之梁兼置吳州隋平陳郡廢改州為饒州以其物産豐饒大業初復置鄱陽郡唐武德四年曰饒州天寶元年曰鄱陽郡皇朝因之今縣六望鄱陽縣本楚邑春秋吳伐楚取鄱是也秦時吳芮為畨陽令甚得江湖間心號曰畨君二漢屬豫章郡吳置鄱陽郡晉以後因之隋置饒州唐因之有鄱江故廣晉縣吳置曰廣昌郡吳芮故城也晉太康元年更名為鄱陽郡治宋因之後省唐武德五年復置八年省入鄱陽望餘干縣故越之西境所謂干越也二漢曰餘汗屬豫章郡晉宋齊梁陳隋屬鄱陽郡唐屬饒州有餘水北流入贛江望浮梁縣本新平縣唐武德四年析鄱陽置屬饒州八年省開元四年復置新昌天寶元年更名浮梁有石藏山望樂平縣本吳樂安縣晉宋屬鄱陽郡後省唐武德四年置樂平縣屬饒州九年省後復置望德興縣五代析樂平置屬饒州有銀山中安仁縣皇朝開寶八年以餘干縣地置安仁場端拱元年升為縣上信州春秋戰國皆屬越後屬楚秦屬九江㑹稽二郡二漢屬豫章㑹稽二郡晉宋及隋屬鄱陽東陽二郡唐乾元元年析饒州之弋陽衢州之常山玉山及建撫二州之地置信州後曰上饒郡皇朝因之統縣六望上饒縣吳置晉省之宋復置屬鄱陽郡後省唐武德四年復置七年省入弋陽乾元二年復置并置信州有上饒江望玉山縣唐證聖二年析常山須江弋陽置屬衢州乾元元年來屬有懷玉山望弋陽縣吳置葛陽縣晉宋屬鄱陽郡隋開皇十二年改為弋陽屬饒州唐乾元元年來屬有弋溪寶豐鎮皇朝開寶八年升為縣景祐二年省康定元年復置慶歷三年又省入弋陽望貴溪縣唐永泰元年析弋陽置屬信州有龍虎山貴溪中鉛山縣五代時置皇朝開寶八年以縣直𨽻京師後屬信州有鉛山中永豐縣唐乾元二年析上饒置屬信州元和七年省入為鎮皇朝熙寧七年復升為縣有豐山有永豐溪上太平州自唐以前地理與宣州同南唐置雄逺軍皇朝開寶八年改平南軍太平興國三年升為太平州今縣三上當塗縣本漢丹陽縣地晉太康二年分置于湖縣成帝以淮南當塗流民寓居于湖乃僑立當塗縣以治之分于湖為境而於江南僑立淮南郡治于湖以當塗屬焉宋齊梁陳皆因之隋平陳郡及于湖廢以當塗屬丹陽郡唐武德三年置南豫州八年州廢屬宣州乾元元年屬升州上元二年復屬宣州南唐置雄逺軍皇朝改為平南軍又改為太平州于湖縣故城在今縣南丹陽鎮本丹陽縣二漢晉宋屬丹陽郡後廢唐武德三年析江寧縣復置屬饒州九年州廢屬宣州貞觀元年省入當塗有牛渚山一名採石在縣北大江中晉溫嶠回軍至牛渚磯聞鼓樂之音水深不可測乃燬犀角照之見水族竒形異狀朱衣躍馬夜見夢嶠曰與君幽明道别何得相照有丹陽湖慈湖中蕪湖縣本吳鳩兹地左傳楚子重伐吳克鳩兹是也二漢晉屬丹陽郡晉宋僑立襄垣縣寄治蕪湖後屬淮南郡宋齊梁陳因之隋平陳省襄垣入當塗五代時析當塗縣置蕪湖縣屬宣州皇朝太平興國二年來屬有尺鑄山蕪湖中繁昌縣晉之繁昌本屬襄城郡亂後於此僑立屬淮南郡而分于湖為境宋齊梁陳因之隋平陳省繁昌入當塗五代時析當塗復置屬宣州皇朝太平興國二年來屬有靈山隱靜山同下州南唐軍春秋戰國皆屬楚秦屬九江郡漢屬豫章郡東漢晉宋皆因之隋屬九江豫章二郡唐屬江洪二州皇朝太平興國二年置南康軍今縣三望星子縣本漢彭澤縣地屬豫章郡後為德化縣之星子鎮皇朝太平興國二年置星子縣屬江州七年置南康軍有廬山彭蠡湖洛星石昔有星墜水化為石縣鎮蓋因石為名吳越錢氏封為寶石山望建昌縣本漢海昏縣地昌邑王賀廢遷於此屬豫章郡東漢永元十六年置建昌縣晉宋齊梁陳隋因之而省海昏入焉唐武德五年置南昌州八年州廢屬洪州皇朝太平興國七年來屬亦永修縣地東漢中平中置晉宋齊梁陳皆屬豫章郡隋省入建昌唐武德五年復置八年省亦新吳縣地東漢中平中置晉宋齊梁陳皆屬豫章郡隋省入建昌唐武德五年復置八年省永淳二年又置後省上都昌縣本漢彭澤縣地唐武德五年置屬洪州八年廢屬江州皇朝太平興國七年來屬有桑落山晉將劉毅為盧循所敗之地有釣磯山晉陶侃微時嘗登此垂釣同下州廣德軍春秋屬吳戰國屬越後屬楚秦屬鄣郡二漢屬丹陽郡晉屬宣城郡宋齊因之梁置大梁郡又改為陳留郡隋平陳郡廢屬宣州唐因之南唐屬升州皇朝開寶八年屬宣州太平興國四年置廣德軍今縣二望廣德縣本漢丹陽郡地鴻嘉二年以為廣德國封中山靖王勝之後雲客是為夷王晉太康中置廣德縣及宋齊皆屬宣城郡梁分置石封縣并置大梁郡又改為陳留郡隋平陳郡廢改石封為綏安縣屬宣州而省廣德入焉唐武德二載改綏安為廣德南唐屬升州皇朝屬宣州後置廣德軍有桐源山桐水左傳楚子西子期伐吳及桐汭即此望建平縣本廣德縣之郎步鎮皇朝端拱元年置建平縣屬廣德軍有伍牙山伍員伐楚還吳經此山因以為名輿地廣記卷二十四
