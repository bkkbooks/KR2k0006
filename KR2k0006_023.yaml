body:
  text: 輿地廣記卷二十三宋歐陽忞撰兩浙路下上明州秦屬會稽郡漢已降因之唐開元二十六年採訪使齊浣奏以越州之鄮縣置以境有四明山為名天寶元年曰餘姚郡梁升為望海軍節度皇朝建隆二年改奉國軍今縣六望鄞縣本漢鄮縣屬會稽郡東漢晉宋皆因之隋平陳省入句章屬會稽郡唐武德四年以句章縣置鄞州八年州廢更置鄮縣屬越州開元中置羽州軍宋時改曰鄞縣有四明山鄞縣故城在今縣東南漢屬會稽郡東漢及晉宋皆因之隋平陳省入句章句章郡漢闕晉宋隋皆因之唐省入鄮縣故城在今縣西望奉化縣本漢鄞縣地唐開元二十四年分鄮縣置屬明州有鎮亭山上慈溪縣本漢句章縣地唐開元二十六年分鄮縣置屬明州有句餘州上定海縣本望海縣朱梁開平三年吳越錢鏐奏置屬明州後改曰定海縣有浹江越滅吳欲遷吳王夫差於甬東韋昭以為句章東口外洲是也下象山縣本漢鄞縣地唐神龍二年分寧海鄮二縣置屬台州廣德二年來屬有東門山即漢志所謂越天門山也下昌國縣皇朝熙寧六年析鄞縣置有雲雩山望常州春秋屬吳戰國屬越後屬楚秦漢屬會稽郡東漢屬吳郡吳分會稽之無錫以西為屯田置典農校尉晉太康二年省校尉屬毗陵郡惠帝以東海王越世子名毗改曰晉陵郡宋齊梁陳因之隋平陳郡廢置常州大業初州廢置毗陵郡唐武德三年復置常州天寶元年曰晉陵郡後復曰毗陵皇朝因之今縣五望晉陵縣本延陵吳季札居之漢曰毗陵縣屬會稽郡東漢屬吳郡晉屬毗陵郡後郡縣俱改為晉陵隋初曰常州後曰毗陵郡唐因之有橫山有季札墓在縣北七十里漳浦之西望武進縣本漢曲阿縣地晉分丹徒曲阿置屬毗陵郡梁改曰蘭溪屬南蘭陵郡隋省入曲阿屬江都郡唐垂拱二年復置於州城內與晉陵分治望無錫縣吳太伯始所居地春秋屬吳戰國屬楚春申君城故吳墟以自為都邑漢為無錫縣屬會稽郡東漢屬吳郡吳省晉太康元年復置屬毗陵郡宋以後屬闕隋屬毗陵郡唐屬常州有慧山望宜興縣本陽羡縣漢屬會稽郡闕郡吳屬吳興郡晉惠帝以周玘創義討石氷分陽羡為義興郡以表其功宋齊梁陳因之隋平陳郡廢改陽羡郡為義興屬常州唐武德七年置南興州八年州廢來屬皇朝太平興國元年改曰宜興望江隂縣梁分蘭陵縣置及置江隂郡隋平陳郡廢屬常州唐武德三年置暨州九年州廢來屬南唐置江隂軍皇朝淳化元年軍廢來屬三年復置軍熙寧四年又廢來屬上溫州春秋屬越秦二漢屬會稽郡吳屬臨海郡晉明帝置永嘉郡宋齊梁陳因之隋平陳郡廢屬處州大業初屬永嘉郡唐武德五年置東嘉州貞觀元年州廢屬括州上元二年置溫州天寶元年曰永嘉郡石晉升靜海軍節度皇朝太平興國二年降軍事今縣四緊永嘉縣本東甌國漢惠帝立閩君搖為東海王都東甌世號曰東甌王後世為閩越所攻東甌舉國徙江淮之間東漢永和三年以章安縣之東甌鄉置永寧縣屬會稽郡吳屬臨海郡晉宋為永嘉郡治隋平陳郡廢改縣為永嘉唐為溫州望平陽縣本橫陽縣晉太康四年置曰始陽後改名宋因之後省唐武德五年分安同縣復置屬東嘉州貞觀元年省大足元年復置屬溫州朱梁改曰平陽有橫陽山緊瑞安縣本東漢章安縣地吳置羅陽縣又改曰安陽晉改為安國屬臨海郡宋因之隋省焉唐武德五年析永嘉縣復置屬東嘉州貞觀元年屬括州上元二年屬溫州五代時改曰瑞安上樂清縣本樂城縣晉孝武分永寧縣置屬永嘉郡宋因之後省入永嘉縣唐武德五年復置屬東嘉州七年又省載初元年復置屬溫州五代時改曰樂清有鴈蕩山芙蓉山上台州春秋戰國屬越秦屬會稽郡漢屬東甌國後屬會稽郡東漢因之吳置臨海郡晉宋齊梁陳因之隋平陳郡廢屬處州後屬永嘉郡唐武德四年置海州五年改為台州天寶元年曰臨海郡皇朝因之今縣五望臨海縣本漢回浦屬會稽郡東漢改曰章安吳分章安置臨海縣屬臨海郡晉宋因之後省入章安隋平陳郡廢改章安曰臨海屬處州後屬永嘉郡唐武德四年置海州五年改為台州天寶元年曰臨海郡皇朝因之今縣五望臨海縣本漢回浦屬會稽郡東漢改曰章安吳分章安置臨海縣屬臨海郡晉宋因之後省入章安隋平陳郡廢改章安曰臨海屬處州後屬永嘉郡唐武德四年置章安縣五年改曰台州八年省章安有括蒼山天姥山望黃巖縣本永寧縣唐上元二年分臨海置屬台州天授元年更名有黃巖山緊寧海縣本漢剡縣地晉為寧海縣屬臨海郡宋因之後省唐武德四年析臨海復置屬海州七年省入章安永昌元年復置屬台州有桐柏山上天台縣吳置始平縣晉太康元年改曰始豐屬臨海郡宋因之後省唐武德四年析臨海縣復置屬海州八年省貞觀八年復置上元二年改為唐興朱梁改為天台後唐復故石晉改為台興皇朝建隆元年復改曰天台有天台山赤城山上仙居縣本樂安縣晉永和三年分始豐縣南鄉置宋因之後省唐武德四年析臨海置屬海州八年省上元二年復置屬台州五代時改為永安皇朝景德四年改為仙居上處州春秋戰國屬越秦屬會稽郡漢為東甌國地後屬會稽郡東漢因之吳置臨海郡晉屬永嘉郡宋以後因之隋開皇九年平陳置處州十二年改為括州大業初州廢置永嘉郡唐武德四年復置括州天寶元年改曰縉雲郡大歷四年避德宗名改為處州皇朝因之今縣五望麗水縣本漢章安縣地隋平陳分松陽縣東更置括蒼縣及處州又改曰括州州廢永嘉郡唐曰括州大歷十四年改曰處州縣曰麗水有括蒼山望龍泉縣本遂昌松陽二縣地唐乾元二年析置龍泉縣有豫章山龍泉湖上松陽縣吳置屬臨海郡晉因之宋屬永嘉郡隋平陳郡廢屬處州唐因之朱梁時楊氏據江淮於是吳越錢氏上言以海冦未平恥聞逆姓請改為長松後又改曰白龍皇朝咸平二年復曰松陽上遂昌縣本漢太末縣地吳赤烏二年置平昌縣晉太康元年改為遂昌屬東陽郡宋因之後省而復置唐武德八年又省入松陽景雲二年復置屬括州上縉雲縣本括蒼縣地唐萬歲登封元年置屬括州有縉雲山有好溪本名惡溪多水怪唐大中中刺史假成彧有善政怪族自去因改曰好溪中青田縣本括蒼縣地唐景雲二年置屬括州有石門山宋謝靈運所遊有題詩有青田溪永嘉記曰青田有雙白鶴年年生子長便去上衢州自隋以前地理與婺州同唐武德四年平李子通析婺州之信安置衢州以州西三衢山為名七年陷輔公祏乃廢垂拱二年復置天寶元年曰信安郡皇朝因之今縣五望西安縣本漢太末縣地東漢初平三年析置新安縣屬會稽郡晉太康元年改曰信安屬東陽郡宋至隋皆因之唐置衢州咸通中改曰西安故定陽縣漢末孫權分新安置晉屬東陽郡宋因之後省唐武德四年析信安復置六年省之故盈川縣唐如意元年析龍丘置元和七年省入信安有石室山晉民王質伐木至石室山見童子四人彈琴而歌質倚斧柯聽之俄頃而去斧柯爛盡既歸已數十年親戚凋落無復向時矣緊江山縣本須江縣唐武德四年析信安置屬衢州八年省永昌元年復置五代時改為江山有江郎山通典謂之須郎山發地如笋有三峯焉上龍遊縣本姑蔑越之西部也秦為太末縣屬會稽郡二漢因之晉宋以後屬東陽郡隋平陳省入金華唐武德四年復置太末縣及榖州八年州廢省縣入信安貞觀八年復置更名龍丘屬婺州五代時改為龍遊有龍丘山榖水中常山縣本信安縣地唐咸亨五年置常山縣屬婺州垂拱二年來屬乾元元年屬信州後復故有常山中開化縣本常山縣地皇朝乾德四年置開化場太平興國六年升為縣上睦州春秋戰國屬越後屬楚秦屬會稽鄣二郡漢屬會稽丹陽二郡東漢屬丹陽吳二郡梁置新安郡隋平陳郡廢仁夀二年置睦州大業初州廢置遂安郡唐武德四年改為睦州天寶元年曰新定郡皇朝因之今縣六望建德縣本漢富陽縣地屬會稽郡吳置建德縣屬吳郡晉宋因之隋省入吳寧唐武德四年復置屬睦州七年省入桐廬雉山永淳二年復置萬歲通天二年州自雉山移治於此望青溪縣漢歙縣地屬丹陽郡梁置新安郡及新安縣隋平陳郡廢大業初改為雉山縣置遂安郡唐武德四年置睦州文明元年復為新安萬歲通天二年州徙治建德開元二十年改為還淳永貞元年改曰青溪有雉山上桐廬縣漢富春縣地吳分置屬吳郡晉宋因之隋平陳縣廢仁夀中復置屬睦州唐武德四年置嚴州七年州廢來屬有嚴陵山嚴陵瀨即嚴子陵之所居也中分水縣本桐廬縣地唐武德四年置屬嚴州七年省如意元年復置更名武盛屬睦州神龍元年復故名中遂安縣本漢歙縣地吳分置新定縣屬新安郡晉太康元年改名遂安宋因之隋平陳縣廢仁夀中復置屬睦州唐因之有白英山中夀昌縣本雉山縣地唐永昌元年分置屬睦州載初元年省神龍元年復置上秀州春秋時吳越分境於此吳亡屬越越敗屬楚秦屬會稽郡漢因之東漢晉宋屬吳郡隋唐屬蘇州後屬杭州石晉省吳越錢氏奏置秀州皇朝因之今縣四望嘉興縣故檇李地吳之南境春秋吳伐越越子陳于檇李即此秦為長水縣望氣者云有天子氣始皇乃令囚徒十萬人掘汙其地表以惡名改曰囚拳縣後曰由拳漢屬會稽郡東漢屬吳郡吳黃龍四年由拳有嘉禾生改為禾興後太子諱禾改為嘉興晉宋因之後省焉唐武德七年復置屬蘇州八年省入吳縣貞觀八年復置五代屬杭州吳越王錢元瓘奏置秀州有胥山緊華亭縣本崑山縣地唐天寶中置屬蘇州後屬秀州有華亭谷水有崑山吳陸氏之先葬此後機雲兄弟有辭學時人以玉出崑岡因名之有機雲宅在谷中後機臨刑歎曰華亭鶴唳可得聞乎上海鹽縣故武原鄉越地也秦置海鹽縣屬會稽郡漢因之東漢屬吳郡順帝時縣淪陷為湖今當湖是也大旱湖竭城郭猶可識後乃移治今所晉宋因之後省焉唐景雲二年分嘉興復置屬蘇州先天元年省開元五年復置後屬秀州中崇德縣有語兒水本曰禦兒越之北境越語云勾踐之地北至禦兒即此輿地廣記卷二十三
