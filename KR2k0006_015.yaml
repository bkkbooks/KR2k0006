body:
  text: 輿地廣記卷十五宋歐陽忞撰陜西秦鳯路上次府鳯翔府春秋以來為秦都始皇時屬內史漢初屬雍國後分為中地郡九年復屬內史建元六年分為右內史太初元年更名主爵都尉為右扶風東漢因之魏晉為扶風郡元魏為秦平郡兼置岐州西魏改郡為岐陽隋開皇初郡廢大業初州廢復置扶風郡唐復為岐州至德二載肅宗自順化幸扶風是年克復兩京置鳯翔府號為西京後罷京名今縣十次赤天興縣故雍縣秦德公既立卜居雍曰後子孫飲馬於河遂都雍至孝公乃徙焉二漢屬右扶風有五畤以祠上帝說者以為四面積髙曰雍宜為神明之隩故立羣祠云晉屬扶風郡元魏置秦平郡及岐州隋為扶風郡唐為岐州至德二載改雍曰鳯翔仍析置天興縣寶應元年省鳯翔入天興有槖泉宫秦孝公起有祈年宫秦惠公起有鳯臺秦穆公時有簫史者善吹簫能致白鳯穆公女弄玉好之公為作鳯臺以居之一旦乘鳯而去秦回中宫在縣西漢文帝十四年胸奴入蕭關回中宫候騎至雍即此次畿岐山縣漢雍縣地後周三龍縣隋開皇十六年改為岐山屬扶風郡唐屬鳯翔府有禹貢岐山有五將山苻堅為姚萇將吳忠所執於此次畿扶風縣漢美陽縣地後周置燕州唐武德二年置湋川縣貞觀八年更名扶風屬岐州岐陽鎮昔周太王去邠踰梁山邑於岐山之下即此詩所謂居岐之陽也文王始亦治焉二漢為美陽縣地屬右扶風晉因之唐貞觀七年置岐州元和三年省入扶風次畿盩厔縣漢武帝置屬右扶風山曲曰盩水曲曰厔因山水之曲以為名東漢省之元魏復焉後周置周南郡及恆州尋並廢隋屬京兆郡唐因之天寶元年改為宜夀至德二載復故名天復元年來屬有駱谷關司竹園次畿郿縣二漢屬右扶風晉因之元魏改為平陽縣西魏復曰郿城後周廢入周城隋開皇十八年改周城為渭濱大業二年又改渭濱曰郿屬扶風郡唐屬岐州有郿塢漢末董卓所築號曰萬歲塢斜水出縣西南衙嶺山北厯斜谷徑五丈原東又北流入渭蜀諸葛亮帥師攻魏軍五丈原與司馬宣王對壘即此次畿寶雞縣故陳倉昔秦文公逰獵於陳倉北阪獲若石云其色如肝寶而祠之故曰陳寶其神來常以夜光輝若流星從東南來集於祠城形若雄雞其聲若雷野雞夜雊說者曰此寶夫人祠也歲星與葉君合葉神來時天為之雷鳴雉為雊漢屬右扶風東漢及晋皆因之元魏改曰宛川西魏復曰陳倉後周置顯州尋州縣俱廢隋開皇十八年復置陳倉縣屬扶風郡唐屬岐州天德二載更名寶雞陳倉故城在今縣東魏為重鎮明帝太和二年蜀諸葛亮圍魏將郝昭於此不克而退大散關在西南有渭水汧水次畿虢縣本周虢仲所封謂之西虢秦武公十一年滅小虢是也漢屬右扶風東漢省之後復置元魏置武都郡西魏改縣曰洛邑後周置翔州州尋廢隋開皇初郡廢大業初復改縣曰虢屬扶風郡唐屬鳯翔府平陽鎮秦寧公二年徙居平陽是也漢為郿縣地磻溪水出南山兹谷北流注於渭即吕氏春秋所謂太公釣兹泉者也其投竿跽餌兩膝遺跡猶存次畿麟遊縣隋義寧元年於仁夀宫置鳯棲郡及麟遊縣二年以仁夀宫中獲白麟更郡曰麟遊唐武德元年曰麟州貞觀元年州廢縣屬岐州改仁夀宫為九成宫次畿普潤縣二漢杜陽縣地隋大業初置屬扶風郡唐屬鳯翔府有杜水漆水岐水次畿好畤縣祭天之所曰畤封禪書曰雍旁故有吳陽武畤皆廢無祠蓋黃帝時嘗用事雖晚周亦郊焉後以為縣漢屬右扶風東漢省之元魏復置為扶風郡治隋大業三年省入上宜唐武德二年析醴泉置好畤屬雍州貞觀八年省上宜入岐陽二十一年省好畤岐陽復置上宜更上宜曰好畤乾寧二年屬乾州皇朝熙寧五年來屬下府秦州周孝王封非子於此春秋戰國屬秦秦平天下屬隴西郡漢武帝分置天水郡東漢建武中更名漢陽郡兼為凉州刺史治焉魏為重鎮晉屬天水洛陽二郡兼置秦州元魏因之又置漢陽郡隋開皇初郡廢大業初復置天水郡唐為秦州升雄武軍節度今縣四上成紀縣包羲氏生於此漢屬天水郡東漢屬漢陽郡晉屬天水郡後廢焉後周復置隋屬天水郡唐屬秦州州本治上邽而成紀本治小抗川開元二十二年地震州自上邽徙治成紀之敬親川縣亦移入新城天寶元年州還治上邽寶應元年陷吐蕃大中三年復故地徙治成紀而上邽廢有禹貢朱圉山邽山渭水瓦亭山上天水縣漢上邽縣地屬隴西郡唐時陷吐蕃後收復置天水縣屬秦州唐末廢之後唐長興三年復置以赤砂鎮為治所有龍馬泉中隴城縣漢為隴縣屬天水郡東漢屬漢陽郡隋開皇六年改曰隴城屬秦州唐因之漢略陽道故城在今縣西北阿陽縣故城亦在縣西北有大隴山瓦亭山街泉亭秦谷秦非子始封於此中清水縣漢屬天水郡東漢省之晉復置屬略陽郡元魏因之後置清水郡隋開皇初郡廢屬秦州唐因之有小隴山清水伏羌城本冀戎地秦武公十年伐冀戎縣之漢屬天水郡王莽末隗囂自稱西伯據此東漢為漢陽郡治焉晉屬天水郡兼置秦州元魏改曰當亭縣後周改曰冀城隋屬天水郡唐屬秦州武德二年更名伏羌後陷吐蕃皇朝建隆二年置伏羌寨熙寧二年以為城有黃瓜縣元魏置及置漢陽郡後廢上涇州春秋戰國屬秦秦屬北地郡漢武帝分置安定郡東漢晉因之元魏太武兼置涇州蓋以涇水為名隋為安定郡唐為涇州天寶元年曰安定郡後升彰義軍節度皇朝太平興國元年改彰化軍今縣四望保定縣本安定漢屬安定郡東漢省之後復置為郡治焉元魏為涇州隋為安定郡唐為涇州至德元載更名保定漢烏氏縣故城在今縣東上靈臺縣本鶉觚漢屬北地郡東漢屬安定郡晉因之後置趙平郡後周郡廢隋屬安定郡唐屬涇州天寶元年更名靈臺亦商時密國之地周文王所伐者也秦為隂密縣白起被遷於此漢晉屬安定郡元魏屬平凉郡後省隋大業初以其地置靈臺縣二年省入鶉觚蓋取文王伐密而民始附之意故以靈臺名縣焉上良原縣隋大業初置屬安定郡唐屬涇州長武縣唐為長城𨽻邠州宜祿皇朝咸平四年置保定縣來屬五年省為寨大觀二年復置上熙州春秋戰國皆為西羌秦置隴西郡二漢晉因之惠帝分置狄道郡前凉張駿置武始郡元魏置臨洮郡隋開皇初廢武始郡屬蘭州唐因之天寶三載分置臨州後陷吐蕃號武勝軍皇朝熙寧五年收復置熙州臨洮郡升臨洮軍節度今縣一中下狄道縣秦漢為隴西郡晉為狄道縣張駿置武始郡元魏置臨洮郡及龍城縣唐置臨州皇朝置熙州有白石山在東清源堡漢首陽縣地屬隴西郡東漢及晉皆因之元魏改首陽曰渭源隋屬隴西郡唐上元二年復改曰首陽而於渭源故城别置渭源縣屬渭州儀鳯三年省首陽入渭源沒蕃後廢皇朝熙寧五年置渭源堡屬熙州有禹貢鳥鼠同穴山渭水所出今謂之青雀山上隴州春秋戰國屬秦秦屬內史二漢屬右扶風晉屬扶風郡西魏置隴東郡兼置東秦州後改為隴州隋開皇三年郡廢大業三年州廢屬扶風郡唐復為隴州天寶元年曰汧陽郡今縣四望汧源縣本汧縣漢屬右扶風後漢及晉皆因之西魏曰汧隂縣後改曰杜陽後周復曰汧隂隋改曰汧源屬扶風郡唐為隴州治焉有禹貢岍山汧水所出有龍山弦蒲藪緊汧陽縣二漢隃麋縣地屬右扶風晉省之元魏置汧陽縣及汧陽郡後周郡廢隋屬扶風郡唐屬隴州有隃麋澤中吳山縣漢汧縣地元魏孝文置長蛇縣隋開皇末省入南田唐武德元年復置屬隴州貞觀元年更名吳山有吳嶽故南田縣元魏置屬武都郡隋屬扶風郡唐元和三年省中隴安縣皇朝開寶元年析汧陽置有秦領山中下成州秦以前為白馬氏漢屬武都郡東漢及晉為郡治焉後為楊茂搜所據楊氏數世皆封仇池公元魏置南秦州西魏改為成州隋開皇初郡廢大業初州廢置漢陽郡唐復為成州天寶元年更名同谷郡今縣二中同谷縣本漢下辨道屬武都郡東漢及晉皆為郡治焉元魏屬修武郡後為白石縣置廣業郡西魏改縣曰同谷後周兼置康州隋開皇初郡廢大業初州廢屬河池郡唐武德元年以縣置西康州貞觀六年州廢屬成州州初治上祿本漢縣屬武都郡東漢因之晉省焉後置仇池縣曰上祿唐改郡曰成州寶應元年沒吐蕃後廢咸通十三年復置徙治同谷有仇池山其上方百頃四面壁立峭絶險固自然有樓櫓却敵之狀髙七里餘蟠道三十六回上有豐水泉煮土成鹽漢末為氐楊茂搜所據中粟亭縣元魏蘭倉縣地置漢陽郡後唐清泰三年置粟亭縣屬成州有雷牛山粟亭山下鳯州春秋時為氐羌所居秦屬隴西郡二漢屬武都郡晉因之惠帝時沒於氐楊茂搜元魏置道郡兼置南岐州西魏改郡曰歸真後周郡廢改州曰鳯州隋大業初州廢置河池郡唐為鳯州天寶初復曰河池郡今縣二上梁泉縣本故道秦文公時伐南山大梓化為牛入水秦為立怒特祠於故道即此漢王引兵從故道襲雍後屬武都郡東漢及晉因之元魏置故道郡及梁泉縣隋置河池郡唐為鳯州緊河池縣漢屬武都郡東漢及晉因之後廢焉元魏置廣化縣及廣化郡隋開皇初郡廢仁夀初改縣曰河池屬河池郡唐屬鳯州皇朝徙治固鎮上兩當縣本漢故道縣地元魏置兩當縣及兩當郡隋開皇初郡廢屬河池郡唐屬鳯州皇朝徙治廣鄉鎮廣鄉即水經所謂廣香川也有兩當水出陳倉縣之大散關西南流入故道下岷州秦屬隴西郡二漢及晉因之西魏置岷州及同和郡隋開皇初郡廢大業初州廢屬臨洮郡唐復為岷州天寶元年曰和政郡後陷吐蕃皇朝熙寧六年收復今縣三祐川縣本臨洮縣地二漢晉屬隴西郡西魏置溢樂縣及同和郡隋改溢樂為臨洮唐武德元年復為溢樂置岷州又置基城縣先天元年改基城為祐川沒蕃後並廢皇朝崇寧四年復置祐川中大潭縣漢冀縣地屬天水郡皇朝建隆三年以良恭大潭二鎮置大潭縣屬秦州熙寧六年來屬有禹貢朱圉山緊長道縣本漢上祿縣地屬武都郡元魏分置長道縣隋屬漢陽郡唐屬成州天寶末廢咸通十三年復置屬秦州皇朝熙寧六年來屬有祁山蜀諸葛亮率諸軍攻祁山南安天水安定郡叛魏應亮即此輿地廣記卷十五
