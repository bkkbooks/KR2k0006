body:
  text: 輿地廣記卷二十七宋歐陽忞撰闕在今縣西故得江夏之名春秋時謂之夏汭後世謂之夏口亦謂之魯口歴代常為重鎮梁武帝自襄陽起兵進逼郢城有數百毛人踰堞且泣因投黄鵠磯蓋城之精也明旦城降有黄鵠山鸚鵡洲望崇陽縣唐天寳二年開山洞置唐年縣屬鄂州朱梁改為臨夏後唐復故名石晉天福初改為臨江皇朝開寳八年改為崇陽上武昌縣故楚之東鄂也楚子熊渠封中子紅為鄂王二漢鄂縣屬江夏郡吳孫權都之皇初三年改為武昌縣及置江夏郡黄龍元年遷都建業以陸遜輔太子鎮武昌孫皓亦嘗都此及東遷使滕牧守之晉太康元年改江夏郡曰武昌郡永平中始置江州傳綜為刺史治此東晉時庾亮謝尚亦鎮焉宋齊梁陳皆為武昌郡隋屬鄂州唐因之故西陵縣二漢屬江夏郡魏屬弋陽郡晉憲帝分屬西陽國宋因之陳省入武昌有樊山峥嶸洲晉劉毅破桓𤣥於此中蒲圻縣晉太康元年置屬長沙郡宋元嘉十六年屬巴陵郡孝建元年屬江夏郡梁置上隽郡隋平陳郡廢屬鄂州唐因之有赤壁山漢末孫權遣周瑜與劉備併力敗曹公於此有蒲圻湖中咸孚縣五代時置永安縣屬鄂州皇朝景徳四年改今名有鍾臺山牛鼻潭中通城縣本崇陽縣地皇朝熙寧五年升通城鎮為縣有九嶺山鷄鳴山太平港下嘉魚縣晉沙陽縣地屬武昌郡宋元嘉十六年屬巴陽郡孝建元年屬江夏郡梁置沙州尋廢隋省沙陽入蒲圻五代時置嘉魚縣屬鄂州有魚嶽山左大江中中安州春秋戰國屬楚秦屬南郡漢髙帝置江夏郡東漢晉因之宋孝建元年分置安陸郡齊因之梁置南司州尋罷西魏置安州總管府隋開皇初郡廢十四年府廢大業初復置安陸郡唐武徳四年平王世充改為安州天寳元年復曰安陸郡後唐升安逺軍節度皇朝因之今縣五中安陸縣漢屬江夏郡晉為郡治宋置安陸郡梁置南司州西魏置安州隋唐因之漢江夏郡故城在東南有禹漢陪尾山石巖山晉張昌作亂山下鎮南將軍劉𢎞擊斬之有溳水東南入汚有雲夢澤然楚之雲夢跨江南北非止此而已中雲夢縣西魏置隋屬安州唐因之皇朝寧熙二年省入安陸元祐元年復置按漢地理志西陵縣為江夏郡治而有雲夢官疑此地是也中應城縣漢雲杜縣地西魏置隋大業初改曰應陽屬安陸郡唐武徳四年復曰應城屬安州元祐三年省入雲夢大和二年復置天祐二年復曰應陽後唐復故有没河水出大洪山東流入於溳有温泉水出京山東澤中淵静如鑑聞人聲則湯湯奮發其熱可以燖鷄東南流注於溳有蒲騷城左傳鄖人軍於蒲騷是也中孝感縣本孝昌縣宋孝武帝置屬江夏郡西魏置岳州及岳山郡後周並廢又有澴岳郡隋開皇初廢以縣屬安州唐武徳四年置澴州及澴陽縣八年州廢省澴陽入孝昌來屬元和三年省入雲夢咸通中復置後唐改為孝感有澴河鎮九宗山中下應山縣本東漢平春縣地屬江夏郡晉因之宋屬義陽郡後省梁置永陽縣及應州隋大業初州廢改永陽為應山屬安陸郡唐屬安州有大龜山石龍山漻水按水經漻水出江夏平春縣西南過安陸入於溳上復州春秋戰國屬楚秦屬南郡二漢屬南江夏二郡晉元康元年分置竟陵郡宋齊因之梁又置沔陽郡後周置復州隋因之而郡廢大業初州廢復置沔陽郡唐武徳五年改為復州天寳元年又曰竟陵郡石晉天福初改曰景陵郡皇朝因之熙寧六年州廢後復置今縣三緊景陵縣楚封大夫鬬辛於此是為鄖公戰國秦使白起攻楚㧞郢東至竟陵二漢屬江夏郡晉置竟陵郡後省入霄城後周復改霄城為竟陵隋開皇初州自建興移治此仁壽三年州仍治建興貞觀七年徙沔陽陽五代時又徙治此皇朝熙寧六年州廢屬安州後復置來屬有巾水戍山晉元熙三年竟陵郡言巾水戍山得古銅鐘七枚藏於相府有漢水夏水下沔陽縣春秋鄖子之國漢雲杜縣地屬江夏郡東漢晉因之宋屬竟陵郡後省梁置沔陽郡西魏省州陵惠懷二縣置縣曰建興後周置後州隋開皇初州移治竟陵仁壽二年州仍治建興大業初改建興曰沔陽州廢仍置沔陽郡唐武徳中屬復州貞觀七年州徙治此五代時又徙治景陵皇朝熙寧七年省入監利後復置来屬雲杜城在縣西北又有石城在西南西臨沔水因山為固晉杜預為荆州刺史開陽口達巴陵徑千餘里内避長江之險通零桂之清即此惠帝始置竟陵郡治此下玉沙縣皇朝乾徳三年以白沙院置屬江陵府至道三年來屬熙寧六年省入監利元祐元年復置按唐地理志郢州富水有白沙山白沙水所出而水經言江水過下隽東得白沙口謂白沙水入江處也然則白沙院之取名蓋以水所經矣上鼎州春秋戰國皆屬楚秦屬黔中郡漢屬武陵郡東漢晉宋齊皆因之梁置武州後改曰流州隋平陳郡廢改州曰朗州大業初州廢復置武陵郡唐武徳四年平蕭銑置朗州天寳元曰復曰武陵郡皇朝因之大中祥符五年改曰鼎州今縣三望武陵縣本漢臨沅縣屬武陵郡東漢為郡治晉宋齊梁陳皆因之晉趙欽問潘京曰貴郡何以名武陵京云鄙郡本名義陵郡在辰陽縣界與夷相接數為此敗光武移東出共議易號傳曰止戈為武詩稱髙平曰陸隋廢郡置朗州改臨沅為武陵縣唐因之皇朝改曰鼎州故漢壽縣本名索漢為武陵郡治東漢陽嘉三年更名為荆州刺史治而郡徙治臨沅至魏州徙治江陵長改漢壽為吳壽晉復故宋齊梁陳皆因之隋省入武陵有武陵山原闕山上有善卷壇有沅水鼎水枉渚望桃源縣東漢沅南縣地建武二十六年置屬武陵郡晉宋齊梁陳皆因之隋省入武陵皇朝乾徳元年析武陵置桃源縣有桃源山晉陶潜桃源記晉太元末有漁人深入武陵溪見桃花夾岸居人衣冠皆秦製自言避秦隱居數世矣不知朝市之變漁人既出後冄尋之路迷終不能至有沅水中龍陽縣吳置晉宋齊梁陳皆屬武陵郡隋唐屬朗州有龍陽山零水有龍陽州吳李衡植柑於其上臨死謂其子曰吾洲有木奴千頭不責衣食嵗絹千疋後柑成果如言上澧州春秋戰國皆屬楚秦屬黔中郡二漢屬武陵郡吳孫休永安六年分置天門郡晉末以後因之隋平陳郡廢置松州尋改為澧州大業初置澧陽郡唐武徳四年平蕭銑置澧州天寳元年曰澧場郡皇朝因之今縣四望澧陽縣晉太康四年置屬天門郡宋因之後省焉隋復置及置澧州太業初置澧陽郡唐為澧州有大浮山崇山昔舜放驩兠於此有澧水涔水涔東南流入澧中下安鄉縣東漢作唐縣地後置安鄉縣隋屬澧州唐因之作唐縣東漢分孱陵置屬武陵郡晉置南平郡宋齊梁陳皆因之隋開皇中郡廢改作唐為孱陵屬澧州唐貞觀元年省入安鄉亦漢壽縣地有澧水澹水按水經注澧水東逕安南縣南澹水注之水上承澧水於作唐東逕其縣北又東注於澧謂之澹口龍王仲宣詩所謂悠悠澹澧是也中下石門縣漢零陽縣地吳時武陵充縣松梁山有石洞開廣數十丈其髙似弩仰射不至名曰天門孫休以為佳祥置天門郡於此晉宋齊梁陳皆因之隋開皇中郡廢置石門縣屬澧州唐因之有層山水經注所謂澧水東歴層歩山是也有漊水㳿水東注澧水謂之㳿口下慈利縣二漢零陵縣属武陵郡晉宋屬天門郡後省隋開皇中復置屬澧州十八年改曰慈利唐因之亦漊中縣地吳置晉宋屬天門郡後省亦崇義縣地後周置衡州隋開皇中置縣十八年改州曰崇州大業初州廢屬澧陽郡唐屬澧州麟徳元年省入慈利有九度山澧水中峽州春秋戰國屬楚秦二漢屬南郡魏武平荆州分置臨江郡劉備改為宜都郡吳晉齊宋梁皆因之兼置宜州西魏改曰柘州後周改曰硤州隋開皇七年郡廢大業初州廢置夷陵郡唐武徳二年復為硤州天寳元年曰夷陵郡皇朝因之今縣四中夷陵縣夷山在西北縣以為名秦令白起代楚三戰而燒夷陵即此二漢屬南郡建安十五年劉備以屬宜都郡吳黄武元年改曰西陵以為重鎮郡城陸坑所築也晉太康元年復故名宋齊梁陳皆因之隋置夷陵郡唐置硤州已出塞本巴山縣隋分長陽置屬清江郡後省唐武徳四年復置屬睦州八年屬東松州貞觀元年屬硤州天寳八載省入長陽五代時復置皇朝開寳八年省入夷陵有西陵山虎牙山石壁色紅間有白文類牙形焉有黄牛硤南岸髙崖間有石如人牽牛狀人黑牛黄此巖既髙加以江湍紆迴行者謡曰朝發黄牛暮宿黄牛三朝一暮黄牛如故中宜都縣二漢夷道縣地屬南郡劉備置宜都郡晉宋齊梁皆因之又析夷道置宜昌縣隋開皇七年郡廢宜昌屬江陵府大業初夷道屬夷陵郡唐武徳二年改宜昌為宜都以宜都及夷道置江州六年曰東松州貞觀元年州廢省夷道入宜都來屬有荆門山上合下開通徹山南有門象焉大江東歴荆門虎牙二山之間荆門在南虎牙在北為楚之西塞故即璞江賦曰虎牙築起以屹崒荆門鬬竦而盤薄圓淵九囘以髙騰溢流雷响而電激也東漢建武中岑彭擊荆門破公孫述將任滿田戎於此有勾將山夷水自施州東北流至縣北注大江即清江水也中下長陽縣本佷山漢屬武陵郡東漢屬南郡晉屬宜都郡太康元年改為興山後復故宋因之後改為長陽隋屬江陵府唐武徳四年置睦州八年州廢屬東松州貞觀元年州廢來屬故鹽水縣後周置及立亭州資曰郡隋開皇初郡廢大業初改州為庸州又廢為清江郡後郡徙而縣省唐武徳四年復置為睦州八年省入長陽昔巴蠻廩君乘土舡徙夷水下至鹽陽射殺神女又下及夷城而居之蓋此地也有佷山出藥草恒山世以銀為音有長陽溪出射堂村東六七里谷中有石穴清泉濆流三十許歩復入穴其水重源顯發北流注於夷水中下逺安縣本東晉沮陽縣地義熙初分置髙安縣及汶陽郡後周改縣曰逺安隋開皇七年郡廢属峽州唐因之有沮水東南流逕當陽枝江縣入於江謂之沮口輿地廣記卷二十七
