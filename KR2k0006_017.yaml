body:
  text: 輿地廣記卷十七宋歐陽忞撰陜西路化外州安西大都護府漢為龜兹國唐立安西府初治西州顯慶二年平賀魯析其地立濛池崑陵二郡護府分種落列置州縣西盡波斯國皆𨽻安西而徙府治髙昌故地三年又徙治龜兹都督府而故府復為西州咸亨元年吐蕃陷都護府長夀二年收復安西四鎮至德元載更名鎮西後復為安西吐蕃既侵河隴唯李元忠守北庭郭昕守安西與沙陀回紇相依攻之久不下建中二年元忠昕遣使間道入奏詔各為大都護並為節度貞元三年吐蕃攻沙陀回紇北庭安西無援遂陷領四鎮龜兹都督府都護府所治本龜兹國毗沙都督府本于闐國踈勒都督府本踈勒國焉耆都督府本焉耆國北庭大都護府在流沙之西北漢為烏孫故地東漢為車師後王庭厯代為北蕃所居唐貞觀中討髙昌於時突厥屯兵於可汗浮圗城與髙昌相影響及髙昌既平懼而來降乃以其地立庭州長安二年改曰北庭都護貞元三年陷吐蕃領縣四下金滿縣下輪臺縣唐大厯六年置下後庭縣本蒲類𨽻西州後來屬寶應元年更名其三縣並貞觀十四年置下西海縣寶應元年置大都督府靈州古為戎狄地秦屬北地郡二漢魏晉皆因之元魏太武帝平赫連昌置薄骨律鎮河渚上舊是赫連杲地至明帝立靈州初治河北後徙治東園所築城後周立普樂郡隋開皇三年郡廢大業初州廢立靈武郡唐武德元年改曰靈州天寶元年曰靈武郡升為朔方軍節度領縣四望回樂縣本二漢富平縣地屬北地郡晉及元魏因之後省焉故城在縣西南元魏置回樂縣及立靈州後周立普樂郡西魏立臨河郡隋開皇元年改臨河郡曰新昌三年州郡並廢大業初立靈郡唐武德元年曰靈州四年析置豐安縣貞觀四年於回樂境內立回州以豐安𨽻焉十三年州廢省豐安天寶末明皇西狩太子即位於靈武是為肅宗上靈武縣漢屬北地郡東漢省之後周置曰建安又立厯城郡隋開皇三年郡廢屬靈州十八年改建安為廣潤仁夀元年改今名唐因之緊懷逺縣漢富平縣地後周置及立懷逺郡隋開皇三年郡廢屬靈州唐立豐州武德六年廢省九原永豐二縣入懷逺上保靜縣本𢎞靜隋開皇十一年置唐神龍元年曰安靜至德元載更名有賀蘭山中都督夏州古為戎狄秦屬上郡後為胸奴所有漢武帝伐胡取河南地立朔方郡東漢因之後復沒於戎狄晉末赫連勃勃建都於此國號大夏子昌為元魏太武所滅以其地立夏州西魏立𢎞化郡隋開皇初郡廢大業初州廢立朔方郡唐貞觀二年平梁師都改為夏州天寶元年曰朔方郡後升靜難軍節度領縣三上朔方縣二漢屬朔方郡後廢晉末赫連勃勃於黑水之南榮都號為統萬蒸土以築城鐵錐刺入一寸即殺作人不及一寸行錐者死元魏立夏州及置嚴緑縣西魏立𢎞化郡隋曰夏州復曰朔方郡後為梁師都所據唐克之改為夏州貞觀三年改巖緑為朔方縣唐末拓跋思恭為靜難軍節度使其後世擅立相承至今為梗中下德靜縣隋末置唐貞觀七年𨽻北開州八年曰化州十三年州廢來屬中下寧朔縣後周置𨽻𢎞化郡隋屬朔方郡唐武德六年立南夏州貞觀二年州廢縣省入朔方五年復置來屬長安二年省開元四年又置九年省其後又置中都督凉州古為戎狄秦時屬胸奴使休屠王居其地漢武帝太初四年開立武威郡東漢魏晉因之兼立凉州前凉張軌後凉吕光皆據之北凉且渠蒙遜亦自張掖徙居焉元魏後周亦曰武威郡隋開皇初郡廢大業初州廢立武威郡唐武德二年平李軌立凉州天寶初曰武威郡後為河西節度領縣五中下姑臧縣本胸奴蓋藏城後人語訛遂曰姑臧二漢魏晉皆武威郡治兼為凉州刺史治焉前凉後凉北凉皆據此元魏後周亦為武威郡隋唐為凉州或為武威郡漢鶉隂縣𨽻安定郡東漢來屬後省故城在今縣東南漢顯美縣屬張掖郡東漢來屬晉以後因之後周省入姑臧府禹貢豬野澤古休屠城蓋并得漢武威休屠二縣地下神烏縣本漢鸞烏縣屬武威郡後省唐總章元年於漢縣故城復置神龍元年更名中昌松縣本漢蒼松屬武威郡魏晉因之後凉昌光改為昌松元魏立昌松郡後周郡廢隋開皇初改縣為永始後復曰昌松唐因之漢允街縣神爵二年置屬金城郡東南漢揟次縣屬武威郡東漢以後因之元魏屬昌松郡後周省入昌松中下大寶縣本畨和二漢屬張掖郡晉屬武威郡元魏立畨和郡後周郡廢為鎮隋開皇中為縣併障燕支二縣入焉唐咸亨元年立雄州調露元年州廢來屬天寶三載以山出醴泉更名有焉支山中嘉麟縣本鸞烏二漢屬武威郡後省唐武德三年復置神烏縣貞觀元年省神龍元年改武威縣為神烏而於鸞烏故城置嘉麟縣景龍元年省先天二年復置中都督沙州昔舜竄三苗於三危即此其後世為戎狄地出美瓜長者狐入其中食之首尾不出左傳所謂元姓之戎居於瓜州是也戰國及秦月氏有其地漢時入胸奴武帝開之屬酒泉郡後分立敦煌郡東漢魏晉因之西凉李皓初據此元魏亦曰敦煌郡兼立瓜州後周因之隋開皇初郡廢大業初州廢復為燉煌郡唐武德二年曰瓜州五年改為西沙州貞觀七年曰沙州天寶元年曰燉煌郡自祿山之亂河右沒於吐蕃大中後吐蕃微弱首領張義潮以瓜沙十一州來歸而宣懿德微不暇疆理名存有司而已後唐莊宗時升為歸義軍節度領縣二下敦煌縣二漢為郡治晉亦屬焉北魏立瓜州後周改縣為鳴沙隋大業初復為敦煌唐立沙州漢郊榖縣屬敦煌郡晉因之元魏立郊榖郡後周郡縣皆廢入焉禹貢三危山在東南有三峯有神沙山冬夏有聲如雷渥窪水漢元鼎中土人得竒馬以獻武帝欲異之乃云從渥窪水中出於是作天馬之歌下夀昌縣本龍勒二漢屬敦煌郡晉因之元魏立夀昌郡後周郡縣皆廢入敦煌唐武德二年析敦煌置夀昌永徽元年省乾封二年復置開元二十六年又省後復置治漢龍勒縣故城陽關在縣西六里玉門關在西北一百十八里二關之西三百餘里有蒲昌海一名鹽澤廣袤三四百里則葱嶺于闐兩河之所注也下都督瓜州古西戎地戰國時月氏有之後入胸奴漢屬敦煌郡東漢魏晉皆因之元康五年立晉昌郡後廢元魏後周為前樂郡隋開皇初郡廢屬瓜州唐武德五年改瓜州為西沙州而析晉昌别立瓜州天寶元年曰晉昌郡領縣二中下晉昌縣本冥安二漢晉屬敦煌郡惠帝分屬晉昌郡西凉李皓改為凉興郡元魏改為常樂郡後周省冥安别置凉興郡隋開皇初郡廢屬瓜州改凉興為常樂縣唐武德四年更名晉昌五年别立瓜州於此中下常樂郡本府至二漢屬敦煌郡魏分置宜禾縣晉立晉昌郡李皓改晉昌郡曰凉興元魏改郡曰常樂後周廢縣别置於𡨕安故城焉既而改常樂縣為晉昌武德元年别置常樂於此下都督鹽州春秋戎狄之地秦屬北地郡二漢因之魏晉荒廢元魏立大興郡西魏改為五原郡兼立西安州後改州曰鹽州又改郡為大興郡隋開皇初郡廢大業初州廢立鹽川郡唐武德二年平梁師都立鹽州天寶元年曰五原郡貞觀三年沒吐蕃九年復城之領縣一上五原縣漢馬領縣地屬北地郡後置五原縣元魏立大大興郡西魏立鹽州隋曰鹽川郡唐曰鹽州府烏池白池細項池四瓦窰池鹽上白池縣本興寧隋末置景龍三年更名中府勝州本春秋戎狄之地戰國屬趙秦屬雲中九原二郡二漢屬雲中五原二郡魏晉後荒廢隋開皇二十年立勝州大業初州廢立榆林郡唐武德中平梁師都立勝州天寶元年曰榆林郡領縣二中下榆林縣本漢雲中之沙南五原之五原地南界有榆溪塞即䝉恬為秦侵胡闢地數千里纍石為城植榆為塞是也隋開皇七年置榆林縣二十年立勝州大業初立榆林郡唐因之漢五原縣故城在今縣西有隋故榆林宫東有榆林關中下河濱縣亦漢治南縣地唐貞觀三年置以東臨河岸故名及立雲州四年曰威州八年州廢來屬東北有河濱關下都督西州漢為軍師前王國元帝置戊巳校尉屯田車師故地地形髙敞因名髙昌壘前凉張駿立髙昌郡元魏和平元年為蠕蠕所并以闕伯周為髙昌王髙昌稱王自此始孝文時金城麴嘉稱王於此傳數世至唐貞觀十四年討平之以其地立西州開元中曰金山都督府天寶元年曰兖河郡領縣五下前庭縣本漢髙昌壘壘有八城本中國人也張駿立髙昌郡吕光且渠䝉遜皆因之後闕伯周始建國至麴又泰為唐所滅立西州及置髙昌縣寶應元年改為前庭取車師前王庭以名之下柳中縣取漢舊地為名中下交河縣漢車師前王國治交河城河水分流繞城下故號交河唐取以名縣中蒲昌縣唐以始昌故城置本𨽻庭州後來屬東南有蒲類海胡人呼為婆悉海下天山縣其五縣皆唐貞觀十四年與州同置下伊州在敦煌北大磧之外為戎狄之地非九州之限東漢明帝時伐胸奴始取伊吾盧地置宜禾都尉以屯田竇憲班超初築城於此班勇為西城長史乃居焉爾後多為屯田兵鎮之所未為郡縣元魏始立伊吾郡後又為鄯善所據唐貞觀四年西域雜胡內附乃立西伊州六年曰伊州天寶元年曰伊吾郡領縣三五代時曰胡盧磧為仲雲之族牙帳仲雲小月氏之遺種也下伊吾縣本胸奴地曰伊吾盧在敦煌之北大磧之外南去玉門關八百里東去陽關二千七百三十里東漢以後為屯田兵鎮之所晉置伊吾縣屬敦煌郡元魏立伊吾郡後廢唐立伊州復置縣有天山胡人呼為折盧漫山每過之皆下馬拜一名雪山下納職縣唐貞觀四年以鄯善所築故城置開元六年省十五年復置下柔逺縣唐貞觀四年置取縣東柔逺故城以名之下甘州春秋戰國為戎狄秦及漢初為胸奴所有使昆邪王居之武帝太初元年昆邪王來降以其地立張掖郡東漢魏晉皆因之北凉且渠䝉遜始都於此元魏置張掖郡西魏置西凉州尋改曰甘州因州東甘峻山為名後周因之隋開皇初郡廢大業初州廢復為張掖郡唐武德二年平李軌立甘州天寶初曰張掖郡領縣二五代時為回鶻牙帳上張掖縣晉舊縣本胸奴昆邪王地漢立張掖郡治觻得縣東漢因之晉改曰永平縣西魏立甘州隋廢郡大業初改永平為張掖縣唐因之漢昭武縣屬張掖郡晉改曰臨澤故城在縣西北漢張掖縣屬武威郡東漢因之後省故城亦在縣西北漢居延縣張掖都尉治東漢興十二年立西海郡魏晉因之後廢故城在今縣東北故臨松郡前凉張天錫置元魏因之後廢為縣後周省入有遮虜障漢將軍路博德所築有祁連山臨松山甘峻山合黎山居延澤禹貢所謂導弱水至於合黎餘波入於流沙居延澤即古流沙也中下刪丹縣漢屬張掖郡東漢因之後分屬西郡晉因之元魏改縣曰山丹隋大業初復改曰刪丹屬張掖郡唐屬甘州漢日勒縣屬張掖郡東漢因之後分立西郡魏晉元魏因之改縣曰永寧西魏郡廢又改曰弱水後周省入山丹故城在縣東南有焉支山胸奴初失祁連焉支二山惜之歌曰奪我祁連山使我六畜不繁息失我焉支山使我婦女無顔色下肅州古月氏地後入胸奴漢太初元年開立酒泉郡東漢魏晉因之西凉李皓自敦煌徙居於此元魏後周亦為酒泉郡隋開皇初郡廢仁夀中立肅州大業初州廢入張掖郡唐武德二年分立肅州天寶元年曰酒泉郡領縣三中下酒泉縣本福祿漢立酒泉郡城下有金泉味如酒因以名焉東漢以後皆因之元魏置酒泉軍後復為郡隋郡廢立肅州州廢屬張掖郡義寧元年改福祿為酒泉唐立肅州西南有崑崙山周穆王見西王母於此漢平帝時金城塞外羌獻魚鹽之地遂得西王母石室以為西海郡後為吐谷渾所都隋大業三年討之復立西海郡下福祿縣本漢樂涫縣屬酒泉郡東漢晉因之後省唐既改福祿縣為酒泉武德二年於樂涫故城復置中下玉門縣漢屬酒泉郡時罷玉門關屯徙其人於此因以名縣東漢魏晉因之元魏立㑹稽郡併新鄉延興入㑹稽縣隋開皇中改縣為玉門屬瓜州唐武德二年來屬貞觀元年省後復置開元中沒吐蕃因置玉門軍天寶十四載廢軍為縣北有獨登山出鹽以充貢有神雨山下疊州厯代為諸羌所據晉屬汶山郡宋齊因之後為西魏後周所有武帝立西疆恆香二郡兼立疊州隋開皇初二郡並廢大業初州廢入臨洮同昌二郡唐武德二年復立疊州天寶元年曰合川郡領縣二下合川縣後周置及立西疆郡隋郡廢屬臨洮郡唐立疊州故疊川縣後周置及立疊州隋廢州屬臨洮郡唐武德二年來屬貞觀二年省入焉有白嶺山下常芬縣後周置及立恆香郡隋郡廢屬同昌郡唐武德元年立芬州髙宗上元二年陷吐蕃神龍元年州廢來屬有弱水下宕州厯代為諸羌所據元魏武帝時始內附封為宕昌王後周立宕昌國武帝天和元年置宕州隋大業初州廢為宕昌郡唐武德元年復為宕州天寶元年曰懷道郡領縣二下懷道縣後周置及立甘松郡隋開皇初郡廢屬宕州唐為州治貞觀三年省和戎縣入焉下良恭縣本陽宕後周置及立宕昌郡兼立宕州隋郡廢後州廢復為宕昌郡唐屬宕州貞觀元年以成州之潭水來屬後省入焉下都督府豐州春秋為戎狄戰國屬趙秦屬九原郡漢屬五原郡東漢因之魏晉後為胸奴所沒隋文帝置豐州煬帝初州廢置五原郡唐貞觀四年以突厥降户立豐州不領縣十一年州廢入靈州二十三年復立天寶元年曰九原郡領縣二中下九原縣二漢屬五原郡後沒胸奴唐永徽四年復置中下永豐縣唐永徽元年置麟德元年别置豐安縣天寶末省東受降城唐景雲二年朔方軍總管張仁願築三受降城中受降城有拂雲堆祠西受降城開元初為河所圮十年總管張說於城東别置新城北三百里有鸊鵜泉上宥州厯代地理與鹽州同唐調露元年於露夏南境以降突厥立魯州麗州含州塞州依州契州以唐人為刺史謂之六胡州長安四年併為匡長二州神龍三年立蘭池都督府分六州為縣開元十年復立魯麗契塞四州十年平康待賓遷其人於河南及江淮十八年復為匡長二州二十六年還所遷胡户立宥州及延恩等縣天寶元年曰寧朔郡至德二載更郡曰懷德乾元元年復故名寶應後廢元和九年於經略軍復置距故州東北三百里十五年徙治長澤為吐蕃所破長慶四年節度使李祐復奏置領縣二中延恩縣唐開元二十六年以故匡州地置又以故塞門縣地置懷德縣以故蘭池州之長泉縣地置歸仁縣寶應後皆省元和九年復置延恩有經略軍在榆多勒城天寶中王忠嗣奏置中下長澤縣本漢三封縣地屬朔方郡後省元魏置長澤及立闡熙大安二郡又立長州隋開皇三年郡並廢大業三年州廢入朔方郡唐貞觀七年立長州十三年州廢𨽻夏州元和十五年來屬有胡洛鹽池輿地廣記卷十七
