body:
  text: 輿地廣記卷三宋歐陽忞撰唐十五道採訪使關內道京兆華同商鳯翔邠右京畿採訪使治京城內隴涇原渭武威今定安雄今廢寧慶鄜丹延亦今延安靈會鹽夏綏今綏德宥麟勝豐單于大都護安北大都護鎮北大都護右關內採訪使以京官領河內道河南汝右都護採訪使治東都城內陜虢滑鄭潁許今潁昌陳蔡汴今開封宋今應天亳徐泗濠宿鄆齊曹今興仁濮青淄登萊棣兖海沂密右河南採訪使治汴州河東道河中晉絳慈隰太原汾沁今威勝遼嵐憲欣代雲朔蔚武今毅州新潞澤右河東採訪使治河中河北道孟懷魏今大名博相衛貝今恩州澶今開德刑洺惠今磁州鎮今真定兾深趙滄景今永靜德定今中山易涿幽瀛今河間莫平媯檀葪營安東上都護右河北採訪使治魏州山南道江陵峽歸夔澧朗今鼎州忠涪萬襄泌今唐州隋鄧均房復郢金右東道採訪使治襄州興元洋利鳯興成文扶集今廢壁今廢巴蓬通今達州開閬果渠右西道採訪使治梁州隴右道秦河渭今鞏州鄯今湟州蘭臨今臨州階洮岷廓疊石涼沙瓜甘肅伊西西大都護北庭大都護右隴右採訪使治鄯州淮南道揚楚滁郵夀廬舒光蘄安黃信今信州右淮南採訪使治揚州江南道潤升今江寧常蘇今平江湖杭睦越明衢處婺溫台福建泉汀漳右東道採訪使治蘇州宣歙池洪江鄂嶽饒虔吉袁信撫漳衡永道郴邵右西道採訪使治洪州黔辰錦施敘今沅州奬夷今永州播思費南今南平溪溱右黔中採訪使治黔中劍南道成都彭闕溪嘉眉卭簡資嶲闕黎茂翼維今威州戎今敘州姚松當悉靜柘恭保今棋州真霸乾梓遂綿劍合龍普渝今恭州陵今仙井榮昌瀘保寧都護今廢右劍南採訪使治益州嶺南道廣韶循潮康瀧今廢端新封潘今廢春今廢勤今廢辨今廢髙恩今南恩雷崖今廢瓊振儋今昌化萬安雍澄今廢賔橫潯巒今廢貴龔象藤巖宜瀼籠田環桂梧賀連栁富今廢昭蒙今廢嚴今廢融思唐今廢古容牢今廢白今廢順今廢繡今廢欎林黨今廢竇今廢禺今廢亷義今廢安南中都護陸峯愛歡長福祿芝今廢武峩今廢演武安今廢湯右嶺南採訪使治廣州按唐志云自秦變古始郡縣天下下更漢晉分裂為南北至隋滅陳天下始合為一乃改周為郡依漢制置太守以司𨽻刺史相統治唐興髙祖改郡為州太守為刺史又置都督府以治之然天下初定權置州郡頗多太宗元年始命併省又因山川形便分天下為十道一曰關內二曰河南三曰河東四曰河北五曰山南六曰隴右七曰淮南八曰江南九曰劍南十曰嶺南至十三年定簿凡州府三百五十八縣一千五百五十一明年平髙昌又增州二縣六其後北殄突厥頡利西平髙昌北踰隂山西抵大漢其地東極海西至焉耆南盡林州南境北接臨延陀界開元二十一年又因十道分山南江南為東西道增置黔中道及京畿都畿置十五採訪使檢察如漢制刺史之職天寶盜起中國用兵而河西隴右不守陷於吐蕃至大中咸通始復隴右乾符以後天下大亂至於唐亡然唐之盛時開元天寶之際東至安東西至安西南至日南北至單于府蓋南北如漢之盛東不及而西過之唐藩鎮貝博魏相磁洺衛右魏博傳五世至田𢎞正入朝十年復亂更四姓傳十世有州七恆兾深趙右成德更二姓傳五世至王承元入朝眀年王庭湊反傳六世有州四幽涿營瀛莫平葪媯檀右盧龍更二姓傳五世至劉總入朝六月朱克融反傳十二世有州九淄青齊海登萊沂密曹濮兖鄆右淄青傳三世而滅有州十二滄景德棣右滄景傳三世至程灌入朝十六年而李全略有之至其子同捷而滅有州四汴潁宋亳右宣武傳四世而滅有州四申光蔡右彰義傳三世而滅有州三邢汾晉澤潞右澤潞傳三世而滅有州五按唐贊云安史亂天下至肅宗大難略平君臣皆幸安故瓜分河北地付授叛將護養孽萌以成禍根亂人乘之遂擅署吏以賦稅自私不朝獻於庭效戰國肱髀相依以土地傳子孫脅百姓加鋸其頸利怵逆汙遂使其人自視猶羌狄然一冦死一賊生訖唐亡百餘年卒不為王土五代梁有州七十八汴洛都雍兖沂密青淄齊棣登萊徐宿鄆曹濮宋亳單潁陳蔡許汝鄭滑襄均房鄧隨郢唐復安申蒲孟懷晉絳浹虢華商同耀邠寧慶衍鄜坊丹延夏銀綏宥靈鹽魏博貝衛澶相邢洺磁鎮兾深趙易祁定唐有州一百二十三汴洛都雍兖沂密青淄齊棣登萊徐宿鄆曹濮宋亳單潁陳蔡許汝鄭滑襄均房鄧隨郢唐復安申蒲孟懷晉絳陜虢華商同耀寧慶衍鄜坊丹延夏銀綏宥靈鹽岐隴涇原渭武秦成階鳯乾魏博貝衛澶相邢洺磁鎮冀深趙易祁定滄景德瀛莫幽涿檀葪順營平蔚朔雲應新媯儒武欣代嵐石憲麟府并汾慈隰澤潞沁遼晉有州一百九汴洛都雍兖沂密青淄齊棣登萊徐宿鄆曹濮宋亳單潁陳蔡許汝鄭滑襄均房金鄧隨郢唐復安申蒲孟懷晉絳陕虢華商同耀邠寧慶衍威鄜坊丹延夏銀綏宥靈鹽岐隴涇原渭武秦成階鳯乾魏博貝衛澶相邢洺磁鎮兾深趙易祁定滄景德欣代嵐石憲麟府并汾慈隰澤潞沁遼漢有州一百六汴洛都雍兖沂密青淄齊棣登萊徐宿鄆曹濮宋亳單潁陳蔡許汝鄭滑襄均房金鄧隨郢唐復安申蒲孟懷晉絳陜虢華商同耀解邠寧慶衍威鄜坊丹延夏銀綏宥靈鹽岐隴涇原渭武乾魏博貝衛澶相邢洺磁鎮冀深趙易祁定滄景德欣代嵐石憲麟府并汾慈隰澤潞沁遼周有州一百一十八汴洛都雍兖沂密青淄齊棣登萊徐宿鄆曹濮濟宋亳單潁陳蔡許汝鄭滑襄均房金鄧隨郢唐復安申蒲孟懷晉絳陜虢華商同耀解邠寧慶威鄜坊丹延夏銀綏宥靈鹽岐隴涇原渭秦成階鳯乾魏博貝衛澶相邢洺磁鎮冀深趙易祁定滄德濱瀛莫雄霸府慈隰澤潞楊楚泗滁和光黃舒蘄廬夀海泰濠通右按五代史職方考云唐自僖昭以來日益割裂梁初天下别為十一南有吳浙荆湖閩漢西有岐蜀北有燕晉劉仁恭稱燕李克用稱晉李茂貞稱岐錢鏐稱吳越楊行密稱吳王審知稱閩馬殷稱楚王建稱蜀髙季興稱南平劉隱稱南漢而朱氏所有七十八州以為梁朱溫莊宗初起并代取幽滄有州三十五其後又取梁魏博等十六州魏博貝衛澶相邢洺磁鎮兾深趙易祁定合五十一州以滅梁岐王稱臣又得其州七岐隴涇原渭武乾同光破蜀已而復失惟得秦鳯階成四州而營平四州陷於契丹其增置之州一寰合一百二十三州以為唐莊宗李充用之子石氏入立獻十有六州於契丹瀛莫幽涿檀薊順蔚湖雲應新媯儒武寰而得蜀金州又增置之州一威合一百九州以為晉石敬塘劉氏之初秦鳯階成復入於蜀隱帝時增置之州一解合一百六州以為漢劉皓郭氏代漢十州入於劉旻沂代嵐石憲麟并汾沁遼世宗取秦鳯階成瀛莫及淮南十四州揚楚泗滁和光黃舒蘄廬夀海泰濠又增置之州五濟溪雄霸通而廢者三衍武景合一百一十八州以為周郭威宋興因之此中國之大略也其餘外屬者強弱相并不常其得失至於周末閩已先亡閩有州五建汀漳泉入於石晉福入於吳越而在者七國自江以南二十一州潤常宣歙鄂升池饒信江洪撫袁吉虔筠建汀劍漳泉為南唐晉天福二年吳楊溥遜位於徐知誥知誥改姓李名升號南唐自劍以南及山南西道四十六州益漢彭蜀綿眉嘉劍梓遂果閬普陵資滎簡卭黎雅維茂文龍黔施夔忠萬興利開通涪渝瀘合昌巴蓬集壁渠戍梁洋為蜀前蜀王建梁時稱帝於成都建死子衍立唐莊宗同光三年衍降孟知祥鎮成都明宗時封蜀王為後蜀自湖南北十州為楚潭衡豐朗嶽道永卲全辰自浙東西十三州為吳越福杭越蘇湖溫台明處衢婺睦秀自嶺南北四十七州為南漢融郴連昭宜桂賀梧蒙嚴富栁象容雍端康封恩春新髙竇雷化韶藤白廣欽亷橫賔潯忠欎林英雄瓊崖儋萬安羅潘勤瀧辨自太原以北十州為東漢劉旻而荆歸峽三州為南平合中國所有二百六十八州而軍不在焉輿地廣記卷三
