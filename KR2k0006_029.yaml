body:
  text: 輿地廣記卷二十九宋歐陽忞撰成都府次府成都府自三代以前為蜀國其君曰蠶叢曰伯雍曰魚鳬曰杜宇曰開明相繼王之周武王伐商蜀人從焉牧誓所謂庸蜀是也秦惠王時巴蜀相攻惠王乃使張儀司馬錯等伐蜀取之置蜀郡西漢因之蜀王本治廣都樊鄉儀既平蜀乃自赤里街移治於少城儀所築也謂之龜城至昭王時李氷為蜀守穿二江行成都中以灌溉土田蜀由此為沃野蜀人始未知學漢景帝時文翁為蜀守乃立學宫教民以經術文藝於是蜀之學者比齊魯焉武帝置益州以統之王莽敗公孫述據蜀光武遣吳漢討平之亦為蜀郡東漢末劉焉為益州牧始自廣漢之雒移治於成都其子璋為劉備所取據其地魏咸熙中遣鄧艾伐取之晉武帝改為成都國尋復置蜀郡兼為益州刺史治惠帝之末李特僭號於蜀後桓溫滅之其地復為晉有安帝時譙縱又竊據之為朱齡石所滅宋及齊梁皆因晉舊後周令尉遲回克而有之州郡復因梁焉隋開皇初郡廢大業初復置唐武德初改為益州天寶元年又改為蜀郡十五載明皇幸蜀駐蹕成都至德二年駕回秦京乃改蜀郡為成都府又分為劍南西川節度唐末王建據之而滅於後唐孟知祥又據之皇朝乾德三年王師克蜀太平興國六年降為益州端拱元年復升成都府劔南西川淳化五年復為益州嘉祐四年復升為府六年復為劍南西川今縣九次赤成都縣在府西古蜀國也秦既平蜀張儀築成都以象咸陽為蜀郡治西漢因之漢末又為益州刺史治焉晉宋齊梁陳皆因之唐為成都府治成都舊謂之錦官城言官之所織錦也亦猶合浦之珠官云又或名之曰錦里城北有升仙橋蜀人司馬相如將入長安題其柱曰不乘髙車駟馬不過汝下後奉使歸蜀果如志焉李氷㳂水造橋上應七星曰冲理橋曰市橋曰江橋曰萬里橋曰笮橋曰永平橋曰長升橋吳漢伐公孫述光武謂漢曰安軍宜在七星間蓋謂是也沱江鎮以沱水之山經為名禹貢言岷山導江東别為沱而爾雅亦言江有沱凡江之别出者皆曰沱非獨此有之故禹治水於荆州之域亦曰浮于江沱潜漢也武擔山蜀王紀云武擔山精化為女子蜀王納以為妃妃死王憐之令五丁力士擔土於成都為冡以葬妃故曰武擔今山上有石照存焉次赤華陽縣在府城東本成都縣地唐貞觀十七年析置蜀縣乾元元年更名華陽昔人論蜀之繁富曰地稱天府原號華陽故晉常璩作蜀書誦之華陽國志縣之得名實本諸此府學有石室漢蜀守文翁興學校人作石室以奉祠之次畿新都縣漢舊縣也故城在今縣東屬廣漢郡晉置新都郡於雒而以縣屬焉隋開皇十八年改新都縣曰興樂大業初省興樂入成都唐武德二年復置新都縣屬益州次畿郫縣漢舊縣也故城在今縣北屬蜀郡宋晉齊梁周隋皆因之唐屬益州蜀王杜宇號曰望帝都郫有墓在焉犀浦鎮本成都縣地唐垂拱二年析置犀浦縣屬益州秦時李氷作石犀五以厭水精穿石犀渠於南江命之曰犀牛里縣取此以為名耳不在其地也皇朝熙寧五年省為鎮入郫縣次畿雙流縣本漢廣都縣後置寧蜀郡後周郡廢屬蜀郡隋仁夀元年以太子名廣故改曰雙流唐屬益州秦時李氷穿二江行成都中故左思蜀都賦云帶二江之雙流按外江在今羅城之南笮橋下內江在今子城之南衆安橋下自唐乾符中髙駢作羅城遂作麋棗堰轉內江水從城北流又屈而南與外江水合故今子城之南不復成江然則二江雙流未嘗歷此縣之境特取蜀中事而名之耳次畿溫江縣本郫縣地西魏析置溫江縣隋開皇初省入郫仁夀初復置萬春縣大業初又省唐武德三年復置萬春縣屬益州貞觀元年更名溫江有新源水開元二十三年長史章仇兼瓊因蜀王秀故渠益開通之以漕西山竹木次畿新繁縣漢曰繁縣屬蜀郡晉因之唐為新繁屬益州次畿廣都縣本漢舊縣地隋改廣都曰雙流唐龍朔二年又析雙流置廣都縣屬益州次畿靈泉縣本漢成都縣地唐貞觀元年析蜀縣置東陽縣屬益州天寶元年更名靈池皇朝天聖四年改曰靈泉上眉州秦屬蜀郡漢屬犍為郡晉宋皆因之齊置齊通郡梁及後周皆因之隋開皇初廢齊通入眉山郡唐武德二年析嘉州置眉州天寶元年改為通義郡後復為眉州皇朝因之統縣四望眉山縣本漢武陽縣地後分置齊通縣為齊通郡治梁及後周皆因之隋開皇初郡廢改齊通曰廣通仁夀元年改為通義唐置眉州皇朝太平興國二年改為眉山按西魏置眉州隋置眉山郡皆在今嘉州其後州縣之名遷於此耳望彭山縣本漢武陽縣屬犍為郡東漢為郡治焉晉因之後郡遷於僰道乃改武陽為犍為縣置江州西魏改縣曰隆山以縣有鼎鼻山地形隆起故也後周省州置隆山郡隋開皇初屬陵州唐貞觀元年省隆山入通義二年復置來屬先天元年改為彭山取彭女山為名有彭亡聚相傳彭祖亡於此後漢岑彭伐公孫述次其地惡之㑹夜不及徙營果為述刺客所殺黃龍鎮在赤水口漢末黃龍見于武陽赤水劉先主以為受命之祥望丹稜縣南齊置齊樂縣後周因之隋開皇初改曰丹稜屬嘉州唐武德二年來屬望青神縣本漢南安縣地後周置青神縣及青神郡隋開皇初郡廢屬嘉州唐武德二年來屬舊治思濛水口八年移於今治昔蠶叢氏衣青衣以勸農桑縣蓋取此為名望蜀州秦二漢屬蜀郡晉永和中桓溫平蜀置晉原郡宋齊屬晉康郡後周廢隋屬蜀郡唐垂拱二年析置蜀州天寶元年曰唐安郡皇朝因之今縣四望晉原縣本漢江原縣屬蜀郡李雄據蜀置江原郡桓溫克之置晉原郡縣為多融後周郡廢改縣為晉原隋屬蜀郡唐垂拱二年置蜀州望新津縣本漢武陽縣地後周置新津縣以為犍為郡治焉隋開皇初郡廢屬蜀郡唐垂拱二年來屬有天柱山通齊堰自卭江口引渠南下百二十里至眉州西南入江溉田千六百頃唐開元二十八年採訪使章仇兼瓊開望江原縣本漢江原縣地後魏置僰通縣大業初省入新津唐武德二年復置唐隆縣屬益州垂拱二年來屬長夀二年改曰武隆神龍元年復曰唐隆先天元年更名唐安後又曰唐興皇朝開寶四年改唐興曰江原望永康縣本青城縣之橫渠鎮孟蜀廣政中置永康縣屬蜀州有天國山望彭州秦二漢及晉屬蜀郡桓溫平蜀置寧蜀郡梁置東益州西魏置天水郡後周州廢置九隴郡隋開皇初郡廢仁夀初置濛州大業初州廢屬蜀郡唐武德三年復置濛州貞觀三年又廢垂拱二年置彭州以天彭山為名漢湔氏道有大彭山兩山相對其形如闕謂之天彭門亦曰天彭闕江水徑其間今在茂州特取其名耳天寶元年曰濛陽郡皇朝因之今縣三望九隴縣本漢繁縣地晉置晉夀縣後周改為九隴及置九隴郡隋屬蜀郡唐置彭州武后時益州長史劉易從决唐昌沱江鑿川派流合堋口琅岐水溉九隴唐昌田民為立祠有九隴山望崇寧縣唐儀鳯二年析九隴導江郫縣置唐昌縣屬益州垂拱二年來屬長夀二年改為周昌神龍初復故名皇朝開寶四年改為永昌崇寧中改為崇寧望濛陽縣唐儀鳯二年析九隴什祁雒縣置屬益州垂拱二年來屬有瀰濛水上綿州秦屬蜀郡漢屬廣漢郡晉宋齊屬梓潼郡後置巴西郡後魏兼置潼州隋開皇初郡廢改潼州曰綿州以綿水為名大業初州廢置金山郡唐武德元年復為綿州天寶元年曰巴西郡皇朝因之今縣八望巴西縣本漢涪縣屬廣漢郡後漢伐公孫述禆將臧宫進破涪城斬公孫恢即此西魏改涪曰巴西隋置金山郡唐置綿州有涪水望彰明縣本漢涪縣地後置漢昌縣西魏改為昌隆隋屬金山郡唐屬綿州先天元年改曰昌明後唐改曰彰明有涪水有唐李白碑白之先世嘗流巂州其後內移白生於此縣緊魏城縣本漢涪縣地西魏置隋屬金山郡唐屬綿州緊羅江縣本漢涪縣地後置潺亭縣西魏改為萬安及置萬安郡隋開皇初郡廢屬金山郡唐屬綿州天寶元年改為羅江按水經注潺水出潺山水源有金銀歷潺亭而下注涪水今羅江即古之潺亭則羅江水亦古所謂潺水歟有羅潰化江因以為名上神泉縣本漢涪縣地後置西充國隋開皇十六年改曰神泉以縣西有泉能愈疾故也屬金山郡唐屬綿州有綿水上龍安縣本金山縣後周置隋屬金山郡唐屬綿州武德三年更名龍安有龍安山西北有松嶺關西昌鎮本益昌縣隋開皇四年省入金山唐永淳元年復置西昌縣屬綿州皇朝熙寧五年省為鎮入龍安中鹽泉縣唐武德三年析魏城置屬綿州有梓潼水中石泉縣本漢廣柔縣地屬蜀郡隋為汶山縣地屬汶山郡唐貞觀八年析置石泉縣屬茂州皇朝熙寧九年來屬有石紐山禹之所生也華陽國志云夷人營其地方百里不敢居畏禹神靈也上漢州秦屬蜀郡漢屬廣漢郡東漢為郡治兼為益州刺史治焉晉置新都郡宋齊為廣漢晉熙二郡隋開皇初郡廢屬蜀郡唐垂拱二年分置漢州天寶元年為德陽郡皇朝因之今縣四上雒縣漢屬廣漢郡東漢為益州刺史治至劉焉乃徙治成都晉置新都郡宋齊為廣漢郡隋屬蜀郡唐置漢州洛水出章山南徑雒縣因取名焉劉備自涪攻雒龎士元中流矢死於此有嚴君平卜臺望什邡縣漢屬廣漢郡髙帝封雍齒為侯國晉屬新都郡後周置曰方寧隋省之唐武德二年析雒縣復置什邡屬漢州有洛通山即右章山也洛水所出望綿竹縣漢屬廣漢郡故城在縣東晉屬新都郡後置晉熙郡隋開皇初郡廢為晉熙縣十八年改曰孝水大業三年復曰綿竹唐武德三年屬濛州貞觀二年州廢屬益州垂拱二年來屬冇紫巖山綿水所出孝泉鎮東漢姜詩所居詩至孝母好飲江水嗜魚膾舍側忽有酒泉常出雙鯉望德陽縣本綿竹縣地東漢析置屬廣漢郡晉因之後周廢焉唐武德三年分雒縣復置屬益州垂拱二年來屬魏將鄧艾自油江出綿竹破蜀將諸葛瞻於此因築京觀有鹿頭關唐髙崇文破劉闢守兵於此有劍閣道三十里至險上嘉州秦屬蜀郡二漢屬犍為郡晉宋齊梁皆因之西魏置眉州取峩眉山為名後周改曰青州取青衣水為名後又改曰嘉州取漢嘉郡為名隋大業初置眉山郡唐武德元年復曰嘉州天寶元年曰犍為郡皇朝因之今縣五上龍游縣本漢南安縣初屬蜀郡故鄧通在文帝景帝時而其傳云蜀郡南安人也武帝平夜郎置犍為郡乃以南安為之屬縣焉東南以後皆因之後周置峨眉縣隋開皇九年改曰青衣隋軍伐陳有龍見于江引舟而進十年改曰龍游唐屬嘉州自西魏以來置眉州青州嘉州眉山郡皆治此漢之青衣本屬蜀郡其地於今為雅之盧山名山公孫述據蜀青衣不賓光武嘉之陽嘉二年改曰漢嘉劉先主因置漢嘉郡領漢嘉徙陽嚴道旄牛四縣實今之雅州盧山名山地也青衣水出盧山徼外東南流徑嚴道洪雅夾江至龍游而與岷江合龍游居青衣水口有青水山青衣津故前世於是置青州嘉州不知龍游乃南安故地非青衣漢嘉本土也唐顔師古注漢書彭越傳杜佑述通典嘉州事皆以龍游為青衣蓋已久矣平羌鎮本漢南安縣地後周置平羌縣及平羌郡隋開皇初郡廢屬眉山郡皇朝熙寧五年省入龍游有熊耳峽諸葛忠武鑿山開道蓋今湖瀼峽云上洪雅縣後周洪雅鎮隋開皇十三年置縣屬眉山郡唐武德元年置犍州貞觀元年州廢屬眉州開元七年置義州半以獠户置南安平鄉二縣八年州廢省二縣以洪雅屬眉州皇朝淳化四年來屬中夾江縣本漢南安縣地隋開皇三年析龍游平羌置屬眉山郡唐屬嘉州舊治洷上武德元年移於今治中峨眉縣本漢南縣地隋開皇十三年置屬眉山郡唐屬嘉州有峩眉山大渡河綏山鎮隋招致生獠於榮樂城置綏山縣取旁山以為名唐屬嘉州皇朝乾德四年省入峨眉下犍為縣本武陽縣後周置隋開皇初改曰犍為屬戎州唐上元元年來屬其後遂以嘉州為犍為郡按漢武帝開夜郎置犍為郡因山立名初治鄨縣其地蓋在今瀘南徼外後徙治僰道今戎州是也東漢及晉徙治武陽今眉州彭山是也始雖因平夜郎以置犍為然郡之北境本大半本巴蜀舊縣如南安武陽牛鞞資中江陽僰道是也而漢史地理志夜郎縣乃屬牂牱郡則知今嘉州非夜郎故地夜郎蓋於今珍播等州人徒見嘉州號犍為郡及領犍為縣遂以為本夜郎國杜佑述通典亦承誤焉郡之東山有大石雙峙說者以為唐蒙開夜郎立此石闕以表之抑又妄矣上卭州秦屬蜀郡二漢及晉皆因之宋齊屬晉康郡梁置卭州西魏因之及置臨卭郡隋開皇初郡廢大業初州廢屬臨卭郡唐武德元年置卭州天寶元年曰臨卭郡今縣六望臨卭縣漢晉屬蜀郡西魏置臨卭郡隋開皇初郡廢唐顯慶二年卭州自依政徙治焉漢司馬相如酤酒令文君當壚相如滌器於市中即此臨溪鎮本臨卭縣地西魏分置臨溪縣隋省之唐復置屬卭州皇朝熙寧五年省入臨卭望依政縣本臨卭縣地梁置卭州西魏因之及置依政縣隋大業初州廢唐初卭州治此後徙治臨卭望安仁縣唐武德三年析臨卭依政置屬卭州貞觀十七年省咸亨元年復置有斜江水望大邑縣唐咸亨二年析益州之晉原置屬卭州有鶴鳴山後漢張道陵隱居於此著作符書有斜江水上蒲江縣本臨卭縣地西魏置廣定縣及蒲原郡隋開皇初郡廢仁夀初改廣定曰蒲江屬臨卭郡唐曰蒲江屬卭州有蒲江水中火井縣本臨卭縣地後周置火井鎮隋末升為縣唐屬卭州有火井舊說云欲出其火先以家火投之須臾隆隆如雷聲爛然通天光曜十里左思蜀都賦云火井沉榮於幽泉髙焰飛煽於天垂今無復見矣有卭池李膺記曰臨卭老姥得水蛇飼之漸長丈餘後姥為令所殺蛇見夢於令曰我當報仇是夜四十里俱陷為湖按陷池在卭都今為化外嶲州非臨闕輿地廣記卷二十九
