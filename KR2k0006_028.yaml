body:
  text: 輿地廣記卷二十八宋歐陽忞撰荆湖北路下嶽州古三苗國地春秋戰國屬楚秦屬長沙郡二漢因之晉元康元年置建昌郡咸康元年省宋元嘉十六年置巴陵郡齊梁陳皆因之梁兼置巴州隋平陳郡廢改州為嶽州大業初改曰羅州復置巴陵郡唐武德四年平蕭銑置巴州六年改為嶽州天寶元年曰巴陵郡皇朝因之今縣五上巴陵縣二漢下雋縣地吳為巴丘邸閣晉太康元年置巴陵縣屬長沙郡宋置巴陵郡梁置巴州隋改為嶽州唐因之吳使魯肅方彧東晉使陶侃皆守巴陵以為重鎮有大江洞庭湖有資水沅水澧水湘水同注洞庭北會大江名之五渚戰國䇿云秦與荆戰大破之取洞庭五渚謂此地湖水圓廣五百餘里日月若出沒於其地有君山艑山巴即湘山也以湘君之所迹處因曰君山有石穴與太湖之苞山潛通故太湖亦有洞庭山君山東北對艑山兩山相次去數千里回峙相望孤影若浮有青草湖望華容縣漢孱陸縣地晉武帝時置安南縣屬安平郡宋因之隋開皇十八年改曰華容屬嶽州唐因之垂拱二年更名容城神龍元年復故有方臺山赤亭湖近湖有赤亭城梁元帝使胡僧祐陸法和等據赤亭擊破侯景軍擒其將住約即此上平江縣本漢昌縣地東漢置吳曰吳昌晉宋因之屬長沙郡隋平陳省入羅唐省羅入湘陰神龍三年分湘陰置昌江縣屬嶽州後唐改曰平江有汨水西至湘陰入湘有廬水中臨湘縣本巴陵縣之王朝場皇朝淳化四年升為王朝縣至道二年改為臨湘有陵城山大江中沅江縣漢益陽縣地梁置樂山郡及樂山縣隋平陳郡廢改縣曰安樂屬嶽州十八年改曰沅江唐因之乾寧中改曰橋江五代時屬朗州皇朝乾德元年復曰沅江來屬有楓山沅水下歸州春秋為夔子國楚人滅之及戰國皆屬楚秦屬南郡二漢因之吳永安三年置建平郡晉亦為建平郡宋因之後周置秭歸郡隋開皇初郡廢屬信州大業初屬巴東郡唐武德二年分夔州置歸天寶九年曰巴東郡皇朝因之今縣三下秭歸縣故夔子國其先熊摯本楚之嫡嗣以疾不立而封於夔春秋時夔子不祀祝融與鬻熊曰我先君有疾鬼神弗赦而自竄於夔我是以失楚又何祀焉楚人滅之二漢為秭歸縣屬南郡晉宋屬建平郡其地險固孫皓末晉將王濬有蜀沿江伐吳吳守將吾彥表謂皓曰增建平兵若建平不下晉師終不敢過皓不從即秭歸縣界後周置秭歸郡隋郡廢屬信州唐置歸州縣東南有丹陽城周成王封楚子熊繹始居於此後徙都枝江亦曰丹陽縣北百餘里有楚大夫屈原故宅名曰樂平里原既被流放忽然暫歸有賢姊曰女須亦歸喻令自寬離騷所謂女須之嬋媛兮申申其詈豫也袁山松以為秭歸之名始於此而酈道元引樂緯云昔歸典聲律宋忠注云歸即夔也則知古人通音同字不必因屈原也有空舲峽大江下巴東縣漢巫陽縣地宋有歸鄉縣屬建平郡初在秭歸之東後徙置於此梁置信陵郡後周郡廢改歸鄉曰樂鄉隋開皇末又改曰巴東屬信州唐武德二年來屬有石門山在大江北岸洞達東西劉備為陸遜所破走徑北門追者甚急踰山越險僅乃得免遂發憤而薨下興山縣吳置屬建平郡晉因之宋省焉唐武德三年析秭歸復置屬歸州皇朝熙寧五年省入秭歸後復置有古夔子城有昭君村漢宫女王嬙此鄉人也下辰州古蠻夷地春秋戰國屬楚秦昭襄王三十年取楚巫黔及江南地置黔中郡漢髙帝二年改為義陵郡在辰陽縣界與蠻夷相接數為所攻破光武時郡治東徙臨沅遂改為武陵郡而以此地屬焉晉宋齊因之後置沅陵郡隋平陳郡廢置辰州大業初州廢復沅陵郡唐武德四年平蕭銑置辰州天寶元年曰盧溪郡皇朝因之今縣四中沅陵縣二漢晉宋齊皆屬武陵郡後置沅陵郡隋置辰州唐因之縣東有壺頭山髙一百里圓廣三百里東漢馬援征蠻從壺頭進軍遇瘴沒於此有小酉山沅水酉水其水東南注于沅謂之酉口中下溆浦縣本漢義陵縣屬武陵郡東漢省之唐武德五年分辰溪地置溆浦縣屬辰州有溆溪其水出鄜梁山西北注于沅楚詞所謂入溆浦余邅回兮迷不知吾之所如即此水也最為沃壤特宜稻焉其城則劉備所築下辰溪縣二漢辰陽縣屬武陵郡晉省之宋復置屬武陵隋平陳改曰辰溪屬充州大業初州廢屬沅陵郡唐屬辰州有五城山辰溪縣治舊在辰水之北楚詞所謂夕宿辰陽是也下盧溪縣本沅陵縣地唐武德三年析置盧溪縣屬辰州有武山武溪所出東南流注于沅水源石上有磐瓠迹猶存磐瓠者髙辛氏之狗銜犬戎吳將軍頭致於闕下帝妻以少女磐瓠負女入南山上石室中生六男六女自相夫妻後遂滋蔓今五溪蠻夷即其種也下沅州古蠻夷地春秋戰國皆屬楚秦屬黔中郡二漢晉宋屬武陵郡梁陳屬沅陵郡隋屬辰州唐貞觀八年以辰州之龍標縣置巫州天授二年曰沅州開元十三年以沅原聲相近復曰巫州天寶二年曰潭陽郡大歷五年改為敘州唐衰沒于溪洞皇朝熙寧七年收復置沅州兼得錦奬二州之地今縣三下盧陽縣本漢無陽縣地屬武陵郡東漢省之晉宋為舞陽後省梁置龍標縣屬沅陵郡隋屬辰州唐析龍標置潭陽縣屬敘州皇朝熙寧七年以其地置盧陽縣為沅州治焉鎮江浦本龍標縣地唐置敘州熙寧五年以其地置寨元豐三年廢為鋪龍門鋪本龍門縣地唐垂拱四年析麻陽置屬辰州尋省熙寧七年以其地置鋪奬州鋪唐奬州地也下麻陽縣唐武德三年分沅陵辰溪置屬辰州熙寧七年來屬唐招諭縣垂拱三年置屬錦州後省皇朝太平興國七年折麻陽復置屬辰州熙寧七年來屬八年省入麻陽故錦州寨唐錦州地也有辰山辰溪下黔陽縣本鐔城縣地二漢及晉屬武陵郡宋省焉唐貞觀八年置朗溪縣屬敘州後置黔江城皇朝元豐三年升為黔陽縣有紫霄山七寶山沅水舞水下靖州古蠻夷地唐為溪洞誠州皇朝熙寧九年收復仍置元祐二年廢為渠陽軍三年廢為寨屬沅州紹聖中復置誠州崇寧二年改為靖州今縣三下永平縣本沅州貫保寨地皇朝元豐六年置渠陽縣為誠州治崇寧二年改為永平有勝山渠河會同縣本三江崇寧二年改名通道縣本羅蒙崇寧二年改名同下州漢陽軍春秋屬鄖後及戰國屬楚秦屬南郡二漢屬江夏郡晉宋齊因之梁屬沔陽郡後周屬復州隋屬沔州州廢屬沔陽郡唐武德四年平朱粲置沔州建中二年州廢四年復置寶歷二年州又廢屬鄂州周置漢陽軍皇朝因之熙寧四年軍廢屬鄂州元祐元年復置今縣三望漢陽縣本安陸縣地二漢及晉屬江夏郡東晉置沌陽縣宋因之後省隋開皇十七年置漢津縣屬復州大業初改曰漢陽唐屬沔州州廢屬鄂州周置漢陽軍皇朝因之有魯山大江漢水沌水灄水漢入江處謂之沔口漢末魏及吳人皆以為重鎮禹貢漢水至于大别南入于江今縣蓋古大别之地也下漢川縣本安陸縣地梁置梁安郡西魏改曰魏安郡尋改曰汊川郡隋開皇初郡廢唐武德四年析漢陽置汊川縣屬沔州州廢屬鄂州周屬安州皇朝太平興國二年改曰漢川屬漢陽軍亦周隋甑山縣也同下州荆門軍五代以前地理與江陵府同皇朝開寶五年置荆門軍熙寧六年廢元祐元年復置今縣二中長林縣本編縣地二漢晉宋皆屬南郡後廢焉而置長林長寧二縣隋開皇十一年省長林入長寧十八年改長寧曰長林屬江陵府唐武德四年於縣東北置基州及章山縣七年州廢以章山𨽻郢州郢州廢來屬八年省入長林貞元二十一年析置荆門縣後省皇朝置荆門軍軍廢屬江陵府後復置皆為軍治有章山禹貢所謂內方也有漢水漳水漕水下當陽縣二漢晉宋齊梁屬南郡後周置平州屬梁蕃隋開皇七年改為玉州九年州廢屬江陵府梁又置安居縣十八年改曰昭丘大業初改曰荆臺尋省入當陽唐武德四年復置平州六年改曰玉州八年州廢屬荆州皇朝置荆門軍初治此後徙治長林軍廢屬江陵府後復置來屬二漢臨沮縣屬南郡晉屬襄陽郡宋復屬南郡後省唐武德四年析當陽復置屬平州八年省入當陽縣有緑林山在縣東即所謂當陽長阪也曹公追劉備而張飛橫矛拒之於此有麥城關侯保麥城詐降而遁焉為潘漳所斬有沮水漳水皆東南流入于江而麥城在二水間王粲於此登樓而賦之曰夾清漳之通浦倚曲沮之長洲是也荆湖北路化外州下錦州歷代地理與辰州同唐垂拱二年析辰州麻陽縣地及開山洞置錦州天寶元年改為盧陽郡乾元元年復曰錦州統縣五中下盧陽縣中下渭陽縣中下招諭縣本省入沆州麻陽中下常豐縣本萬安縣天寶元年更名中下洛浦縣天授二年析辰州之大鄉置屬溪州後來屬下奬州歷代地理與辰州同唐天授二年析沆州之夜即渭溪二縣置舞州開元十三年以舞武聲相近更名鶴州二十年曰業州天寶元年曰龍溪郡大厯五年改為奬州統縣三中下峩山縣本夜郎天寶元年更名中下渭溪縣天授二年析夜即置中下梓薑縣本屬充州天寶二年廢為羈縻州以縣來屬下溪州歷代地理與辰州同唐天授二年析辰州之亢鄉置天寶元年曰靈溪郡統縣二上大鄉縣漢沅陵零陽二縣地屬武陵郡梁置大鄉縣屬沅陵郡隋屬辰州唐置溪州以王溪相會此地故以為名中下三亭縣貞觀九年析大鄉置有黔山大酉山輿地廣記卷二十八
