body:
  text: 輿地廣記卷三十六宋歐陽忞撰廣南西路上下都督府桂州古百越之地戰國屬楚秦屬桂林郡二漢屬宋陵蒼梧二郡吳甘露元年立始安郡晉因之宋明帝改為始建國齊復曰始安郡梁兼立桂州隋平陳郡廢大業初州廢復為始安郡唐武德四年平蕭銑立桂州天寶元年曰始安郡唐末升靜江軍節度為楚馬氏所有後入南漢今縣十緊臨桂縣本始安二漢屬零陵郡吳立始安郡晉以後因之梁立桂州唐因之貞觀八年更名慕化鎮本慕化縣唐武德初年置曰純化永正元年改曰慕化後改今名皇朝嘉佑六年省有灕山隱山桂江郡灕水也其源多桂不生雜木有陽江望興安縣本臨源唐武德四年析始安置屬桂州大厯四年更名全義石晉開運三年馬希範奏立溥州改縣為德昌後復為全義皇朝乾德中州廢來屬太平興國三年更今名有陽海山灕水湘水二水皆出一山而分源南流為灕北流為湘漢討南越戈船下賴將軍出零陵下灕水即此望靈川縣唐龍朔二年析始安置有泠石山銀江望陽朔縣隋屬始安郡唐屬桂州有陽朔山灕水望荔浦縣漢屬蒼梧郡晉宋以後屬始安郡梁屬桂州唐武德四年立荔州貞觀十二年州廢來屬永寧鎮故永寧縣皇朝熙寧四年省元祐元年復置紹聖二年又省有方山荔水上永福縣唐武德四年析始安置有永福山白石水中修仁縣夲建陵吳置及晉屬蒼梧郡宋來屬始建國齊梁陳屬始安郡隋屬桂州唐貞觀元年立晏州十二年州廢來屬長慶元年更名皇朝熙寧四年省為鎮入荔浦元豐元年復置有崇仁山駱駝山中義寧縣有思江下理定縣本興安隋屬桂州大業初省入始安後復置唐至德二載更名有蘭林山有靈渠𢎞灕水故秦史祿沂鑿後廢唐寶厯初觀察使李渤立斗門十八以通漕俄又廢咸通九年刺史魚孟咸以石為鏵隄亘四十里植大木為斗門至十八重乃通巨舟下古縣唐乾寧二年析慕化置有常安水下都督府容州古百越之地秦屬象郡漢屬南越後及東漢屬合浦郡晉宋以後因之隋為合浦永平二郡唐武德四年平蕭銑立銅州貞觀八年改為容州天寶元年曰普寧郡五代為南漢所有升為寧逺軍節度皇朝開寶五年廢繡禺順三州入焉今縣三上普寧縣本漢合浦縣地後廢隂石縣梁立隂石郡隋廢郡改縣為奉化屬藤州開皇十九年又改今名唐分屬容州元和中州自北流徙治於此故繡州本二漢河林縣地唐武德四年立陵州六年更名繡州天寶元年曰常林郡皇朝開寶五年州廢又省常林阿林羅繡三縣入普寧故欣道縣本隋寧人唐貞觀二十三年更名來屬故渭龍縣唐武德四年析普寧置開寶五年並廢入普寧有容江繡江中北流縣隋置屬合浦郡唐武德四年立銅州貞觀八年曰容州元和中州徙治普寧故禺州本東峩州唐乾封四年析白辨竇容四州置總章元年更名天寶元年曰溫水郡皇朝開寶五年州廢及省峩石扶萊羅辨三縣入北流故陵城縣唐武德四年析北流置開寶五年省入有句扇山縣南三十里兩石相對中濶三十步俗號鬼門關漢馬援討林邑經此刻石紀事龜趺尚存唐李德裕謫崖州過關詩云一去一萬里千知千不還崖州在何處生度鬼門關中陸川縣唐屬東峩州唐末來屬故順州順義郡唐大厯八年析禺羅辨白四州置皇朝開寶五年州廢及省龍化溫水南河龍豪四縣入陸川有雞籠山龍化水下都督府雍州秦屬桂林郡二漢以後屬鬱林郡唐武德四年立南晉州貞觀八年更名天寶元年曰朗寧郡五代為南漢所有升為建武軍節度皇朝曰永寧郡今縣二下宣化縣本漢領方縣地故朗寧縣唐武德五年析宣化置故思籠縣唐乾元後開山洞置二縣開寶五年省入故如和縣唐武德五年析南賔安京置屬欽州景龍二年來屬皇朝景祐二年省入有如和山鬱水水即夜郎豚水也與溫水合又與歡水合亦名駱越水自蠻境七源州流出州民常苦之唐景雲中司馬吕仁引渠分流以殺水勢自是無漂溺之害民乃來水而居有雍水下武緣縣隋屬鬱林郡大業初省入嶺山唐武德五年復置故豐陵縣唐乾元後開山洞置皇朝開寶五年省入故樂昌縣本晉興唐武德五年析宣化置開寶五年更名景祐三年省入有武緣水西有都稜鎮中融州春秋戰國為百越秦屬桂林郡二漢屬鬱林郡吳分屬桂林郡晉以後因之隋屬始安郡唐武德四年平蕭銑置融州天寶元年曰融水郡五代為南漢所有皇朝政和三年升為清逺軍節度今縣一中融水縣本潭中縣地二漢屬鬱林郡齊置齊熙縣及郡宋寧州隋改州曰融州改縣曰義熙後州廢以縣屬始安郡唐復立融州武德六年縣更名武陽鎮本武陽縣唐天寶初併黃水臨牂二縣更置皇朝熙寧七年省為鎮羅城鎮本羅城縣開寶五年分桂州置熙寧七年省為鎮下象州古百越之地秦屬桂林郡二漢屬鬱林郡吳屬桂林郡晉宋齊因之陳置象州因象山為名隋平陳因之煬帝廢屬始安郡唐武德四年立象州天寶元年曰象郡五代為楚馬氏所有後入南漢皇朝開寶七年廢嚴州入焉今縣三中下陽夀縣本漢潭中縣地吳分立桂林郡後又立象郡及置陽夀縣隋屬始安郡唐武德四年析桂林置武德縣仍於縣立象州貞觀十三年州徙治武化天寶元年省武德入陽壽大厯十一年州徙治焉故武化縣唐武德四年省建陵置屬桂州後屬晏州貞觀十三年州廢來屬五代時省有象山陽水中下來賔縣唐乾封二年招致生獠以秦故桂林郡地置及立嚴州又置歸化縣皇朝開寶七年州廢省歸化入來賔來屬有大江下武仙縣唐武德四年析桂林置乾封元年省桂林入焉有仙人山鬱水下賀州秦屬南海郡二漢屬蒼梧郡吳分立臨賀郡晉因之宋改為臨慶國齊復為臨賀郡梁陳因之隋平陳郡廢置賀州大業初廢屬始安郡唐武德四年平蕭銑立賀州天寶元年曰臨賀郡五代為楚馬氏所有後入南漢今縣三緊臨賀縣二漢屬蒼梧郡吳立臨賀郡宋為臨慶國隋立賀州大業初州廢省臨賀入富川唐武德四年復置為州治故封陽及蕩山二縣唐屬賀州皇朝開寶四年省入有臨賀山有臨水南流左合賀水縣對二水之㑹故取名焉臨水又西南徑封陽為封溪水又西南徑廣信而南注鬱水上富川縣二漢屬蒼梧郡吳以後屬臨賀郡隋屬賀州唐因之天寶中更名富水後復故名故馮乘縣唐屬賀州皇朝開寶四年省入有秦山富水中桂嶺縣本建興吳置屬臨賀郡晉太康元年改為興安隋開皇十八年更今名屬熙平郡唐武德四年來屬有桂嶺下昭州秦屬桂林郡二漢屬蒼梧郡吳晉屬始安郡宋屬始建國齊以後復屬始安郡隋屬桂州唐武德四年平蕭銑立樂州貞觀八年改為昭州取昭潭為名天寶元年曰平樂郡五代時為楚馬氏所有後入南漢皇朝開寶五年廢富州熙寧五年廢象州皆入焉今縣四中平樂縣本漢荔浦縣地屬蒼梧郡吳分置平樂縣屬始安郡晉因之宋屬始建國齊以後復屬始安郡唐立樂州改曰昭州故永平縣唐屬昭州皇朝開寶五年省入有日巖山其巖如人目童子黑白分明中立山縣本漢荔浦縣地隋置隋化唐武德五年更名立南恭州貞觀八年改曰蒙州天寶元年曰䝉山郡皇朝熙寧五年州廢以縣來屬初唐武德中析置東區純義二縣屬䝉州永貞元年改純義曰正義皇朝太平興國中改正義曰蒙山熙寧五年省東區䝉山入立山有東區山䝉江中龍平縣本漢臨賀縣地屬蒼梧郡後置龍平縣屬始安郡唐武德四年立靜州貞觀八年改為富州天寶元年曰開江縣皇朝開寶五年州廢以縣來屬熙寧八年屬梧州元豐三年復來屬初梁置開江縣隋省入豪靜唐復置屬梧州又屬桞州天寶後置思勤縣長慶三年改開江白馬江開寶五年二縣皆省入有富豪山下梧州古百越之地秦屬挂林郡漢屬南越以同姓趙光為蒼梧秦王漢兵誅南越光降為隋拱侯元鼎六年以其地立蒼梧郡東漢建安八年立交州牧治此十五年徙治畨禺晉宋齊梁陳為蒼梧郡隋平陳郡廢屬封州後屬蒼梧郡唐武德四年平蕭銑立梧州天寶元年曰蒼梧郡五代為楚馬氏所有後入南漢今縣一下蒼梧縣本漢廣信縣為蒼梧郡治東漢以後因之隋平陳郡廢改廣信為蒼梧縣唐立梧州貞觀十二年省豪靜入焉孟陵鎮本猛陵縣漢屬蒼梧郡東漢以後因之隋屬始安郡大業初省入豪靜後蕭銑復置屬藤州唐貞觀八年來屬更名戎城鎮本戎城縣梁置曰遂成隋更名屬藤州唐永徽中來屬皇朝開寶五年二縣皆省入六年復置戎城熙寧四年又省有火桂江始安江下藤州古百越之地秦屬南海郡漢屬蒼梧郡東漢晉因之穆帝分立永平郡宋齊以後因之隋平陳廢立藤州大業初州廢立永平郡唐武德四年曰藤州天寶元年曰威義郡五代時為南漢所有皇朝熙寧四年廢南儀州入焉今縣二中鐔津縣本漢猛陵縣地隋屬藤州初州治永平無鐔津又有隋安賀川寧人等縣皆貞觀後省併更置鐔津為州治以寧人屬容州永平屬昭州故寧風縣唐武德五年以縣立燕州貞觀三年徙治長恭七年更名泰州徙治寧風八年徙治安基復為燕州十八年州廢以寧風來屬故感義縣本淳民隋置唐武德中更名故昌義縣本安昌唐至德二載更名皇朝開寶五年省寧風感義義昌三縣入鐔津有鉛穴山鐔江漳江上下岑溪縣本漢猛陵縣地隋屬永熙郡唐武德五年以永業縣地立南義州及置龍城縣後廢置不常後第名義州天寶元年曰連城郡至德中改龍城為岑溪皇朝開寶三年州復曰南義州五年廢入竇州六年復置太平興國中改曰南儀熙寧四年廢以岑溪來屬故永業縣本安義唐至德四載更名故連城縣武德五年析正義置開寶六年并省入岑溪下龔州古百越之地秦屬桂林郡二漢吳晉屬蒼梧郡穆帝以後分屬永平郡後因之唐貞觀七年以燕州故治立龔州天寶元年曰臨江郡五代為南漢所有皇朝開寶五年廢思明州入焉今縣一中下平南縣本漢猛陵縣地唐貞觀七年置後自武陵徙州治此故陽川縣今陽建後更名故武陵縣隋屬藤州唐武德七年來屬故隋建縣隋屬藤州唐貞觀十二年來屬故大同縣貞觀七年置皇朝開寶六年四縣皆省入平南故武郎縣唐永隆二年析龔蒙象三州立思唐州及置武郎平原二縣長慶三年改平原曰思和石晉天福初改州曰思化漢初復舊開寶五年改州曰思明六年州廢省思和入武郎來屬嘉祐二年省武郎入平南有石燕山龔江下潯州古百越之地秦屬桂林郡漢以後屬鬱林郡隋屬永平鬱林二郡唐立潯州後廢屬龔州後復置天寶元年曰潯江郡五代為南漢所有今縣一下桂平縣本漢布山縣地鬱林郡所治也後分置桂平縣梁立桂平郡隋屬鬱林郡唐屬燕州後立潯州故大賔縣隋屬永平郡唐屬燕州後來屬五代時省焉故皇化縣本漢阿林縣地隋置後省入桂平唐武德四年復置繡州貞觀七年來屬皇朝開寶五年省入桂平有潯江鬱江下貴州古西甌駱越之地秦屬桂林郡徙謫人居之漢屬鬱林郡東漢以後因之隋開皇初郡廢屬尹州大業初屬鬱林郡唐武德四年平蕭銑立南尹州貞觀九年改為貴州天寶元年曰懷澤郡五代為南漢所有今縣一下鬱林縣本漢廣鬱縣地屬鬱林郡谷永為太守降烏滸一萬人置七縣即此地也晉改為鬱平縣宋齊以後因之唐置南尹州後曰貴州皇朝開寶四年改曰鬱林故懷澤縣宋置隋省唐復置故潮水縣唐置故義山縣本馬嶺唐武德四年改曰馬度貞觀後省天寶後復置更名皇朝開寶五年省三縣入鬱林有馬度山南山鬱江下桞州古百越之地秦以後地理與象州同唐平蕭銑立昆州是年改曰南昆州貞觀八年又以地當桞星更名天寶元年曰龍城郡五代為南漢所有今縣三中馬平縣本漢潭中縣地屬鬱林郡吳分屬桂林郡後置馬平縣及郡隋廢郡入象州後州廢屬始定郡唐立昆州後改曰桞州有桞江羅池唐桞宗元貶為刺史死三年神降于州之後堂部將歐陽翼等見而拜之其夕夢翼而告曰館我於羅池即此地中洛容縣唐貞觀中置故象縣隋屬始安郡唐屬桂州後來屬皇朝嘉祐四年省入有洛青山中桞城縣本龍城梁置隋屬始安郡唐武德四年立龍州并置桞嶺縣貞觀七年州廢省桞嶺以龍城來屬皇朝景德三年改曰桞城有龍江潯江輿地廣記卷三十六
